      console.groupCollapsed("record.id 健康");
      console.log(report.recordIds);
      console.groupEnd();
      console.groupCollapsed("合并与数量风险");
      console.log(report.mergeRisks);
      console.log(report.quantityRisks);
      console.groupEnd();
      console.groupCollapsed("读取错误与异常数据");
      console.log(report.errors);
      console.groupEnd();
      if (report.health.safeForAutomaticSync) console.info(report.health.recommendation);
      else console.warn(report.health.recommendation);
      console.info("审计仅执行远程 GET：未写 localStorage、未调用 saveRecords、未推送 Gist。未输出 Token。");
      console.groupEnd();
      return report;
    }

    function markLocalDataChanged() {
      if (applyingRemoteData) return;
      localStorage.setItem("dotlog_last_updated", new Date().toISOString());
      queueGistSync();
    }

    async function requestGist(method, body = null, settingsOverride = null) {
      const { token, gistId } = settingsOverride || getGistSettings();
      const response = await fetch(`https://api.github.com/gists/${encodeURIComponent(gistId)}`, {
        method,
        headers: {
          Authorization: `token ${token}`,
          Accept: "application/vnd.github+json",
          ...(body ? { "Content-Type": "application/json" } : {})
        },
        ...(body ? { body: JSON.stringify(body) } : {})
      });

      if (response.status === 401 || response.status === 403) {
        throw new Error("TOKEN_INVALID");
      }

      if (response.status === 404) {
        throw new Error("GIST_NOT_FOUND");
      }

      if (!response.ok) {
        throw new Error("NETWORK_ERROR");
      }

      return response.json();
    }

    async function fetchGistData() {
      const gist = await requestGist("GET");
      const content = gist.files?.[gistDataFile]?.content;
      if (!content) return null;
      return JSON.parse(content);
    }

    async function pushGistData(data) {
      await requestGist("PATCH", {
        files: {
          [gistDataFile]: {
            content: JSON.stringify(data, null, 2)
          }
        }
      });
    }

    function syncErrorMessage(error) {
      if (error.message === "TOKEN_INVALID") return "● Token 无效，请检查";
      if (error.message === "GIST_NOT_FOUND") return "● Gist 不存在，请检查 ID";
      if (error.message === "RECORD_COUNT_REGRESSION") return "● 检测到记录减少，已阻止同步";
      if (error.message === "NORMALIZE_RECORD_COUNT_REGRESSION") return "● 数据转换数量异常，已阻止同步";
      if (error.message === "SCHEMA_BACKUP_NOT_READY") return "● 数据备份失败，已阻止同步";
      if (error.message === "MANUAL_SYNC_BACKUP_FAILED") return "● 手动同步备份失败，已阻止同步";
      if (error.message === "GIST_MERGE_UNSAFE") return "● 记录冲突或数据风险，已阻止同步";
      return "● 无法连接，请检查网络";
    }

    async function testGistConnection() {
      if (!hasGistSettings()) return false;

      setSyncStatus("syncing", "● 同步中");
      try {
        await requestGist("GET");
        const checkedAt = new Date().toISOString();
        setSyncStatus("connected", `● 已连接，上次同步 ${formatSyncTime(new Date(checkedAt))}`, { lastSyncedAt: checkedAt });
        return true;
      } catch (error) {
        setSyncStatus("error", syncErrorMessage(error));
        return false;
      }
    }

    function queueGistSync() {
      if (!hasGistSettings() || applyingRemoteData || !schemaV1BackupReady) return;
      clearTimeout(syncTimer);
      setSyncStatus("syncing", "● 同步中");
      syncTimer = setTimeout(() => {
        syncWithGist().catch(() => {});
      }, 700);
    }

    async function syncWithGist(options = {}) {
      if (!hasGistSettings() || syncInProgress) return false;
      if (!schemaV1BackupReady) {
        setSyncStatus("error", "● 数据备份失败，已阻止同步");
        return false;
      }

      syncInProgress = true;
      setSyncStatus("syncing", "● 同步中");

      try {
        const localData = collectLocalData();
        let remoteData = await fetchGistData();
        let remoteDataWasNormalized = false;
        if (remoteData) {
          const normalization = normalizeGistDataForSync(remoteData);
          remoteData = normalization.data;
          remoteDataWasNormalized = normalization.changed;
        }
        const deletionIdsToClear = new Set(getPendingDeletedRecordIds());
        let deletionApplied = false;
        let didPush = false;
        let nextData = null;

        if (remoteData && deletionIdsToClear.size > 0) {
          const deletionResult = applyRecordDeletionIds(remoteData, [...deletionIdsToClear]);
          remoteData = deletionResult.data;
          deletionApplied = deletionResult.removedIds.length > 0;
        }

        if (remoteData) {
          const movedRecordIds = findCrossDateMovedRecordIds(localData.records, remoteData.records);
          if (movedRecordIds.length > 0) {
            const deletionResult = applyRecordDeletionIds(remoteData, movedRecordIds);
            remoteData = deletionResult.data;
            deletionApplied = deletionApplied || deletionResult.removedIds.length > 0;
          }
        }

        if (remoteData && options.confirmLocalDeletions) {
          const remainingRegressions = getRecordCountRegressions(localData.records, remoteData.records);
          if (remainingRegressions.length > 0) {
            const remoteOnlyIds = findConfirmableRemoteOnlyRecordIds(localData, remoteData);
            if (remoteOnlyIds.length === 0) {
              const backupKey = createManualSyncBackup(localData, remoteData);
              if (!backupKey) throw new Error("MANUAL_SYNC_BACKUP_FAILED");
              const regressionSummary = remainingRegressions
                .map(({ dateKey, before, after }) => `${dateKey}：远程 ${before} 条 → 本地 ${after} 条`)
                .join("\n");
              const confirmed = confirm(
                `部分旧记录 ID 不一致，无法逐条核对删除。已创建本地/远程完整备份。\n\n${regressionSummary}\n\n只有确认当前手机数据完整且正确时，才点击“确定”以本地完整数据覆盖远程。`
              );
              if (!confirmed) throw new Error("RECORD_COUNT_REGRESSION");

              nextData = {
                ...localData,
                last_updated: new Date().toISOString()
              };
              applyRemoteData(nextData);
              await pushGistData(nextData);
              didPush = true;
              remoteData = null;
            } else {
              const confirmed = confirm(
                `远程比本地多 ${remoteOnlyIds.length} 条记录。\n\n如果这些记录是你主动删除的，点击“确定”以本地删除结果同步到远程；否则点击“取消”。`
              );
              if (!confirmed) throw new Error("RECORD_COUNT_REGRESSION");

              rememberDeletedRecordIds(remoteOnlyIds);
              remoteOnlyIds.forEach((recordId) => deletionIdsToClear.add(recordId));
              const deletionResult = applyRecordDeletionIds(remoteData, remoteOnlyIds);
              remoteData = deletionResult.data;
              deletionApplied = deletionApplied || deletionResult.removedIds.length > 0;
            }
          }
        }

        if (remoteData) {
          const remoteBaseline = remoteData;
          const requiresInitialMerge = options.mergeLocal || !isCurrentGistInitialized();
          const localTime = Date.parse(localData.last_updated || "1970-01-01T00:00:00.000Z");
          const remoteTime = Date.parse(remoteBaseline.last_updated || "1970-01-01T00:00:00.000Z");
          const settingsPreference = requiresInitialMerge || remoteTime > localTime ? "remote" : "local";
          try {
            nextData = mergeGistData(localData, remoteBaseline, { settingsPreference });
          } catch (error) {
            const mergePlan = error?.mergePlan;
            const manuallyResolvable = error?.message === "GIST_MERGE_UNSAFE"
              && options.confirmLocalConflicts
              && canManuallyResolveGistMergeRisks(mergePlan);
            if (!manuallyResolvable) {
              if (error?.message === "GIST_MERGE_UNSAFE" && options.confirmLocalConflicts) {
                alert(`同步仍被安全保护阻止：\n\n${describeGistMergeBlockers(mergePlan)}`);
              }
              throw error;
            }

            const backupKey = createManualSyncBackup(
              localData,
              remoteBaseline,
              "confirmed-local-conflict-and-sparse-union"
            );
            if (!backupKey) throw new Error("MANUAL_SYNC_BACKUP_FAILED");
            const conflictSummary = mergePlan.conflicts.slice(0, 5).map((conflict) => {
              const title = conflict.localRecord?.text
                || conflict.localRecord?.title
                || conflict.localRecord?.summary
                || "未命名记录";
              return `${conflict.dateKey} · ${title}`;
            }).join("\n");
            const remainingCount = Math.max(0, mergePlan.conflicts.length - 5);
            const localOnlyCount = mergePlan.dateResults
              .reduce((total, result) => total + result.onlyLocal.length, 0);
            const sparseDateCount = mergePlan.sparseRisks.length;
            const conflictSection = mergePlan.conflicts.length > 0
              ? `检测到 ${mergePlan.conflicts.length} 条同 ID 内容冲突，旧版本缺少可靠更新时间。\n\n${conflictSummary}${remainingCount ? `\n另有 ${remainingCount} 条` : ""}\n\n`
              : "";
            const sparseSection = sparseDateCount > 0
              ? `远程有 ${sparseDateCount} 个日期尚未包含当前设备新增的记录；合并将保留两端全部记录，其中本地独有 ${localOnlyCount} 条。\n\n`
              : "";
            const actionQuestion = mergePlan.conflicts.length > 0
              ? "是否以当前设备中的冲突版本为准，并保留两端所有独有记录后继续同步？"
              : "是否保留两端所有独有记录并继续同步？";
            const confirmed = confirm(
              `${conflictSection}${sparseSection}已创建本地/远程完整备份。${actionQuestion}`
            );
            if (!confirmed) throw error;

            nextData = mergeGistData(localData, remoteBaseline, {
              settingsPreference,
              conflictResolution: "prefer-local",
              resolutionTimestamp: getNowIso(),
              allowRemoteSparseWithLocalOnly: true
            });
          }
          assertNoRecordCountRegression(nextData, localData, "初始合并覆盖本地");
          assertNoRecordCountRegression(nextData, remoteBaseline, "初始合并覆盖远程");
          const shouldApplyLocally = !isGistDataEquivalentForMerge(localData, nextData);
          const shouldPushRemotely = remoteDataWasNormalized
            || !isGistDataEquivalentForMerge(remoteBaseline, nextData);
          if (shouldApplyLocally) applyRemoteData(nextData);
          if (shouldPushRemotely) {
            await pushGistData(nextData);
            didPush = true;
          }
        } else if (!nextData) {
          nextData = { ...localData, last_updated: new Date().toISOString() };
          applyRemoteData(nextData);
          await pushGistData(nextData);
          didPush = true;
        }

        if (deletionApplied && !didPush) {
          nextData = { ...nextData, last_updated: new Date().toISOString() };
          assertNoRecordCountRegression(nextData, remoteData, "主动删除同步远程");
          applyRemoteData(nextData);
          await pushGistData(nextData);
          didPush = true;
        }

        if (deletionIdsToClear.size > 0) {
          clearDeletedRecordIds([...deletionIdsToClear]);
        }

        markCurrentGistInitialized();
        const syncedAt = new Date().toISOString();
        setSyncStatus("connected", `● 已连接，上次同步 ${formatSyncTime(new Date(syncedAt))}`, { lastSyncedAt: syncedAt });
        if (settingsMode === "settings") {
          renderSettingsPage();
        } else {
          render();
        }
        return true;
      } catch (error) {
        setSyncStatus("error", syncErrorMessage(error));
        return false;
      } finally {
        syncInProgress = false;
      }
    }

    function loadRecords(date) {
      try {
        const key = storageKey(date);
        const storedValue = localStorage.getItem(key);
        const records = parseStoredRecordArray(storedValue, key);
        return normalizeRecordList(records, formatDateKey(date));
      } catch (error) {
        console.error("[Dotlog] 记录读取失败；原始 localStorage 未被改写", error);
        return [];
      }
    }

    function getPreviousDayBoundary(date) {
      const previousDate = addDays(date, -1);
      const previousRecords = loadRecords(previousDate);
      if (previousRecords.length === 0) return null;

      const record = previousRecords.reduce((latest, current) => {
        return localDateFromDateTime(current.endTime) > localDateFromDateTime(latest.endTime) ? current : latest;
      });

      return { date: previousDate, record };
    }

    function getDefaultStartTime(date, endTime) {
      if (!isValidTimeInput(endTime)) return "";
      const endMinutes = timeToMinutes(endTime);
      const previousRecord = loadRecords(date)
        .filter((record) => timeToMinutes(timePart(record.endTime)) < endMinutes)
        .sort((first, second) => timeToMinutes(timePart(second.endTime)) - timeToMinutes(timePart(first.endTime)))[0];

      if (previousRecord) return timePart(previousRecord.endTime);
      return timePart(getPreviousDayBoundary(date)?.record.endTime) || endTime;
    }

    function getRecordInterval(records, index, date) {
      const record = records[index];
      if (!record) return null;

      const previousDayBoundary = index === records.length - 1 ? getPreviousDayBoundary(date) : null;
      const previousRecord = index < records.length - 1
        ? records[index + 1]
        : previousDayBoundary?.record || null;
      const startTime = record.startTime || previousRecord?.endTime || null;
      const endTime = record.endTime || null;
      if (!startTime || !endTime) return null;

      const duration = durationBetweenDateTimes(startTime, endTime);
      const isCrossDay = datePart(startTime) !== datePart(endTime);

      let gapMinutes = 0;
      if (record.startTime && previousRecord) {
        gapMinutes = Math.max(0, durationBetweenDateTimes(previousRecord.endTime, startTime));
      }

      return {
        startTime: timePart(startTime),
        endTime: timePart(endTime),
        startDateTime: startTime,
        endDateTime: endTime,
        duration,
        gapMinutes,
        isCrossDay,
        startDate: dateFromKey(datePart(startTime)),
        endDate: dateFromKey(datePart(endTime)),
        isInvalid: duration < 0
      };
    }

    function saveRecords(date, records, options = {}) {
      if (!schemaV1BackupReady) {
        console.warn("[Dotlog] schema v1 备份尚未完成，已阻止记录写回");
        return false;
      }

      const key = storageKey(date);
      try {
        const existingRecords = parseStoredRecordArray(localStorage.getItem(key), key);
        const normalizedRecords = normalizeRecordList(records, formatDateKey(date));
        if (normalizedRecords.length < records.length) {
          console.warn("[Dotlog] normalize 后记录数量减少，已阻止写回", {
            key,
            before: records.length,
            after: normalizedRecords.length
          });
          return false;
        }

        if (normalizedRecords.length < existingRecords.length) {
          const decrease = existingRecords.length - normalizedRecords.length;
          const intentionalDecrease = options.allowRecordCountDecrease === true
            && decrease === options.expectedDecrease;
          if (!intentionalDecrease) {
            console.warn("[Dotlog] 写回记录少于当前整天数据，已阻止覆盖", {
              key,
              before: existingRecords.length,
              after: normalizedRecords.length,
              reason: options.reason || "unspecified"
            });
            return false;
          }
        }

        localStorage.setItem(key, JSON.stringify(normalizedRecords));
        markLocalDataChanged();
        return true;
      } catch (error) {
        console.error("[Dotlog] 记录写回失败，原始数据保持不变", { key, error });
        return false;
      }
    }

    function canExtendRecordToNow(record, index, date, now = new Date()) {
      if (!record || index !== 0 || !isToday(date)) return false;
      const difference = durationBetweenDateTimes(record.endTime, `${formatDateKey(now)}T${formatTime(now)}`);
      return difference >= 3;
    }

    function extendRecordToNow(index) {
      const records = loadRecords(viewedDate);
      const record = records[index];
      const now = new Date();
      if (!canExtendRecordToNow(record, index, viewedDate, now)) return;

      records[index] = stampUpdatedRecord({
        ...record,
        endTime: `${formatDateKey(now)}T${formatTime(now)}`
      }, now.toISOString());
      saveRecords(viewedDate, sortRecords(records));
      render();
    }

    function sortRecords(records) {
      return records
        .map((record, order) => ({ record, order }))
        .sort((a, b) => {
          const firstTime = localDateFromDateTime(a.record.startTime || a.record.endTime)?.getTime() || 0;
          const secondTime = localDateFromDateTime(b.record.startTime || b.record.endTime)?.getTime() || 0;
          const timeDiff = secondTime - firstTime;
          return timeDiff || a.order - b.order;
        })
        .map((item) => item.record);
    }

    function resetDateViewState() {
      tableExpanded = false;
      openCategoryIndexes = [];
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
    }

    function setViewedDate(date) {
      viewedDate = startOfDay(date);
      currentWeekStart = getWeekStart(viewedDate);
      resetDateViewState();
      render();
    }

    function createWeekSlide(weekStart, position, todayDate) {
      const slide = document.createElement("div");
      slide.className = `week-slide is-${position}`;
      const isCurrent = position === "current";
      if (!isCurrent) {
        slide.setAttribute("aria-hidden", "true");
        slide.inert = true;
      }

      for (let index = 0; index < 7; index += 1) {
        const date = offsetDate(weekStart, index);
        const day = document.createElement("button");
        day.className = "week-day";
        day.type = "button";
        day.dataset.dateKey = formatDateKey(date);
        day.setAttribute("aria-label", formatDateLabel(date));
        if (!isCurrent) day.tabIndex = -1;
        if (isSameDate(date, todayDate)) day.classList.add("is-today");
        if (isSameDate(date, viewedDate)) day.classList.add("is-selected");

        const number = document.createElement("span");
        number.className = "week-day-num";
        number.textContent = String(date.getDate());
        day.append(number);

        if (isCurrent) day.addEventListener("click", () => setViewedDate(date));
        slide.append(day);
      }

      return slide;
    }

    function renderWeekNav() {
      const todayDate = startOfDay(new Date());
      monthTitle.textContent = isSameDate(viewedDate, todayDate)
        ? "今天"
        : formatShortDateLabel(viewedDate);

      weekDays.replaceChildren(
        createWeekSlide(offsetDate(currentWeekStart, -7), "previous", todayDate),
        createWeekSlide(currentWeekStart, "current", todayDate),
        createWeekSlide(offsetDate(currentWeekStart, 7), "next", todayDate)
      );
    }

    function resetWeekSwipePosition(animate = true) {
      weekSwipeCurrentX = 0;
      weekDays.classList.remove("is-dragging");
      weekDays.style.transition = animate
        ? "transform 0.32s cubic-bezier(0.22, 0.72, 0.2, 1), opacity 0.26s ease"
        : "none";
      weekDays.style.transform = "translate3d(0, 0, 0)";
      weekDays.style.opacity = "1";
    }

    function lockPageSwipeScroll() {
      if (pageSwipeScrollLocked) return;
      pageSwipeLockedScrollY = window.scrollY || window.pageYOffset || 0;
      document.body.style.position = "fixed";
      document.body.style.top = `-${pageSwipeLockedScrollY}px`;
      document.body.style.left = "0";
      document.body.style.right = "0";
      document.body.style.width = "100%";
      document.body.style.overflow = "hidden";
      pageSwipeScrollLocked = true;
    }

    function unlockPageSwipeScroll() {
      if (!pageSwipeScrollLocked) return;
      document.body.style.removeProperty("position");
      document.body.style.removeProperty("top");
      document.body.style.removeProperty("left");
      document.body.style.removeProperty("right");
      document.body.style.removeProperty("width");
      document.body.style.removeProperty("overflow");
      window.scrollTo(0, pageSwipeLockedScrollY);
      pageSwipeScrollLocked = false;
    }

    function lockBottomSheetBackgroundScroll() {
      if (bottomSheetScrollLocked || pageSwipeScrollLocked) return;
      bottomSheetLockedScrollY = window.scrollY || window.pageYOffset || 0;
      document.body.style.position = "fixed";
      document.body.style.top = `-${bottomSheetLockedScrollY}px`;
      document.body.style.left = "0";
      document.body.style.right = "0";
      document.body.style.width = "100%";
      document.body.style.overflow = "hidden";
      bottomSheetScrollLocked = true;
    }

    function unlockBottomSheetBackgroundScroll() {
      if (!bottomSheetScrollLocked || pageSwipeScrollLocked) return;
      document.body.style.removeProperty("position");
      document.body.style.removeProperty("top");
      document.body.style.removeProperty("left");
      document.body.style.removeProperty("right");
      document.body.style.removeProperty("width");
      document.body.style.removeProperty("overflow");
      window.scrollTo(0, bottomSheetLockedScrollY);
      bottomSheetScrollLocked = false;
    }

    function buildRenderedTable(records, date) {
      const tableData = buildTimeRows(records, date);
      if (tableData.rows.length === 0) {
        return null;
      }

      const table = document.createElement("div");
      table.className = "summary-table";

      const tableWrap = document.createElement("div");
      tableWrap.className = "table-wrap";

      const timeTable = document.createElement("table");
      timeTable.className = "time-table";
      timeTable.innerHTML = `
        <thead>
          <tr>
            <th class="col-index">#</th>
            <th class="col-time">开始</th>
            <th class="col-time">结束</th>
            <th class="col-duration">时长</th>
            <th class="col-category">分类</th>
            <th class="col-tags">标签</th>
            <th class="col-event">事件</th>
            <th class="col-note">备注</th>
          </tr>
        </thead>
      `;

      const tbody = document.createElement("tbody");
      tableData.rows.forEach((row) => {
        const tr = document.createElement("tr");
        const cells = [
          row.index,
          row.start,
          row.end,
          formatDuration(row.duration),
          row,
          row,
          row,
          row.note
        ];

        cells.forEach((value, cellIndex) => {
          const td = document.createElement("td");

          if (cellIndex === 4) {
            if (value.displayCategory) {
              td.append(createCategoryBadge(value.displayCategory));
            } else {
              const empty = document.createElement("span");
              empty.className = "empty-category";
              empty.textContent = "—";
              td.append(empty);
            }
          } else if (cellIndex === 5) {
            if (value.displayCategory && value.displayTags.length > 0) {
              const tableLabels = document.createElement("div");
              tableLabels.className = "label-stack";
              tableLabels.style.justifyContent = "flex-start";
              value.displayTags.forEach((tag) => {
                tableLabels.append(createTagBadge(tag, value.displayCategory, -1));
              });
              td.append(tableLabels);
            } else {
              const empty = document.createElement("span");
              empty.className = "empty-category";
              empty.textContent = "—";
              td.append(empty);
            }
          } else if (cellIndex === 6) {
            td.textContent = value.text;
          } else if (cellIndex === 7) {
            if (value) {
              td.className = "table-note";
              td.textContent = value;
            } else {
              const empty = document.createElement("span");
              empty.className = "empty-category";
              empty.textContent = "—";
              td.append(empty);
            }
          } else {
            td.textContent = value;
          }

          tr.append(td);
        });

        tbody.append(tr);
      });

      timeTable.append(tbody);
      tableWrap.append(timeTable);

      const total = document.createElement("p");
      total.className = "table-total";
      total.textContent = `合计：${formatDuration(tableData.totalMinutes)}（共 ${tableData.rows.length} 条）`;

      table.append(tableWrap, total);
      return table;
    }

    function buildDateRecordsContent(date, interactive = true, dayViewRecords = getRecordsForDayView(date)) {
      const records = dayViewRecords;

      if (records.length === 0) {
        const emptyWrap = document.createElement("div");
        emptyWrap.className = "empty";
        emptyWrap.innerHTML = `
          <div>
            <p class="empty-title">还没有记录</p>
            <p class="empty-subtitle">发生了什么，就写下来</p>
          </div>
        `;
        return emptyWrap;
      }

      const list = document.createElement("ul");
      list.className = "list";
      const groups = groupRecordsByPeriod(records);

      periodOrder.forEach((period) => {
        if (!groups[period]?.length) return;

        const header = document.createElement("li");
        header.className = "period-header";
        header.textContent = period;
        list.append(header);

        groups[period].forEach(({ record, index, displayIndex }) => {
          const isReferenceRecord = Boolean(record.__dayViewIsReference);
          const canEditRecord = interactive && !isReferenceRecord;
          const item = document.createElement("li");
          item.className = "record";
          item.dataset.index = String(index);
          if (isReferenceRecord) item.dataset.sourceDate = record.__dayViewSourceDate || "";

          const classificationDraft = canEditRecord && (isCategoryOpen(index) || isTagOpen(index))
            ? getClassificationDraft(index, record)
            : canEditRecord
              ? classificationDrafts[index]
              : null;
          const displayCategory = classificationDraft
            ? classificationDraft.category
            : resolveRecordCategoryName(record);
          const displayTags = classificationDraft
            ? classificationDraft.tags
            : resolveRecordTagNames(record);
          const displayColor = displayCategory ? categoryColor(displayCategory) : null;
          const interval = getRecordInterval(records, displayIndex, date);
          const durationText = interval?.isInvalid
            ? "时间段有误，结束早于开始"
            : interval ? formatDuration(interval.duration) : "—";

          const bar = document.createElement("div");
          bar.className = "record-bar";
          bar.style.background = displayColor || "var(--border)";

          const body = document.createElement("div");
          body.className = "record-body";

          const mainRow = document.createElement("div");
          mainRow.className = "record-main";

          const title = document.createElement("span");
          title.className = "record-title";
          title.textContent = record.text;
          mainRow.append(title);

          if (isCrossDayRecord(record)) {
            const crossDayBadge = document.createElement("span");
            crossDayBadge.className = "cross-day-badge";
            crossDayBadge.textContent = "跨天";
            mainRow.append(crossDayBadge);
          }

          if (displayTags.length > 0) {
            const tags = document.createElement("span");
            tags.className = "record-tags";
            tags.textContent = displayTags.map((tag) => `#${tag}`).join(" ");
            mainRow.append(tags);
          }

          const subRow = document.createElement("div");
          subRow.className = "record-sub";

          if (displayCategory) {
            if (canEditRecord) {
              const category = document.createElement("button");
              category.className = "record-category";
              category.type = "button";
              category.style.color = displayColor || "var(--muted)";
              category.textContent = displayCategory;
              category.addEventListener("click", () => {
                openCategorySelection(index, record);
              });
              subRow.append(category);
            } else {
              const category = document.createElement("span");
              category.className = "record-category";
              category.style.color = displayColor || "var(--muted)";
              category.textContent = displayCategory;
              subRow.append(category);
            }
          }

          const duration = document.createElement("span");
          duration.className = "record-duration";
          duration.classList.toggle("is-invalid", Boolean(interval?.isInvalid));
          duration.textContent = displayCategory ? ` · ${durationText}` : durationText;
          subRow.append(duration);

          body.append(mainRow, subRow);

          if (record.note) {
            const note = document.createElement("div");
            note.className = "record-note";
            note.textContent = record.note;
            body.append(note);
          }

          const time = document.createElement("div");
          time.className = "record-time";

          const startTime = document.createElement("span");
          startTime.className = "record-time-start";
          startTime.textContent = interval?.startTime || timePart(record.endTime);
          if (interval?.isCrossDay) startTime.title = formatDateButtonLabel(datePart(interval.startDateTime));

          if (interval) {
            const endTime = document.createElement("span");
            endTime.className = "record-time-end";
            endTime.textContent = timePart(record.endTime);
            time.append(endTime);
          }

          time.append(startTime);

          if (canEditRecord && editingRecordIndex !== index && canExtendRecordToNow(record, index, date)) {
            const extendButton = document.createElement("button");
            extendButton.className = "extend-to-now-button";
            extendButton.type = "button";
            extendButton.textContent = "⤴";
            extendButton.setAttribute("aria-label", "延长到现在");
            extendButton.title = "延长到现在";
            extendButton.addEventListener("click", (event) => {
              event.stopPropagation();
              extendRecordToNow(index);
            });
            time.append(extendButton);
          }

          if (canEditRecord && isCategoryOpen(index)) {
            body.append(createCategoryPicker(record, index));
          }

          if (canEditRecord && displayCategory && isTagOpen(index)) {
            body.append(createTagPicker(record, index));
          }

          if (canEditRecord && editingRecordIndex === index && editDraft) {
            body.append(createEditPanel(index));
          }

          if (canEditRecord) {
            let longPressTriggered = false;
            let longPressResetTimer = null;
            item.addEventListener("touchstart", (event) => {
              if (event.target.closest("button, input, select, textarea")) return;
              clearTimeout(longPressTimer);
              clearTimeout(longPressResetTimer);
              longPressTriggered = false;
              longPressTimer = setTimeout(() => {
                longPressTriggered = true;
                if (navigator.vibrate) navigator.vibrate(40);
                openCtxMenu(index, record, item);
              }, 500);
            }, { passive: true });
            item.addEventListener("touchend", () => {
              clearTimeout(longPressTimer);
              if (longPressTriggered) {
                longPressResetTimer = setTimeout(() => {
                  longPressTriggered = false;
                }, 700);
              }
            }, { passive: true });
            item.addEventListener("touchmove", () => {
              clearTimeout(longPressTimer);
            }, { passive: true });
            item.addEventListener("touchcancel", () => {
              clearTimeout(longPressTimer);
              longPressTriggered = false;
            }, { passive: true });
            item.addEventListener("click", (event) => {
              if (!longPressTriggered) return;
              event.preventDefault();
              event.stopPropagation();
              longPressTriggered = false;
            });
            item.addEventListener("contextmenu", (event) => {
              event.preventDefault();
              openCtxMenu(index, record, item);
            });
          }

          item.append(bar, body, time);
          list.append(item);

          if (interval?.gapMinutes > 0) {
            const gap = document.createElement("li");
            gap.className = "record-gap";
            gap.setAttribute("aria-label", `空白时间 ${formatDuration(interval.gapMinutes)}`);
            const spacer = document.createElement("span");
            const gapDuration = document.createElement("span");
            gapDuration.className = "record-gap-duration";
            gapDuration.textContent = `空白 ${formatDuration(interval.gapMinutes)}`;
            gap.append(spacer, gapDuration);
            list.append(gap);
          }
        });
      });

      return list;
    }

    function renderDatePageContent(date, interactive = true, includeTable = tableExpanded) {
      const records = getRecordsForDayView(date);
      const tableContent = includeTable ? buildRenderedTable(records, date) : null;
      const recordsContent = buildDateRecordsContent(date, interactive, records);
      const summaryText = summaryTextForRecords(records, date);
      return { records, tableContent, recordsContent, summaryText };
    }

    function createDateSwipeSlide(date, includeTable = false) {
      const slide = document.createElement("div");
      slide.className = "date-swipe-slide";
      const content = renderDatePageContent(date, false, includeTable);

      const tools = document.createElement("section");
      tools.className = "table-tools";
      const status = document.createElement("span");
      status.className = "export-status";
      status.setAttribute("aria-hidden", "true");
      const tableHolder = document.createElement("div");
      if (content.tableContent) tableHolder.append(content.tableContent);
      tools.append(status, tableHolder);

      const recordsSection = document.createElement("section");
      recordsSection.append(content.recordsContent);

      const footer = document.createElement("footer");
      footer.className = "app-footer";
      footer.innerHTML = `<span class="app-footer-brand">Dotlog</span> · daily time log`;

      slide.append(tools, recordsSection, footer);
      return slide;
    }

    function preparePageSwipeOverlay() {
      dateSwipeTrack.replaceChildren(
        createDateSwipeSlide(offsetDate(viewedDate, -1), false),
        createDateSwipeSlide(viewedDate, tableExpanded),
        createDateSwipeSlide(offsetDate(viewedDate, 1), false)
      );
      datePageHost.classList.add("is-swipe-previewing");
      dateSwipeOverlay.classList.remove("is-hidden");
      const { stride } = getPageSwipeMetrics();
      dateSwipeTrack.style.transition = "none";
      dateSwipeTrack.style.transform = `translate3d(${-stride}px, 0, 0)`;
      pageSwipeCurrentX = 0;
    }

    function resetPageSwipeOverlay() {
      dateSwipeTrack.style.transition = "none";
      dateSwipeTrack.style.transform = "";
      dateSwipeTrack.replaceChildren();
      dateSwipeOverlay.classList.add("is-hidden");
      datePageHost.classList.remove("is-swipe-previewing");
      pageSwipeCurrentX = 0;
    }

    function setPageSwipeTrack(offsetX, transition = "none") {
      const { stride } = getPageSwipeMetrics();
      dateSwipeTrack.style.transition = transition;
      dateSwipeTrack.style.transform = `translate3d(${offsetX - stride}px, 0, 0)`;
      pageSwipeCurrentX = offsetX;
    }

    function getPageSwipeMetrics() {
      const width = Math.max(datePageHost.clientWidth, 1);
      const gapValue = getComputedStyle(dateSwipeOverlay).getPropertyValue("--date-swipe-gap").trim();
      const gap = Number.parseFloat(gapValue) || 0;
      return {
        width,
        gap,
        stride: width + gap
      };
    }

    function resetPageSwipePosition(animate = true) {
      if (dateSwipeOverlay.classList.contains("is-hidden")) return;
      setPageSwipeTrack(
        0,
        animate ? "transform 0.34s cubic-bezier(0.2, 0.78, 0.2, 1)" : "none"
      );

      if (animate) {
        setTimeout(() => {
          if (pageSwipeAnimating || pageSwipeTracking) return;
          resetPageSwipeOverlay();
          unlockPageSwipeScroll();
        }, 360);
      } else {
        resetPageSwipeOverlay();
        unlockPageSwipeScroll();
      }
    }

    function finishPageSwipe(dayOffset, exitDirection) {
      if (pageSwipeAnimating) return;
      pageSwipeAnimating = true;
      const { stride } = getPageSwipeMetrics();
      const startX = Math.max(-stride, Math.min(stride, pageSwipeCurrentX));
      const targetX = exitDirection * stride;
      const remainingRatio = Math.min(1, Math.abs(targetX - startX) / stride);
      const duration = Math.max(180, Math.round(300 * remainingRatio));

      setPageSwipeTrack(startX, "none");

      requestAnimationFrame(() => {
        let completed = false;
        let completionTimer = null;
        const finishSwipe = (event) => {
          if (completed || (event && (event.target !== dateSwipeTrack || event.propertyName !== "transform"))) return;
          completed = true;
          dateSwipeTrack.removeEventListener("transitionend", finishSwipe);
          if (completionTimer !== null) clearTimeout(completionTimer);

          setViewedDate(offsetDate(viewedDate, dayOffset));
          requestAnimationFrame(() => {
            resetPageSwipeOverlay();
            unlockPageSwipeScroll();
            pageSwipeAnimating = false;
          });
        };

        dateSwipeTrack.addEventListener("transitionend", finishSwipe);
        setPageSwipeTrack(
          targetX,
          `transform ${duration}ms cubic-bezier(0.2, 0.78, 0.2, 1)`
        );
        completionTimer = setTimeout(() => finishSwipe(), duration + 120);
      });
    }

    function canStartPageSwipe(target) {
      if (settingsMode !== "main" || weekSwipeAnimating || pageSwipeAnimating) return false;
      if (!target || !(target instanceof Element)) return false;
      if (!bottomSheet.classList.contains("is-hidden")) return false;
      if (!sheetOverlay.classList.contains("is-hidden")) return false;
      if (!ctxOverlay.classList.contains("is-hidden")) return false;
      if (!timePickerOverlay.classList.contains("is-hidden")) return false;
      if (!calendarImportOverlay.classList.contains("is-hidden")) return false;
      if (!exportRangeOverlay.classList.contains("is-hidden")) return false;
      if (!calendarMenu.classList.contains("is-hidden")) return false;
      if (target.closest(".week-nav, .header-actions, .month-title, .settings-view")) return false;
      if (target.closest("button, input, select, textarea, label, a")) return false;
      if (target.closest(".table-wrap")) return false;
      if (target.closest(".ctx-menu, .bottom-sheet, .time-picker, .date-picker, .calendar-import-panel, .export-range-panel")) return false;
      return true;
    }

    function completeWeekSwipe(dayOffset, exitDirection) {
      if (weekSwipeAnimating) return;
      const selectedDateKey = formatDateKey(viewedDate);
      const selectedDate = dateFromKey(selectedDateKey);
      const targetDate = offsetDate(selectedDate, dayOffset);
      const targetWeekStart = getWeekStart(targetDate);

      if (isSameDate(targetWeekStart, currentWeekStart)) {
        viewedDate = targetDate;
        resetDateViewState();
        resetWeekSwipePosition(true);
        render();
        return;
      }

      weekSwipeAnimating = true;
      const width = Math.max(weekNav.clientWidth, 1);
      const startX = Math.max(-width, Math.min(width, weekSwipeCurrentX));
      const targetX = exitDirection * width;
      const remainingRatio = Math.min(1, Math.abs(targetX - startX) / width);
      const duration = Math.max(90, Math.round(220 * remainingRatio));

      weekDays.classList.remove("is-dragging");
      weekDays.style.transition = "none";
      weekDays.style.transform = `translate3d(${startX}px, 0, 0)`;
      weekDays.style.opacity = "1";

      requestAnimationFrame(() => {
        let completionTimer = null;
        let completed = false;
        const finishWeekSwipe = (event) => {
          if (completed || (event && (event.target !== weekDays || event.propertyName !== "transform"))) return;
          completed = true;
          weekDays.removeEventListener("transitionend", finishWeekSwipe);
          if (completionTimer !== null) clearTimeout(completionTimer);

          viewedDate = targetDate;
          currentWeekStart = getWeekStart(viewedDate);
          resetDateViewState();
          weekSwipeCurrentX = 0;

          // Keep transitions disabled while the three slides are rebuilt at the
          // centered position. Re-enabling them in this same frame can make
          // WebKit animate the reset from ±100% to 0 a second time.
          weekDays.style.transition = "none";
          weekDays.style.transform = "translate3d(0, 0, 0)";
          weekDays.style.opacity = "1";
          render();
          weekSwipeAnimating = false;

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              if (weekSwipeAnimating) return;
              weekDays.style.removeProperty("transition");
              weekDays.style.removeProperty("transform");
              weekDays.style.removeProperty("opacity");
            });
          });
        };

        weekDays.addEventListener("transitionend", finishWeekSwipe);
        weekDays.style.transition = `transform ${duration}ms cubic-bezier(0.22, 0.72, 0.2, 1)`;
        weekDays.style.transform = `translate3d(${targetX}px, 0, 0)`;
        weekSwipeCurrentX = targetX;
        completionTimer = setTimeout(() => finishWeekSwipe(), duration + 120);
      });
    }

    function goToPrevWeek() {
      completeWeekSwipe(-1, 1);
    }

    function goToNextWeek() {
      completeWeekSwipe(1, -1);
    }

    function getClassificationDraft(index, record) {
      if (!classificationDrafts[index]) {
        const resolvedCategory = resolveRecordCategory(record);
        const resolvedTags = resolveRecordTags(record);
        classificationDrafts[index] = {
          category: resolveRecordCategoryName(record) || null,
          tags: resolveRecordTagNames(record),
          categoryId: resolvedCategory?.id || normalizeReferenceId(record.categoryId),
          tagIds: resolvedTags.length > 0
            ? resolvedTags.map((tag) => tag.id)
            : (Array.isArray(record.tagIds) ? [...record.tagIds] : [])
        };
      }

      return classificationDrafts[index];
    }

    function discardClassificationDraft(index) {
      delete classificationDrafts[index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function commitClassificationDraft(index) {
      const draft = classificationDrafts[index];
      if (!draft) return;

      const records = loadRecords(viewedDate);
      if (!records[index]) return;

      records[index] = stampUpdatedRecord({
        ...records[index],
        ...resolveClassificationFields({
          category: draft.category,
          tags: draft.category ? [...draft.tags] : [],

    function renderTimePickerColumn(column, count) {
      column.innerHTML = "";
      for (let value = 0; value < count; value += 1) {
        const option = document.createElement("button");
        option.className = "time-picker-option";
        option.type = "button";
        option.dataset.value = String(value);
        option.textContent = String(value).padStart(2, "0");
        option.addEventListener("click", () => selectTimePickerValue(column, value, true));
        column.append(option);
      }
    }

    function selectTimePickerValue(column, value, scroll = false) {
      const max = column === timePickerHour ? 23 : 59;
      const safeValue = Math.max(0, Math.min(max, value));
      column.querySelectorAll(".time-picker-option").forEach((option) => {
        option.classList.toggle("is-selected", Number(option.dataset.value) === safeValue);
      });
      const [hour, minute] = timePickerValue.split(":").map(Number);
      timePickerValue = column === timePickerHour
        ? `${String(safeValue).padStart(2, "0")}:${String(minute).padStart(2, "0")}`
        : `${String(hour).padStart(2, "0")}:${String(safeValue).padStart(2, "0")}`;
      if (scroll) column.scrollTo({ top: safeValue * 36, behavior: "smooth" });
    }

    function settleTimePickerColumn(column) {
      const pendingFrame = timePickerScrollFrames.get(column);
      if (pendingFrame) cancelAnimationFrame(pendingFrame);
      timePickerScrollFrames.set(column, requestAnimationFrame(() => {
        selectTimePickerValue(column, Math.round(column.scrollTop / 36));
        timePickerScrollFrames.delete(column);
      }));
    }

    function openTimePicker(target, title = "选择时间") {
      const fallback = formatTime(new Date());
      timePickerTarget = target;
      timePickerValue = isValidTimeInput(target.value) ? target.value : fallback;
      timePickerTitle.textContent = title;
      timePickerOverlay.classList.remove("is-hidden");
      timePicker.classList.remove("is-hidden");
      const [hour, minute] = timePickerValue.split(":").map(Number);
      selectTimePickerValue(timePickerHour, hour);
      selectTimePickerValue(timePickerMinute, minute);
      requestAnimationFrame(() => {
        timePickerHour.scrollTop = hour * 36;
        timePickerMinute.scrollTop = minute * 36;
      });
    }

    function closeTimePicker() {
      timePickerOverlay.classList.add("is-hidden");
      timePicker.classList.add("is-hidden");
      timePickerTarget = null;
    }

    function confirmTimePicker() {
      if (!timePickerTarget) return;
      selectTimePickerValue(timePickerHour, Math.round(timePickerHour.scrollTop / 36));
      selectTimePickerValue(timePickerMinute, Math.round(timePickerMinute.scrollTop / 36));
      const target = timePickerTarget;
      target.value = timePickerValue;
      closeTimePicker();
      target.dispatchEvent(new Event("input", { bubbles: true }));
    }

    function renderDatePicker() {
      const year = datePickerMonth.getFullYear();
      const month = datePickerMonth.getMonth();
      datePickerTitle.textContent = `${year}年${month + 1}月`;
      datePickerDays.replaceChildren();
      const firstWeekday = (new Date(year, month, 1).getDay() + 6) % 7;
      const dayCount = daysInMonth(year, month + 1);

      for (let index = 0; index < 42; index += 1) {
        const day = index - firstWeekday + 1;
        const button = document.createElement("button");
        button.className = "date-picker-day";
        button.type = "button";
        if (day < 1 || day > dayCount) {
          button.classList.add("is-outside");
          button.disabled = true;
        } else {
          const value = formatDateKey(new Date(year, month, day));
          button.textContent = String(day);
          button.classList.toggle("is-selected", value === datePickerTarget?.value);
          button.disabled = Boolean(datePickerMinimum && value < datePickerMinimum);
          button.addEventListener("click", () => {
            datePickerTarget?.onSelect(value);
            closeDatePicker();
          });
        }
        datePickerDays.append(button);
      }
    }

      datePickerTarget = { value: formatDateKey(selected), onSelect: options.onSelect };
      datePickerMinimum = options.minimum || null;
      datePickerMonth = new Date(selected.getFullYear(), selected.getMonth(), 1);

      datePicker.classList.remove("is-hidden");

    function updateEntryDateDisplay() {

      entryStartDate.textContent = formatDateButtonLabel(entryStartDateValue, crossesYear);
      entryEndDate.textContent = formatDateButtonLabel(entryEndDateValue, crossesYear);
      const dayDifference = dateFromKey(entryEndDateValue) && dateFromKey(entryStartDateValue)
        ? Math.round((dateFromKey(entryEndDateValue) - dateFromKey(entryStartDateValue)) / 86400000)
        : 0;
      entryEndDateBadge.textContent = dayDifference === 1 ? "次日" : `+${dayDifference}天`;
      entryEndDateBadge.classList.toggle("is-hidden", dayDifference <= 0);

    function setEntryDateRange(startDate, endDate = startDate, notifyCorrection = false) {
      entryStartDateValue = isValidDateKey(startDate) ? startDate : formatDateKey(viewedDate);
      entryEndDateValue = isValidDateKey(endDate) ? endDate : entryStartDateValue;
      if (entryEndDateValue < entryStartDateValue) {
        entryEndDateValue = entryStartDateValue;
        if (notifyCorrection) showToast("结束日期已自动更新");
      }
      updateEntryDateDisplay();

    function validateEditedRecordInterval(records, index, startDateTime, endDateTime) {
      if (durationBetweenDateTimes(startDateTime, endDateTime) < 0) {
        alert("时间段有误，结束早于开始");
        return false;
      }

      const previousRecord = index < records.length - 1
        ? records[index + 1]
        : null;
      if (previousRecord?.endTime) {
        if (localDateFromDateTime(startDateTime) < localDateFromDateTime(previousRecord.endTime)) {
          alert(`开始时间不能早于相邻记录结束时间 ${timePart(previousRecord.endTime)}`);
          return false;
        }
      }

      const nextRecord = index > 0 ? records[index - 1] : null;
      if (nextRecord?.startTime) {
        if (localDateFromDateTime(endDateTime) > localDateFromDateTime(nextRecord.startTime)) {
          alert(`结束时间不能晚于相邻记录开始时间 ${timePart(nextRecord.startTime)}`);
          return false;
        }
      }

      return true;
    }

    function saveEditedRecord(index) {
      if (!editDraft || !isValidTimeInput(editDraft.startTime) || !isValidTimeInput(editDraft.endTime) || !editDraft.text.trim()) return;

      const records = loadRecords(viewedDate);
      const original = records[index];
      if (!original) return;
      const nextStartTime = localDateTime(editDraft.startDate, editDraft.startTime);
      const nextEndTime = localDateTime(editDraft.endDate, editDraft.endTime);
      if (!validateEditedRecordInterval(records, index, nextStartTime, nextEndTime)) return;

      const timeChanged = nextEndTime !== original.endTime;
      const hasSameTime = records.some((record, recordIndex) => recordIndex !== index && record.endTime === nextEndTime);
      if (timeChanged && hasSameTime && !confirm("该时间已有另一条记录，是否继续保存？")) {
        return;
      }

      const updatedRecord = stampUpdatedRecord({
        ...original,
        id: original.id,
        startTime: nextStartTime,
        endTime: nextEndTime,
        text: editDraft.text.trim(),
        note: editDraft.note.trim() || null,
        isBackfill: original.isBackfill || false,
        isSplit: original.isSplit || false,
        ...resolveClassificationFields({
          category: editDraft.category,
          tags: editDraft.category ? [...editDraft.tags] : [],
          categoryId: editDraft.categoryId,
          tagIds: editDraft.tagIds
        }, original)
      });

      if (editDraft.startDate === formatDateKey(viewedDate)) {
        records[index] = updatedRecord;
        saveRecords(viewedDate, sortRecords(records));
      } else {
        const inserted = insertNewRecords(dateFromKey(editDraft.startDate), [updatedRecord]);
        if (!inserted) return;
        records.splice(index, 1);
        const removed = saveRecords(viewedDate, records, {
          allowRecordCountDecrease: true,
          expectedDecrease: 1,
          reason: "move-record-start-date"
        });
        if (!removed) return;
      }
      editingRecordIndex = null;
      editDraft = null;
      editCategoryExpanded = false;
      editTagsExpanded = false;
      render();
    }

    function inspectStoredRecordReferences(category, tag = null) {
      const categoryReferences = [];
      const tagReferences = [];
      const errors = [];
      const targetTags = tag ? [tag] : (Array.isArray(category.tags) ? category.tags : []);
      const targetTagIds = new Set(targetTags.map((item) => item?.id).filter(Boolean));
      const targetTagNames = new Set(targetTags.map((item) => item?.name).filter(Boolean));

      for (let storageIndex = 0; storageIndex < localStorage.length; storageIndex += 1) {
        const key = localStorage.key(storageIndex);
        if (!key || !/^time_tracker_\d{4}-\d{2}-\d{2}$/.test(key)) continue;

        try {
          const records = JSON.parse(localStorage.getItem(key));
          if (!Array.isArray(records)) {
            errors.push({ key, reason: "记录数据不是数组" });
            continue;
          }

          records.forEach((record, recordIndex) => {
            if (!record || typeof record !== "object" || Array.isArray(record)) {
              errors.push({ key, recordIndex, reason: "记录不是对象" });
              return;
            }

            const location = {
              key,
              recordIndex,
              recordId: normalizeReferenceId(record.id)
            };
            const recordCategoryId = normalizeReferenceId(record.categoryId);
            const recordCategoryName = typeof record.category === "string" ? record.category.trim() : "";
            const categoryReferenced = recordCategoryId === category.id
              || recordCategoryName === category.name;
            if (categoryReferenced) categoryReferences.push(location);

            const tagIds = Array.isArray(record.tagIds)
              ? record.tagIds.map((tagId) => normalizeReferenceId(tagId)).filter(Boolean)
              : [];
            const tagNames = Array.isArray(record.tags)
              ? record.tags.map((tagName) => String(tagName).trim()).filter(Boolean)
              : [];
            const hasCategoryContext = Boolean(recordCategoryId || recordCategoryName);
            const tagReferenced = tagIds.some((tagId) => targetTagIds.has(tagId))
              || (tagNames.some((tagName) => targetTagNames.has(tagName))
                && (categoryReferenced || !hasCategoryContext));
            if (tagReferenced) tagReferences.push(location);
          });
        } catch (error) {
          errors.push({
            key,
            reason: error instanceof Error ? error.message : String(error)
          });
        }
      }

      return { categoryReferences, tagReferences, errors };
    }

    function saveEditedCategoryName(categoryId, input, originalName) {
      const nextName = input.value.trim();
      if (!nextName) {
        input.value = originalName;
        return;
      }

      const config = loadCategoryConfig();
      const category = config.categories.find((item) => item.id === categoryId);
      if (!category) return;

      if (config.categories.some((item) => item.id !== categoryId && item.name === nextName)) {
        alert("分类名称已存在");
        input.value = originalName;
        return;
      }

      category.name = nextName;
      saveCategoryConfig(config);
      editingCategoryIndex = null;
      renderSettingsPage();
    }

    function createInlineInput(value, onSave, onCancel) {
      const input = document.createElement("input");
      input.className = "inline-input";
      input.type = "text";
      input.value = value;

      let cancelled = false;
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          onSave(input);
        }

        if (event.key === "Escape") {
          cancelled = true;
          onCancel();
        }
      });

      input.addEventListener("blur", () => {
        if (!cancelled) onSave(input);
      });

      setTimeout(() => {
        input.focus();
        input.select();
      }, 0);

      return input;
    }

    function deleteCategory(categoryId) {
      const config = loadCategoryConfig();
      const categoryIndex = config.categories.findIndex((item) => item.id === categoryId);
      const category = config.categories[categoryIndex];
      if (!category) return;

      if (category.tags.length > 0) {
        alert(`分类「${category.name}」下还有 ${category.tags.length} 个标签，请先处理这些标签。`);
        return;
      }

      const usage = inspectStoredRecordReferences(category);
      if (usage.errors.length > 0) {
        console.warn("[Dotlog] 历史记录引用检查失败，已阻止删除分类", usage.errors);
        alert("部分历史记录无法读取，无法安全确认分类是否未被使用，已阻止删除。");
        return;
      }
      if (usage.categoryReferences.length > 0 || usage.tagReferences.length > 0) {
        alert(`分类「${category.name}」仍被历史记录使用，不能删除。`);
        return;
      }

      if (!confirm(`确认删除分类「${category.name}」？`)) {
        return;
      }

      config.categories.splice(categoryIndex, 1);
      saveCategoryConfig(config);
      editingCategoryIndex = null;
      addingTagCategoryIndex = null;
      editingTag = null;
      openColorPickerIndex = null;
      renderSettingsPage();
    }

    function saveTagDetailEditor() {
      if (!tagDetailDraft) return;
      const name = tagDetailDraft.name.trim();
      if (!name) {
        tagDetailDraft.error = "请输入标签名称";
        renderSettingsPage();
        return;
      }

      const config = loadCategoryConfig();
      const originalCategory = config.categories.find((item) => item.id === tagDetailDraft.categoryId);
      const category = originalCategory?.tags.some((tag) => tag.id === tagDetailDraft.tagId)
        ? originalCategory
        : config.categories.find((item) => item.tags.some((tag) => tag.id === tagDetailDraft.tagId));
      const tag = category?.tags.find((item) => item.id === tagDetailDraft.tagId);
      if (!category || !tag) {
        tagDetailDraft.error = "标签不存在，请关闭后重试";
        renderSettingsPage();
        return;
      }

      const duplicateName = category.tags.some((item) => item.id !== tag.id && item.name === name);
      if (duplicateName) {
        tagDetailDraft.error = "标签名称已存在";
        renderSettingsPage();
        return;
      }

      tag.name = name;
      tag.triggers = [...new Set(
        tagDetailDraft.triggers
          .map((trigger) => String(trigger).trim())
          .filter(Boolean)
      )];
      saveCategoryConfig(config);
      const returnScrollY = tagDetailReturnScrollY;
      if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
      tagDetailDraft = null;
      tagDetailReturnScrollY = null;
      renderSettingsPage();
      restoreTagDetailScrollPosition(returnScrollY);
    }

    function buildTimeRows(records, date) {
      const chronologicalRecords = [...records].reverse();
      let totalMinutes = 0;

      const rows = chronologicalRecords.map((record, index) => {
        const descendingIndex = records.length - 1 - index;
        const interval = getRecordInterval(records, descendingIndex, date);
        if (!interval || interval.isInvalid) return null;
        totalMinutes += interval.duration;
        const categoryName = resolveRecordCategoryName(record);
        const tagNames = resolveRecordTagNames(record);

        return {
          index: index + 1,
          start: interval.startTime,
          end: interval.endTime,
          duration: interval.duration,
          category: categoryName,
          tags: tagNames,
          displayCategory: categoryName,
          displayTags: tagNames,
          text: record.text,
          note: record.note,
          isBackfill: record.isBackfill,
          isSplit: record.isSplit
        };
      }).filter(Boolean);

      return {
        rows,
        totalMinutes
      };
    }

    function escapeCsvValue(value) {
      const text = String(value ?? "");
      if (/[",\r\n]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    function datesInRange(startDate, endDate) {
      const dates = [];
      for (let date = startOfDay(startDate); date <= endDate; date = offsetDate(date, 1)) {
        dates.push(date);
      }
      return dates;
    }

    function exportRangeLabel(startDate, endDate) {
      const startKey = formatDateKey(startDate);
      const endKey = formatDateKey(endDate);
      return startKey === endKey ? startKey : `${startKey}_${endKey}`;
    }

    function exportCsv(startDate, endDate) {
      const tableRows = datesInRange(startDate, endDate).flatMap((date) => (
        buildTimeRows(getRecordsForDayExport(date), date).rows.map((row) => ({
          ...row,
          date: formatDateKey(date)
        }))
      ));

      if (tableRows.length === 0) {
        alert("所选日期区间没有可导出的完整时间记录");
        return false;
      }

      const headers = ["序号", "日期", "开始时间", "结束时间", "时长", "分类", "标签", "事件", "备注"];
      const rows = tableRows.map((row, index) => [
        index + 1,
        row.date,
        row.start,
        row.end,
        formatDuration(row.duration),
        row.category || "",
        row.tags.length ? row.tags.join("/") : "",
        row.text,
        row.note || ""
      ]);
      const csv = [headers, ...rows]
        .map((row) => row.map(escapeCsvValue).join(","))
        .join("\r\n");
      const blob = new Blob([`\uFEFF${csv}`], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `Dotlog_${exportRangeLabel(startDate, endDate)}.csv`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showExportStatus(`✓ 已导出 ${tableRows.length} 条记录`);
      return true;
    }

    function buildCalendarEvents(records, date) {
      const chronologicalRecords = [...records].reverse();
      const eventsByCategory = {};
      let eventCount = 0;

      chronologicalRecords.forEach((record, index) => {
        const descendingIndex = records.length - 1 - index;
        const interval = getRecordInterval(records, descendingIndex, date);
        if (!interval) return;
        const categoryName = resolveRecordCategoryName(record);
        if (!categoryName) return;

        const event = [
          "BEGIN:VEVENT",
          `DTSTART;TZID=Asia/Shanghai:${formatIcsDate(interval.startDate, interval.startTime)}`,
          `DTEND;TZID=Asia/Shanghai:${formatIcsDate(interval.endDate, interval.endTime)}`,
          `SUMMARY:${escapeIcsText(summaryForRecord(record))}`,
          record.note ? `DESCRIPTION:${escapeIcsText(record.note)}` : null,
          `UID:${createEventUid()}@时间打点器`,
          "END:VEVENT"
        ].filter(Boolean).join("\r\n");

        if (!eventsByCategory[categoryName]) {
          eventsByCategory[categoryName] = [];
        }

        eventsByCategory[categoryName].push(event);
        eventCount += 1;
      });

      return { eventsByCategory, eventCount };
    }

    function buildIcsContent(events) {
      return [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//时间打点器//CN",
        "CALSCALE:GREGORIAN",
        ...events,
        "END:VCALENDAR"
      ].join("\r\n");
    }

      const [year, month, day] = value.split("-").map(Number);
      const date = startOfDay(new Date(year, month - 1, day));
      return formatDateKey(date) === value ? date : null;

    async function exportIcsFiles(startDate, endDate) {
      if (typeof JSZip === "undefined") {
        alert("导出组件加载失败，请检查网络后重试");
        return false;
      }

      const eventsByCategory = {};
      let eventCount = 0;
      datesInRange(startDate, endDate).forEach((date) => {
        const dayEvents = buildCalendarEvents(getRecordsForDayExport(date), date);
        eventCount += dayEvents.eventCount;
        Object.entries(dayEvents.eventsByCategory).forEach(([category, events]) => {
          if (!eventsByCategory[category]) eventsByCategory[category] = [];
          eventsByCategory[category].push(...events);
        });
      });

      if (eventCount === 0) {
        alert("所选日期区间没有已分类的完整时间记录");
        return false;
      }

      const rangeLabel = exportRangeLabel(startDate, endDate);
      const categoriesToExport = Object.keys(eventsByCategory);
      const zip = new JSZip();
      categoriesToExport.forEach((category) => {
        zip.file(`${rangeLabel}_${category}.ics`, buildIcsContent(eventsByCategory[category]));
      });

      const content = await zip.generateAsync({ type: "blob" });
      const url = URL.createObjectURL(content);
      const link = document.createElement("a");
      link.href = url;
      link.download = `时间记录_${rangeLabel}.zip`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showExportStatus(`✓ 已导出 ${categoriesToExport.length} 个分类，共 ${eventCount} 个事件`);
      return true;
    }

    function insertNewRecords(date, newRecords) {
      const timestamp = getNowIso();
      const resolvedNewRecords = newRecords.map((record) => stampNewRecord({
        ...record,
        id: normalizeReferenceId(record.id) || createStableId("rec"),
        ...resolveClassificationFields(record)
      }, timestamp, APP_VERSION));
      const records = sortRecords([...resolvedNewRecords, ...loadRecords(date)]);
      if (!saveRecords(date, records)) return null;
      openCategoryIndexes = [];
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
      tableExpanded = false;
      return records;
    }

    function updateSplitHint() {
      splitHint.classList.toggle("is-hidden", !(entryInput.value.trim() && entryInput.value.includes("+")));
    }

    function findEntrySuggestion(inputText) {
      const text = inputText.trim();
      if (!text) return null;

      let bestMatch = null;
      getCategories().forEach((category) => {
        category.tags.forEach((tag) => {
          const triggers = Array.isArray(tag.triggers) ? tag.triggers : [];
          triggers.forEach((rawTrigger) => {
            const trigger = String(rawTrigger).trim();
            if (!trigger || !text.includes(trigger)) return;
            if (bestMatch && trigger.length <= bestMatch.trigger.length) return;
            bestMatch = {
              categoryName: category.name,
              categoryId: category.id,
              tagName: tag.name,
              tagId: tag.id,
              trigger,
              key: JSON.stringify([category.name, tag.name, trigger])
            };
          });
        });
      });
      return bestMatch;
    }

    function renderEntrySuggestion() {
      const suggestion = findEntrySuggestion(entryInput.value);
      const hidden = !suggestion || suggestion.key === dismissedEntrySuggestionKey;
      entrySuggestion.classList.toggle("is-hidden", hidden);
      entrySuggestionValue.textContent = hidden
        ? ""
        : `${suggestion.categoryName} + #${suggestion.tagName}`;
    }

    function resetEntrySuggestion() {
      dismissedEntrySuggestionKey = null;
      renderEntrySuggestion();
    }

    function acceptCurrentEntrySuggestion() {
      const suggestion = findEntrySuggestion(entryInput.value);
      if (!suggestion || suggestion.key === dismissedEntrySuggestionKey) return;

      if (entryClassificationDraft.category === suggestion.categoryName) {
        const tags = entryClassificationDraft.tags.includes(suggestion.tagName)
          ? [...entryClassificationDraft.tags]
          : [...entryClassificationDraft.tags, suggestion.tagName];
        entryClassificationDraft = resolveClassificationFields({
          category: suggestion.categoryName,
          tags,
          categoryId: suggestion.categoryId,
          tagIds: tags.map((tagName, index) => (
            tagName === suggestion.tagName
              ? suggestion.tagId
              : Array.isArray(entryClassificationDraft.tagIds) ? entryClassificationDraft.tagIds[index] : null
          ))
        });
      } else {
        entryClassificationDraft = resolveClassificationFields({
          category: suggestion.categoryName,
          tags: [suggestion.tagName],
          categoryId: suggestion.categoryId,
          tagIds: [suggestion.tagId]
        });
      }

      dismissedEntrySuggestionKey = suggestion.key;
      renderEntryClassification();
      renderEntrySuggestion();
    }

    function dismissCurrentEntrySuggestion() {
      const suggestion = findEntrySuggestion(entryInput.value);
      if (!suggestion) return;
      dismissedEntrySuggestionKey = suggestion.key;
      renderEntrySuggestion();
    }

    function renderEntryClassification() {
      const categoryRow = document.createElement("div");
      categoryRow.className = "entry-classification-row";

      const categoryLabel = document.createElement("span");
      categoryLabel.className = "entry-classification-label";
      categoryLabel.textContent = "分类";

      const categoryOptions = document.createElement("div");
      categoryOptions.className = "entry-classification-options";

      getCategories().forEach((category) => {
        const button = document.createElement("button");
        button.className = "category-option";
        button.type = "button";
        button.textContent = category.name;
        button.setAttribute("aria-pressed", String(entryClassificationDraft.category === category.name));

        if (entryClassificationDraft.category === category.name) {
          button.classList.add("is-selected");
          button.style.backgroundColor = category.color;
          button.style.borderColor = category.color;
        }

        button.addEventListener("click", () => {
          const selectingCurrent = entryClassificationDraft.category === category.name;
          entryClassificationDraft = resolveClassificationFields({
            category: selectingCurrent ? null : category.name,
            tags: [],
            categoryId: selectingCurrent ? null : category.id,
            tagIds: []
          });
          renderEntryClassification();
        });
        categoryOptions.append(button);
      });

      categoryRow.append(categoryLabel, categoryOptions);
      const rows = [categoryRow];
      const availableTags = entryClassificationDraft.category
        ? getCategoryTags(entryClassificationDraft.category)
        : [];

      if (availableTags.length > 0) {
        const tagRow = document.createElement("div");
        tagRow.className = "entry-classification-row";

        const tagLabel = document.createElement("span");
        tagLabel.className = "entry-classification-label";
        tagLabel.textContent = "标签";

        const tagOptions = document.createElement("div");
        tagOptions.className = "entry-classification-options";

        availableTags.forEach((tag) => {
          const button = document.createElement("button");
          button.className = "tag-option";
          button.type = "button";
          button.textContent = `#${tag}`;
          button.setAttribute("aria-pressed", String(entryClassificationDraft.tags.includes(tag)));

          if (entryClassificationDraft.tags.includes(tag)) {
            const color = categoryColor(entryClassificationDraft.category);
            button.classList.add("is-selected");
            button.style.backgroundColor = color;
            button.style.borderColor = color;
          }

          button.addEventListener("click", () => {
            const nextTags = entryClassificationDraft.tags.includes(tag)
              ? entryClassificationDraft.tags.filter((item) => item !== tag)
              : [...entryClassificationDraft.tags, tag];
            entryClassificationDraft = resolveClassificationFields({
              category: entryClassificationDraft.category,
              tags: nextTags,
              categoryId: entryClassificationDraft.categoryId,
              tagIds: entryClassificationDraft.tagIds
            });
            renderEntryClassification();
          });
          tagOptions.append(button);
        });

        tagRow.append(tagLabel, tagOptions);
        rows.push(tagRow);
      }

      entryClassification.replaceChildren(...rows);
    }

    function resetEntryClassification() {
      entryClassificationDraft = { category: null, tags: [], categoryId: null, tagIds: [] };
      renderEntryClassification();
    }

    function entryClassificationFields() {
      return resolveClassificationFields({
        category: entryClassificationDraft.category,
        tags: entryClassificationDraft.category ? [...entryClassificationDraft.tags] : [],
        categoryId: entryClassificationDraft.categoryId,
        tagIds: entryClassificationDraft.tagIds
      });
    }

      return {
        date: dateFromKey(entryStartDateValue) || viewedDate,
        startDate: entryStartDateValue,
        endDate: entryEndDateValue,
        endTime: isValidTimeInput(entryEndTime.value) ? entryEndTime.value : formatTime(new Date())

    function refreshEntryStartTime(force = false) {
      if (entryStartTimeTouched && !force) return;
      const timing = activeEntryTiming();
      entryStartTime.value = getDefaultStartTime(timing.date, timing.endTime);
    }

    function resolveEntryStartTime(date, endTime) {
      if (entryStartTimeTouched && isValidTimeInput(entryStartTime.value)) {
        return entryStartTime.value;
      }
      return getDefaultStartTime(date, endTime);
    }

    function validateEntryInterval(startDate, startTime, endDate, endTime) {
      if (!isValidTimeInput(startTime) || !isValidTimeInput(endTime)
        || !isValidDateKey(startDate) || !isValidDateKey(endDate)) {
        alert("请选择正确的开始时间");
        return false;
      }

      if (durationBetweenDateTimes(localDateTime(startDate, startTime), localDateTime(endDate, endTime)) < 0) {
        alert("时间段有误，结束早于开始");
        return false;
      }

      return true;
    }

    function resetEntryStartTime() {
      entryStartTimeTouched = false;
      refreshEntryStartTime(true);
    }

    function updateBottomSheetViewport() {
      if (!window.visualViewport || bottomSheet.classList.contains("is-hidden")) return;
      const viewport = window.visualViewport;
      const layoutHeight = Math.max(window.innerHeight, document.documentElement.clientHeight);
      const keyboardOffset = Math.max(0, layoutHeight - viewport.height - viewport.offsetTop);
      bottomSheet.style.bottom = `${keyboardOffset}px`;
      bottomSheet.style.maxHeight = `${Math.max(260, viewport.height - 12)}px`;
    }

      bottomSheet.style.bottom = "";
