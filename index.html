<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dotlog</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dotlog">
  <meta name="theme-color" content="#F7F5F0">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #F7F5F0;
      --text: #1A1A1A;
      --muted: #8A8A8A;
      --accent: #4A7C6F;
      --border: #E0DDD8;
      --paper: #FFFEFB;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      width: min(100% - 32px, 680px);
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    .title {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0;
    }

    .top-bar {
      display: block;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 4px;
    }

    .icon-button,
    .settings-button {
      border: 0;
      background: transparent;
      color: var(--muted);
      display: inline-grid;
      width: 28px;
      height: 28px;
      place-items: center;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
    }

    .icon-button:hover,
    .settings-button:hover {
      color: var(--text);
    }

    .calendar-menu-wrap {
      position: relative;
      z-index: 9999;
      display: inline-grid;
    }

    .calendar-menu {
      position: absolute;
      top: 34px;
      right: 0;
      z-index: 9999;
      width: 168px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 10px 28px rgba(26, 26, 26, 0.12);
    }

    .calendar-menu-item {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      align-items: center;
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      touch-action: manipulation;
    }

    .calendar-menu-item + .calendar-menu-item {
      border-top: 1px solid var(--border);
    }

    .calendar-menu-item:hover {
      background: #F0EDEA;
    }

    .calendar-menu-icon {
      color: var(--muted);
      text-align: center;
    }

    .is-hidden {
      display: none !important;
    }

    .date-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 32px;
      margin-top: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .date-text {
      border: 0;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-variant-numeric: tabular-nums;
      padding: 4px 2px;
    }

    .date-text:hover {
      text-decoration: underline;
    }

    .date-picker {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px 38px;
      color: var(--muted);
      font-size: 14px;
    }

    .day-summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 18px 38px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85em;
      font-variant-numeric: tabular-nums;
    }

    .sync-indicator {
      min-width: 18px;
      text-align: right;
      color: var(--muted);
    }

    .sync-indicator.is-syncing {
      animation: sync-spin 1s linear infinite;
    }

    .sync-indicator.is-error {
      color: #C8A06B;
    }

    @keyframes sync-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .date-select,
    .compact-select {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 7px 8px;
      outline: none;
    }

    .date-select:focus,
    .compact-select:focus {
      border-color: var(--accent);
    }

    .nav-button {
      display: inline-grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border: 1px solid transparent;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .nav-button:hover {
      border-color: var(--border);
      color: var(--text);
      background: rgba(255, 255, 255, 0.5);
    }

    .today-link {
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-size: 14px;
    }

    .today-link:hover {
      text-decoration: underline;
    }

    .entry-form {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      padding: 18px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .entry-form.is-hidden {
      display: none;
    }

    .entry-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 11px 12px;
      outline: none;
    }

    .entry-input::placeholder {
      color: var(--muted);
    }

    .entry-input:focus {
      border-color: var(--accent);
    }

    .submit-button {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #FFFFFF;
      padding: 0 18px;
      min-width: 72px;
      cursor: pointer;
    }

    .submit-button:hover {
      filter: brightness(0.96);
    }

    .backfill-button {
      border: 1px solid var(--muted);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      min-width: 42px;
      padding: 0 12px;
      cursor: pointer;
    }

    .backfill-button:hover {
      border-color: var(--text);
      color: var(--text);
      background: rgba(255, 255, 255, 0.42);
    }

    .split-hint {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .backfill-panel,
    .edit-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(26, 26, 26, 0.05);
    }

    .backfill-panel {
      grid-column: 1 / -1;
    }

    .date-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .form-line {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .form-line input {
      min-width: 0;
    }

    .edit-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 8px 10px;
      outline: none;
    }

    .edit-input:focus {
      border-color: var(--accent);
    }

    .edit-input.is-invalid {
      border-color: #C87B7B;
    }

    .field-error {
      color: #C87B7B;
      font-size: 13px;
      line-height: 1.4;
    }

    .panel-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .panel-save {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #FFFFFF;
      padding: 7px 14px;
      cursor: pointer;
    }

    .panel-save:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .panel-cancel {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 7px 4px;
      cursor: pointer;
    }

    .panel-cancel:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .table-tools {
      padding-top: 16px;
    }

    .table-tools.is-hidden {
      display: none;
    }

    .outline-button {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      padding: 9px 14px;
      cursor: pointer;
    }

    .outline-button:hover {
      background: rgba(74, 124, 111, 0.07);
    }

    .export-status {
      color: var(--accent);
      font-size: 14px;
    }

    #tableArea {
      flex-basis: 100%;
      width: 100%;
    }

    .summary-table {
      margin-top: 16px;
      padding: 18px;
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(26, 26, 26, 0.06);
    }

    .start-note,
    .table-total {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
      margin: 12px 0;
    }

    .time-table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .time-table th,
    .time-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .time-table th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .time-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .time-table .col-index {
      width: 42px;
    }

    .time-table .col-time {
      width: 74px;
      font-variant-numeric: tabular-nums;
    }

    .time-table .col-duration {
      width: 118px;
    }

    .time-table .col-category {
      width: 120px;
    }

    .time-table .col-tags {
      width: 170px;
    }

    .time-table .col-event {
      width: 150px;
    }

    .time-table .col-note {
      width: auto;
    }

    .time-table td {
      overflow-wrap: anywhere;
    }

    .list {
      margin: 26px 0 0;
      padding: 0;
      list-style: none;
    }

    .record {
      display: grid;
      grid-template-columns: 76px 5.5em 1fr auto auto auto;
      gap: 12px;
      align-items: start;
      min-height: 38px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(224, 221, 216, 0.62);
    }

    .record-time {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      line-height: 1.7;
    }

    .record-duration {
      color: var(--muted);
      font-size: 0.85em;
      font-variant-numeric: tabular-nums;
      line-height: 2;
      text-align: right;
      white-space: nowrap;
    }

    .record-text {
      overflow-wrap: anywhere;
      line-height: 1.7;
    }

    .record-title {
      line-height: 1.7;
    }

    .record-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.85em;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .category-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      max-width: 100%;
      border: 0;
      border-radius: 999px;
      color: #FFFFFF;
      font-size: 12px;
      line-height: 1.4;
      padding: 3px 8px;
      white-space: nowrap;
    }

    .category-pill.is-button {
      cursor: pointer;
    }

    .label-stack {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: 230px;
    }

    .category-picker,
    .tag-picker,
    .edit-panel {
      grid-column: 3 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 2px 0 5px;
    }

    .edit-panel {
      display: grid;
      gap: 12px;
      margin: 4px 0 8px;
      padding: 14px;
    }

    .edit-panel .tag-picker {
      grid-column: auto;
      padding: 0;
    }

    .tag-picker {
      align-items: center;
    }

    .tag-prompt {
      flex-basis: 100%;
      color: var(--muted);
      font-size: 13px;
    }

    .category-option,
    .tag-option {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #FFFFFF;
      color: var(--text);
      padding: 4px 9px;
      font-size: 13px;
      line-height: 1.4;
      cursor: pointer;
    }

    .category-option:hover,
    .tag-option:hover {
      border-color: var(--accent);
    }

    .tag-option.is-selected {
      color: #FFFFFF;
    }

    .category-option.is-selected {
      color: #FFFFFF;
    }

    .skip-category,
    .finish-tags {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 4px 2px;
      font-size: 13px;
      cursor: pointer;
    }

    .finish-tags {
      color: var(--accent);
    }

    .skip-category:hover,
    .finish-tags:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .empty-category {
      color: var(--muted);
    }

    .table-note {
      color: var(--muted);
    }

    .table-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .calendar-import-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(26, 26, 26, 0.24);
    }

    .calendar-import-panel {
      width: min(100%, 460px);
      max-height: min(82vh, 620px);
      overflow-y: auto;
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 18px 48px rgba(26, 26, 26, 0.18);
      padding: 20px;
    }

    .calendar-import-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .calendar-import-title {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .calendar-import-close {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 2px 4px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .calendar-import-copy,
    .calendar-import-note {
      color: var(--muted);
      font-size: 13px;
    }

    .calendar-import-copy {
      margin: 0 0 14px;
    }

    .calendar-import-note {
      margin: 14px 0 0;
      font-size: 0.8em;
    }

    .calendar-import-list {
      display: grid;
      border-top: 1px solid var(--border);
    }

    .calendar-import-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .calendar-import-category {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .calendar-import-swatch {
      width: 10px;
      height: 10px;
      flex: 0 0 10px;
      border-radius: 999px;
    }

    .calendar-import-count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .calendar-import-button {
      border: 1px solid currentColor;
      border-radius: 6px;
      background: transparent;
      padding: 5px 9px;
      cursor: pointer;
      white-space: nowrap;
    }

    .calendar-import-actions {
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .calendar-import-status {
      color: var(--accent);
      font-size: 13px;
    }

    .settings-view {
      padding-top: 4px;
    }

    .back-link {
      border: 0;
      background: transparent;
      color: var(--accent);
      padding: 0;
      cursor: pointer;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .settings-title {
      margin: 28px 0 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      font-size: 20px;
      font-weight: 600;
    }

    .category-config-list {
      display: grid;
      gap: 20px;
    }

    .config-category {
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    .settings-section {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .settings-section-title {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 600;
    }

    .sync-form {
      display: grid;
      gap: 12px;
    }

    .sync-row {
      display: grid;
      grid-template-columns: 112px 1fr auto;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .sync-row input {
      width: 100%;
      min-width: 0;
    }

    .sync-actions,
    .sync-status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding-left: 122px;
    }

    .sync-status {
      color: var(--muted);
      font-size: 14px;
    }

    .sync-status.is-connected {
      color: var(--accent);
    }

    .sync-status.is-error {
      color: #C87B7B;
    }

    .config-category-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .config-category-name {
      font-weight: 600;
    }

    .config-actions {
      display: flex;
      gap: 10px;
      white-space: nowrap;
    }

    .text-button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 13px;
    }

    .text-button:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .inline-input {
      width: min(100%, 240px);
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 6px 8px;
      outline: none;
    }

    .inline-input:focus {
      border-color: var(--accent);
    }

    .config-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .config-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      background: #FFFFFF;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 9px;
      font-size: 13px;
      line-height: 1.4;
    }

    .config-tag-name {
      cursor: default;
    }

    .remove-tag {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      line-height: 1;
    }

    .remove-tag:hover {
      color: var(--text);
    }

    .add-category-panel {
      display: grid;
      gap: 10px;
      margin-top: 16px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
    }

    .color-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border: 2px solid transparent;
      border-radius: 999px;
      cursor: pointer;
    }

    .color-swatch.is-selected {
      border-color: var(--text);
    }

    .add-category-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .edit-button,
    .delete-button {
      opacity: 0;
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 2px 0 2px 12px;
      cursor: pointer;
      line-height: 1.7;
    }

    .record:hover .edit-button,
    .record:hover .delete-button,
    .edit-button:focus-visible,
    .delete-button:focus-visible {
      opacity: 1;
    }

    .edit-button:hover,
    .delete-button:hover {
      color: var(--text);
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      color: var(--muted);
      text-align: center;
    }

    .empty-title {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 500;
    }

    .empty-subtitle {
      margin: 0;
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .page {
        width: min(100% - 24px, 680px);
        padding-top: 32px;
      }

      .entry-form {
        grid-template-columns: 1fr;
      }

      .backfill-button,
      .submit-button {
        height: 44px;
      }

      .outline-button {
        width: 100%;
      }

      .summary-table {
        padding: 14px;
      }

      .record {
        grid-template-columns: 68px 5.2em 1fr auto auto auto;
        gap: 9px;
      }

      .label-stack {
        justify-content: flex-start;
        max-width: none;
      }

      .category-picker,
      .tag-picker,
      .edit-panel {
        grid-column: 1 / -1;
      }

      .edit-button,
      .delete-button {
        opacity: 1;
        padding-left: 8px;
      }

      .form-line {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .sync-row {
        grid-template-columns: 1fr;

      .sync-actions,
      .sync-status-row {

    @media (max-width: 480px) {
      .record {
        grid-template-columns: max-content max-content 1fr max-content max-content;
        column-gap: 8px;

  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const entryForm = document.querySelector("#entryForm");
    const entryInput = document.querySelector("#entryInput");
    const backfillToggle = document.querySelector("#backfillToggle");
    const backfillPanel = document.querySelector("#backfillPanel");
    const backfillYear = document.querySelector("#backfillYear");
    const backfillMonth = document.querySelector("#backfillMonth");
    const backfillDay = document.querySelector("#backfillDay");
    const backfillTime = document.querySelector("#backfillTime");
    const backfillText = document.querySelector("#backfillText");
    const backfillError = document.querySelector("#backfillError");
    const confirmBackfill = document.querySelector("#confirmBackfill");
    const cancelBackfill = document.querySelector("#cancelBackfill");
    const splitHint = document.querySelector("#splitHint");
    const tableTools = document.querySelector("#tableTools");
    const tableToggle = document.querySelector("#tableToggle");
    const exportIcs = document.querySelector("#exportIcs");
    const calendarMenuWrap = document.querySelector("#calendarMenuWrap");
    const calendarMenu = document.querySelector("#calendarMenu");
    const importCalendarOption = document.querySelector("#importCalendarOption");
    const exportIcsOption = document.querySelector("#exportIcsOption");
    const calendarImportOverlay = document.querySelector("#calendarImportOverlay");
    const calendarImportPanel = document.querySelector("#calendarImportPanel");
    const exportStatus = document.querySelector("#exportStatus");
    const tableArea = document.querySelector("#tableArea");
    const recordsArea = document.querySelector("#recordsArea");
    const dateText = document.querySelector("#dateText");
    const datePicker = document.querySelector("#datePicker");
    const viewYear = document.querySelector("#viewYear");
    const viewMonth = document.querySelector("#viewMonth");
    const viewDay = document.querySelector("#viewDay");
    const jumpDate = document.querySelector("#jumpDate");
    const daySummary = document.querySelector("#daySummary");
    const summaryText = document.querySelector("#summaryText");
    const syncIndicator = document.querySelector("#syncIndicator");
    const prevDate = document.querySelector("#prevDate");
    const nextDate = document.querySelector("#nextDate");
    const todayLink = document.querySelector("#todayLink");
    const settingsButton = document.querySelector("#settingsButton");
    const settingsView = document.querySelector("#settingsView");
    const pageHeader = document.querySelector("header");

    const today = startOfDay(new Date());
    let viewedDate = startOfDay(new Date());
    let tableExpanded = false;
    let openCategoryIndexes = [];
    let openTagIndexes = [];
    let classificationDrafts = {};
    let exportStatusTimer = null;
    let settingsMode = "main";
    let editingRecordIndex = null;
    let editDraft = null;
    let editingCategoryIndex = null;
    let addingTagCategoryIndex = null;
    let editingTag = null;
    let addingCategory = false;
    let selectedNewCategoryColor = "#7B8EC8";
    let applyingRemoteData = false;
    let syncTimer = null;
    let syncInProgress = false;
    const importedCalendarCategories = new Set();
    let syncStatus = {
      state: "unconfigured",
      message: "未配置",
      lastSyncedAt: localStorage.getItem("dotlog_last_synced") || null
    };

    const gistDataFile = "dotlog_data.json";

    const colorPresets = [
      "#7B8EC8", "#8DC88B", "#E8A87C", "#6BB5D5",
      "#D56B9A", "#C87B7B", "#A57BC8", "#C8C87B",
      "#B0B0B0", "#6BC8B8", "#C8A06B", "#8B8BC8"
    ];

    const defaultCategoryConfig = {
      categories: [
        { name: "睡眠", color: "#7B8EC8", tags: ["午睡", "入睡困难", "睡眠不足"] },
        { name: "生活维护", color: "#8DC88B", tags: ["饮食", "个人护理", "家务", "采购", "医疗健康", "宠物照顾", "杂务处理"] },
        { name: "身体训练", color: "#E8A87C", tags: ["八段锦", "力量训练", "跑步", "散步", "跳操跟练", "瑜伽", "拉伸"] },
        { name: "输入", color: "#6BB5D5", tags: ["阅读", "课程学习", "播客/音频", "灵感采集"] },
        { name: "输出", color: "#D56B9A", tags: ["写作", "日记", "复盘", "知识整理", "内容创作"] },
        { name: "工作项目", color: "#C87B7B", tags: ["项目执行", "研究分析", "沟通协作"] },
        { name: "Meta work", color: "#A57BC8", tags: ["时间管理", "知识管理", "流程优化", "自我认知"] },
        { name: "娱乐休闲", color: "#C8C87B", tags: ["社交媒体", "影视娱乐", "听休闲播客", "玩游戏", "外出休闲", "碎片休闲"] },
        { name: "黑洞时间", color: "#B0B0B0", tags: ["拖延", "无目的优化", "无意识刷手机"] }
      ]
    };

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatDateLabel(date) {
      const weekdays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${weekdays[date.getDay()]}`;
    }

    function formatShortDateLabel(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function formatTime(date) {
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      return `${hours}:${minutes}`;
    }

    function timeToMinutes(time) {
      const [hours, minutes] = time.split(":").map(Number);
      return hours * 60 + minutes;
    }

    function minutesToTime(totalMinutes) {
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
    }

    function formatDuration(totalMinutes) {
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;

      if (hours === 0) return `${minutes} min`;
      if (minutes === 0) return `${hours} h`;
      return `${hours} h ${minutes} min`;
    }

    function durationBetween(startTime, endTime) {
      const start = timeToMinutes(startTime);
      let end = timeToMinutes(endTime);
      if (end < start) end += 24 * 60;
      return end - start;
    }

    function summaryTextForRecords(records) {
      if (records.length === 0) return "";
      if (records.length === 1) return "1 条 · —";

      const chronologicalRecords = [...records].reverse();
      const startRecord = chronologicalRecords[0];
      const endRecord = chronologicalRecords[chronologicalRecords.length - 1];
      return `${records.length} 条 · ${formatDuration(durationBetween(startRecord.time, endRecord.time))}`;
    }

    function daysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function fillSelect(select, values, selectedValue) {
      select.replaceChildren();
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = String(value);
        option.textContent = String(value).padStart(2, "0");
        option.selected = Number(value) === Number(selectedValue);
        select.append(option);
      });
    }

    function setDateSelectors(yearSelect, monthSelect, daySelect, date) {
      const currentYear = today.getFullYear();
      fillSelect(yearSelect, [currentYear - 1, currentYear, currentYear + 1], date.getFullYear());
      fillSelect(monthSelect, Array.from({ length: 12 }, (_, index) => index + 1), date.getMonth() + 1);
      fillSelect(daySelect, Array.from({ length: daysInMonth(date.getFullYear(), date.getMonth() + 1) }, (_, index) => index + 1), date.getDate());
    }

    function refreshDaySelector(yearSelect, monthSelect, daySelect) {
      const year = Number(yearSelect.value);
      const month = Number(monthSelect.value);
      const currentDay = Math.min(Number(daySelect.value) || 1, daysInMonth(year, month));
      fillSelect(daySelect, Array.from({ length: daysInMonth(year, month) }, (_, index) => index + 1), currentDay);
    }

    function dateFromSelectors(yearSelect, monthSelect, daySelect) {
      return startOfDay(new Date(Number(yearSelect.value), Number(monthSelect.value) - 1, Number(daySelect.value)));
    }

    function isValidTimeInput(time) {
      if (!/^\d{2}:\d{2}$/.test(time)) return false;
      const [hours, minutes] = time.split(":").map(Number);
      return hours >= 0 && hours <= 23 && minutes >= 0 && minutes <= 59;
    }

    function cloneDefaultCategoryConfig() {
      return JSON.parse(JSON.stringify(defaultCategoryConfig));
    }

    function normalizeCategoryConfig(config) {
      if (!config || !Array.isArray(config.categories)) return cloneDefaultCategoryConfig();

      return {
        categories: config.categories
          .filter((category) => category && category.name && category.color)
          .map((category) => ({
            name: String(category.name),
            color: String(category.color),
            tags: Array.isArray(category.tags) ? category.tags.map(String) : []
          }))
      };
    }

    function loadCategoryConfig() {
      const storedConfig = localStorage.getItem("category_config");
      if (!storedConfig) {
        const defaultConfig = cloneDefaultCategoryConfig();
        saveCategoryConfig(defaultConfig);
        return defaultConfig;
      }

      try {
        return normalizeCategoryConfig(JSON.parse(storedConfig));
      } catch {
        const defaultConfig = cloneDefaultCategoryConfig();
        saveCategoryConfig(defaultConfig);
        return defaultConfig;
      }
    }

    function saveCategoryConfig(config) {
      localStorage.setItem("category_config", JSON.stringify(normalizeCategoryConfig(config)));
      markLocalDataChanged();
    }

    function getCategories() {
      return loadCategoryConfig().categories;
    }

    function findCategory(categoryName) {
      return getCategories().find((category) => category.name === categoryName);
    }

    function getCategoryTags(categoryName) {
      const category = findCategory(categoryName);
      return category ? category.tags : [];
    }

    function categoryColor(categoryName) {
      const category = findCategory(categoryName);
      return category ? category.color : "#B0B0B0";
    }

    function parseEntryText(rawText) {
      const notes = [];
      const textWithoutNotes = rawText.replace(/（([^（）]*)）|\(([^()]*)\)/g, (match, chineseNote, englishNote) => {
        const note = (chineseNote || englishNote || "").trim();
        if (note) notes.push(note);
        return "";
      });

      const text = textWithoutNotes.replace(/\s+/g, " ").trim() || rawText.trim();

      return {
        text,
        note: notes.length ? notes.join("；") : null
      };
    }

    function parseBackfill(rawText) {
      if (!rawText.startsWith("补录")) {
        return {
          isBackfill: false,
          time: formatTime(new Date()),
          text: rawText
        };
      }

      const match = rawText.match(/^补录\s+(\S+)\s+(.+)$/);
      if (!match) {
        alert("补录格式：补录 HH:MM 事件描述");
        return null;
      }

      const time = match[1];
      const text = match[2].trim();
      if (!/^\d{2}:\d{2}$/.test(time)) {
        alert("补录格式：补录 HH:MM 事件描述");
        return null;
      }

      const [hours, minutes] = time.split(":").map(Number);
      if (hours > 23 || minutes > 59) {
        alert("时间格式不正确，请使用 00:00–23:59");
        return null;
      }

      return {
        isBackfill: true,
        time,
        text
      };
    }

    function parseSplit(rawText, endTime) {
      if (!rawText.includes("+")) {
        return { isSplit: false };
      }

      const match = rawText.match(/^(.+?)\s*\+\s*(.+?)\s+(\d+)$/);
      if (!match) {
        alert("加号拆分格式：主事件 + 次事件 时长（分钟）");
        return null;
      }

      const duration = Number(match[3]);
      if (duration < 1 || duration > 600) {
        alert("时长超出范围，请输入 1–600 分钟");
        return null;
      }

      const endMinutes = timeToMinutes(endTime);
      const secondaryEndMinutes = endMinutes - duration;
      if (secondaryEndMinutes < 0) {
        alert("拆分后时间超出当天范围，请检查时长");
        return null;
      }

      return {
        isSplit: true,
        mainText: match[1].trim(),
        secondaryText: match[2].trim(),
        secondaryEndTime: minutesToTime(secondaryEndMinutes)
      };
    }

    function storageKey(date) {
      return `time_tracker_${formatDateKey(date)}`;
    }

    function formatIcsDate(date, time) {
      const [hours, minutes] = time.split(":").map(Number);
      const eventDate = new Date(date.getFullYear(), date.getMonth(), date.getDate(), hours, minutes, 0);
      const year = eventDate.getFullYear();
      const month = String(eventDate.getMonth() + 1).padStart(2, "0");
      const day = String(eventDate.getDate()).padStart(2, "0");
      return `${year}${month}${day}T${time.replace(":", "")}00`;
    }

    function addDays(date, days) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate() + days);
    }

    function escapeIcsText(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/;/g, "\\;")
        .replace(/,/g, "\\,")
        .replace(/\r?\n/g, "\\n");
    }

    function summaryForRecord(record) {
      if (!record.tags.length) return record.text;
      return `${record.text} ${record.tags.map((tag) => `#${tag}`).join(" ")}`;
    }

    function createEventUid() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function showExportStatus(message) {
      exportStatus.textContent = message;
      clearTimeout(exportStatusTimer);
      exportStatusTimer = setTimeout(() => {
        exportStatus.textContent = "";
      }, 2000);
    }

    function getGistSettings() {
      return {
        token: localStorage.getItem("gist_token") || "",
        gistId: localStorage.getItem("gist_id") || ""
      };
    }

    function hasGistSettings() {
      const settings = getGistSettings();
      return Boolean(settings.token && settings.gistId);
    }

    function formatSyncTime(date = new Date()) {
      return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function setSyncStatus(state, message, options = {}) {
      syncStatus = {
        state,
        message,
        lastSyncedAt: options.lastSyncedAt || syncStatus.lastSyncedAt
      };

      if (state === "connected" && options.lastSyncedAt) {
        localStorage.setItem("dotlog_last_synced", options.lastSyncedAt);
      }

      updateSyncIndicators();
    }

    function updateSyncIndicators() {
      if (!hasGistSettings()) {
        syncIndicator.className = "sync-indicator is-hidden";
        syncIndicator.textContent = "";
      } else if (syncStatus.state === "syncing") {
        syncIndicator.className = "sync-indicator is-syncing";
        syncIndicator.textContent = "↑↓";
        syncIndicator.title = "同步中";
      } else if (syncStatus.state === "error") {
        syncIndicator.className = "sync-indicator is-error";
        syncIndicator.textContent = "!";
        syncIndicator.title = syncStatus.message;
      } else {
        syncIndicator.className = "sync-indicator";
        syncIndicator.textContent = "✓";
        syncIndicator.title = syncStatus.message || "已同步";
      }

      const statusNode = document.querySelector("#syncStatusText");
      if (!statusNode) return;

      statusNode.className = "sync-status";
      if (!hasGistSettings()) {
        statusNode.textContent = "● 未配置";
      } else if (syncStatus.state === "connected") {
        statusNode.classList.add("is-connected");
        statusNode.textContent = syncStatus.message;
      } else if (syncStatus.state === "syncing") {
        statusNode.textContent = "● 同步中";
      } else if (syncStatus.state === "error") {
        statusNode.classList.add("is-error");
        statusNode.textContent = syncStatus.message;
      } else {
        statusNode.textContent = "● 未配置";
      }
    }

    function isToday(date) {
      return formatDateKey(date) === formatDateKey(today);
    }

    function normalizeRecord(record) {
      return {
        time: record.time,
        text: record.text,
        category: record.category || null,
        note: record.note || null,
        tags: Array.isArray(record.tags) ? record.tags : [],
        isBackfill: record.isBackfill || false,
        isSplit: record.isSplit || false
      };
    }

    function getLocalUpdatedAt() {
      return localStorage.getItem("dotlog_last_updated") || "1970-01-01T00:00:00.000Z";
    }

    function collectLocalData() {
      const records = {};

      for (let index = 0; index < localStorage.length; index += 1) {
        const key = localStorage.key(index);
        if (!key || !key.startsWith("time_tracker_")) continue;

        const dateKey = key.replace("time_tracker_", "");
        try {
          const value = JSON.parse(localStorage.getItem(key)) || [];
          records[dateKey] = sortRecords(value.map(normalizeRecord));
        } catch {
          records[dateKey] = [];
        }
      }

      return {
        records,
        category_config: loadCategoryConfig(),
        last_updated: getLocalUpdatedAt()
      };
    }

    function applyRemoteData(data) {
      applyingRemoteData = true;

      try {
        const keysToRemove = [];
        for (let index = 0; index < localStorage.length; index += 1) {
          const key = localStorage.key(index);
          if (key && key.startsWith("time_tracker_")) keysToRemove.push(key);
        }
        keysToRemove.forEach((key) => localStorage.removeItem(key));

        Object.entries(data.records || {}).forEach(([dateKey, records]) => {
          localStorage.setItem(`time_tracker_${dateKey}`, JSON.stringify(sortRecords((records || []).map(normalizeRecord))));
        });

        if (data.category_config) {
          localStorage.setItem("category_config", JSON.stringify(normalizeCategoryConfig(data.category_config)));
        }

        localStorage.setItem("dotlog_last_updated", data.last_updated || new Date().toISOString());
      } finally {
        applyingRemoteData = false;
      }
    }

    function mergeGistData(localData, remoteData) {
      const mergedRecords = {};
      const allDates = new Set([
        ...Object.keys(remoteData.records || {}),
        ...Object.keys(localData.records || {})
      ]);

      allDates.forEach((dateKey) => {
        const seen = new Set();
        const merged = [];
        [...(remoteData.records?.[dateKey] || []), ...(localData.records?.[dateKey] || [])]
          .map(normalizeRecord)
          .forEach((record) => {
            const signature = JSON.stringify(record);
            if (seen.has(signature)) return;
            seen.add(signature);
            merged.push(record);
          });
        mergedRecords[dateKey] = sortRecords(merged);
      });

      return {
        records: mergedRecords,
        category_config: localData.category_config || remoteData.category_config || cloneDefaultCategoryConfig(),
        last_updated: new Date().toISOString()
      };
    }

    function markLocalDataChanged() {
      if (applyingRemoteData) return;
      localStorage.setItem("dotlog_last_updated", new Date().toISOString());
      queueGistSync();
    }

    async function requestGist(method, body = null) {
      const { token, gistId } = getGistSettings();
      const response = await fetch(`https://api.github.com/gists/${encodeURIComponent(gistId)}`, {
        method,
        headers: {
          Authorization: `token ${token}`,
          Accept: "application/vnd.github+json",
          ...(body ? { "Content-Type": "application/json" } : {})
        },
        ...(body ? { body: JSON.stringify(body) } : {})
      });

      if (response.status === 401 || response.status === 403) {
        throw new Error("TOKEN_INVALID");
      }

      if (response.status === 404) {
        throw new Error("GIST_NOT_FOUND");
      }

      if (!response.ok) {
        throw new Error("NETWORK_ERROR");
      }

      return response.json();
    }

    async function fetchGistData() {
      const gist = await requestGist("GET");
      const content = gist.files?.[gistDataFile]?.content;
      if (!content) return null;
      return JSON.parse(content);
    }

    async function pushGistData(data) {
      await requestGist("PATCH", {
        files: {
          [gistDataFile]: {
            content: JSON.stringify(data, null, 2)
          }
        }
      });
    }

    function syncErrorMessage(error) {
      if (error.message === "TOKEN_INVALID") return "● Token 无效，请检查";
      if (error.message === "GIST_NOT_FOUND") return "● Gist 不存在，请检查 ID";
      return "● 无法连接，请检查网络";
    }

    function queueGistSync() {
      if (!hasGistSettings() || applyingRemoteData) return;
      clearTimeout(syncTimer);
      setSyncStatus("syncing", "● 同步中");
      syncTimer = setTimeout(() => {
        syncWithGist().catch(() => {});
      }, 700);
    }

    async function syncWithGist(options = {}) {
      if (!hasGistSettings() || syncInProgress) return false;

      syncInProgress = true;
      setSyncStatus("syncing", "● 同步中");

      try {
        const localData = collectLocalData();
        const remoteData = await fetchGistData();
        let nextData = null;

        if (options.mergeLocal) {
          nextData = mergeGistData(localData, remoteData || { records: {}, category_config: null, last_updated: "1970-01-01T00:00:00.000Z" });
          applyRemoteData(nextData);
          await pushGistData(nextData);
        } else if (!remoteData) {
          nextData = { ...localData, last_updated: new Date().toISOString() };
          applyRemoteData(nextData);
          await pushGistData(nextData);
        } else {
          const localTime = Date.parse(localData.last_updated || "1970-01-01T00:00:00.000Z");
          const remoteTime = Date.parse(remoteData.last_updated || "1970-01-01T00:00:00.000Z");

          if (remoteTime > localTime) {
            applyRemoteData(remoteData);
            nextData = remoteData;
          } else if (localTime > remoteTime) {
            nextData = localData;
            await pushGistData(nextData);
          } else {
            nextData = localData;
          }
        }

        const syncedAt = new Date().toISOString();
        setSyncStatus("connected", `● 已连接，上次同步 ${formatSyncTime(new Date(syncedAt))}`, { lastSyncedAt: syncedAt });
        if (settingsMode === "settings") {
          renderSettingsPage();
        } else {
          render();
        }
        return true;
      } catch (error) {
        setSyncStatus("error", syncErrorMessage(error));
        return false;
      } finally {
        syncInProgress = false;
      }
    }

    function loadRecords(date) {
      try {
        const records = JSON.parse(localStorage.getItem(storageKey(date))) || [];
        return records.map(normalizeRecord);
      } catch {
        return [];
      }
    }

    function saveRecords(date, records) {
      localStorage.setItem(storageKey(date), JSON.stringify(records));
      markLocalDataChanged();
    }

    function sortRecords(records) {
      return records
        .map((record, order) => ({ record, order }))
        .sort((a, b) => {
          const timeDiff = timeToMinutes(b.record.time) - timeToMinutes(a.record.time);
          return timeDiff || a.order - b.order;
        })
        .map((item) => item.record);
    }

    function changeViewedDate(dayOffset) {
      viewedDate = startOfDay(new Date(
        viewedDate.getFullYear(),
        viewedDate.getMonth(),
        viewedDate.getDate() + dayOffset
      ));
      tableExpanded = false;
      openCategoryIndexes = [];
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
      datePicker.classList.add("is-hidden");
      render();
    }

    function openDatePicker() {
      setDateSelectors(viewYear, viewMonth, viewDay, viewedDate);
      datePicker.classList.remove("is-hidden");
    }

    function closeDatePicker() {
      datePicker.classList.add("is-hidden");
    }

    function jumpToSelectedDate() {
      viewedDate = dateFromSelectors(viewYear, viewMonth, viewDay);
      tableExpanded = false;
      openCategoryIndexes = [];
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
      closeDatePicker();
      render();
    }

    function getClassificationDraft(index, record) {
      if (!classificationDrafts[index]) {
        classificationDrafts[index] = {
          category: record.category || null,
          tags: Array.isArray(record.tags) ? [...record.tags] : []
        };
      }

      return classificationDrafts[index];
    }

    function discardClassificationDraft(index) {
      delete classificationDrafts[index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function commitClassificationDraft(index) {
      const draft = classificationDrafts[index];
      if (!draft) return;

      const records = loadRecords(viewedDate);
      if (!records[index]) return;

      records[index].category = draft.category || null;
      records[index].tags = draft.category ? [...draft.tags] : [];
      saveRecords(viewedDate, records);
      delete classificationDrafts[index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function openCategorySelection(index, record) {
      getClassificationDraft(index, record);
      openCategoryIndexes = [index];
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function openTagSelection(index, record) {
      getClassificationDraft(index, record);
      openTagIndexes = [index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function updateRecordCategory(date, index, category, keepPickerOpen = false) {
      const records = loadRecords(date);
      if (!records[index]) return;

      records[index].category = category;
      records[index].tags = [];
      saveRecords(date, records);
      delete classificationDrafts[index];
      openCategoryIndexes = keepPickerOpen
        ? [index]
        : openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = category
        ? [...new Set([...openTagIndexes, index])]
        : openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function updateRecordTags(date, index, tags, keepPickerOpen = true) {
      const records = loadRecords(date);
      if (!records[index]) return;

      records[index].tags = tags;
      saveRecords(date, records);
      delete classificationDrafts[index];
      openTagIndexes = keepPickerOpen
        ? [...new Set([...openTagIndexes, index])]
        : openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function isCategoryOpen(index) {
      return openCategoryIndexes.includes(index);
    }

    function isTagOpen(index) {
      return openTagIndexes.includes(index);
    }

    function createCategoryBadge(categoryName, options = {}) {

      badge.className = "category-pill";

        badge.type = "button";
        badge.setAttribute("aria-label", `重新选择分类 ${categoryName}`);
      }

      return badge;
    }

    function createTagBadge(tagName, categoryName, index, options = {}) {
      const badge = document.createElement(options.button ? "button" : "span");
      badge.className = "category-pill";
      badge.style.backgroundColor = categoryColor(categoryName);
      badge.textContent = tagName;

      if (options.button) {
        badge.classList.add("is-button");
        badge.type = "button";
        badge.setAttribute("aria-label", `重新选择标签 ${tagName}`);
      }

      return badge;

    function createCategoryPicker(record, index) {
      const picker = document.createElement("div");
      picker.className = "category-picker";
      const draft = classificationDrafts[index] || null;

      getCategories().forEach((category) => {
        const button = document.createElement("button");
        button.className = "category-option";
        button.type = "button";
        button.textContent = category.name;
        if (draft && draft.category === category.name) {
          button.classList.add("is-selected");
          button.style.backgroundColor = category.color;
          button.style.borderColor = category.color;
        }
        button.addEventListener("click", () => {
          if (!draft) {
            updateRecordCategory(viewedDate, index, category.name);
            return;
          }

          if (draft.category === category.name) {
            draft.category = null;
            draft.tags = [];
            commitClassificationDraft(index);
            return;
          }

          draft.category = category.name;
          draft.tags = [];
          openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
          openTagIndexes = [...new Set([...openTagIndexes, index])];
          render();
        });
        picker.append(button);
      });

      if (draft && draft.category) {
        const clearButton = document.createElement("button");
        clearButton.className = "skip-category";
        clearButton.type = "button";
        clearButton.textContent = "清除";
        clearButton.addEventListener("click", () => {
          draft.category = null;
          draft.tags = [];
          commitClassificationDraft(index);
        });
        picker.append(clearButton);
      }

      const skipButton = document.createElement("button");
      skipButton.className = "skip-category";
      skipButton.type = "button";
      skipButton.textContent = "跳过";
      skipButton.addEventListener("click", () => {
        if (draft) {
          discardClassificationDraft(index);
        } else {
          openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
          render();
        }
      });

      picker.append(skipButton);
      return picker;
    }

    function createTagPicker(record, index) {
      const picker = document.createElement("div");
      picker.className = "tag-picker";
      const draft = getClassificationDraft(index, record);
      const activeCategory = draft.category || record.category;
      const activeTags = draft.tags;

      const prompt = document.createElement("div");
      prompt.className = "tag-prompt";
      prompt.textContent = "选择标签（可多选）：";
      picker.append(prompt);

      getCategoryTags(activeCategory).forEach((tag) => {
        const button = document.createElement("button");
        button.className = "tag-option";
        button.type = "button";
        button.textContent = tag;

        if (activeTags.includes(tag)) {
          button.classList.add("is-selected");
          button.style.backgroundColor = categoryColor(activeCategory);
          button.style.borderColor = categoryColor(activeCategory);
        }

        button.addEventListener("click", () => {
          draft.tags = draft.tags.includes(tag)
            ? draft.tags.filter((item) => item !== tag)
            : [...draft.tags, tag];
          render();
        });

        picker.append(button);
      });

      const finishButton = document.createElement("button");
      finishButton.className = "finish-tags";
      finishButton.type = "button";
      finishButton.textContent = "完成";
      finishButton.addEventListener("click", () => {
        commitClassificationDraft(index);
      });

      const skipButton = document.createElement("button");
      skipButton.className = "skip-category";
      skipButton.type = "button";
      skipButton.textContent = "跳过";
      skipButton.addEventListener("click", () => {
        discardClassificationDraft(index);
      });

      picker.append(finishButton, skipButton);
      return picker;
    }

    function startEditingRecord(index, record) {
      editingRecordIndex = index;
      editDraft = {
        time: record.time || "",
        text: record.text || "",
        note: record.note || "",
        category: record.category || null,
        tags: Array.isArray(record.tags) ? [...record.tags] : [],
        isBackfill: record.isBackfill || false,
        isSplit: record.isSplit || false
      };
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function cancelEditingRecord() {
      editingRecordIndex = null;
      editDraft = null;
      render();
    }

    function saveEditedRecord(index) {
      if (!editDraft || !isValidTimeInput(editDraft.time) || !editDraft.text.trim()) return;

      const records = loadRecords(viewedDate);
      const original = records[index];
      if (!original) return;

      const timeChanged = editDraft.time !== original.time;
      const hasSameTime = records.some((record, recordIndex) => recordIndex !== index && record.time === editDraft.time);
      if (timeChanged && hasSameTime && !confirm("该时间已有另一条记录，是否继续保存？")) {
        return;
      }

      records[index] = {
        time: editDraft.time,
        text: editDraft.text.trim(),
        category: editDraft.category || null,
        note: editDraft.note.trim() || null,
        tags: editDraft.category ? [...editDraft.tags] : [],
        isBackfill: original.isBackfill || false,
        isSplit: original.isSplit || false
      };

      saveRecords(viewedDate, sortRecords(records));
      editingRecordIndex = null;
      editDraft = null;
      render();
    }

    function createChoiceButton(label, selected, color, onClick) {
      const button = document.createElement("button");
      button.className = selected ? "tag-option is-selected" : "tag-option";
      button.type = "button";
      button.textContent = label;

      if (selected) {
        button.style.backgroundColor = color;
        button.style.borderColor = color;
      }

      button.addEventListener("click", onClick);
      return button;
    }

    function createEditPanel(index) {
      const panel = document.createElement("div");
      panel.className = "edit-panel";

      const timeLine = document.createElement("label");
      timeLine.className = "form-line";
      const timeLabel = document.createElement("span");
      timeLabel.textContent = "时间：";
      const timeInput = document.createElement("input");
      timeInput.className = "edit-input";
      timeInput.type = "text";
      timeInput.inputMode = "numeric";
      timeInput.value = editDraft.time;
      timeLine.append(timeLabel, timeInput);

      const textLine = document.createElement("label");
      textLine.className = "form-line";
      const textLabel = document.createElement("span");
      textLabel.textContent = "事件：";
      const textInput = document.createElement("input");
      textInput.className = "edit-input";
      textInput.type = "text";
      textInput.value = editDraft.text;
      textLine.append(textLabel, textInput);

      const noteLine = document.createElement("label");
      noteLine.className = "form-line";
      const noteLabel = document.createElement("span");
      noteLabel.textContent = "备注：";
      const noteInput = document.createElement("input");
      noteInput.className = "edit-input";
      noteInput.type = "text";
      noteInput.value = editDraft.note;
      noteLine.append(noteLabel, noteInput);

      const error = document.createElement("div");
      error.className = "field-error is-hidden";
      error.textContent = "请输入正确时间格式 HH:MM";

      const categoryRow = document.createElement("div");
      categoryRow.className = "tag-picker";
      const categoryPrompt = document.createElement("div");
      categoryPrompt.className = "tag-prompt";
      categoryPrompt.textContent = "分类：";
      categoryRow.append(categoryPrompt);

      getCategories().forEach((category) => {
        const selected = editDraft.category === category.name;
        categoryRow.append(createChoiceButton(category.name, selected, category.color, () => {
          editDraft.category = selected ? null : category.name;
          editDraft.tags = [];
          render();
        }));
      });

      const tagRow = document.createElement("div");
      tagRow.className = "tag-picker";
      const tagPrompt = document.createElement("div");
      tagPrompt.className = "tag-prompt";
      tagPrompt.textContent = "标签：";
      tagRow.append(tagPrompt);

      if (editDraft.category) {
        getCategoryTags(editDraft.category).forEach((tag) => {
          const selected = editDraft.tags.includes(tag);
          tagRow.append(createChoiceButton(tag, selected, categoryColor(editDraft.category), () => {
            editDraft.tags = selected
              ? editDraft.tags.filter((item) => item !== tag)
              : [...editDraft.tags, tag];
            render();
          }));
        });
      } else {
        const empty = document.createElement("span");
        empty.className = "empty-category";
        empty.textContent = "先选择分类";
        tagRow.append(empty);
      }

      const actions = document.createElement("div");
      actions.className = "panel-actions";
      const saveButton = document.createElement("button");
      saveButton.className = "panel-save";
      saveButton.type = "button";
      saveButton.textContent = "保存";
      const cancelButton = document.createElement("button");
      cancelButton.className = "panel-cancel";
      cancelButton.type = "button";
      cancelButton.textContent = "取消";

      function validateEditPanel() {
        const validTime = isValidTimeInput(editDraft.time);
        const validText = Boolean(editDraft.text.trim());
        timeInput.classList.toggle("is-invalid", !validTime);
        error.classList.toggle("is-hidden", validTime);
        saveButton.disabled = !validTime || !validText;
      }

      timeInput.addEventListener("input", () => {
        editDraft.time = timeInput.value.trim();
        validateEditPanel();
      });
      textInput.addEventListener("input", () => {
        editDraft.text = textInput.value;
        validateEditPanel();
      });
      noteInput.addEventListener("input", () => {
        editDraft.note = noteInput.value;
      });
      saveButton.addEventListener("click", () => saveEditedRecord(index));
      cancelButton.addEventListener("click", cancelEditingRecord);

      actions.append(saveButton, cancelButton);
      panel.append(timeLine, textLine, noteLine, error, categoryRow, tagRow, actions);
      validateEditPanel();

      setTimeout(() => textInput.focus(), 0);
      return panel;
    }

    function categoryNameExists(name, excludeIndex = -1) {
      return getCategories().some((category, index) => index !== excludeIndex && category.name === name);
    }

    function saveEditedCategoryName(index, input, originalName) {
      const nextName = input.value.trim();
      if (!nextName) {
        input.value = originalName;
        return;
      }

      if (categoryNameExists(nextName, index)) {
        alert("分类名称已存在");
        input.value = originalName;
        return;
      }

      const config = loadCategoryConfig();
      config.categories[index].name = nextName;
      saveCategoryConfig(config);
      editingCategoryIndex = null;
      renderSettingsPage();
    }

    function createInlineInput(value, onSave, onCancel) {
      const input = document.createElement("input");
      input.className = "inline-input";
      input.type = "text";
      input.value = value;

      let cancelled = false;
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          onSave(input);
        }

        if (event.key === "Escape") {
          cancelled = true;
          onCancel();
        }
      });

      input.addEventListener("blur", () => {
        if (!cancelled) onSave(input);
      });

      setTimeout(() => {
        input.focus();
        input.select();
      }, 0);

      return input;
    }

    function deleteCategory(index) {
      const config = loadCategoryConfig();
      const category = config.categories[index];
      if (!category) return;

      if (!confirm(`删除「${category.name}」分类？该分类下的所有标签也会一并删除。已打过此分类标记的历史记录不受影响。`)) {
        return;
      }

      config.categories.splice(index, 1);
      saveCategoryConfig(config);
      editingCategoryIndex = null;
      addingTagCategoryIndex = null;
      editingTag = null;
      renderSettingsPage();
    }

    function addTagToCategory(categoryIndex, input) {
      const tagName = input.value.trim();
      if (!tagName) return;

      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

      if (category.tags.includes(tagName)) {
        alert("标签已存在");
        return;
      }

      category.tags.push(tagName);
      saveCategoryConfig(config);
      addingTagCategoryIndex = null;
      renderSettingsPage();
    }

    function updateTagName(categoryIndex, tagIndex, input, originalName) {
      const tagName = input.value.trim();
      if (!tagName) {
        input.value = originalName;
        return;
      }

      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

      if (category.tags.some((tag, index) => index !== tagIndex && tag === tagName)) {
        alert("标签已存在");
        input.value = originalName;
        return;
      }

      category.tags[tagIndex] = tagName;
      saveCategoryConfig(config);
      editingTag = null;
      renderSettingsPage();
    }

    function deleteTag(categoryIndex, tagIndex) {
      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

    function buildTimeRows(records) {
      const chronologicalRecords = [...records].reverse();
      let totalMinutes = 0;

      const rows = chronologicalRecords.slice(1).map((record, index) => {
        const previousRecord = chronologicalRecords[index];
        const duration = durationBetween(previousRecord.time, record.time);
        totalMinutes += duration;

        return {
          index: index + 1,
          start: previousRecord.time,
          end: record.time,
          duration,
          category: record.category,
          tags: record.tags,
          text: record.text,
          note: record.note,
          isBackfill: record.isBackfill,
          isSplit: record.isSplit
        };
      });

      return {
        startRecord: chronologicalRecords[0],
        rows,
        totalMinutes
      };
    }

    function escapeCsvValue(value) {
      const text = String(value ?? "");
      if (/[",\r\n]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    function exportCsv(tableData) {
      const headers = ["序号", "开始时间", "结束时间", "时长", "分类", "标签", "事件", "备注"];
      const rows = tableData.rows.map((row) => [
        row.index,
        row.start,
        row.end,
        formatDuration(row.duration),
        row.category || "",
        row.tags.length ? row.tags.join("/") : "",
        row.text,
        row.note || ""
      ]);
      const csv = [headers, ...rows]
        .map((row) => row.map(escapeCsvValue).join(","))
        .join("\r\n");
      const blob = new Blob([`\uFEFF${csv}`], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `Dotlog_${formatDateKey(viewedDate)}.csv`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function buildCalendarEvents(records, date) {
      const chronologicalRecords = [...records].reverse();
      const eventsByCategory = {};
      let eventCount = 0;

      chronologicalRecords.slice(1).forEach((record, index) => {
        if (!record.category) return;

        const previousRecord = chronologicalRecords[index];
        const crossesMidnight = timeToMinutes(record.time) < timeToMinutes(previousRecord.time);
        const endDate = crossesMidnight ? addDays(date, 1) : date;
        const event = [
          "BEGIN:VEVENT",
          `DTSTART;TZID=Asia/Shanghai:${formatIcsDate(date, previousRecord.time)}`,
          `DTEND;TZID=Asia/Shanghai:${formatIcsDate(endDate, record.time)}`,
          `SUMMARY:${escapeIcsText(summaryForRecord(record))}`,
          record.note ? `DESCRIPTION:${escapeIcsText(record.note)}` : null,
          `UID:${createEventUid()}@时间打点器`,
          "END:VEVENT"
        ].filter(Boolean).join("\r\n");

        if (!eventsByCategory[record.category]) {
          eventsByCategory[record.category] = [];
        }

        eventsByCategory[record.category].push(event);
        eventCount += 1;
      });

      return { eventsByCategory, eventCount };
    }

    function buildIcsContent(events) {
      return [

        "VERSION:2.0",
        "PRODID:-//时间打点器//CN",
        "CALSCALE:GREGORIAN",
        ...events,
        "END:VCALENDAR"
      ].join("\r\n");
    }

    async function exportIcsFiles() {
      const records = loadRecords(viewedDate);

      if (records.length < 2) {
        alert("至少需要 2 条记录才能导出");
        return;
      }

      if (!records.some((record) => record.category)) {
        alert("请先为至少一条记录选择分类，再导出");
        return;
      }

      if (typeof JSZip === "undefined") {
        alert("导出组件加载失败，请检查网络后重试");
        return;
      }

      const dateKey = formatDateKey(viewedDate);
      const { eventsByCategory, eventCount } = buildCalendarEvents(records, viewedDate);
      const categoriesToExport = Object.keys(eventsByCategory);

      if (eventCount === 0) {
        alert("请先为至少一条记录选择分类，再导出");
        return;
      }

      const zip = new JSZip();
      categoriesToExport.forEach((category) => {
        zip.file(`${dateKey}_${category}.ics`, buildIcsContent(eventsByCategory[category]));
      });

      const content = await zip.generateAsync({ type: "blob" });
      const url = URL.createObjectURL(content);
      const link = document.createElement("a");
      link.href = url;
      link.download = `时间记录_${dateKey}.zip`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showExportStatus(`✓ 已导出 ${categoriesToExport.length} 个分类，共 ${eventCount} 个事件`);
    }

    function insertNewRecords(date, newRecords) {
      const records = sortRecords([...newRecords, ...loadRecords(date)]);
      saveRecords(date, records);
      openCategoryIndexes = newRecords
        .map((record) => records.indexOf(record))
        .filter((index) => index >= 0);
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
      tableExpanded = false;
      return records;
    }

    function updateSplitHint() {
      splitHint.classList.toggle("is-hidden", !(entryInput.value.trim() && entryInput.value.includes("+")));
    }

    function toggleBackfillPanel(open) {
      backfillPanel.classList.toggle("is-hidden", !open);
      if (open) {
        setDateSelectors(backfillYear, backfillMonth, backfillDay, today);
        backfillError.classList.add("is-hidden");
        backfillTime.classList.remove("is-invalid");
        setTimeout(() => backfillTime.focus(), 0);
      }
    }

    function setBackfillError(message) {
      backfillError.textContent = message;
      backfillError.classList.remove("is-hidden");
    }

    function validateBackfillPanel() {
      const valid = isValidTimeInput(backfillTime.value.trim());
      backfillTime.classList.toggle("is-invalid", !valid);
      if (!valid) {
        setBackfillError("请输入正确时间格式 HH:MM");
      } else {
        backfillError.classList.add("is-hidden");
      }
      return valid;
    }

    function submitBackfillPanel() {
      const time = backfillTime.value.trim();
      const rawText = backfillText.value.trim();
      const targetDate = dateFromSelectors(backfillYear, backfillMonth, backfillDay);

      if (!validateBackfillPanel()) {
        backfillTime.focus();
        return;
      }

      if (!rawText) {
        setBackfillError("请填写事件描述");
        backfillText.focus();
        return;
      }

      const parsedEntry = parseEntryText(rawText);
      const newRecord = {
        time,
        text: parsedEntry.text,
        category: null,
        note: parsedEntry.note,
        tags: [],
        isBackfill: true,
        isSplit: false
      };

      insertNewRecords(targetDate, [newRecord]);
      backfillTime.value = "";
      backfillText.value = "";
      toggleBackfillPanel(false);
      if (formatDateKey(targetDate) === formatDateKey(viewedDate)) {
        render();
      } else {
        openCategoryIndexes = [];
        openTagIndexes = [];
        render();
        showExportStatus(`已补录至 ${formatShortDateLabel(targetDate)}`);
      }
      entryInput.focus();
    }

    entryForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const rawText = entryInput.value.trim();
      if (!rawText) {
        entryInput.focus();
        return;
      }

      const backfill = parseBackfill(rawText);
      if (!backfill) {
        entryInput.focus();
        return;
      }

      const split = parseSplit(backfill.text, backfill.time);
      if (!split) {
        entryInput.focus();
        return;
      }

      const newRecords = [];

      if (split.isSplit) {
        const mainEntry = parseEntryText(split.mainText);
        const secondaryEntry = parseEntryText(split.secondaryText);
        newRecords.push(
          {
            time: split.secondaryEndTime,
            text: mainEntry.text,
            category: null,
            note: mainEntry.note,
            tags: [],
            isBackfill: backfill.isBackfill,
            isSplit: true
          },
          {
            time: backfill.time,
            text: secondaryEntry.text,
            category: null,
            note: secondaryEntry.note,
            tags: [],
            isBackfill: backfill.isBackfill,
            isSplit: true
          }
        );
      } else {
        const parsedEntry = parseEntryText(backfill.text);
        newRecords.push({
          time: backfill.time,
          text: parsedEntry.text,
          category: null,
          note: parsedEntry.note,
          tags: [],
          isBackfill: backfill.isBackfill,
          isSplit: false
        });
      }

      insertNewRecords(today, newRecords);
      viewedDate = startOfDay(new Date());
      entryInput.value = "";
      updateSplitHint();
      render();
      entryInput.focus();
    });

    tableToggle.addEventListener("click", () => {
      const records = loadRecords(viewedDate);

      if (!tableExpanded && records.length < 2) {
        alert("至少需要 2 条记录才能生成表格");
        return;
      }

      tableExpanded = !tableExpanded;
      render();
    });

    calendarMenuWrap.addEventListener("click", (event) => {
      event.stopPropagation();
    });

    exportIcs.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopImmediatePropagation();
      toggleCalendarMenu();
    }, true);

    importCalendarOption.addEventListener("click", () => {
      closeCalendarMenu();
      openCalendarImportPanel();
    });

    exportIcsOption.addEventListener("click", () => {
      closeCalendarMenu();
      exportIcsFiles();
    });

    calendarImportOverlay.addEventListener("click", (event) => {
      if (event.target === calendarImportOverlay) {
        closeCalendarImportPanel();
      }
    });

    entryInput.addEventListener("input", updateSplitHint);

    backfillToggle.addEventListener("click", () => {
      toggleBackfillPanel(backfillPanel.classList.contains("is-hidden"));
    });

    backfillTime.addEventListener("input", () => {
      if (!backfillError.classList.contains("is-hidden")) validateBackfillPanel();
    });

    backfillText.addEventListener("input", () => {
      if (backfillText.value.trim() && backfillError.textContent === "请填写事件描述") {
        backfillError.classList.add("is-hidden");
      }
    });

    backfillYear.addEventListener("change", () => refreshDaySelector(backfillYear, backfillMonth, backfillDay));
    backfillMonth.addEventListener("change", () => refreshDaySelector(backfillYear, backfillMonth, backfillDay));

    backfillText.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        submitBackfillPanel();
      }
    });

    backfillTime.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        backfillText.focus();
      }
    });

    confirmBackfill.addEventListener("click", submitBackfillPanel);

    cancelBackfill.addEventListener("click", () => {
      backfillTime.value = "";
      backfillText.value = "";
      toggleBackfillPanel(false);
      entryInput.focus();
    });

    settingsButton.addEventListener("click", showSettingsPage);

    dateText.addEventListener("click", (event) => {
      event.stopPropagation();
      closeCalendarMenu();
      if (datePicker.classList.contains("is-hidden")) {
        openDatePicker();
      } else {
        closeDatePicker();
      }
    });

    datePicker.addEventListener("click", (event) => {
      event.stopPropagation();
    });

    viewYear.addEventListener("change", () => refreshDaySelector(viewYear, viewMonth, viewDay));
    viewMonth.addEventListener("change", () => refreshDaySelector(viewYear, viewMonth, viewDay));
    jumpDate.addEventListener("click", jumpToSelectedDate);

    document.addEventListener("click", () => {
      closeDatePicker();
      closeCalendarMenu();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeCalendarMenu();
        closeCalendarImportPanel();
      }
    });

    prevDate.addEventListener("click", () => changeViewedDate(-1));
    nextDate.addEventListener("click", () => changeViewedDate(1));
    todayLink.addEventListener("click", () => {
      viewedDate = startOfDay(new Date());
      tableExpanded = false;
      openCategoryIndexes = [];
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
      closeDatePicker();
      render();
      entryInput.focus();
    });

    render();
    if (hasGistSettings()) {
      syncWithGist();
    } else {
      updateSyncIndicators();
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
</body>
</html>
