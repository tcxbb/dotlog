    function findCategoryById(categoryId) {
      return getCategories().find((category) => category.id === categoryId);
    }

    function findCategoryByName(categoryName) {
      return getCategories().find((category) => category.name === categoryName);
    }

    function getAllTagsWithCategory() {
      return getCategories().flatMap((category) => (
        category.tags.map((tag) => ({ category, tag }))
      ));
    }

    function findTagById(tagId) {
      return getAllTagsWithCategory().find(({ tag }) => tag.id === tagId) || null;
    }

    function findTagByName(categoryName, tagName) {
      const category = findCategoryByName(categoryName);
      if (!category) return null;
      const tag = category.tags.find((item) => item.name === tagName);
      return tag ? { category, tag } : null;
    }

    function findCategory(categoryName) {
      return findCategoryByName(categoryName);
    }

    function normalizeReferenceId(value) {
      const id = typeof value === "string" ? value.trim() : "";
      return id || null;
    }

    function resolveRecordCategory(record) {
      if (!record || typeof record !== "object") return null;

      const categoryId = normalizeReferenceId(record.categoryId);
      if (categoryId) {
        const categoryById = findCategoryById(categoryId);
        if (categoryById) return categoryById;
      }

      const categoryName = typeof record.category === "string" ? record.category.trim() : "";
      return categoryName ? findCategoryByName(categoryName) || null : null;
    }

    function resolveRecordCategoryName(record) {
      const category = resolveRecordCategory(record);
      if (category) return category.name;
      return typeof record?.category === "string" ? record.category.trim() : "";
    }

    function resolveRecordTags(record) {
      if (!record || typeof record !== "object") return [];

      const tagsById = Array.isArray(record.tagIds)
        ? record.tagIds
          .map((tagId) => normalizeReferenceId(tagId))
          .filter(Boolean)
          .map((tagId) => findTagById(tagId)?.tag || null)
          .filter(Boolean)
        : [];
      if (tagsById.length > 0) {
        return [...new Map(tagsById.map((tag) => [tag.id, tag])).values()];
      }

      const categoryName = resolveRecordCategoryName(record);
      if (!categoryName || !Array.isArray(record.tags)) return [];

      const tagsByName = record.tags
        .map((tagName) => typeof tagName === "string" ? tagName.trim() : "")
        .filter(Boolean)
        .map((tagName) => findTagByName(categoryName, tagName)?.tag || null)
        .filter(Boolean);
      return [...new Map(tagsByName.map((tag) => [tag.id, tag])).values()];
    }

    function resolveRecordTagNames(record) {
      const tagNames = resolveRecordTags(record).map((tag) => tag.name);
      if (tagNames.length > 0) return tagNames;
      if (!Array.isArray(record?.tags)) return [];
      return [...new Set(record.tags
        .map((tagName) => typeof tagName === "string" ? tagName.trim() : "")
        .filter(Boolean))];
    }

    function auditDotlogMigrationState() {
      const dateKeyPattern = /^time_tracker_(\d{4}-\d{2}-\d{2})$/;
      const cleanString = (value) => typeof value === "string" ? value.trim() : "";
      const addToIndex = (index, key, value) => {
        if (!key) return;
        if (!index.has(key)) index.set(key, []);
        index.get(key).push(value);
      };
      const recordLocation = (date, index, record) => ({
        date,
        index,
        id: cleanString(record?.id) || null,
        startTime: cleanString(record?.startTime) || null,
        time: cleanString(record?.time) || null,
        text: cleanString(record?.text) || null,
        category: cleanString(record?.category) || null,
        tags: Array.isArray(record?.tags) ? [...record.tags] : []
      });

      const storageErrors = [];
      const dateEntries = [];
      for (let index = 0; index < localStorage.length; index += 1) {
        const key = localStorage.key(index);
        const match = key?.match(dateKeyPattern);
        if (!match) continue;

        try {
          const parsed = JSON.parse(localStorage.getItem(key));
          if (!Array.isArray(parsed)) {
            storageErrors.push({ key, error: "记录数据不是数组" });
            dateEntries.push({ key, date: match[1], records: [] });
            continue;
          }
          dateEntries.push({ key, date: match[1], records: parsed });
        } catch (error) {
          storageErrors.push({ key, error: error instanceof Error ? error.message : String(error) });
          dateEntries.push({ key, date: match[1], records: [] });
        }
      }
      dateEntries.sort((left, right) => left.date.localeCompare(right.date));

      let configError = null;
      let rawCategoryConfig = null;
      const storedCategoryConfig = localStorage.getItem("category_config");
      if (storedCategoryConfig) {
        try {
          rawCategoryConfig = JSON.parse(storedCategoryConfig);
        } catch (error) {
          configError = error instanceof Error ? error.message : String(error);
        }
      } else {
        configError = "category_config 不存在";
      }

      const categoryById = new Map();
      const categoryByName = new Map();
      const tagById = new Map();
      const tagByName = new Map();
      const categories = Array.isArray(rawCategoryConfig?.categories)
        ? rawCategoryConfig.categories
        : [];

      categories.forEach((category, categoryIndex) => {
        if (!category || typeof category !== "object") return;
        const categoryRef = {
          id: cleanString(category.id) || null,
          name: cleanString(category.name) || null,
          categoryIndex,
          tags: []
        };
        addToIndex(categoryById, categoryRef.id, categoryRef);
        addToIndex(categoryByName, categoryRef.name, categoryRef);

        if (!Array.isArray(category.tags)) return;
        category.tags.forEach((tag, tagIndex) => {
          const tagRef = {
            id: cleanString(tag?.id) || null,
            name: cleanString(typeof tag === "string" ? tag : tag?.name) || null,
            categoryId: categoryRef.id,
            categoryName: categoryRef.name,
            categoryIndex,
            tagIndex
          };
          categoryRef.tags.push(tagRef);
          addToIndex(tagById, tagRef.id, tagRef);
          addToIndex(tagByName, tagRef.name, tagRef);
        });
      });

      const duplicateConfigEntries = (index) => [...index.entries()]
        .filter(([, matches]) => matches.length > 1)
        .map(([value, matches]) => ({ value, matches }));

      const report = {
        generatedAt: new Date().toISOString(),
        readOnly: true,
        overview: {
          dateCount: dateEntries.length,
          recordCount: dateEntries.reduce((total, entry) => total + entry.records.length, 0),
          recordsPerDate: dateEntries.map((entry) => ({ date: entry.date, count: entry.records.length }))
        },
        recordIds: {
          missing: 0,
          legacy: 0,
          uuid: 0,
          abnormal: 0,
          missingRecords: [],
          abnormalRecords: [],
          duplicates: []
        },
        categories: {
          withValidCategoryId: 0,
          withUnknownCategoryId: 0,
          withoutCategoryIdWithName: 0,
          withoutCategoryIdAndName: 0,
          matchableByUniqueName: 0,
          unknownCategoryIdsRecoverableByName: 0,
          unknownCategoryIds: [],
          unmatchedNames: [],
          ambiguousNames: [],
          duplicateConfigIds: duplicateConfigEntries(categoryById),
          duplicateConfigNames: duplicateConfigEntries(categoryByName)
        },
        tags: {
          withAllValidTagIds: 0,
          withSomeUnknownTagIds: 0,
          withoutTagIdsWithNames: 0,
          withoutTagIdsAndNames: 0,
          recordsMatchableByUniqueNames: 0,
          tagNamesMatchableByUniqueName: 0,
          unknownTagIdsRecoverableByNames: 0,
          unknownTagIds: [],
          unmatchedNames: [],
          ambiguousNames: [],
          duplicateConfigIds: duplicateConfigEntries(tagById),
          duplicateConfigNames: duplicateConfigEntries(tagByName)
        },
        risks: {
          sparseDateRule: "记录数不超过 max(3, 每日记录数中位数的 25%)",
          sparseDateThreshold: 3,
          sparseDates: [],
          missingIdMayDuplicateAcrossDevices: false,
          suspectedSameDayDuplicates: [],
          unsafeMigrationRecords: []
        },
        errors: {
          categoryConfig: configError,
          storage: storageErrors,
          invalidRecords: []
        }
      };

      const recordIdOccurrences = new Map();
      const unsafeMigrationRecords = new Map();
      const markUnsafe = (location, reason) => {
        const key = `${location.date}:${location.index}`;
        if (!unsafeMigrationRecords.has(key)) {
          unsafeMigrationRecords.set(key, { ...location, reasons: [] });
        }
        unsafeMigrationRecords.get(key).reasons.push(reason);
      };

      dateEntries.forEach(({ date, records }) => {
        const fingerprints = new Map();

        records.forEach((record, index) => {
          const location = recordLocation(date, index, record);
          if (!record || typeof record !== "object" || Array.isArray(record)) {
            report.errors.invalidRecords.push({ ...location, error: "记录不是对象" });
          }

          const recordId = cleanString(record?.id);
          if (!recordId) {
            report.recordIds.missing += 1;
            report.recordIds.missingRecords.push(location);
          } else {
            addToIndex(recordIdOccurrences, recordId, location);
            if (recordId.startsWith("rec_legacy_")) {
              report.recordIds.legacy += 1;
            } else if (/^rec_[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(recordId)) {
              report.recordIds.uuid += 1;
            } else {
              report.recordIds.abnormal += 1;
              report.recordIds.abnormalRecords.push(location);
            }
          }

          const categoryId = cleanString(record?.categoryId);
          const categoryName = cleanString(record?.category);
          let resolvedCategory = null;
          if (categoryId) {
            const idMatches = categoryById.get(categoryId) || [];
            if (idMatches.length === 1) {
              report.categories.withValidCategoryId += 1;
              resolvedCategory = idMatches[0];
            } else {
              report.categories.withUnknownCategoryId += 1;
              const nameMatches = categoryName ? categoryByName.get(categoryName) || [] : [];
              const unknownCategoryId = {
                ...location,
                categoryId,
                reason: idMatches.length > 1 ? "配置中存在重复 categoryId" : "配置中找不到 categoryId",
                fallbackCategoryId: nameMatches.length === 1 ? nameMatches[0].id : null
              };
              report.categories.unknownCategoryIds.push(unknownCategoryId);
              if (nameMatches.length === 1) {
                report.categories.matchableByUniqueName += 1;
                report.categories.unknownCategoryIdsRecoverableByName += 1;
                resolvedCategory = nameMatches[0];
              } else if (categoryName && nameMatches.length === 0) {
                report.categories.unmatchedNames.push(location);
                markUnsafe(location, `categoryId 与分类名称都无法匹配：${categoryId} / ${categoryName}`);
              } else if (categoryName && nameMatches.length > 1) {
                report.categories.ambiguousNames.push({ ...location, candidates: nameMatches });
                markUnsafe(location, `categoryId 无效且分类名称存在歧义：${categoryName}`);
              } else {
                markUnsafe(location, `categoryId 无法唯一解析且没有名称兜底：${categoryId}`);
              }
            }
          } else if (categoryName) {
            report.categories.withoutCategoryIdWithName += 1;
            const nameMatches = categoryByName.get(categoryName) || [];
            if (nameMatches.length === 1) {
              report.categories.matchableByUniqueName += 1;
              resolvedCategory = nameMatches[0];
            } else if (nameMatches.length === 0) {
              report.categories.unmatchedNames.push(location);
              markUnsafe(location, `分类名称无法匹配：${categoryName}`);
            } else {
              report.categories.ambiguousNames.push({ ...location, candidates: nameMatches });
              markUnsafe(location, `分类名称存在歧义：${categoryName}`);
            }
          } else {
            report.categories.withoutCategoryIdAndName += 1;
          }

          const tagIds = Array.isArray(record?.tagIds)
            ? record.tagIds.map(cleanString).filter(Boolean)
            : [];
          const tagNames = Array.isArray(record?.tags)
            ? record.tags.map(cleanString).filter(Boolean)
            : [];

          const auditTagNameFallback = () => {
            if (tagNames.length === 0) return false;
            let allNamesMatchUniquely = true;
            tagNames.forEach((tagName) => {
              const matches = resolvedCategory
                ? resolvedCategory.tags.filter((tag) => tag.name === tagName)
                : (tagByName.get(tagName) || []);
              if (matches.length === 1) {
                report.tags.tagNamesMatchableByUniqueName += 1;
              } else if (matches.length === 0) {
                allNamesMatchUniquely = false;
                report.tags.unmatchedNames.push({ ...location, tagName });
                markUnsafe(location, `标签名称无法匹配：${tagName}`);
              } else {
                allNamesMatchUniquely = false;
                report.tags.ambiguousNames.push({ ...location, tagName, candidates: matches });
                markUnsafe(location, `标签名称存在歧义：${tagName}`);
              }
            });
            if (allNamesMatchUniquely) {
              report.tags.recordsMatchableByUniqueNames += 1;
            }
            return allNamesMatchUniquely;
          };

          if (tagIds.length > 0) {
            const unresolvedTagIds = tagIds.filter((tagId) => (tagById.get(tagId) || []).length !== 1);
            if (unresolvedTagIds.length === 0) {
              report.tags.withAllValidTagIds += 1;
            } else {
              report.tags.withSomeUnknownTagIds += 1;
              report.tags.unknownTagIds.push({ ...location, tagIds: unresolvedTagIds });
              if (auditTagNameFallback()) {
                report.tags.unknownTagIdsRecoverableByNames += 1;
              } else if (tagNames.length === 0) {
                markUnsafe(location, `tagIds 无法解析且没有名称兜底：${unresolvedTagIds.join(", ")}`);
              }
            }
          } else if (tagNames.length > 0) {
            report.tags.withoutTagIdsWithNames += 1;
            auditTagNameFallback();
          } else {
            report.tags.withoutTagIdsAndNames += 1;
          }

          const duplicateFingerprint = [
            cleanString(record?.startTime),
            cleanString(record?.time),
            cleanString(record?.text).replace(/\s+/g, " ").toLowerCase()
          ].join("|");
          if (duplicateFingerprint !== "||") {
            addToIndex(fingerprints, duplicateFingerprint, location);
          }
        });

        [...fingerprints.entries()]
          .filter(([, matches]) => matches.length > 1)
          .forEach(([fingerprint, matches]) => {
            report.risks.suspectedSameDayDuplicates.push({ date, fingerprint, matches });
          });
      });

      report.recordIds.duplicates = [...recordIdOccurrences.entries()]
        .filter(([, matches]) => matches.length > 1)
        .map(([id, matches]) => ({ id, matches }));

      const dailyCounts = report.overview.recordsPerDate.map(({ count }) => count).sort((a, b) => a - b);
      const middle = Math.floor(dailyCounts.length / 2);
      const median = dailyCounts.length === 0
        ? 0
        : dailyCounts.length % 2 === 1
          ? dailyCounts[middle]
          : (dailyCounts[middle - 1] + dailyCounts[middle]) / 2;
      report.risks.sparseDateThreshold = Math.max(3, Math.floor(median * 0.25));
      report.risks.sparseDates = report.overview.recordsPerDate
        .filter(({ count }) => count <= report.risks.sparseDateThreshold);
      report.risks.missingIdMayDuplicateAcrossDevices = report.recordIds.missing > 0;
      report.risks.unsafeMigrationRecords = [...unsafeMigrationRecords.values()];

      window.__dotlogMigrationAudit = report;
      console.group("[Dotlog] 旧数据与同步迁移只读审计");
      console.log("审计报告对象：window.__dotlogMigrationAudit", report);
      console.table([{
        日期数量: report.overview.dateCount,
        记录总数: report.overview.recordCount,
        缺少记录ID: report.recordIds.missing,
        旧版记录ID: report.recordIds.legacy,
        UUID记录ID: report.recordIds.uuid,
        异常记录ID: report.recordIds.abnormal
      }]);
      console.groupCollapsed("每日记录数量");
      console.table(report.overview.recordsPerDate);
      console.groupEnd();
      console.groupCollapsed("分类 ID 状态");
      console.table([{
        ID有效: report.categories.withValidCategoryId,
        ID无法解析: report.categories.withUnknownCategoryId,
        无ID但有名称: report.categories.withoutCategoryIdWithName,
        无ID且无名称: report.categories.withoutCategoryIdAndName,
        名称可唯一匹配: report.categories.matchableByUniqueName,
        无效ID可由名称恢复: report.categories.unknownCategoryIdsRecoverableByName
      }]);
      console.log(report.categories);
      console.groupEnd();
      console.groupCollapsed("标签 ID 状态");
      console.table([{
        ID全部有效: report.tags.withAllValidTagIds,
        ID部分无效: report.tags.withSomeUnknownTagIds,
        无ID但有名称: report.tags.withoutTagIdsWithNames,
        无ID且无名称: report.tags.withoutTagIdsAndNames,
        名称可唯一匹配的记录: report.tags.recordsMatchableByUniqueNames,
        无效ID可由名称恢复: report.tags.unknownTagIdsRecoverableByNames
      }]);
      console.log(report.tags);
      console.groupEnd();
      console.groupCollapsed("同步与迁移风险");
      console.log(report.risks);
      console.groupEnd();
      if (configError || storageErrors.length || report.errors.invalidRecords.length) {
        console.warn("审计发现无法正常解析的数据", report.errors);
      }
      console.info("审计为只读操作：未保存记录、未补 ID、未触发同步。");
      console.groupEnd();
      return report;
    }

    function mapTagIdsByName(tags, tagIds) {
      const tagIdMap = new Map();
      if (!Array.isArray(tags)) return tagIdMap;

      tags.forEach((tagName, index) => {
        const safeTagName = typeof tagName === "string" ? tagName.trim() : "";
        const tagId = normalizeReferenceId(Array.isArray(tagIds) ? tagIds[index] : null);
        if (safeTagName && tagId && !tagIdMap.has(safeTagName)) {
          tagIdMap.set(safeTagName, tagId);
        }
      });

      return tagIdMap;
    }

    function resolveClassificationFields(classification, fallbackRecord = null) {
      const category = typeof classification?.category === "string"
        ? classification.category.trim()
        : "";
      const safeCategory = category || null;
      const tags = safeCategory
        ? [...new Set((Array.isArray(classification?.tags) ? classification.tags : [])
          .map((tag) => String(tag).trim())
          .filter(Boolean))]
        : [];

      if (!safeCategory) {
        return {
          category: null,
          tags: [],
          categoryId: null,
          tagIds: []
        };
      }

      const matchedCategory = findCategoryByName(safeCategory);
      const fallbackCategoryId = fallbackRecord?.category === safeCategory
        ? normalizeReferenceId(fallbackRecord.categoryId)
        : null;
      const categoryId = matchedCategory?.id
        || normalizeReferenceId(classification?.categoryId)
        || fallbackCategoryId
        || null;

      const classificationTagIdMap = mapTagIdsByName(tags, classification?.tagIds);
      const fallbackTagIdMap = fallbackRecord?.category === safeCategory
        ? mapTagIdsByName(fallbackRecord.tags, fallbackRecord.tagIds)
        : new Map();
      const tagIds = tags.map((tagName, index) => {
        const matchedTag = findTagByName(safeCategory, tagName);
        if (matchedTag?.tag?.id) return matchedTag.tag.id;
        return normalizeReferenceId(Array.isArray(classification?.tagIds) ? classification.tagIds[index] : null)
          || classificationTagIdMap.get(tagName)
          || fallbackTagIdMap.get(tagName)
          || null;
      }).filter(Boolean);

      return {
        category: safeCategory,
        tags,
        categoryId,
        tagIds
      };
    }

    function getCategoryTags(categoryName) {
      const category = findCategory(categoryName);
      return category ? category.tags.map((tag) => tag.name) : [];
    }

    function categoryColor(categoryName) {
      const category = findCategory(categoryName);
      return category ? category.color : "#B0B0B0";
    }

    function parseEntryText(rawText) {
      const notes = [];
      const textWithoutNotes = rawText.replace(/（([^（）]*)）|\(([^()]*)\)/g, (match, chineseNote, englishNote) => {
        const note = (chineseNote || englishNote || "").trim();
        if (note) notes.push(note);
        return "";
      });

      const text = textWithoutNotes.replace(/\s+/g, " ").trim() || rawText.trim();

      return {
        text,
        note: notes.length ? notes.join("；") : null
      };
    }

    function parseBackfill(rawText) {
      if (!rawText.startsWith("补录")) {
        return {
          isBackfill: false,
          time: formatTime(new Date()),
          text: rawText
        };
      }

      const match = rawText.match(/^补录\s+(\S+)\s+(.+)$/);
      if (!match) {
        alert("补录格式：补录 HH:MM 事件描述");
        return null;
      }

      const time = match[1];
      const text = match[2].trim();
      if (!/^\d{2}:\d{2}$/.test(time)) {
        alert("补录格式：补录 HH:MM 事件描述");
        return null;
      }

      const [hours, minutes] = time.split(":").map(Number);
      if (hours > 23 || minutes > 59) {
        alert("时间格式不正确，请使用 00:00–23:59");
        return null;
      }

      return {
        isBackfill: true,
        time,
        text
      };
    }

    function parseSplit(rawText, endTime) {
      if (!rawText.includes("+")) {
        return { isSplit: false };
      }

      const match = rawText.match(/^(.+?)\s*\+\s*(.+?)\s+(\d+)$/);
      if (!match) {
        alert("加号拆分格式：主事件 + 次事件 时长（分钟）");
        return null;
      }

      const duration = Number(match[3]);
      if (duration < 1 || duration > 600) {
        alert("时长超出范围，请输入 1–600 分钟");
        return null;
      }

      const endMinutes = timeToMinutes(endTime);
      const secondaryEndMinutes = endMinutes - duration;
      if (secondaryEndMinutes < 0) {
        alert("拆分后时间超出当天范围，请检查时长");
        return null;
      }

      return {
        isSplit: true,
        mainText: match[1].trim(),
        secondaryText: match[2].trim(),
        secondaryEndTime: minutesToTime(secondaryEndMinutes)
      };
    }

    function storageKey(date) {
      return `time_tracker_${formatDateKey(date)}`;
    }

    function formatIcsDate(date, time) {
      const [hours, minutes] = time.split(":").map(Number);
      const eventDate = new Date(date.getFullYear(), date.getMonth(), date.getDate(), hours, minutes, 0);
      const year = eventDate.getFullYear();
      const month = String(eventDate.getMonth() + 1).padStart(2, "0");
      const day = String(eventDate.getDate()).padStart(2, "0");
      return `${year}${month}${day}T${time.replace(":", "")}00`;
    }

    function addDays(date, days) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate() + days);
    }

    function escapeIcsText(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/;/g, "\\;")
        .replace(/,/g, "\\,")
        .replace(/\r?\n/g, "\\n");
    }

    function summaryForRecord(record) {
      if (!record.tags.length) return record.text;
      return `${record.text} ${record.tags.map((tag) => `#${tag}`).join(" ")}`;
    }

    function createEventUid() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function showExportStatus(message) {
      exportStatus.textContent = message;
      clearTimeout(exportStatusTimer);
      exportStatusTimer = setTimeout(() => {
        exportStatus.textContent = "";
      }, 2000);
    }

    function getGistSettings() {
      return {
        token: localStorage.getItem("gist_token") || "",
        gistId: localStorage.getItem("gist_id") || ""
      };
    }

    function hasGistSettings() {
      const settings = getGistSettings();
      return Boolean(settings.token && settings.gistId);
    }

    function formatSyncTime(date = new Date()) {
      return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function setSyncStatus(state, message, options = {}) {
      syncStatus = {
        state,
        message,
        lastSyncedAt: options.lastSyncedAt || syncStatus.lastSyncedAt
      };

      if (state === "connected" && options.lastSyncedAt) {
        localStorage.setItem("dotlog_last_synced", options.lastSyncedAt);
      }

      updateSyncIndicators();
    }

    function updateSyncIndicators() {
      if (!hasGistSettings()) {
        syncIndicator.className = "sync-indicator is-hidden";
        syncIndicator.textContent = "";
      } else if (syncStatus.state === "syncing") {
        syncIndicator.className = "sync-indicator is-syncing";
        syncIndicator.textContent = "↑↓";
        syncIndicator.title = "同步中";
      } else if (syncStatus.state === "error") {
        syncIndicator.className = "sync-indicator is-error";
        syncIndicator.textContent = "!";
        syncIndicator.title = syncStatus.message;
      } else {
        syncIndicator.className = "sync-indicator";
        syncIndicator.textContent = "✓";
        syncIndicator.title = syncStatus.message || "已同步";
      }

      const statusNode = document.querySelector("#syncStatusText");
      if (!statusNode) return;

      statusNode.className = "sync-status";
      if (!hasGistSettings()) {
        statusNode.textContent = "● 未配置";
      } else if (syncStatus.state === "connected") {
        statusNode.classList.add("is-connected");
        statusNode.textContent = syncStatus.message;
      } else if (syncStatus.state === "syncing") {
        statusNode.textContent = "● 同步中";
      } else if (syncStatus.state === "error") {
        statusNode.classList.add("is-error");
        statusNode.textContent = syncStatus.message;
      } else {
        statusNode.textContent = "● 未配置";
      }
    }

    function isToday(date) {
      return isSameDate(date, new Date());
    }

    function normalizeRecord(record) {
      return {
        ...record,
        id: typeof record.id === "string" && record.id.trim()
          ? record.id.trim()
          : createLegacyRecordId(record),
        time: record.time,
        startTime: isValidTimeInput(record.startTime || "") ? record.startTime : null,
        text: record.text,
        category: record.category || null,
        categoryId: normalizeReferenceId(record.categoryId),
        note: record.note || null,
        tags: Array.isArray(record.tags) ? record.tags : [],
        tagIds: Array.isArray(record.tagIds)
          ? record.tagIds.map((tagId) => normalizeReferenceId(tagId)).filter(Boolean)
          : [],
        isBackfill: record.isBackfill || false,
        isSplit: record.isSplit || false
      };
    }

    function normalizeRecordList(records, identityScope = "") {
      if (!Array.isArray(records)) {
        throw new Error(`记录数据不是数组，已阻止 normalize：${identityScope || "unknown"}`);
      }

      const occurrenceByFingerprint = new Map();
      const normalizedRecords = records.map((record) => {
        if (typeof record.id === "string" && record.id.trim()) return normalizeRecord(record);

        const fingerprint = legacyRecordFingerprint(record);
        const occurrence = occurrenceByFingerprint.get(fingerprint) || 0;
        occurrenceByFingerprint.set(fingerprint, occurrence + 1);
        return normalizeRecord({
          ...record,
          id: createLegacyRecordId(record, `${identityScope}:${occurrence}`)
        });
      });

      if (normalizedRecords.length < records.length) {
        console.warn("[Dotlog] normalize 后记录数量减少，已阻止写回", {
          identityScope,
          before: records.length,
          after: normalizedRecords.length
        });
        throw new Error("NORMALIZE_RECORD_COUNT_REGRESSION");
      }

      return normalizedRecords;
    }

    function getRecordStorageKeys() {
      const keys = [];
      for (let index = 0; index < localStorage.length; index += 1) {
        const key = localStorage.key(index);
        if (key && /^time_tracker_\d{4}-\d{2}-\d{2}$/.test(key)) keys.push(key);
      }
      return keys.sort();
    }

    function ensureSchemaV1Backup() {
      const existingBackupKey = localStorage.getItem(schemaV1BackupMarkerKey);
      if (existingBackupKey && localStorage.getItem(existingBackupKey)) return true;

      const createdAt = new Date().toISOString();
      const backupKey = `backup_before_schema_v1_${createdAt.replace(/[:.]/g, "-")}`;
      const recordValues = {};
      getRecordStorageKeys().forEach((key) => {
        recordValues[key] = localStorage.getItem(key);
      });

      try {
        localStorage.setItem(backupKey, JSON.stringify({
          createdAt,
          schemaVersion: dataSchemaVersion,
          records: recordValues,
          categoryConfig: localStorage.getItem("category_config"),
          lastUpdated: localStorage.getItem("dotlog_last_updated")
        }));
        localStorage.setItem(schemaV1BackupMarkerKey, backupKey);
        console.info("[Dotlog] schema v1 原始数据备份已创建", backupKey);
        return true;
      } catch (error) {
        console.error("[Dotlog] schema v1 备份失败，已阻止记录写回和自动同步", error);
        return false;
      }
    }

    function parseStoredRecordArray(rawValue, key) {
      if (rawValue === null) return [];
      const records = JSON.parse(rawValue);
      if (!Array.isArray(records)) {
        throw new Error(`记录 key 不是数组：${key}`);
      }
      return records;
    }

    function getRecordCountRegressions(candidateRecords = {}, baselineRecords = {}) {
      return Object.keys(baselineRecords).flatMap((dateKey) => {
        const before = Array.isArray(baselineRecords[dateKey]) ? baselineRecords[dateKey].length : 0;
        const after = Array.isArray(candidateRecords[dateKey]) ? candidateRecords[dateKey].length : 0;
        return after < before ? [{ dateKey, before, after }] : [];
      });
    }

    function assertNoRecordCountRegression(candidateData, baselineData, context) {
      const regressions = getRecordCountRegressions(candidateData?.records, baselineData?.records);
      if (regressions.length === 0) return;
      console.warn(`[Dotlog] ${context} 检测到记录数量减少，已阻止覆盖`, regressions);
      const error = new Error("RECORD_COUNT_REGRESSION");
      error.regressions = regressions;
      throw error;
    }

    function getLocalUpdatedAt() {
      return localStorage.getItem("dotlog_last_updated") || "1970-01-01T00:00:00.000Z";
    }

    function collectLocalData() {
      const records = {};

      getRecordStorageKeys().forEach((key) => {
        const dateKey = key.replace("time_tracker_", "");
        try {
          const value = parseStoredRecordArray(localStorage.getItem(key), key);
          records[dateKey] = sortRecords(normalizeRecordList(value, dateKey));
        } catch (error) {
          console.error("[Dotlog] 本地记录读取失败，已阻止同步", { key, error });
          throw error;
        }
      });

      const settings = loadCategoryConfig();
      return {
        records,
        __settings__: settings,
        category_config: settings,
        last_updated: getLocalUpdatedAt()
      };
    }

    function getSettingsFromGistData(data) {
      return data?.__settings__ || data?.category_config || null;
    }

    function countDataRecords(data) {
      return Object.values(data?.records || {}).reduce((total, records) => {
        return total + (Array.isArray(records) ? records.length : 0);
      }, 0);
    }

    function isCurrentGistInitialized() {
      const { gistId } = getGistSettings();
      return Boolean(gistId && localStorage.getItem("dotlog_sync_initialized_gist") === gistId);
    }

    function markCurrentGistInitialized() {
      const { gistId } = getGistSettings();
      if (gistId) localStorage.setItem("dotlog_sync_initialized_gist", gistId);
    }

    function applyRemoteData(data) {
      if (!schemaV1BackupReady) {
        throw new Error("SCHEMA_BACKUP_NOT_READY");
      }

      const localData = collectLocalData();
      assertNoRecordCountRegression(data, localData, "远程覆盖本地");
      const normalizedRemoteRecords = {};
      Object.entries(data.records || {}).forEach(([dateKey, records]) => {
        if (!Array.isArray(records)) {
          throw new Error(`远程记录不是数组：${dateKey}`);
        }
        const normalizedRecords = sortRecords(normalizeRecordList(records, dateKey));
        if (normalizedRecords.length < records.length) {
          console.warn("[Dotlog] 远程记录 normalize 后数量减少，已阻止覆盖", {
            dateKey,
            before: records.length,
            after: normalizedRecords.length
          });
          throw new Error("NORMALIZE_RECORD_COUNT_REGRESSION");
        }
        normalizedRemoteRecords[dateKey] = normalizedRecords;
      });

      applyingRemoteData = true;

      try {
        const keysToRemove = getRecordStorageKeys().filter((key) => (
          !Object.prototype.hasOwnProperty.call(normalizedRemoteRecords, key.replace("time_tracker_", ""))
        ));
        keysToRemove.forEach((key) => localStorage.removeItem(key));

        Object.entries(normalizedRemoteRecords).forEach(([dateKey, records]) => {
          localStorage.setItem(`time_tracker_${dateKey}`, JSON.stringify(records));
        });

        const remoteSettings = getSettingsFromGistData(data);
        if (remoteSettings) {
          localStorage.setItem("category_config", JSON.stringify(normalizeCategoryConfig(remoteSettings)));
        }

        localStorage.setItem("dotlog_last_updated", data.last_updated || new Date().toISOString());
      } finally {
        applyingRemoteData = false;
      }
    }

    function mergeGistData(localData, remoteData) {
      const mergedRecords = {};
      const allDates = new Set([
        ...Object.keys(remoteData.records || {}),
        ...Object.keys(localData.records || {})
      ]);

      allDates.forEach((dateKey) => {
        const seen = new Set();
        const merged = [];
        [...(remoteData.records?.[dateKey] || []), ...(localData.records?.[dateKey] || [])]
          .map(normalizeRecord)
          .forEach((record) => {
            const signature = JSON.stringify(record);
            if (seen.has(signature)) return;
            seen.add(signature);
            merged.push(record);
          });
        mergedRecords[dateKey] = sortRecords(merged);
      });

      const mergedSettings = normalizeCategoryConfig(
        getSettingsFromGistData(remoteData)
          || getSettingsFromGistData(localData)
          || cloneDefaultCategoryConfig()
      );

      return {
        records: mergedRecords,
        __settings__: mergedSettings,
        category_config: mergedSettings,
        last_updated: new Date().toISOString()
      };
    }

    function markLocalDataChanged() {
      if (applyingRemoteData) return;
      localStorage.setItem("dotlog_last_updated", new Date().toISOString());
      queueGistSync();
    }

    async function requestGist(method, body = null, settingsOverride = null) {
      const { token, gistId } = settingsOverride || getGistSettings();
      const response = await fetch(`https://api.github.com/gists/${encodeURIComponent(gistId)}`, {
        method,
        headers: {
          Authorization: `token ${token}`,
          Accept: "application/vnd.github+json",
          ...(body ? { "Content-Type": "application/json" } : {})
        },
        ...(body ? { body: JSON.stringify(body) } : {})
      });

      if (response.status === 401 || response.status === 403) {
        throw new Error("TOKEN_INVALID");
      }

      if (response.status === 404) {
        throw new Error("GIST_NOT_FOUND");
      }

      if (!response.ok) {
        throw new Error("NETWORK_ERROR");
      }

      return response.json();
    }

    async function fetchGistData() {
      const gist = await requestGist("GET");
      const content = gist.files?.[gistDataFile]?.content;
      if (!content) return null;
      return JSON.parse(content);
    }

    async function pushGistData(data) {
      await requestGist("PATCH", {
        files: {
          [gistDataFile]: {
            content: JSON.stringify(data, null, 2)
          }
        }
      });
    }

    function syncErrorMessage(error) {
      if (error.message === "TOKEN_INVALID") return "● Token 无效，请检查";
      if (error.message === "GIST_NOT_FOUND") return "● Gist 不存在，请检查 ID";
      if (error.message === "RECORD_COUNT_REGRESSION") return "● 检测到记录减少，已阻止同步";
      if (error.message === "NORMALIZE_RECORD_COUNT_REGRESSION") return "● 数据转换数量异常，已阻止同步";
      if (error.message === "SCHEMA_BACKUP_NOT_READY") return "● 数据备份失败，已阻止同步";
      return "● 无法连接，请检查网络";
    }

    async function testGistConnection() {
      if (!hasGistSettings()) return false;

      setSyncStatus("syncing", "● 同步中");
      try {
        await requestGist("GET");
        const checkedAt = new Date().toISOString();
        setSyncStatus("connected", `● 已连接，上次同步 ${formatSyncTime(new Date(checkedAt))}`, { lastSyncedAt: checkedAt });
        return true;
      } catch (error) {
        setSyncStatus("error", syncErrorMessage(error));
        return false;
      }
    }

    function queueGistSync() {
      if (!hasGistSettings() || applyingRemoteData || !schemaV1BackupReady) return;
      clearTimeout(syncTimer);
      setSyncStatus("syncing", "● 同步中");
      syncTimer = setTimeout(() => {
        syncWithGist().catch(() => {});
      }, 700);
    }

    async function syncWithGist(options = {}) {
      if (!hasGistSettings() || syncInProgress) return false;
      if (!schemaV1BackupReady) {
        setSyncStatus("error", "● 数据备份失败，已阻止同步");
        return false;
      }

      syncInProgress = true;
      setSyncStatus("syncing", "● 同步中");

      try {
        const localData = collectLocalData();
        const remoteData = await fetchGistData();
        let nextData = null;
        const requiresInitialMerge = options.mergeLocal || !isCurrentGistInitialized();

        if (requiresInitialMerge) {
          const remoteBaseline = remoteData || { records: {}, category_config: null, last_updated: "1970-01-01T00:00:00.000Z" };
          nextData = mergeGistData(localData, remoteBaseline);
          assertNoRecordCountRegression(nextData, localData, "初始合并覆盖本地");
          assertNoRecordCountRegression(nextData, remoteBaseline, "初始合并覆盖远程");
          applyRemoteData(nextData);
          await pushGistData(nextData);
        } else if (!remoteData) {
          nextData = { ...localData, last_updated: new Date().toISOString() };
          applyRemoteData(nextData);
          await pushGistData(nextData);
        } else {
          const localTime = Date.parse(localData.last_updated || "1970-01-01T00:00:00.000Z");
          const remoteTime = Date.parse(remoteData.last_updated || "1970-01-01T00:00:00.000Z");
          const localRecordCount = countDataRecords(localData);
          const remoteRecordCount = countDataRecords(remoteData);

          if (localRecordCount === 0 && remoteRecordCount > 0) {
            applyRemoteData(remoteData);
            nextData = remoteData;
          } else if (remoteTime > localTime) {
            applyRemoteData(remoteData);
            nextData = remoteData;
          } else if (localTime > remoteTime) {
            nextData = localData;
            assertNoRecordCountRegression(nextData, remoteData, "本地推送远程");
            await pushGistData(nextData);
          } else {
            nextData = localData;
          }
        }

        markCurrentGistInitialized();
        const syncedAt = new Date().toISOString();
        setSyncStatus("connected", `● 已连接，上次同步 ${formatSyncTime(new Date(syncedAt))}`, { lastSyncedAt: syncedAt });
        if (settingsMode === "settings") {
          renderSettingsPage();
        } else {
          render();
        }
        return true;
      } catch (error) {
        setSyncStatus("error", syncErrorMessage(error));
        return false;
      } finally {
        syncInProgress = false;
      }
    }

    function loadRecords(date) {
      try {
        const key = storageKey(date);
        const storedValue = localStorage.getItem(key);
        const records = parseStoredRecordArray(storedValue, key);
        return normalizeRecordList(records, formatDateKey(date));
      } catch (error) {
        console.error("[Dotlog] 记录读取失败；原始 localStorage 未被改写", error);
        return [];
      }
    }

    function getPreviousDayBoundary(date) {
      const previousDate = addDays(date, -1);
      const previousRecords = loadRecords(previousDate);
      if (previousRecords.length === 0) return null;

      const record = previousRecords.reduce((latest, current) => {
        return timeToMinutes(current.time) > timeToMinutes(latest.time) ? current : latest;
      });

      return { date: previousDate, record };
    }

    function getDefaultStartTime(date, endTime) {
      if (!isValidTimeInput(endTime)) return "";
      const endMinutes = timeToMinutes(endTime);
      const previousRecord = loadRecords(date)
        .filter((record) => timeToMinutes(record.time) < endMinutes)
        .sort((first, second) => timeToMinutes(second.time) - timeToMinutes(first.time))[0];

      if (previousRecord) return previousRecord.time;
      return getPreviousDayBoundary(date)?.record.time || endTime;
    }

    function getRecordInterval(records, index, date) {
      const record = records[index];
      if (!record) return null;

      const previousDayBoundary = index === records.length - 1 ? getPreviousDayBoundary(date) : null;
      const previousRecord = index < records.length - 1
        ? records[index + 1]
        : previousDayBoundary?.record || null;
      const startTime = record.startTime || previousRecord?.time || null;
      if (!startTime) return null;

      const isCrossDay = index === records.length - 1
        && (record.startTime
          ? timeToMinutes(startTime) > timeToMinutes(record.time)
          : Boolean(previousDayBoundary));
      const duration = isCrossDay
        ? durationFromPreviousDay(startTime, record.time)
        : durationBetween(startTime, record.time);

      let gapMinutes = 0;
      if (record.startTime && previousRecord) {
        if (index < records.length - 1) {
          gapMinutes = Math.max(0, timeToMinutes(startTime) - timeToMinutes(previousRecord.time));
        } else if (isCrossDay) {
          gapMinutes = Math.max(0, timeToMinutes(startTime) - timeToMinutes(previousRecord.time));
        } else {
          gapMinutes = durationFromPreviousDay(previousRecord.time, startTime);
        }
      }

      return {
        startTime,
        endTime: record.time,
        duration,
        gapMinutes,
        isCrossDay,
        startDate: isCrossDay ? addDays(date, -1) : date
      };
    }

    function saveRecords(date, records, options = {}) {
      if (!schemaV1BackupReady) {
        console.warn("[Dotlog] schema v1 备份尚未完成，已阻止记录写回");
        return false;
      }

      const key = storageKey(date);
      try {
        const existingRecords = parseStoredRecordArray(localStorage.getItem(key), key);
        const normalizedRecords = normalizeRecordList(records, formatDateKey(date));
        if (normalizedRecords.length < records.length) {
          console.warn("[Dotlog] normalize 后记录数量减少，已阻止写回", {
            key,
            before: records.length,
            after: normalizedRecords.length
          });
          return false;
        }

        if (normalizedRecords.length < existingRecords.length) {
          const decrease = existingRecords.length - normalizedRecords.length;
          const intentionalDecrease = options.allowRecordCountDecrease === true
            && decrease === options.expectedDecrease;
          if (!intentionalDecrease) {
            console.warn("[Dotlog] 写回记录少于当前整天数据，已阻止覆盖", {
              key,
              before: existingRecords.length,
              after: normalizedRecords.length,
              reason: options.reason || "unspecified"
            });
            return false;
          }
        }

        localStorage.setItem(key, JSON.stringify(normalizedRecords));
        markLocalDataChanged();
        return true;
      } catch (error) {
        console.error("[Dotlog] 记录写回失败，原始数据保持不变", { key, error });
        return false;
      }
    }

    function canExtendRecordToNow(record, index, date, now = new Date()) {
      if (!record || index !== 0 || !isToday(date)) return false;
      const difference = now.getHours() * 60 + now.getMinutes() - timeToMinutes(record.time);
      return difference >= 3;
    }

    function extendRecordToNow(index) {
      const records = loadRecords(viewedDate);
      const record = records[index];
      const now = new Date();
      if (!canExtendRecordToNow(record, index, viewedDate, now)) return;

      record.time = formatTime(now);
      saveRecords(viewedDate, sortRecords(records));
      render();
    }

    function sortRecords(records) {
      return records
        .map((record, order) => ({ record, order }))
        .sort((a, b) => {
          const timeDiff = timeToMinutes(b.record.time) - timeToMinutes(a.record.time);
          return timeDiff || a.order - b.order;
        })
        .map((item) => item.record);
    }

    function resetDateViewState() {
      tableExpanded = false;
      openCategoryIndexes = [];
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
    }

    function setViewedDate(date) {
      viewedDate = startOfDay(date);

    function createWeekSlide(weekStart, position, todayDate) {
      const slide = document.createElement("div");
      slide.className = `week-slide is-${position}`;
      const isCurrent = position === "current";
      if (!isCurrent) {
        slide.setAttribute("aria-hidden", "true");
        slide.inert = true;
      }

      for (let index = 0; index < 7; index += 1) {
        const date = offsetDate(weekStart, index);
        const day = document.createElement("button");
        day.className = "week-day";
        day.type = "button";
        day.setAttribute("aria-label", formatDateLabel(date));
        if (!isCurrent) day.tabIndex = -1;
        if (isSameDate(date, todayDate)) day.classList.add("is-today");
        if (isSameDate(date, viewedDate)) day.classList.add("is-selected");

        const number = document.createElement("span");
        number.className = "week-day-num";
        number.textContent = String(date.getDate());
        day.append(number);

        if (isCurrent) day.addEventListener("click", () => setViewedDate(date));
        slide.append(day);
      }

      return slide;
    }

    function renderWeekNav() {
      const todayDate = startOfDay(new Date());
      monthTitle.textContent = isSameDate(viewedDate, todayDate)
        ? "今天"
        : formatShortDateLabel(viewedDate);

      weekDays.replaceChildren(
        createWeekSlide(offsetDate(currentWeekStart, -7), "previous", todayDate),
        createWeekSlide(currentWeekStart, "current", todayDate),
        createWeekSlide(offsetDate(currentWeekStart, 7), "next", todayDate)
      );

    function lockPageSwipeScroll() {
      if (pageSwipeScrollLocked) return;
      pageSwipeLockedScrollY = window.scrollY || window.pageYOffset || 0;
      document.body.style.position = "fixed";
      document.body.style.top = `-${pageSwipeLockedScrollY}px`;
      document.body.style.left = "0";
      document.body.style.right = "0";
      document.body.style.width = "100%";
      document.body.style.overflow = "hidden";
      pageSwipeScrollLocked = true;
    }

    function unlockPageSwipeScroll() {
      if (!pageSwipeScrollLocked) return;
      document.body.style.removeProperty("position");
      document.body.style.removeProperty("top");
      document.body.style.removeProperty("left");
      document.body.style.removeProperty("right");
      document.body.style.removeProperty("width");
      document.body.style.removeProperty("overflow");
      window.scrollTo(0, pageSwipeLockedScrollY);
      pageSwipeScrollLocked = false;
    }

    function lockBottomSheetBackgroundScroll() {
      if (bottomSheetScrollLocked || pageSwipeScrollLocked) return;
      bottomSheetLockedScrollY = window.scrollY || window.pageYOffset || 0;
      document.body.style.position = "fixed";
      document.body.style.top = `-${bottomSheetLockedScrollY}px`;
      document.body.style.left = "0";
      document.body.style.right = "0";
      document.body.style.width = "100%";
      document.body.style.overflow = "hidden";
      bottomSheetScrollLocked = true;
    }

      if (!bottomSheetScrollLocked || pageSwipeScrollLocked) return;
      document.body.style.removeProperty("position");
