<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dotlog</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dotlog">
  <meta name="theme-color" content="#F7F5F0">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #F7F5F0;
      --text: #1A1A1A;
      --muted: #8A8A8A;
      --accent: #606060;
      --border: #E0DDD8;
      --paper: #FFFEFB;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      width: min(100% - 32px, 680px);
      margin: 0 auto;
      padding: 56px 0 100px;
    }

    .app-title {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 12px;
      border-bottom: 0;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .icon-button,
    .settings-button {
      border: 0;
      background: transparent;
      color: var(--muted);
      display: inline-grid;
      width: 28px;
      height: 28px;
      place-items: center;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
    }

    .icon-button:hover,
    .settings-button:hover {
      color: var(--text);
    }

    .calendar-menu-wrap {
      position: relative;
      z-index: 9999;
      display: inline-grid;
    }

    .calendar-menu {
      position: absolute;
      top: 34px;
      right: 0;
      z-index: 9999;
      width: 168px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 10px 28px rgba(26, 26, 26, 0.12);
    }

    .calendar-menu-item {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      align-items: center;
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      touch-action: manipulation;
    }

    .calendar-menu-item + .calendar-menu-item {
      border-top: 1px solid var(--border);
    }

    .calendar-menu-item:hover {
      background: #F0EDEA;
    }

    .calendar-menu-icon {
      color: var(--muted);
      text-align: center;
    }

    .is-hidden {
      display: none !important;
    }

    .month-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 8px;
    }

    .month-title {
      color: var(--text);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .today-btn {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      padding: 4px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .today-btn.is-hidden {
      display: none;
    }

    .week-nav {
      overflow: hidden;
      margin-bottom: 8px;
      padding: 8px 0 12px;
      border-bottom: 1px solid var(--border);
      user-select: none;
    }

    .week-header,
    .week-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .week-header {
      margin-bottom: 6px;
    }

    .week-header span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }

    .week-days {
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .week-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: 0;
      background: transparent;
      padding: 4px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .week-day-num {
      display: flex;
      width: 34px;
      height: 34px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: var(--text);
      font-size: 16px;
      font-weight: 400;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .week-day.is-today .week-day-num {
      color: var(--accent);
      font-weight: 600;
    }

    .week-day.is-selected .week-day-num {
      background: var(--text);
      color: var(--paper);
      font-weight: 600;
    }

    .week-day.is-today.is-selected .week-day-num {
      background: var(--accent);
      color: #FFFFFF;
    }

    .week-day-dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--muted);
    }

    .week-day.is-today .week-day-dot {
      background: var(--accent);
    }

    .week-day.is-selected .week-day-dot {
      background: var(--paper);
    }

    .week-day.is-today.is-selected .week-day-dot {
      background: rgba(255, 255, 255, 0.7);
    }

    .day-summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 18px;
      padding-bottom: 12px;
      color: var(--muted);
      font-size: 0.85em;
      font-variant-numeric: tabular-nums;
    }

    .sync-indicator {
      min-width: 18px;
      text-align: right;
      color: var(--muted);
    }

    .sync-indicator.is-syncing {
      animation: sync-spin 1s linear infinite;
    }

    .sync-indicator.is-error {
      color: #C8A06B;
    }

    @keyframes sync-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .compact-select {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 7px 8px;
      outline: none;
    }

    .compact-select:focus {
      border-color: var(--accent);
    }

    .backfill-panel,
    .edit-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(26, 26, 26, 0.05);
    }

    .fab {
      position: fixed;
      right: 24px;
      bottom: calc(32px + env(safe-area-inset-bottom));
      z-index: 200;
      display: grid;
      width: 56px;
      height: 56px;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 4px 16px rgba(26, 26, 26, 0.18);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .fab:active {
      transform: scale(0.93);
    }

    .fab svg {
      width: 20px;
      height: 20px;
    }

    .fab.is-open {
      z-index: 500;
      background: #888888;
      transform: rotate(45deg);
    }

    .fab.is-hidden {
      display: none;
    }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(26, 26, 26, 0.32);
      transition: opacity 0.25s ease;
    }

    .sheet-overlay.is-hidden {
      display: none;
    }

    .bottom-sheet {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 400;
      width: 100%;
      max-width: 680px;
      max-height: calc(100vh - 24px);
      margin: 0 auto;
      overflow-y: auto;
      border-radius: 16px 16px 0 0;
      background: var(--paper);
      padding: 12px 20px calc(40px + env(safe-area-inset-bottom));
      box-shadow: 0 -4px 24px rgba(26, 26, 26, 0.12);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .bottom-sheet.is-open {
      transform: translateY(0);
    }

    .bottom-sheet.is-hidden {
      display: none;
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      margin: 0 auto 16px;
      border-radius: 999px;
      background: var(--border);
    }

    .sheet-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }

    .sheet-input:focus {
      border-color: var(--accent);
    }

    .sheet-input::placeholder {
      color: var(--muted);
    }

    .sheet-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .sheet-submit {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #FFFFFF;
      padding: 10px 24px;
      font-size: 15px;
      cursor: pointer;
    }

    .sheet-submit:active {
      filter: brightness(0.93);
    }

    .sheet-secondary {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .sheet-backfill-toggle {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 0;
      font-size: 14px;
      cursor: pointer;
    }

    .sheet-backfill-toggle:active {
      color: var(--text);
    }

    .bottom-sheet .backfill-panel {
      margin-top: 12px;
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .bottom-sheet .split-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .date-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .form-line {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .form-line input {
      min-width: 0;
    }

    .edit-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 8px 10px;
      outline: none;
    }

    .edit-input:focus {
      border-color: var(--accent);
    }

    .edit-input.is-invalid {
      border-color: #C87B7B;
    }

    .field-error {
      color: #C87B7B;
      font-size: 13px;
      line-height: 1.4;
    }

    .panel-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .panel-save {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #FFFFFF;
      padding: 7px 14px;
      cursor: pointer;
    }

    .panel-save:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .panel-cancel {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 7px 4px;
      cursor: pointer;
    }

    .panel-cancel:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .table-tools {
      padding-top: 16px;
    }

    .table-tools.is-hidden {
      display: none;
    }

    .outline-button {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      padding: 9px 14px;
      cursor: pointer;
    }

    .outline-button:hover {
      background: rgba(74, 124, 111, 0.07);
    }

    .export-status {
      color: var(--accent);
      font-size: 14px;
    }

    #tableArea {
      flex-basis: 100%;
      width: 100%;
    }

    .summary-table {
      margin-top: 16px;
      padding: 18px;
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(26, 26, 26, 0.06);
    }

    .start-note,
    .table-total {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
      margin: 12px 0;
    }

    .time-table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .time-table th,
    .time-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .time-table th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .time-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .time-table .col-index {
      width: 42px;
    }

    .time-table .col-time {
      width: 74px;
      font-variant-numeric: tabular-nums;
    }

    .time-table .col-duration {
      width: 118px;
    }

    .time-table .col-category {
      width: 120px;
    }

    .time-table .col-tags {
      width: 170px;
    }

    .time-table .col-event {
      width: 150px;
    }

    .time-table .col-note {
      width: auto;
    }

    .time-table td {
      overflow-wrap: anywhere;
    }

    .list {
      margin: 26px 0 0;
      padding: 0;
      list-style: none;
    }

    .record {
      position: relative;
      display: grid;
      grid-template-columns: 4px minmax(0, 1fr) auto;
      column-gap: 12px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 0;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: pan-y;
    }

    .record-bar {
      width: 4px;
      min-height: 36px;
      border-radius: 999px;
      align-self: stretch;
    }

    .record-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .record-main {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0;
      line-height: 1.4;
    }

    .record-title {
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      word-break: break-all;
    }

    .record-tags {
      margin-left: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .record-sub {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      font-size: 13px;
      line-height: 1.4;
    }

    .record-category {
      border: 0;
      background: transparent;
      padding: 0;
      font-size: 13px;
      cursor: pointer;
    }

    .record-category:active {
      opacity: 0.7;
    }

    .record-duration {
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .record-time {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .record-time-start,
    .record-time-end {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .ctx-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0, 0, 0, 0.25);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      transition: opacity 0.2s ease;
    }

    .ctx-overlay.is-hidden {
      display: none;
    }

    .ctx-menu {
      position: fixed;
      z-index: 600;
      left: 50%;
      width: 65%;
      max-width: 320px;
      overflow: hidden;
      transform: translateX(-50%);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.12),
        0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .ctx-menu.is-hidden {
      display: none;
    }

    .ctx-menu:not(.is-hidden) {
      animation: ctxMenuIn 0.18s cubic-bezier(0.32, 0.72, 0, 1);
    }

    @keyframes ctxMenuIn {
      from {
        opacity: 0;
        transform: translateX(-50%) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }

    .ctx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      border: 0;
      background: transparent;
      padding: 16px 20px;
      text-align: left;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      box-sizing: border-box;
      transition: background 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .ctx-item:active {
      background: rgba(0, 0, 0, 0.05);
    }

    .ctx-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .ctx-icon svg {
      width: 18px;
      height: 18px;
    }

    .ctx-edit {
      color: var(--text);
    }

    .ctx-delete {
      color: #C0392B;
    }

    .ctx-divider {
      height: 1px;
      margin: 0 16px;
      background: var(--border);
    }

    .record-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .category-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      max-width: 100%;
      border: 0;
      border-radius: 999px;
      color: #FFFFFF;
      font-size: 12px;
      line-height: 1.4;
      padding: 3px 8px;
      white-space: nowrap;
    }

    .category-pill.is-button {
      cursor: pointer;
    }

    .label-stack {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: 230px;
    }

    .category-picker,
    .tag-picker,
    .edit-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 2px 0 5px;
    }

    .edit-panel {
      display: grid;
      gap: 12px;
      margin: 4px 0 8px;
      padding: 14px;
    }

    .edit-panel .tag-picker {
      grid-column: auto;
      padding: 0;
    }

    .tag-picker {
      align-items: center;
    }

    .tag-picker-actions {
      flex-basis: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .tag-picker-actions .finish-tags {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #FFFFFF;
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
    }

    .tag-picker-actions .finish-tags:hover {
      filter: brightness(0.96);
      text-decoration: none;
    }

    .tag-picker-actions .skip-category {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .tag-picker-actions .skip-category:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .tag-prompt {
      flex-basis: 100%;
      color: var(--muted);
      font-size: 13px;
    }

    .category-option,
    .tag-option {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #FFFFFF;
      color: var(--text);
      padding: 4px 9px;
      font-size: 13px;
      line-height: 1.4;
      cursor: pointer;
    }

    .category-option:hover,
    .tag-option:hover {
      border-color: var(--accent);
    }

    .tag-option.is-selected {
      color: #FFFFFF;
    }

    .category-option.is-selected {
      color: #FFFFFF;
    }

    .skip-category,
    .finish-tags {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 4px 2px;
      font-size: 13px;
      cursor: pointer;
    }

    .finish-tags {
      color: var(--accent);
    }

    .skip-category:hover,
    .finish-tags:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .empty-category {
      color: var(--muted);
    }

    .table-note {
      color: var(--muted);
    }

    .table-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .calendar-import-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(26, 26, 26, 0.24);
    }

    .calendar-import-panel {
      width: min(100%, 460px);
      max-height: min(82vh, 620px);
      overflow-y: auto;
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 18px 48px rgba(26, 26, 26, 0.18);
      padding: 20px;
    }

    .calendar-import-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .calendar-import-title {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .calendar-import-close {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 2px 4px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .calendar-import-copy,
    .calendar-import-note {
      color: var(--muted);
      font-size: 13px;
    }

    .calendar-import-copy {
      margin: 0 0 14px;
    }

    .calendar-import-note {

  <script>
    const entryForm = document.querySelector("#entryForm");
    const entryInput = document.querySelector("#entryInput");

    const tableTools = document.querySelector("#tableTools");

    const calendarMenu = document.querySelector("#calendarMenu");
    const importCalendarOption = document.querySelector("#importCalendarOption");
    const exportIcsOption = document.querySelector("#exportIcsOption");
    const calendarImportOverlay = document.querySelector("#calendarImportOverlay");
    const calendarImportPanel = document.querySelector("#calendarImportPanel");
    const exportStatus = document.querySelector("#exportStatus");
    const tableArea = document.querySelector("#tableArea");
    const recordsArea = document.querySelector("#recordsArea");
    const monthTitle = document.querySelector("#monthTitle");
    const todayBtn = document.querySelector("#todayBtn");
    const weekNav = document.querySelector("#weekNav");
    const weekDays = document.querySelector("#weekDays");
    const daySummary = document.querySelector("#daySummary");
    const summaryText = document.querySelector("#summaryText");
    const syncIndicator = document.querySelector("#syncIndicator");
    const settingsButton = document.querySelector("#settingsButton");
    const settingsView = document.querySelector("#settingsView");
    const pageHeader = document.querySelector("header");

    const today = startOfDay(new Date());
    let viewedDate = startOfDay(new Date());
    let currentWeekStart = getWeekStart(viewedDate);
    let weekSwipeStartX = 0;
    let weekSwipeStartY = 0;
    let tableExpanded = false;
    let openCategoryIndexes = [];
    let openTagIndexes = [];
    let classificationDrafts = {};
    let exportStatusTimer = null;
    let bottomSheetCloseTimer = null;
    let ctxTargetIndex = null;
    let ctxTargetRecord = null;
    let longPressTimer = null;
    let settingsMode = "main";
    let editingRecordIndex = null;
    let editDraft = null;
    let editingCategoryIndex = null;
    let addingTagCategoryIndex = null;
    let editingTag = null;
    let addingCategory = false;
    let selectedNewCategoryColor = "#7B8EC8";
    let applyingRemoteData = false;
    let syncTimer = null;
    let syncInProgress = false;
    const importedCalendarCategories = new Set();
    let syncStatus = {
      state: "unconfigured",
      message: "未配置",
      lastSyncedAt: localStorage.getItem("dotlog_last_synced") || null
    };

    const gistDataFile = "dotlog_data.json";

    const colorPresets = [
      "#7B8EC8", "#8DC88B", "#E8A87C", "#6BB5D5",
      "#D56B9A", "#C87B7B", "#A57BC8", "#C8C87B",
      "#B0B0B0", "#6BC8B8", "#C8A06B", "#8B8BC8"
    ];

    const defaultCategoryConfig = {
      categories: [
        { name: "睡眠", color: "#7B8EC8", tags: ["午睡", "入睡困难", "睡眠不足"] },
        { name: "生活维护", color: "#8DC88B", tags: ["饮食", "个人护理", "家务", "采购", "医疗健康", "宠物照顾", "杂务处理"] },
        { name: "身体训练", color: "#E8A87C", tags: ["八段锦", "力量训练", "跑步", "散步", "跳操跟练", "瑜伽", "拉伸"] },
        { name: "输入", color: "#6BB5D5", tags: ["阅读", "课程学习", "播客/音频", "灵感采集"] },
        { name: "输出", color: "#D56B9A", tags: ["写作", "日记", "复盘", "知识整理", "内容创作"] },
        { name: "工作项目", color: "#C87B7B", tags: ["项目执行", "研究分析", "沟通协作"] },
        { name: "Meta work", color: "#A57BC8", tags: ["时间管理", "知识管理", "流程优化", "自我认知"] },
        { name: "娱乐休闲", color: "#C8C87B", tags: ["社交媒体", "影视娱乐", "听休闲播客", "玩游戏", "外出休闲", "碎片休闲"] },
        { name: "黑洞时间", color: "#B0B0B0", tags: ["拖延", "无目的优化", "无意识刷手机"] }
      ]
    };

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getWeekStart(date) {
      const start = startOfDay(date);
      const day = start.getDay();
      start.setDate(start.getDate() + (day === 0 ? -6 : 1 - day));
      return start;
    }

    function offsetDate(date, days) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate() + days);
    }

    function isSameDate(first, second) {
      return formatDateKey(first) === formatDateKey(second);
    }

    function hasRecords(date) {
      return loadRecords(date).length > 0;
    }

    function formatDateLabel(date) {
      const weekdays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${weekdays[date.getDay()]}`;
    }

    function formatShortDateLabel(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function formatTime(date) {
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      return `${hours}:${minutes}`;
    }

    function timeToMinutes(time) {
      const [hours, minutes] = time.split(":").map(Number);
      return hours * 60 + minutes;
    }

    function minutesToTime(totalMinutes) {
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
    }

    function formatDuration(totalMinutes) {
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;

      if (hours === 0) return `${minutes} min`;
      if (minutes === 0) return `${hours} h`;
      return `${hours} h ${minutes} min`;
    }

    function durationBetween(startTime, endTime) {
      const start = timeToMinutes(startTime);
      let end = timeToMinutes(endTime);
      if (end < start) end += 24 * 60;
      return end - start;
    }

    function summaryTextForRecords(records) {
      if (records.length === 0) return "";
      if (records.length === 1) return "1 条 · —";

      const chronologicalRecords = [...records].reverse();
      const startRecord = chronologicalRecords[0];
      const endRecord = chronologicalRecords[chronologicalRecords.length - 1];
      return `${records.length} 条 · ${formatDuration(durationBetween(startRecord.time, endRecord.time))}`;
    }

    function daysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function fillSelect(select, values, selectedValue) {
      select.replaceChildren();
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = String(value);
        option.textContent = String(value).padStart(2, "0");
        option.selected = Number(value) === Number(selectedValue);
        select.append(option);
      });
    }

    function setDateSelectors(yearSelect, monthSelect, daySelect, date) {
      const currentYear = today.getFullYear();
      fillSelect(yearSelect, [currentYear - 1, currentYear, currentYear + 1], date.getFullYear());
      fillSelect(monthSelect, Array.from({ length: 12 }, (_, index) => index + 1), date.getMonth() + 1);
      fillSelect(daySelect, Array.from({ length: daysInMonth(date.getFullYear(), date.getMonth() + 1) }, (_, index) => index + 1), date.getDate());
    }

    function refreshDaySelector(yearSelect, monthSelect, daySelect) {
      const year = Number(yearSelect.value);
      const month = Number(monthSelect.value);
      const currentDay = Math.min(Number(daySelect.value) || 1, daysInMonth(year, month));
      fillSelect(daySelect, Array.from({ length: daysInMonth(year, month) }, (_, index) => index + 1), currentDay);
    }

    function dateFromSelectors(yearSelect, monthSelect, daySelect) {
      return startOfDay(new Date(Number(yearSelect.value), Number(monthSelect.value) - 1, Number(daySelect.value)));
    }

    function isValidTimeInput(time) {
      if (!/^\d{2}:\d{2}$/.test(time)) return false;
      const [hours, minutes] = time.split(":").map(Number);
      return hours >= 0 && hours <= 23 && minutes >= 0 && minutes <= 59;
    }

    function cloneDefaultCategoryConfig() {
      return JSON.parse(JSON.stringify(defaultCategoryConfig));
    }

    function normalizeCategoryConfig(config) {
      if (!config || !Array.isArray(config.categories)) return cloneDefaultCategoryConfig();

      return {
        categories: config.categories
          .filter((category) => category && category.name && category.color)
          .map((category) => ({
            name: String(category.name),
            color: String(category.color),
            tags: Array.isArray(category.tags) ? category.tags.map(String) : []
          }))
      };
    }

    function loadCategoryConfig() {
      const storedConfig = localStorage.getItem("category_config");
      if (!storedConfig) {
        const defaultConfig = cloneDefaultCategoryConfig();
        saveCategoryConfig(defaultConfig);
        return defaultConfig;
      }

      try {
        return normalizeCategoryConfig(JSON.parse(storedConfig));
      } catch {
        const defaultConfig = cloneDefaultCategoryConfig();
        saveCategoryConfig(defaultConfig);
        return defaultConfig;
      }
    }

    function saveCategoryConfig(config) {
      localStorage.setItem("category_config", JSON.stringify(normalizeCategoryConfig(config)));
      markLocalDataChanged();
    }

    function getCategories() {
      return loadCategoryConfig().categories;
    }

    function findCategory(categoryName) {
      return getCategories().find((category) => category.name === categoryName);
    }

    function getCategoryTags(categoryName) {
      const category = findCategory(categoryName);
      return category ? category.tags : [];
    }

    function categoryColor(categoryName) {
      const category = findCategory(categoryName);
      return category ? category.color : "#B0B0B0";
    }

    function parseEntryText(rawText) {
      const notes = [];
      const textWithoutNotes = rawText.replace(/（([^（）]*)）|\(([^()]*)\)/g, (match, chineseNote, englishNote) => {
        const note = (chineseNote || englishNote || "").trim();
        if (note) notes.push(note);
        return "";
      });

      const text = textWithoutNotes.replace(/\s+/g, " ").trim() || rawText.trim();

      return {
        text,
        note: notes.length ? notes.join("；") : null
      };
    }

    function parseBackfill(rawText) {
      if (!rawText.startsWith("补录")) {
        return {
          isBackfill: false,
          time: formatTime(new Date()),
          text: rawText
        };
      }

      const match = rawText.match(/^补录\s+(\S+)\s+(.+)$/);
      if (!match) {
        alert("补录格式：补录 HH:MM 事件描述");
        return null;
      }

      const time = match[1];
      const text = match[2].trim();
      if (!/^\d{2}:\d{2}$/.test(time)) {
        alert("补录格式：补录 HH:MM 事件描述");
        return null;
      }

      const [hours, minutes] = time.split(":").map(Number);
      if (hours > 23 || minutes > 59) {
        alert("时间格式不正确，请使用 00:00–23:59");
        return null;
      }

      return {
        isBackfill: true,
        time,
        text
      };
    }

    function parseSplit(rawText, endTime) {
      if (!rawText.includes("+")) {
        return { isSplit: false };
      }

      const match = rawText.match(/^(.+?)\s*\+\s*(.+?)\s+(\d+)$/);
      if (!match) {
        alert("加号拆分格式：主事件 + 次事件 时长（分钟）");
        return null;
      }

      const duration = Number(match[3]);
      if (duration < 1 || duration > 600) {
        alert("时长超出范围，请输入 1–600 分钟");
        return null;
      }

      const endMinutes = timeToMinutes(endTime);
      const secondaryEndMinutes = endMinutes - duration;
      if (secondaryEndMinutes < 0) {
        alert("拆分后时间超出当天范围，请检查时长");
        return null;
      }

      return {
        isSplit: true,
        mainText: match[1].trim(),
        secondaryText: match[2].trim(),
        secondaryEndTime: minutesToTime(secondaryEndMinutes)
      };
    }

    function storageKey(date) {
      return `time_tracker_${formatDateKey(date)}`;
    }

    function formatIcsDate(date, time) {
      const [hours, minutes] = time.split(":").map(Number);
      const eventDate = new Date(date.getFullYear(), date.getMonth(), date.getDate(), hours, minutes, 0);
      const year = eventDate.getFullYear();
      const month = String(eventDate.getMonth() + 1).padStart(2, "0");
      const day = String(eventDate.getDate()).padStart(2, "0");
      return `${year}${month}${day}T${time.replace(":", "")}00`;
    }

    function addDays(date, days) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate() + days);
    }

    function escapeIcsText(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/;/g, "\\;")
        .replace(/,/g, "\\,")
        .replace(/\r?\n/g, "\\n");
    }

    function summaryForRecord(record) {
      if (!record.tags.length) return record.text;
      return `${record.text} ${record.tags.map((tag) => `#${tag}`).join(" ")}`;
    }

    function createEventUid() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function showExportStatus(message) {
      exportStatus.textContent = message;
      clearTimeout(exportStatusTimer);
      exportStatusTimer = setTimeout(() => {
        exportStatus.textContent = "";
      }, 2000);
    }

    function getGistSettings() {
      return {
        token: localStorage.getItem("gist_token") || "",
        gistId: localStorage.getItem("gist_id") || ""
      };
    }

    function hasGistSettings() {
      const settings = getGistSettings();
      return Boolean(settings.token && settings.gistId);
    }

    function formatSyncTime(date = new Date()) {
      return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function setSyncStatus(state, message, options = {}) {
      syncStatus = {
        state,
        message,
        lastSyncedAt: options.lastSyncedAt || syncStatus.lastSyncedAt
      };

      if (state === "connected" && options.lastSyncedAt) {
        localStorage.setItem("dotlog_last_synced", options.lastSyncedAt);
      }

      updateSyncIndicators();
    }

    function updateSyncIndicators() {
      if (!hasGistSettings()) {
        syncIndicator.className = "sync-indicator is-hidden";
        syncIndicator.textContent = "";
      } else if (syncStatus.state === "syncing") {
        syncIndicator.className = "sync-indicator is-syncing";
        syncIndicator.textContent = "↑↓";
        syncIndicator.title = "同步中";
      } else if (syncStatus.state === "error") {
        syncIndicator.className = "sync-indicator is-error";
        syncIndicator.textContent = "!";
        syncIndicator.title = syncStatus.message;
      } else {
        syncIndicator.className = "sync-indicator";
        syncIndicator.textContent = "✓";
        syncIndicator.title = syncStatus.message || "已同步";
      }

      const statusNode = document.querySelector("#syncStatusText");
      if (!statusNode) return;

      statusNode.className = "sync-status";
      if (!hasGistSettings()) {
        statusNode.textContent = "● 未配置";
      } else if (syncStatus.state === "connected") {
        statusNode.classList.add("is-connected");
        statusNode.textContent = syncStatus.message;
      } else if (syncStatus.state === "syncing") {
        statusNode.textContent = "● 同步中";
      } else if (syncStatus.state === "error") {
        statusNode.classList.add("is-error");
        statusNode.textContent = syncStatus.message;
      } else {
        statusNode.textContent = "● 未配置";
      }
    }

    function isToday(date) {
      return formatDateKey(date) === formatDateKey(today);
    }

    function normalizeRecord(record) {
      return {
        time: record.time,
        text: record.text,
        category: record.category || null,
        note: record.note || null,
        tags: Array.isArray(record.tags) ? record.tags : [],
        isBackfill: record.isBackfill || false,
        isSplit: record.isSplit || false
      };
    }

    function getLocalUpdatedAt() {
      return localStorage.getItem("dotlog_last_updated") || "1970-01-01T00:00:00.000Z";
    }

    function collectLocalData() {
      const records = {};

      for (let index = 0; index < localStorage.length; index += 1) {
        const key = localStorage.key(index);
        if (!key || !key.startsWith("time_tracker_")) continue;

        const dateKey = key.replace("time_tracker_", "");
        try {
          const value = JSON.parse(localStorage.getItem(key)) || [];
          records[dateKey] = sortRecords(value.map(normalizeRecord));
        } catch {
          records[dateKey] = [];
        }
      }

      const settings = loadCategoryConfig();
      return {
        records,
        __settings__: settings,
        category_config: settings,
        last_updated: getLocalUpdatedAt()
      };
    }

    function getSettingsFromGistData(data) {
      return data?.__settings__ || data?.category_config || null;
    }

    function countDataRecords(data) {
      return Object.values(data?.records || {}).reduce((total, records) => {
        return total + (Array.isArray(records) ? records.length : 0);
      }, 0);
    }

    function isCurrentGistInitialized() {
      const { gistId } = getGistSettings();
      return Boolean(gistId && localStorage.getItem("dotlog_sync_initialized_gist") === gistId);
    }

    function markCurrentGistInitialized() {
      const { gistId } = getGistSettings();
      if (gistId) localStorage.setItem("dotlog_sync_initialized_gist", gistId);
    }

    function applyRemoteData(data) {
      applyingRemoteData = true;

      try {
        const keysToRemove = [];
        for (let index = 0; index < localStorage.length; index += 1) {
          const key = localStorage.key(index);
          if (key && key.startsWith("time_tracker_")) keysToRemove.push(key);
        }
        keysToRemove.forEach((key) => localStorage.removeItem(key));

        Object.entries(data.records || {}).forEach(([dateKey, records]) => {
          localStorage.setItem(`time_tracker_${dateKey}`, JSON.stringify(sortRecords((records || []).map(normalizeRecord))));
        });

        const remoteSettings = getSettingsFromGistData(data);
        if (remoteSettings) {
          localStorage.setItem("category_config", JSON.stringify(normalizeCategoryConfig(remoteSettings)));
        }

        localStorage.setItem("dotlog_last_updated", data.last_updated || new Date().toISOString());
      } finally {
        applyingRemoteData = false;
      }
    }

    function mergeGistData(localData, remoteData) {
      const mergedRecords = {};
      const allDates = new Set([
        ...Object.keys(remoteData.records || {}),
        ...Object.keys(localData.records || {})
      ]);

      allDates.forEach((dateKey) => {
        const seen = new Set();
        const merged = [];
        [...(remoteData.records?.[dateKey] || []), ...(localData.records?.[dateKey] || [])]
          .map(normalizeRecord)
          .forEach((record) => {
            const signature = JSON.stringify(record);
            if (seen.has(signature)) return;
            seen.add(signature);
            merged.push(record);
          });
        mergedRecords[dateKey] = sortRecords(merged);
      });

      const mergedSettings = normalizeCategoryConfig(
        getSettingsFromGistData(remoteData)
          || getSettingsFromGistData(localData)
          || cloneDefaultCategoryConfig()
      );

      return {
        records: mergedRecords,
        __settings__: mergedSettings,
        category_config: mergedSettings,
        last_updated: new Date().toISOString()
      };
    }

    function markLocalDataChanged() {
      if (applyingRemoteData) return;
      localStorage.setItem("dotlog_last_updated", new Date().toISOString());
      queueGistSync();
    }

    async function requestGist(method, body = null, settingsOverride = null) {
      const { token, gistId } = settingsOverride || getGistSettings();
      const response = await fetch(`https://api.github.com/gists/${encodeURIComponent(gistId)}`, {
        method,
        headers: {
          Authorization: `token ${token}`,
          Accept: "application/vnd.github+json",
          ...(body ? { "Content-Type": "application/json" } : {})
        },
        ...(body ? { body: JSON.stringify(body) } : {})
      });

      if (response.status === 401 || response.status === 403) {
        throw new Error("TOKEN_INVALID");
      }

      if (response.status === 404) {
        throw new Error("GIST_NOT_FOUND");
      }

      if (!response.ok) {
        throw new Error("NETWORK_ERROR");
      }

      return response.json();
    }

    async function fetchGistData() {
      const gist = await requestGist("GET");
      const content = gist.files?.[gistDataFile]?.content;
      if (!content) return null;
      return JSON.parse(content);
    }

    async function pushGistData(data) {
      await requestGist("PATCH", {
        files: {
          [gistDataFile]: {
            content: JSON.stringify(data, null, 2)
          }
        }
      });
    }

    function syncErrorMessage(error) {
      if (error.message === "TOKEN_INVALID") return "● Token 无效，请检查";
      if (error.message === "GIST_NOT_FOUND") return "● Gist 不存在，请检查 ID";
      return "● 无法连接，请检查网络";
    }

    async function testGistConnection() {
      if (!hasGistSettings()) return false;

      setSyncStatus("syncing", "● 同步中");
      try {
        await requestGist("GET");
        const checkedAt = new Date().toISOString();
        setSyncStatus("connected", `● 已连接，上次同步 ${formatSyncTime(new Date(checkedAt))}`, { lastSyncedAt: checkedAt });
        return true;
      } catch (error) {
        setSyncStatus("error", syncErrorMessage(error));
        return false;
      }
    }

    function queueGistSync() {
      if (!hasGistSettings() || applyingRemoteData) return;
      clearTimeout(syncTimer);
      setSyncStatus("syncing", "● 同步中");
      syncTimer = setTimeout(() => {
        syncWithGist().catch(() => {});
      }, 700);
    }

    async function syncWithGist(options = {}) {
      if (!hasGistSettings() || syncInProgress) return false;

      syncInProgress = true;
      setSyncStatus("syncing", "● 同步中");

      try {
        const localData = collectLocalData();
        const remoteData = await fetchGistData();
        let nextData = null;
        const requiresInitialMerge = options.mergeLocal || !isCurrentGistInitialized();

        if (requiresInitialMerge) {
          nextData = mergeGistData(localData, remoteData || { records: {}, category_config: null, last_updated: "1970-01-01T00:00:00.000Z" });
          applyRemoteData(nextData);
          await pushGistData(nextData);
        } else if (!remoteData) {
          nextData = { ...localData, last_updated: new Date().toISOString() };
          applyRemoteData(nextData);
          await pushGistData(nextData);
        } else {
          const localTime = Date.parse(localData.last_updated || "1970-01-01T00:00:00.000Z");
          const remoteTime = Date.parse(remoteData.last_updated || "1970-01-01T00:00:00.000Z");
          const localRecordCount = countDataRecords(localData);
          const remoteRecordCount = countDataRecords(remoteData);

          if (localRecordCount === 0 && remoteRecordCount > 0) {
            applyRemoteData(remoteData);
            nextData = remoteData;
          } else if (remoteTime > localTime) {
            applyRemoteData(remoteData);
            nextData = remoteData;
          } else if (localTime > remoteTime) {
            nextData = localData;
            await pushGistData(nextData);
          } else {
            nextData = localData;
          }
        }

        markCurrentGistInitialized();
        const syncedAt = new Date().toISOString();
        setSyncStatus("connected", `● 已连接，上次同步 ${formatSyncTime(new Date(syncedAt))}`, { lastSyncedAt: syncedAt });
        if (settingsMode === "settings") {
          renderSettingsPage();
        } else {
          render();
        }
        return true;
      } catch (error) {
        setSyncStatus("error", syncErrorMessage(error));
        return false;
      } finally {
        syncInProgress = false;
      }
    }

    function loadRecords(date) {
      try {
        const records = JSON.parse(localStorage.getItem(storageKey(date))) || [];
        return records.map(normalizeRecord);
      } catch {
        return [];
      }
    }

    function saveRecords(date, records) {
      localStorage.setItem(storageKey(date), JSON.stringify(records));
      markLocalDataChanged();
    }

    function sortRecords(records) {
      return records
        .map((record, order) => ({ record, order }))
        .sort((a, b) => {
          const timeDiff = timeToMinutes(b.record.time) - timeToMinutes(a.record.time);
          return timeDiff || a.order - b.order;
        })
        .map((item) => item.record);
    }

    function resetDateViewState() {
      tableExpanded = false;
      openCategoryIndexes = [];
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
    }

    function setViewedDate(date) {
      viewedDate = startOfDay(date);
      currentWeekStart = getWeekStart(viewedDate);
      resetDateViewState();
      render();
    }

    function renderWeekNav() {
      weekDays.replaceChildren();
      const todayDate = startOfDay(new Date());

      monthTitle.textContent = formatShortDateLabel(viewedDate);
      todayBtn.classList.toggle("is-hidden", isSameDate(viewedDate, todayDate));

      for (let index = 0; index < 7; index += 1) {
        const date = offsetDate(currentWeekStart, index);
        const day = document.createElement("button");
        day.className = "week-day";
        day.type = "button";
        day.setAttribute("aria-label", formatDateLabel(date));
        if (isSameDate(date, todayDate)) day.classList.add("is-today");
        if (isSameDate(date, viewedDate)) day.classList.add("is-selected");

        const number = document.createElement("span");
        number.className = "week-day-num";
        number.textContent = String(date.getDate());
        day.append(number);

        if (hasRecords(date)) {
          const dot = document.createElement("span");
          dot.className = "week-day-dot";
          day.append(dot);
        }

        day.addEventListener("click", () => setViewedDate(date));
        weekDays.append(day);
      }
    }

    function animateWeekTransition(direction) {
      const outX = direction === "left" ? "-100%" : "100%";
      const inX = direction === "left" ? "100%" : "-100%";
      weekDays.style.transition = "none";
      weekDays.style.opacity = "0";
      weekDays.style.transform = `translateX(${outX})`;

      requestAnimationFrame(() => {
        weekDays.style.transition = "transform 0.22s ease, opacity 0.22s ease";
        weekDays.style.transform = `translateX(${inX})`;
        requestAnimationFrame(() => {
          weekDays.style.transform = "translateX(0)";
          weekDays.style.opacity = "1";
        });
      });
    }

    function changeWeek(dayOffset, direction) {
      viewedDate = offsetDate(viewedDate, dayOffset);
      currentWeekStart = getWeekStart(viewedDate);
      resetDateViewState();
      animateWeekTransition(direction);
      render();
    }

    function goToPrevWeek() {
      changeWeek(-7, "right");
    }

    function goToNextWeek() {
      changeWeek(7, "left");
    }

    function getClassificationDraft(index, record) {
      if (!classificationDrafts[index]) {
        classificationDrafts[index] = {
          category: record.category || null,
          tags: Array.isArray(record.tags) ? [...record.tags] : []
        };
      }

      return classificationDrafts[index];
    }

    function discardClassificationDraft(index) {
      delete classificationDrafts[index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function commitClassificationDraft(index) {
      const draft = classificationDrafts[index];
      if (!draft) return;

      const records = loadRecords(viewedDate);
      if (!records[index]) return;

      records[index].category = draft.category || null;
      records[index].tags = draft.category ? [...draft.tags] : [];
      saveRecords(viewedDate, records);
      delete classificationDrafts[index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function openCategorySelection(index, record) {
      getClassificationDraft(index, record);
      openCategoryIndexes = [index];
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function openTagSelection(index, record) {
      getClassificationDraft(index, record);
      openTagIndexes = [index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function updateRecordCategory(date, index, category, keepPickerOpen = false) {
      const records = loadRecords(date);
      if (!records[index]) return;

      records[index].category = category;
      records[index].tags = [];
      saveRecords(date, records);
      delete classificationDrafts[index];
      openCategoryIndexes = [...new Set([...openCategoryIndexes, index])];
      openTagIndexes = category
        ? [...new Set([...openTagIndexes, index])]
        : openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function updateRecordTags(date, index, tags, keepPickerOpen = true) {
      const records = loadRecords(date);
      if (!records[index]) return;

      records[index].tags = tags;
      saveRecords(date, records);
      delete classificationDrafts[index];
      openTagIndexes = keepPickerOpen
        ? [...new Set([...openTagIndexes, index])]
        : openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function isCategoryOpen(index) {
      return openCategoryIndexes.includes(index);
    }

    function isTagOpen(index) {
      return openTagIndexes.includes(index);
    }

    function openCtxMenu(index, record, recordEl) {
      ctxTargetIndex = index;
      ctxTargetRecord = record;
      ctxOverlay.classList.remove("is-hidden");
      ctxMenu.classList.remove("is-hidden");

      const rect = recordEl.getBoundingClientRect();
      ctxMenu.style.left = "";
      ctxMenu.style.width = "";
      ctxMenu.style.right = "";
      ctxMenu.style.top = `${rect.bottom + 8}px`;

      requestAnimationFrame(() => {
        const menuHeight = ctxMenu.offsetHeight;
        if (rect.bottom + 8 + menuHeight > window.innerHeight - 16) {
          ctxMenu.style.top = `${rect.top - menuHeight - 8}px`;
        }
      });
    }

    function closeCtxMenu() {
      clearTimeout(longPressTimer);
      ctxOverlay.classList.add("is-hidden");
      ctxMenu.classList.add("is-hidden");
      ctxTargetIndex = null;
      ctxTargetRecord = null;
    }

    function createCategoryBadge(categoryName, options = {}) {
      const badge = document.createElement(options.button ? "button" : "span");
      badge.className = "category-pill";
      badge.style.backgroundColor = categoryColor(categoryName);
      badge.textContent = categoryName;

      if (options.button) {
        badge.classList.add("is-button");
        badge.type = "button";
        badge.setAttribute("aria-label", `重新选择分类 ${categoryName}`);
      }

      return badge;
    }

    function createTagBadge(tagName, categoryName, index, options = {}) {
      const badge = document.createElement(options.button ? "button" : "span");
      badge.className = "category-pill";
      badge.style.backgroundColor = categoryColor(categoryName);
      badge.textContent = tagName;

      if (options.button) {
        badge.classList.add("is-button");
        badge.type = "button";
        badge.setAttribute("aria-label", `重新选择标签 ${tagName}`);
      }

      return badge;
    }

    function createCategoryPicker(record, index) {
      const picker = document.createElement("div");
      picker.className = "category-picker";
      const draft = classificationDrafts[index] || null;

      getCategories().forEach((category) => {
        const button = document.createElement("button");
        button.className = "category-option";
        button.type = "button";
        button.textContent = category.name;
        if (draft && draft.category === category.name) {
          button.classList.add("is-selected");
          button.style.backgroundColor = category.color;
          button.style.borderColor = category.color;
        }
        button.addEventListener("click", () => {
          if (!draft) {
            updateRecordCategory(viewedDate, index, category.name);
            return;
          }

          draft.category = category.name;
          draft.tags = [];
          openTagIndexes = [...new Set([...openTagIndexes, index])];
          render();
        });
        picker.append(button);
      });

      if (draft && draft.category) {
        const clearButton = document.createElement("button");
        clearButton.className = "skip-category";
        clearButton.type = "button";
        clearButton.textContent = "清除";
        clearButton.addEventListener("click", () => {
          draft.category = null;
          draft.tags = [];
          commitClassificationDraft(index);
        });
        picker.append(clearButton);
      }

      const skipButton = document.createElement("button");
      skipButton.className = "skip-category";
      skipButton.type = "button";
      skipButton.textContent = "跳过";
      skipButton.addEventListener("click", () => {
        if (draft) {
          discardClassificationDraft(index);
        } else {
          openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
          render();
        }
      });

      picker.append(skipButton);
      return picker;
    }

    function createTagPicker(record, index) {
      const picker = document.createElement("div");
      picker.className = "tag-picker";
      const draft = getClassificationDraft(index, record);
      const activeCategory = draft.category || record.category;
      const activeTags = draft.tags;

      const prompt = document.createElement("div");
      prompt.className = "tag-prompt";
      prompt.textContent = "选择标签（可多选）：";
      picker.append(prompt);

      getCategoryTags(activeCategory).forEach((tag) => {
        const button = document.createElement("button");
        button.className = "tag-option";
        button.type = "button";
        button.textContent = tag;

        if (activeTags.includes(tag)) {
          button.classList.add("is-selected");
          button.style.backgroundColor = categoryColor(activeCategory);
          button.style.borderColor = categoryColor(activeCategory);
        }

        button.addEventListener("click", () => {
          draft.tags = draft.tags.includes(tag)
            ? draft.tags.filter((item) => item !== tag)
            : [...draft.tags, tag];
          render();
        });

        picker.append(button);
      });

      const finishButton = document.createElement("button");
      finishButton.className = "finish-tags";
      finishButton.type = "button";
      finishButton.textContent = "完成";
      finishButton.addEventListener("click", () => {
        commitClassificationDraft(index);
      });

      const skipButton = document.createElement("button");
      skipButton.className = "skip-category";
      skipButton.type = "button";
      skipButton.textContent = "跳过";
      skipButton.addEventListener("click", () => {
        discardClassificationDraft(index);
      });

      const actionsRow = document.createElement("div");
      actionsRow.className = "tag-picker-actions";
      actionsRow.append(finishButton, skipButton);
      picker.append(actionsRow);
      return picker;
    }

    function startEditingRecord(index, record) {
      editingRecordIndex = index;
      editDraft = {
        time: record.time || "",
        text: record.text || "",
        note: record.note || "",
        category: record.category || null,
        tags: Array.isArray(record.tags) ? [...record.tags] : [],
        isBackfill: record.isBackfill || false,
        isSplit: record.isSplit || false
      };
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function cancelEditingRecord() {
      editingRecordIndex = null;
      editDraft = null;
      render();
    }

    function saveEditedRecord(index) {
      if (!editDraft || !isValidTimeInput(editDraft.time) || !editDraft.text.trim()) return;

      const records = loadRecords(viewedDate);
      const original = records[index];
      if (!original) return;

      const timeChanged = editDraft.time !== original.time;
      const hasSameTime = records.some((record, recordIndex) => recordIndex !== index && record.time === editDraft.time);
      if (timeChanged && hasSameTime && !confirm("该时间已有另一条记录，是否继续保存？")) {
        return;
      }

      records[index] = {
        time: editDraft.time,
        text: editDraft.text.trim(),
        category: editDraft.category || null,
        note: editDraft.note.trim() || null,
        tags: editDraft.category ? [...editDraft.tags] : [],
        isBackfill: original.isBackfill || false,
        isSplit: original.isSplit || false
      };

      saveRecords(viewedDate, sortRecords(records));
      editingRecordIndex = null;
      editDraft = null;
      render();
    }

    function categoryNameExists(name, excludeIndex = -1) {
      return getCategories().some((category, index) => index !== excludeIndex && category.name === name);
    }

    function saveEditedCategoryName(index, input, originalName) {
      const nextName = input.value.trim();
      if (!nextName) {
        input.value = originalName;
        return;
      }

      if (categoryNameExists(nextName, index)) {
        alert("分类名称已存在");
        input.value = originalName;
        return;
      }

      const config = loadCategoryConfig();
      config.categories[index].name = nextName;
      saveCategoryConfig(config);
      editingCategoryIndex = null;
      renderSettingsPage();
    }

    function createInlineInput(value, onSave, onCancel) {
      const input = document.createElement("input");
      input.className = "inline-input";
      input.type = "text";
      input.value = value;

      let cancelled = false;
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          onSave(input);
        }

        if (event.key === "Escape") {
          cancelled = true;
          onCancel();
        }
      });

      input.addEventListener("blur", () => {
        if (!cancelled) onSave(input);
      });

      setTimeout(() => {
        input.focus();
        input.select();
      }, 0);

      return input;
    }

    function deleteCategory(index) {
      const config = loadCategoryConfig();
      const category = config.categories[index];
      if (!category) return;

      if (!confirm(`删除「${category.name}」分类？该分类下的所有标签也会一并删除。已打过此分类标记的历史记录不受影响。`)) {
        return;
      }

      config.categories.splice(index, 1);
      saveCategoryConfig(config);
      editingCategoryIndex = null;
      addingTagCategoryIndex = null;
      editingTag = null;
      renderSettingsPage();
    }

    function addTagToCategory(categoryIndex, input) {
      const tagName = input.value.trim();
      if (!tagName) return;

      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

      if (category.tags.includes(tagName)) {
        alert("标签已存在");
        return;
      }

      category.tags.push(tagName);
      saveCategoryConfig(config);
      addingTagCategoryIndex = null;
      renderSettingsPage();
    }

    function updateTagName(categoryIndex, tagIndex, input, originalName) {
      const tagName = input.value.trim();
      if (!tagName) {
        input.value = originalName;
        return;
      }

      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

      if (category.tags.some((tag, index) => index !== tagIndex && tag === tagName)) {
        alert("标签已存在");
        input.value = originalName;
        return;
      }

      category.tags[tagIndex] = tagName;
      saveCategoryConfig(config);
      editingTag = null;
      renderSettingsPage();
    }

    function deleteTag(categoryIndex, tagIndex) {
      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

      category.tags.splice(tagIndex, 1);
      saveCategoryConfig(config);
      renderSettingsPage();
    }

    function createSettingsCategory(category, categoryIndex) {
      const item = document.createElement("section");
      item.className = "config-category";

      const head = document.createElement("div");
      head.className = "config-category-head";

      const nameWrap = document.createElement("div");
      if (editingCategoryIndex === categoryIndex) {
        nameWrap.append(createInlineInput(
          category.name,
          (input) => saveEditedCategoryName(categoryIndex, input, category.name),
          () => {
            editingCategoryIndex = null;
            renderSettingsPage();
          }
        ));
      } else {
        const name = document.createElement("span");
        name.className = "config-category-name";
        name.textContent = category.name;
        nameWrap.append(name);
      }

      const actions = document.createElement("div");
      actions.className = "config-actions";

      const editButton = document.createElement("button");
      editButton.className = "text-button";
      editButton.type = "button";
      editButton.textContent = "编辑名称";
      editButton.addEventListener("click", () => {
        editingCategoryIndex = categoryIndex;
        renderSettingsPage();
      });

      const deleteButton = document.createElement("button");
      deleteButton.className = "text-button";
      deleteButton.type = "button";
      deleteButton.textContent = "删除";
      deleteButton.addEventListener("click", () => deleteCategory(categoryIndex));

      actions.append(editButton, deleteButton);
      head.append(nameWrap, actions);

      const tags = document.createElement("div");
      tags.className = "config-tags";

      category.tags.forEach((tag, tagIndex) => {
        if (editingTag && editingTag.categoryIndex === categoryIndex && editingTag.tagIndex === tagIndex) {
          tags.append(createInlineInput(
            tag,
            (input) => updateTagName(categoryIndex, tagIndex, input, tag),
            () => {
              editingTag = null;
              renderSettingsPage();
            }
          ));
          return;
        }

        const tagPill = document.createElement("span");
        tagPill.className = "config-tag";

        const tagName = document.createElement("span");
        tagName.className = "config-tag-name";
        tagName.textContent = `#${tag}`;
        tagName.addEventListener("dblclick", () => {
          editingTag = { categoryIndex, tagIndex };
          renderSettingsPage();
        });

        const removeButton = document.createElement("button");
        removeButton.className = "remove-tag";
        removeButton.type = "button";
        removeButton.textContent = "×";
        removeButton.addEventListener("click", () => deleteTag(categoryIndex, tagIndex));

        tagPill.append(tagName, removeButton);
        tags.append(tagPill);
      });

      if (addingTagCategoryIndex === categoryIndex) {
        tags.append(createInlineInput(
          "",
          (input) => addTagToCategory(categoryIndex, input),
          () => {
            addingTagCategoryIndex = null;
            renderSettingsPage();
          }
        ));
      } else {
        const addTagButton = document.createElement("button");
        addTagButton.className = "text-button";
        addTagButton.type = "button";
        addTagButton.textContent = "+ 添加标签";
        addTagButton.addEventListener("click", () => {
          addingTagCategoryIndex = categoryIndex;
          renderSettingsPage();
        });
        tags.append(addTagButton);
      }

      item.append(head, tags);
      return item;
    }

    function renderAddCategoryPanel(container) {
      if (!addingCategory) {
        const addButton = document.createElement("button");
        addButton.className = "outline-button";
        addButton.type = "button";
        addButton.textContent = "+ 添加新分类";

          selectedNewCategoryColor = colorPresets[0];
          renderSettingsPage();
        });
        container.append(addButton);

      }

      const panel = document.createElement("div");
      panel.className = "add-category-panel";

      const input = document.createElement("input");
      input.className = "inline-input";
      input.type = "text";
      input.placeholder = "分类名称";

      const swatches = document.createElement("div");
      swatches.className = "color-swatches";
      colorPresets.forEach((color) => {
        const swatch = document.createElement("button");
        swatch.className = "color-swatch";
        swatch.type = "button";
        swatch.style.backgroundColor = color;

        swatch.addEventListener("click", () => {
          selectedNewCategoryColor = color;
          renderSettingsPage();
        });
        swatches.append(swatch);
      });

      const actions = document.createElement("div");
      actions.className = "add-category-actions";

      const confirmButton = document.createElement("button");
      confirmButton.className = "outline-button";
      confirmButton.type = "button";
      confirmButton.textContent = "确认";

      const cancelButton = document.createElement("button");
      cancelButton.className = "text-button";
      cancelButton.type = "button";
      cancelButton.textContent = "取消";

      function confirmAddCategory() {
        const name = input.value.trim();
        if (!name) return;
        if (categoryNameExists(name)) {
          alert("分类名称已存在");
          return;
        }

        const config = loadCategoryConfig();
        config.categories.push({
          name,
          color: selectedNewCategoryColor,
          tags: []
        });
        saveCategoryConfig(config);
        addingCategory = false;
        renderSettingsPage();
      }

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") confirmAddCategory();
        if (event.key === "Escape") {
          addingCategory = false;
          renderSettingsPage();
        }
      });
      confirmButton.addEventListener("click", confirmAddCategory);
      cancelButton.addEventListener("click", () => {
        addingCategory = false;
        renderSettingsPage();
      });

      actions.append(confirmButton, cancelButton);
      panel.append(input, swatches, actions);
      container.append(panel);

      setTimeout(() => input.focus(), 0);
    }
