    function render() {
      const records = loadRecords(viewedDate);
      const viewingToday = isToday(viewedDate);

      renderWeekNav();
      fab.classList.toggle("is-hidden", !viewingToday);
      const currentSummaryText = summaryTextForRecords(records);
      summaryText.textContent = currentSummaryText;
      daySummary.classList.toggle("is-hidden", !currentSummaryText);
      updateSyncIndicators();

      if (!tableExpanded) {
        tableArea.replaceChildren();
      } else {
        renderTimeTable(records);
      }

      if (records.length === 0) {
        recordsArea.innerHTML = `
          <div class="empty">
            <div>
              <p class="empty-title">还没有记录</p>
              <p class="empty-subtitle">发生了什么，就写下来</p>
            </div>
          </div>
        `;
        return;
      }

      const list = document.createElement("ul");
      list.className = "list";

      records.forEach((record, index) => {
        const item = document.createElement("li");
        item.className = "record";
        item.dataset.index = String(index);

        const classificationDraft = isCategoryOpen(index) || isTagOpen(index)
          ? getClassificationDraft(index, record)
          : classificationDrafts[index];
        const displayCategory = classificationDraft ? classificationDraft.category : record.category;
        const displayTags = classificationDraft ? classificationDraft.tags : record.tags;
        const displayColor = displayCategory ? categoryColor(displayCategory) : null;
        const hasInterval = index < records.length - 1;
        const durationText = hasInterval
          ? formatDuration(durationBetween(records[index + 1].time, record.time))
          : "—";

        const bar = document.createElement("div");
        bar.className = "record-bar";
        bar.style.background = displayColor || "var(--border)";

        const body = document.createElement("div");
        body.className = "record-body";

        const mainRow = document.createElement("div");
        mainRow.className = "record-main";

        const title = document.createElement("span");
        title.className = "record-title";
        title.textContent = record.text;
        mainRow.append(title);

        if (displayTags.length > 0) {
          const tags = document.createElement("span");
          tags.className = "record-tags";
          tags.textContent = displayTags.map((tag) => `#${tag}`).join(" ");
          mainRow.append(tags);
        }

        const subRow = document.createElement("div");
        subRow.className = "record-sub";

        if (displayCategory) {
          const category = document.createElement("button");
          category.className = "record-category";
          category.type = "button";
          category.style.color = displayColor || "var(--muted)";
          category.textContent = displayCategory;
          category.addEventListener("click", () => {
            openCategorySelection(index, record);
          });
          subRow.append(category);
        }

        const duration = document.createElement("span");
        duration.className = "record-duration";
        duration.textContent = displayCategory ? ` · ${durationText}` : durationText;
        subRow.append(duration);

        body.append(mainRow, subRow);

        if (record.note) {
          const note = document.createElement("div");
          note.className = "record-note";
          note.textContent = record.note;
          body.append(note);
        }

        const time = document.createElement("div");
        time.className = "record-time";

        const startTime = document.createElement("span");
        startTime.className = "record-time-start";
        startTime.textContent = hasInterval ? records[index + 1].time : record.time;

        if (hasInterval) {
          const endTime = document.createElement("span");
          endTime.className = "record-time-end";
          endTime.textContent = record.time;
          time.append(endTime);
        }

        time.append(startTime);

        if (isCategoryOpen(index)) {
          body.append(createCategoryPicker(record, index));
        }

        if (displayCategory && isTagOpen(index)) {
          body.append(createTagPicker(record, index));
        }

        if (editingRecordIndex === index && editDraft) {
          body.append(createEditPanel(index));
        }

        let longPressTriggered = false;
        let longPressResetTimer = null;
        item.addEventListener("touchstart", (event) => {
          if (event.target.closest("button, input, select, textarea")) return;
          clearTimeout(longPressTimer);
          clearTimeout(longPressResetTimer);
          longPressTriggered = false;
          longPressTimer = setTimeout(() => {
            longPressTriggered = true;
            if (navigator.vibrate) navigator.vibrate(40);
            openCtxMenu(index, record, item);
          }, 500);
        }, { passive: true });
        item.addEventListener("touchend", () => {
          clearTimeout(longPressTimer);
          if (longPressTriggered) {
            longPressResetTimer = setTimeout(() => {
              longPressTriggered = false;
            }, 700);
          }
        }, { passive: true });
        item.addEventListener("touchmove", () => {
          clearTimeout(longPressTimer);
        }, { passive: true });
        item.addEventListener("touchcancel", () => {
          clearTimeout(longPressTimer);
          longPressTriggered = false;
        }, { passive: true });
        item.addEventListener("click", (event) => {
          if (!longPressTriggered) return;
          event.preventDefault();
          event.stopPropagation();
          longPressTriggered = false;
        });
        item.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          openCtxMenu(index, record, item);
        });

        item.append(bar, body, time);

        list.append(item);
      });

      recordsArea.replaceChildren(list);
    }

    function buildTimeRows(records) {
      const chronologicalRecords = [...records].reverse();
      let totalMinutes = 0;

      const rows = chronologicalRecords.slice(1).map((record, index) => {
        const previousRecord = chronologicalRecords[index];
        const duration = durationBetween(previousRecord.time, record.time);
        totalMinutes += duration;

        return {
          index: index + 1,
          start: previousRecord.time,
          end: record.time,
          duration,
          category: record.category,
          tags: record.tags,
          text: record.text,
          note: record.note,
          isBackfill: record.isBackfill,
          isSplit: record.isSplit
        };
      });

      return {
        startRecord: chronologicalRecords[0],
        rows,
        totalMinutes
      };
    }

    function escapeCsvValue(value) {
      const text = String(value ?? "");
      if (/[",\r\n]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    function exportCsv(tableData) {
      const headers = ["序号", "开始时间", "结束时间", "时长", "分类", "标签", "事件", "备注"];
      const rows = tableData.rows.map((row) => [
        row.index,
        row.start,
        row.end,
        formatDuration(row.duration),
        row.category || "",
        row.tags.length ? row.tags.join("/") : "",
        row.text,
        row.note || ""
      ]);
      const csv = [headers, ...rows]
        .map((row) => row.map(escapeCsvValue).join(","))
        .join("\r\n");
      const blob = new Blob([`\uFEFF${csv}`], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `Dotlog_${formatDateKey(viewedDate)}.csv`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function renderTimeTable(records) {
      if (records.length < 2) {
        tableArea.replaceChildren();
        tableExpanded = false;
        return;
      }

      const tableData = buildTimeRows(records);
      const table = document.createElement("div");
      table.className = "summary-table";

      const tableWrap = document.createElement("div");
      tableWrap.className = "table-wrap";

      const timeTable = document.createElement("table");
      timeTable.className = "time-table";
      timeTable.innerHTML = `
        <thead>
          <tr>
            <th class="col-index">#</th>
            <th class="col-time">开始</th>
            <th class="col-time">结束</th>
            <th class="col-duration">时长</th>
            <th class="col-category">分类</th>
            <th class="col-tags">标签</th>
            <th class="col-event">事件</th>
            <th class="col-note">备注</th>
          </tr>
        </thead>
      `;

      const tbody = document.createElement("tbody");
      tableData.rows.forEach((row) => {
        const tr = document.createElement("tr");
        const cells = [
          row.index,
          row.start,
          row.end,
          formatDuration(row.duration),
          row,
          row,
          row,
          row.note
        ];

        cells.forEach((value, cellIndex) => {
          const td = document.createElement("td");

          if (cellIndex === 4) {
            if (value.category) {
              td.append(createCategoryBadge(value.category));
            } else {
              const empty = document.createElement("span");
              empty.className = "empty-category";
              empty.textContent = "—";
              td.append(empty);
            }
          } else if (cellIndex === 5) {
            if (value.category && value.tags.length > 0) {
              const tableLabels = document.createElement("div");
              tableLabels.className = "label-stack";
              tableLabels.style.justifyContent = "flex-start";
              value.tags.forEach((tag) => {
                tableLabels.append(createTagBadge(tag, value.category, -1));
              });
              td.append(tableLabels);
            } else {
              const empty = document.createElement("span");
              empty.className = "empty-category";
              empty.textContent = "—";
              td.append(empty);
            }
          } else if (cellIndex === 6) {
            td.textContent = value.text;
          } else if (cellIndex === 7) {
            if (value) {
              td.className = "table-note";
              td.textContent = value;
            } else {
              const empty = document.createElement("span");
              empty.className = "empty-category";
              empty.textContent = "—";
              td.append(empty);
            }
          } else {
            td.textContent = value;
          }

          tr.append(td);
        });

        tbody.append(tr);
      });

      timeTable.append(tbody);
      tableWrap.append(timeTable);

      const total = document.createElement("p");
      total.className = "table-total";
      total.textContent = `合计：${formatDuration(tableData.totalMinutes)}（共 ${tableData.rows.length} 条）`;

      const tableActions = document.createElement("div");
      tableActions.className = "table-actions";
      const csvButton = document.createElement("button");
      csvButton.className = "outline-button";
      csvButton.type = "button";
      csvButton.textContent = "导出 CSV";
      csvButton.addEventListener("click", () => exportCsv(tableData));
      tableActions.append(csvButton);

      table.append(tableWrap, total, tableActions);
      tableArea.replaceChildren(table);
    }

    function buildCalendarEvents(records, date) {
      const chronologicalRecords = [...records].reverse();
      const eventsByCategory = {};
      let eventCount = 0;

      chronologicalRecords.slice(1).forEach((record, index) => {
        if (!record.category) return;

        const previousRecord = chronologicalRecords[index];
        const crossesMidnight = timeToMinutes(record.time) < timeToMinutes(previousRecord.time);
        const endDate = crossesMidnight ? addDays(date, 1) : date;
        const event = [
          "BEGIN:VEVENT",
          `DTSTART;TZID=Asia/Shanghai:${formatIcsDate(date, previousRecord.time)}`,
          `DTEND;TZID=Asia/Shanghai:${formatIcsDate(endDate, record.time)}`,
          `SUMMARY:${escapeIcsText(summaryForRecord(record))}`,
          record.note ? `DESCRIPTION:${escapeIcsText(record.note)}` : null,
          `UID:${createEventUid()}@时间打点器`,
          "END:VEVENT"
        ].filter(Boolean).join("\r\n");

        if (!eventsByCategory[record.category]) {
          eventsByCategory[record.category] = [];
        }

        eventsByCategory[record.category].push(event);
        eventCount += 1;
      });

      return { eventsByCategory, eventCount };
    }

    function buildIcsContent(events) {
      return [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//时间打点器//CN",
        "CALSCALE:GREGORIAN",
        ...events,
        "END:VCALENDAR"
      ].join("\r\n");
    }

    function closeCalendarMenu() {
      calendarMenu.classList.add("is-hidden");
      exportIcs.setAttribute("aria-expanded", "false");
    }

    function toggleCalendarMenu() {
      const opening = calendarMenu.classList.contains("is-hidden");
      calendarMenu.classList.toggle("is-hidden", !opening);
      exportIcs.setAttribute("aria-expanded", String(opening));
    }

    function closeCalendarImportPanel() {
      calendarImportOverlay.classList.add("is-hidden");
      calendarImportPanel.replaceChildren();
    }

    function calendarImportKey(category) {
      return `${formatDateKey(viewedDate)}::${category}`;
    }

    function navigateToCalendarImport(events) {
      const icsContent = buildIcsContent(events);
      const dataUri = `data:text/calendar;charset=utf-8,${encodeURIComponent(icsContent)}`;
      window.location.href = dataUri;
    }

    function renderImportedCalendarActions(category, events, actions) {
      const status = document.createElement("span");
      status.className = "calendar-import-status";
      status.textContent = "✓ 已导入";

      const retryButton = document.createElement("button");
      retryButton.className = "calendar-import-button";
      retryButton.type = "button";
      retryButton.style.color = categoryColor(category);
      retryButton.textContent = "重新导入";
      retryButton.addEventListener("click", () => {
        navigateToCalendarImport(events);
      });

      actions.replaceChildren(status, retryButton);
    }

    function triggerCalendarImport(category, events, actions) {
      importedCalendarCategories.add(calendarImportKey(category));
      renderImportedCalendarActions(category, events, actions);
      navigateToCalendarImport(events);
    }

    function renderCalendarImportPanel(eventsByCategory) {
      const head = document.createElement("div");
      head.className = "calendar-import-head";

      const title = document.createElement("h2");
      title.className = "calendar-import-title";
      title.id = "calendarImportTitle";
      title.textContent = "导入日历";

      const closeButton = document.createElement("button");
      closeButton.className = "calendar-import-close";
      closeButton.type = "button";
      closeButton.textContent = "×";
      closeButton.setAttribute("aria-label", "关闭导入日历面板");
      closeButton.addEventListener("click", closeCalendarImportPanel);
      head.append(title, closeButton);

      const copy = document.createElement("p");
      copy.className = "calendar-import-copy";
      copy.textContent = "点击每个分类，逐个导入到日历";

      const list = document.createElement("div");
      list.className = "calendar-import-list";

      Object.entries(eventsByCategory).forEach(([category, events]) => {
        const row = document.createElement("div");
        row.className = "calendar-import-row";

        const categoryCell = document.createElement("div");
        categoryCell.className = "calendar-import-category";
        const swatch = document.createElement("span");
        swatch.className = "calendar-import-swatch";
        swatch.style.backgroundColor = categoryColor(category);
        const categoryName = document.createElement("span");
        categoryName.textContent = category;
        categoryCell.append(swatch, categoryName);

        const count = document.createElement("span");
        count.className = "calendar-import-count";
        count.textContent = `${events.length}个事件`;

        const importActions = document.createElement("div");
        importActions.className = "calendar-import-actions";

        if (importedCalendarCategories.has(calendarImportKey(category))) {
          renderImportedCalendarActions(category, events, importActions);
        } else {
          const importButton = document.createElement("button");
          importButton.className = "calendar-import-button";
          importButton.type = "button";
          importButton.style.color = categoryColor(category);
          importButton.textContent = "→ 导入";
          importButton.addEventListener("click", () => {
            triggerCalendarImport(category, events, importActions);
          });
          importActions.append(importButton);
        }

        row.append(categoryCell, count, importActions);
        list.append(row);
      });

      const note = document.createElement("p");
      note.className = "calendar-import-note";
      note.textContent = "在 iPhone 上使用效果最佳";

      calendarImportPanel.replaceChildren(head, copy, list, note);
    }

    function openCalendarImportPanel() {
      const records = loadRecords(viewedDate);

      if (records.length < 2) {
        alert("至少需要 2 条记录才能导入");
        return;
      }

      if (!records.some((record) => record.category)) {
        alert("请先为至少一条记录选择分类");
        return;
      }

      const { eventsByCategory, eventCount } = buildCalendarEvents(records, viewedDate);
      if (eventCount === 0) {
        alert("请先为至少一条记录选择分类");
        return;
      }

      renderCalendarImportPanel(eventsByCategory);
      calendarImportOverlay.classList.remove("is-hidden");
    }

    async function exportIcsFiles() {
      const records = loadRecords(viewedDate);

      if (records.length < 2) {
        alert("至少需要 2 条记录才能导出");
        return;
      }

      if (!records.some((record) => record.category)) {
        alert("请先为至少一条记录选择分类，再导出");
        return;
      }

      if (typeof JSZip === "undefined") {
        alert("导出组件加载失败，请检查网络后重试");
        return;
      }

      const dateKey = formatDateKey(viewedDate);
      const { eventsByCategory, eventCount } = buildCalendarEvents(records, viewedDate);
      const categoriesToExport = Object.keys(eventsByCategory);

      if (eventCount === 0) {
        alert("请先为至少一条记录选择分类，再导出");
        return;
      }

      const zip = new JSZip();
      categoriesToExport.forEach((category) => {
        zip.file(`${dateKey}_${category}.ics`, buildIcsContent(eventsByCategory[category]));
      });

      const content = await zip.generateAsync({ type: "blob" });
      const url = URL.createObjectURL(content);
      const link = document.createElement("a");
      link.href = url;
      link.download = `时间记录_${dateKey}.zip`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showExportStatus(`✓ 已导出 ${categoriesToExport.length} 个分类，共 ${eventCount} 个事件`);
    }

    function insertNewRecords(date, newRecords) {
      const records = sortRecords([...newRecords, ...loadRecords(date)]);
      saveRecords(date, records);
      openCategoryIndexes = newRecords
        .map((record) => records.indexOf(record))
        .filter((index) => index >= 0);
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
      tableExpanded = false;
      return records;
    }

    function updateSplitHint() {
      splitHint.classList.toggle("is-hidden", !(entryInput.value.trim() && entryInput.value.includes("+")));
    }

    function openBottomSheet() {
      clearTimeout(bottomSheetCloseTimer);
      bottomSheet.classList.remove("is-hidden");
      sheetOverlay.classList.remove("is-hidden");
      requestAnimationFrame(() => {
        bottomSheet.classList.add("is-open");
        fab.classList.add("is-open");
      });
      setTimeout(() => {
        if (bottomSheet.classList.contains("is-open")) entryInput.focus();
      }, 300);
    }

    function closeBottomSheet() {
      clearTimeout(bottomSheetCloseTimer);
      bottomSheet.classList.remove("is-open");
      fab.classList.remove("is-open");
      if (bottomSheet.classList.contains("is-hidden")) {
        toggleBackfillPanel(false);
        return;
      }
      bottomSheetCloseTimer = setTimeout(() => {
        bottomSheet.classList.add("is-hidden");
        sheetOverlay.classList.add("is-hidden");
        toggleBackfillPanel(false);
      }, 300);
    }

    function toggleBackfillPanel(open) {
      backfillPanel.classList.toggle("is-hidden", !open);
      if (open) {
        setDateSelectors(backfillYear, backfillMonth, backfillDay, today);
        backfillError.classList.add("is-hidden");
        backfillTime.classList.remove("is-invalid");
        setTimeout(() => backfillTime.focus(), 0);
      }
    }

    function setBackfillError(message) {
      backfillError.textContent = message;
      backfillError.classList.remove("is-hidden");
    }

    function validateBackfillPanel() {
      const valid = isValidTimeInput(backfillTime.value.trim());
      backfillTime.classList.toggle("is-invalid", !valid);
      if (!valid) {
        setBackfillError("请输入正确时间格式 HH:MM");
      } else {
        backfillError.classList.add("is-hidden");
      }
      return valid;
    }

    function submitBackfillPanel() {
      const time = backfillTime.value.trim();
      const rawText = backfillText.value.trim();
      const targetDate = dateFromSelectors(backfillYear, backfillMonth, backfillDay);

      if (!validateBackfillPanel()) {
        backfillTime.focus();
        return;
      }

      if (!rawText) {
        setBackfillError("请填写事件描述");
        backfillText.focus();
        return;
      }

      const parsedEntry = parseEntryText(rawText);
      const newRecord = {
        time,
        text: parsedEntry.text,
        category: null,
        note: parsedEntry.note,
        tags: [],
        isBackfill: true,
        isSplit: false
      };

      insertNewRecords(targetDate, [newRecord]);
      backfillTime.value = "";
      backfillText.value = "";
      toggleBackfillPanel(false);
      if (formatDateKey(targetDate) === formatDateKey(viewedDate)) {
        render();
      } else {
        openCategoryIndexes = [];
        openTagIndexes = [];
        render();
        showExportStatus(`已补录至 ${formatShortDateLabel(targetDate)}`);
      }
      closeBottomSheet();
    }

    entryForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const rawText = entryInput.value.trim();
      if (!rawText) {
        return;
      }

      const backfill = parseBackfill(rawText);
      if (!backfill) {
        return;
      }

      const split = parseSplit(backfill.text, backfill.time);
      if (!split) {
        return;
      }

      const newRecords = [];

      if (split.isSplit) {
        const mainEntry = parseEntryText(split.mainText);
        const secondaryEntry = parseEntryText(split.secondaryText);
        newRecords.push(
          {
            time: split.secondaryEndTime,
            text: mainEntry.text,
            category: null,
            note: mainEntry.note,
            tags: [],
            isBackfill: backfill.isBackfill,
            isSplit: true
          },
          {
            time: backfill.time,
            text: secondaryEntry.text,
            category: null,
            note: secondaryEntry.note,
            tags: [],
            isBackfill: backfill.isBackfill,
            isSplit: true
          }
        );
      } else {
        const parsedEntry = parseEntryText(backfill.text);
        newRecords.push({
          time: backfill.time,
          text: parsedEntry.text,
          category: null,
          note: parsedEntry.note,
          tags: [],
          isBackfill: backfill.isBackfill,
          isSplit: false
        });
      }

      insertNewRecords(today, newRecords);
      viewedDate = startOfDay(new Date());
      currentWeekStart = getWeekStart(viewedDate);
      entryInput.value = "";
      updateSplitHint();
      render();
      requestAnimationFrame(() => {
        const firstPicker = document.querySelector(".category-picker");
        if (firstPicker) {
          firstPicker.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      });
      closeBottomSheet();
    });

    tableToggle.addEventListener("click", () => {
      const records = loadRecords(viewedDate);

      if (!tableExpanded && records.length < 2) {
        alert("至少需要 2 条记录才能生成表格");
        return;
      }

      tableExpanded = !tableExpanded;
      render();
    });

    calendarMenuWrap.addEventListener("click", (event) => {
      event.stopPropagation();
    });

    exportIcs.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopImmediatePropagation();
      toggleCalendarMenu();
    }, true);

    importCalendarOption.addEventListener("click", () => {
      closeCalendarMenu();
      openCalendarImportPanel();
    });

    exportIcsOption.addEventListener("click", () => {
      closeCalendarMenu();
      exportIcsFiles();
    });

    calendarImportOverlay.addEventListener("click", (event) => {
      if (event.target === calendarImportOverlay) {
        closeCalendarImportPanel();
      }
    });

    ctxEdit.addEventListener("click", () => {
      if (ctxTargetIndex === null || !ctxTargetRecord) return;
      const targetIndex = ctxTargetIndex;
      const targetRecord = ctxTargetRecord;
      closeCtxMenu();
      startEditingRecord(targetIndex, targetRecord);
    });

    ctxDelete.addEventListener("click", () => {
      if (ctxTargetIndex === null) return;
      const targetIndex = ctxTargetIndex;
      closeCtxMenu();
      if (!confirm("确认删除这条记录？")) return;
      const latestRecords = loadRecords(viewedDate);
      latestRecords.splice(targetIndex, 1);
      saveRecords(viewedDate, latestRecords);
      openCategoryIndexes = [];
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
      render();
    });

    ctxOverlay.addEventListener("click", closeCtxMenu);

    entryInput.addEventListener("input", updateSplitHint);

    fab.addEventListener("click", () => {
      if (bottomSheet.classList.contains("is-open")) {
        closeBottomSheet();
      } else {
        openBottomSheet();
      }
    });

    sheetOverlay.addEventListener("click", closeBottomSheet);

    backfillToggle.addEventListener("click", () => {
      toggleBackfillPanel(backfillPanel.classList.contains("is-hidden"));
    });

    backfillTime.addEventListener("input", () => {
      if (!backfillError.classList.contains("is-hidden")) validateBackfillPanel();
    });

    backfillText.addEventListener("input", () => {
      if (backfillText.value.trim() && backfillError.textContent === "请填写事件描述") {
        backfillError.classList.add("is-hidden");
      }
    });

    backfillYear.addEventListener("change", () => refreshDaySelector(backfillYear, backfillMonth, backfillDay));
    backfillMonth.addEventListener("change", () => refreshDaySelector(backfillYear, backfillMonth, backfillDay));

    backfillText.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        submitBackfillPanel();
      }
    });

    backfillTime.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        backfillText.focus();
      }
    });

    confirmBackfill.addEventListener("click", submitBackfillPanel);

    cancelBackfill.addEventListener("click", () => {
      backfillTime.value = "";
      backfillText.value = "";
      toggleBackfillPanel(false);
    });

    settingsButton.addEventListener("click", showSettingsPage);

    weekNav.addEventListener("touchstart", (event) => {
      weekSwipeStartX = event.touches[0].clientX;
      weekSwipeStartY = event.touches[0].clientY;
    }, { passive: true });

    weekNav.addEventListener("touchend", (event) => {
      const deltaX = event.changedTouches[0].clientX - weekSwipeStartX;
      const deltaY = event.changedTouches[0].clientY - weekSwipeStartY;
      if (Math.abs(deltaX) <= Math.abs(deltaY)) return;
      if (deltaX < -50) {
        goToNextWeek();
      } else if (deltaX > 50) {
        goToPrevWeek();
      }
    }, { passive: true });

    todayBtn.addEventListener("click", () => setViewedDate(new Date()));

    document.addEventListener("click", () => {
      closeCalendarMenu();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeCtxMenu();
        closeBottomSheet();
        closeCalendarMenu();
        closeCalendarImportPanel();
      }
    });

    render();
    if (hasGistSettings()) {
      syncWithGist();
    } else {
      updateSyncIndicators();
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
</body>
</html>
