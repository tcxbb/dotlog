<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dotlog</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dotlog">
  <meta name="theme-color" content="#FFFFFF">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #FFFFFF;
      --text: #1A1A1A;
      --muted: #8A8A8A;
      --accent: #606060;
      --border: #E0DDD8;
      --paper: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 0 20px 100px;
    }

    .top-region {
      position: sticky;
      top: 0;
      z-index: 500;
      padding: calc(10px + env(safe-area-inset-top)) 0 10px;
      border-bottom: 1px solid rgba(224, 221, 216, 0.72);
      background: var(--bg);
      box-shadow: 0 4px 10px rgba(26, 26, 26, 0.025);
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 32px;
      padding: 0;
      border-bottom: 0;
    }

    .page-header,
    .month-bar,
    .week-nav,
    .period-header {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .icon-button {
      border: 0;
      background: transparent;
      color: var(--muted);
      display: inline-grid;
      width: 28px;
      height: 28px;
      place-items: center;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      outline: none;
      box-shadow: none;
      -webkit-appearance: none;
      appearance: none;
      -webkit-tap-highlight-color: transparent;
    }

    .today-shortcut {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
    }

    .icon-button:hover {
      color: var(--text);
    }

    .icon-button:focus,
    .icon-button:focus-visible,
    .icon-button:active {
      outline: none;
      box-shadow: none;
      background: transparent;
    }

    .calendar-menu-wrap {
      position: relative;
      z-index: 9999;
      display: inline-grid;
    }

    .calendar-menu {
      position: absolute;
      top: 34px;
      right: 0;
      z-index: 9999;
      width: 168px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 10px 28px rgba(26, 26, 26, 0.12);
    }

    .calendar-menu-item {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      align-items: center;
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      touch-action: manipulation;
    }

    .calendar-menu-item + .calendar-menu-item {
      border-top: 1px solid var(--border);
    }

    .calendar-menu-item:hover {
      background: #F0EDEA;
    }

    .calendar-menu-icon {
      color: var(--muted);
      text-align: center;
    }

    .is-hidden {
      display: none !important;
    }

    .month-title {
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .top-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 21px;
      padding-inline: 7.142857%;
      padding-top: 2px;
    }

    .month-meta {
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .week-nav {
      overflow: hidden;
      margin: 0;
      padding: 12px 0 6px;
      touch-action: pan-y;
      user-select: none;
    }

    .week-header,
    .week-slide {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .week-header {
      margin-bottom: 3px;
    }

    .week-header span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }

    .week-days {
      position: relative;
      transition: none;
      will-change: transform, opacity;
    }

    .week-slide {
      width: 100%;
    }

    .week-slide.is-previous,
    .week-slide.is-next {
      position: absolute;
      top: 0;
      left: 0;
    }

    .week-slide.is-previous {
      transform: translateX(-100%);
    }

    .week-slide.is-next {
      transform: translateX(100%);
    }

    .week-days.is-dragging {
      transition: none;
    }

    .week-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      border: 0;
      background: transparent;
      padding: 2px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .week-day-num {
      display: flex;
      width: 32px;
      height: 32px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: var(--text);
      font-size: 16px;
      font-weight: 400;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .week-day.is-today .week-day-num {
      color: var(--accent);
      font-weight: 700;
    }

    .week-day.is-selected:not(.is-today) .week-day-num {
      background: #E0E0E0;
      color: var(--text);
      font-weight: 600;
    }

    .week-day.is-today.is-selected .week-day-num {
      background: var(--accent);
      color: #FFFFFF;
      font-weight: 700;
    }

    .app-footer {
      padding: 42px 72px calc(22px + env(safe-area-inset-bottom));
      color: #AAA7A2;
      font-size: 11px;
      text-align: center;
      white-space: nowrap;
    }

    .app-footer-brand {
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 12px;
      cursor: pointer;
    }

    .app-footer-version {
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }

    .sync-indicator {
      min-width: 18px;
      text-align: right;
      color: var(--muted);
    }

    .sync-indicator.is-syncing {
      animation: sync-spin 1s linear infinite;
    }

    .sync-indicator.is-error {
      color: #C8A06B;
    }

    @keyframes sync-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .compact-select {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 7px 8px;
      outline: none;
    }

    .compact-select:focus {
      border-color: var(--accent);
    }

    .backfill-panel,
    .edit-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(26, 26, 26, 0.05);
    }

    .fab {
      position: fixed;
      right: 24px;
      bottom: calc(32px + env(safe-area-inset-bottom));
      z-index: 200;
      display: grid;
      width: 56px;
      height: 56px;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 4px 16px rgba(26, 26, 26, 0.18);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .fab:active {
      transform: scale(0.93);
    }

    .fab svg {
      width: 20px;
      height: 20px;
    }

    .fab.is-hidden {
      display: none;
    }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(26, 26, 26, 0.32);
      transition: opacity 0.25s ease;
      touch-action: none;
    }

    .sheet-overlay.is-hidden {
      display: none;
    }

    .bottom-sheet {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 700;
      width: 100%;
      max-width: 680px;
      max-height: calc(100vh - 24px);
      max-height: calc(100dvh - 12px);
      margin: 0 auto;
      overflow-y: auto;
      overscroll-behavior: contain;
      border-radius: 16px 16px 0 0;
      background: var(--paper);
      padding: 12px 20px calc(40px + env(safe-area-inset-bottom));
      box-shadow: 0 -4px 24px rgba(26, 26, 26, 0.12);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .bottom-sheet.is-open {
      transform: translateY(0);
    }

    .bottom-sheet.is-hidden {
      display: none;
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      margin: 0 auto 16px;
      border-radius: 999px;
      background: var(--border);
    }

    .sheet-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }

    .sheet-input:focus {
      border-color: var(--accent);
    }

    .entry-suggestion {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 38px;
      margin-top: 8px;
      border: 1px solid rgba(224, 221, 216, 0.82);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      padding: 4px 5px 4px 11px;
      color: var(--muted);
      font-size: 13px;
    }

    .entry-suggestion.is-hidden {
      display: none;
    }

    .entry-suggestion-copy {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .entry-suggestion-value {
      color: var(--text);
      font-weight: 500;
    }

    .entry-suggestion-actions {
      display: flex;
      flex-shrink: 0;
      align-items: center;
      gap: 1px;
    }

    .entry-suggestion-action {
      display: grid;
      width: 34px;
      height: 30px;
      place-items: center;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
    }

    .entry-suggestion-action:hover {
      background: rgba(26, 26, 26, 0.045);
      color: var(--text);
    }

    .sheet-input::placeholder {
      color: var(--muted);
    }

    .sheet-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .sheet-left-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sheet-aux-btn {
      display: flex;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .sheet-aux-btn:active {
      background: var(--bg);
      color: var(--text);
    }

    .sheet-submit {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #FFFFFF;
      padding: 10px 24px;
      font-size: 15px;
      cursor: pointer;
    }

    .sheet-submit:active {
      filter: brightness(0.93);
    }

    .bottom-sheet .backfill-panel {
      margin-top: 12px;
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .bottom-sheet .split-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .entry-time-row {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) 34px;
      align-items: center;
      column-gap: 7px;
      row-gap: 4px;
      margin-top: 10px;
    }

    .entry-time-label {
      grid-row: 1;
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 13px;
    }

    .entry-date-range,
    .entry-clock-range {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 7px;
      align-items: center;
      min-width: 0;
    }

    .entry-date-range {
      grid-column: 2;
      grid-row: 1;
    }

    .entry-clock-range {
      grid-column: 2;
      grid-row: 2;
    }

    .entry-date-wrap {
      position: relative;
      min-width: 0;
    }

    .entry-date-button {
      width: 100%;
      height: 34px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      padding: 6px 8px;
      font-size: 13px;
      text-align: center;
      white-space: nowrap;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    .entry-date-badge {
      position: absolute;
      top: -7px;
      right: -5px;
      z-index: 1;
      border-radius: 999px;
      background: #E88A3D;
      color: #FFFFFF;
      padding: 1px 5px;
      font-size: 9px;
      font-weight: 700;
      line-height: 1.5;
      box-shadow: 0 1px 3px rgba(26, 26, 26, 0.12);
    }

    .time-range-arrow {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 14px;
    }

    .entry-time-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      padding: 7px 10px;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
    }

    .entry-time-auto {
      grid-column: 3;
      grid-row: 2;
      display: inline-grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--muted);
      padding: 0;
      cursor: pointer;
    }

    .entry-time-auto:hover,
    .entry-time-auto:focus-visible,
    .entry-time-auto:active {
      border-color: var(--muted);
      color: var(--text);
    }

    .entry-time-auto svg {
      width: 16px;
      height: 16px;
    }

    .entry-classification {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .entry-classification-row {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }

    .entry-classification-label {
      color: var(--muted);
      padding-top: 4px;
      font-size: 13px;
      line-height: 1.4;
    }

    .entry-classification-options {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .date-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .form-line {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .form-line input {
      min-width: 0;
    }

    .edit-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 8px 10px;
      outline: none;
    }

    .edit-input:focus {
      border-color: var(--accent);
    }

    .edit-input.is-invalid {
      border-color: #C87B7B;
    }

    .field-error {
      color: #C87B7B;
      font-size: 13px;
      line-height: 1.4;
    }

    .panel-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .panel-save {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #FFFFFF;
      padding: 7px 14px;
      cursor: pointer;
    }

    .panel-save:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .panel-cancel {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 7px 4px;
      cursor: pointer;
    }

    .panel-cancel:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .table-tools {
      padding-top: 5px;
    }

    .table-tools.is-hidden {
      display: none;
    }

    .date-page-host {
      position: relative;
      min-height: 1px;
    }

    .date-page-host.is-swipe-previewing > .table-tools,
    .date-page-host.is-swipe-previewing > #recordsArea,
    .date-page-host.is-swipe-previewing > .app-footer {
      visibility: hidden;
    }

    .date-swipe-overlay {
      --date-swipe-gap: 14px;
      position: absolute;
      inset: 0;
      z-index: 20;
      overflow: hidden;
      background: var(--bg);
      pointer-events: none;
    }

    .date-swipe-overlay.is-hidden {
      display: none;
    }

    .date-swipe-track {
      display: flex;
      gap: var(--date-swipe-gap);
      height: 100%;
      will-change: transform;
    }

    .date-swipe-slide {
      flex: 0 0 100%;
      width: 100%;
      min-width: 0;
      background: var(--bg);
    }

    .date-swipe-slide .table-tools {
      padding-top: 5px;
    }

    .outline-button {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      padding: 9px 14px;
      cursor: pointer;
    }

    .outline-button:hover {
      background: rgba(74, 124, 111, 0.07);
    }

    .export-status {
      color: var(--accent);
      font-size: 14px;
    }

    #tableArea {
      flex-basis: 100%;
      width: 100%;
    }

    .summary-table {
      margin-top: 16px;
      padding: 18px;
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(26, 26, 26, 0.06);
    }

    .start-note,
    .table-total {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
      margin: 12px 0;
    }

    .time-table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .time-table th,
    .time-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .time-table th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .time-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .time-table .col-index {
      width: 42px;
    }

    .time-table .col-time {
      width: 74px;
      font-variant-numeric: tabular-nums;
    }

    .time-table .col-duration {
      width: 118px;
    }

    .time-table .col-category {
      width: 120px;
    }

    .time-table .col-tags {
      width: 170px;
    }

    .time-table .col-event {
      width: 150px;
    }

    .time-table .col-note {
      width: auto;
    }

    .time-table td {
      overflow-wrap: anywhere;
    }

    .list {
      margin: 9px 0 0;
      padding: 0;
      list-style: none;
    }

    .period-header {
      padding: 16px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .period-header:first-child {
      padding-top: 8px;
    }

    .record {
      position: relative;
      display: grid;
      grid-template-columns: 4px minmax(0, 1fr) auto;
      column-gap: 12px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 0;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: pan-y;
    }

    .record-bar {
      width: 4px;
      min-height: 36px;
      border-radius: 999px;
      align-self: stretch;
    }

    .record-gap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      min-height: 20px;
      padding: 1px 0;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      -webkit-user-select: none;
      user-select: none;
    }

    .record-gap-duration {
      white-space: nowrap;
    }

    .record-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .record-main {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0;
      line-height: 1.4;
    }

    .record-title {
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      word-break: break-all;
    }

    .cross-day-badge {
      display: inline-block;
      font-size: 10px;
      color: #999;
      background: #f0f0f0;
      border-radius: 4px;

      gap: 10px;
      align-items: center;
      padding-left: 122px;
    }

    .sync-status {
      color: var(--muted);
      font-size: 14px;
    }

    .sync-status.is-connected {
      color: var(--accent);
    }

    .sync-status.is-error {
      color: #C87B7B;
    }

    .config-category-head {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
      margin-bottom: 7px;
      padding: 0 2px;
      cursor: pointer;
    }

    .config-category-name {
      overflow: hidden;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .config-category-identity {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .config-category-toggle {
      display: grid;
      width: 28px;
      height: 36px;
      flex-shrink: 0;
      place-items: center;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .config-category-toggle:hover {
      background: rgba(26, 26, 26, 0.04);
      color: var(--text);
    }

    .config-category-toggle[aria-expanded="true"] {
      transform: translateY(-1px);
    }

    .color-swatch-btn {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.12);
      cursor: pointer;
      transition: transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .color-swatch-btn:active {
      transform: scale(0.9);
    }

    .color-picker-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 0 8px;
    }

    .color-picker-panel.is-hidden {
      display: none;
    }

    .color-option {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .color-option:active {
      transform: scale(0.9);
    }

    .color-option.is-selected {
      box-shadow: 0 0 0 2px var(--paper), 0 0 0 4px rgba(0, 0, 0, 0.35);
    }

    .config-actions {
      position: relative;
      display: flex;
      align-items: center;
      gap: 2px;
      margin-right: 7px;
      white-space: nowrap;
    }

    .config-head-action,
    .config-tag-action {
      min-width: 36px;
      min-height: 36px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .config-head-action:hover,
    .config-tag-action:hover {
      background: rgba(26, 26, 26, 0.045);
      color: var(--text);
    }

    .config-head-add {
      min-width: 32px;
      padding: 0;
      font-size: 22px;
      font-weight: 300;
    }

    .config-action-menu-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .config-action-menu {
      position: absolute;
      top: calc(100% + 2px);
      right: 0;
      z-index: 30;
      width: 128px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(26, 26, 26, 0.12);
    }

    .config-action-menu button {
      display: block;
      width: 100%;
      min-height: 40px;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 8px 12px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
    }

    .config-action-menu button:hover {
      background: rgba(26, 26, 26, 0.045);
    }

    .config-action-menu .is-danger {
      color: #A85F5F;
    }

    .text-button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 13px;
    }

    .text-button:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .inline-input {
      width: min(100%, 240px);
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 6px 8px;
      outline: none;
    }

    .inline-input:focus {
      border-color: var(--accent);
    }

    .config-tags {
      display: grid;
      gap: 2px;
      padding: 5px;
      border: 1px solid rgba(224, 221, 216, 0.52);
      border-radius: 12px;
      background: #FFFFFF;
    }

    #settingsView > .category-config-list + div {
      display: flex;
      margin-top: 24px;
    }

    #settingsView > .category-config-list + div > .outline-button {
      width: auto;
      border-color: rgba(96, 96, 96, 0.52);
      border-radius: 9px;
      padding: 8px 14px;
    }

    #settingsView > .category-config-list + div > .add-category-panel {
      width: min(100%, 360px);
      margin-top: 0;
    }

    .config-tag {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 45px;
      padding: 5px 3px 5px 9px;
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
    }

    .config-tag-name {
      min-width: 0;
      flex: 1;
      cursor: default;
      overflow-wrap: anywhere;
    }

    .config-tag-actions {
      position: relative;
      display: flex;
      flex-shrink: 0;
      align-items: center;
    }

    .config-tag-editor {
      display: flex;
      align-items: center;
      min-height: 45px;
      padding: 6px 8px;
    }

    .config-tag-editor .inline-input {
      width: 100%;
    }

    .config-tags-empty {
      color: var(--muted);
      padding: 10px 9px;
      font-size: 13px;
    }

    .tag-detail-overlay {
      position: fixed;
      inset: 0;
      z-index: 13000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(26, 26, 26, 0.32);
    }

    .tag-detail-panel {
      width: min(100%, 440px);
      max-height: calc(100dvh - 40px);
      overflow-y: auto;
      border-radius: 14px;
      background: var(--paper);
      padding: 20px;
      box-shadow: 0 14px 40px rgba(26, 26, 26, 0.18);
    }

    .tag-detail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .tag-detail-title {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .tag-detail-close {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 21px;
      line-height: 1;
    }

    .tag-detail-close:hover {
      background: rgba(26, 26, 26, 0.045);
      color: var(--text);
    }

    .tag-detail-fields {
      display: grid;
      gap: 18px;
    }

    .tag-detail-field {
      display: grid;
      gap: 7px;
    }

    .tag-detail-label {
      color: var(--muted);
      font-size: 13px;
    }

    .tag-detail-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      color: var(--text);
      padding: 9px 11px;
      outline: none;
    }

    .tag-detail-input:focus {
      border-color: var(--accent);
    }

    .tag-trigger-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-height: 28px;
    }

    .tag-trigger-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 28px;
      border: 1px solid rgba(224, 221, 216, 0.82);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      padding: 3px 5px 3px 10px;
      font-size: 13px;
    }

    .tag-trigger-remove {
      display: grid;
      width: 22px;
      height: 22px;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }

    .tag-trigger-remove:hover {
      background: rgba(26, 26, 26, 0.05);
      color: var(--text);
    }

    .tag-trigger-empty {
      color: var(--muted);
      font-size: 13px;
    }

    .tag-trigger-add-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .tag-trigger-add {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 8px 13px;
      cursor: pointer;
    }

    .tag-trigger-add:hover {
      border-color: var(--accent);
    }

    .tag-detail-error {
      min-height: 18px;
      color: #C87B7B;
      font-size: 13px;
    }

    .tag-detail-actions {
      margin-top: 2px;
    }

    .add-category-panel {
      display: grid;
      gap: 10px;
      margin-top: 16px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
    }

    .color-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border: 2px solid transparent;
      border-radius: 999px;
      box-shadow: none;
      cursor: pointer;
      transition: box-shadow 0.15s ease, transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .color-swatch.is-selected {
      border-color: transparent;
      box-shadow:
        0 0 0 2px var(--paper),
        0 0 0 4px var(--swatch-color);
      box-shadow:
        0 0 0 2px var(--paper),
        0 0 0 4px var(--swatch-color),
        0 0 8px 2px color-mix(in srgb, var(--swatch-color) 40%, transparent);
      transform: scale(1.05);
    }

    .add-category-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      color: var(--muted);
      text-align: center;
    }

    .empty-title {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 500;
    }

    .empty-subtitle {
      margin: 0;
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .page {
        width: 100%;
        padding-top: 0;
      }

      .outline-button {
        width: 100%;
      }

      .summary-table {
        padding: 14px;
      }

      .record {
        column-gap: 10px;
      }

      .form-line {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .sync-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .sync-actions,
      .sync-status-row {
        padding-left: 0;
      }

      .tag-detail-overlay {
        align-items: flex-end;
        padding: 0;
      }

      .tag-detail-panel {
        width: 100%;
        max-height: calc(100dvh - 16px);
        border-radius: 16px 16px 0 0;
        padding: 18px 20px calc(28px + env(safe-area-inset-bottom));
      }
    }

    @media (max-width: 480px) {
      .record {
        column-gap: 8px;
        padding: 12px 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top-region">
      <div class="page-header">
        <div class="month-title" id="monthTitle"></div>
        <div class="header-actions">
          <button class="icon-button today-shortcut is-hidden" id="todayShortcut" type="button" aria-label="回到今天" title="回到今天">今</button>
          <span class="calendar-menu-wrap" id="calendarMenuWrap">
            <button class="icon-button" id="exportIcs" type="button" title="导入、导出与列表" aria-label="打开工具菜单" aria-expanded="false">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="4" width="14" height="13" rx="2"/>
                <line x1="3" y1="8" x2="17" y2="8"/>
                <line x1="7" y1="2" x2="7" y2="6"/>
                <line x1="13" y1="2" x2="13" y2="6"/>
                <line x1="10" y1="11" x2="10" y2="14"/>
                <polyline points="7.5,12.5 10,15 12.5,12.5"/>
              </svg>
            </button>
            <span class="calendar-menu is-hidden" id="calendarMenu">
              <button class="calendar-menu-item" id="importCalendarOption" type="button">
                <span class="calendar-menu-icon" aria-hidden="true">📅</span>
                <span>导入日历</span>
              </button>
              <button class="calendar-menu-item" id="exportIcsOption" type="button">
                <span class="calendar-menu-icon" aria-hidden="true">↓</span>
                <span>导出 .ics</span>
              </button>
              <button class="calendar-menu-item" id="exportCsvOption" type="button">
                <span class="calendar-menu-icon" aria-hidden="true">↓</span>
                <span>导出 CSV</span>
              </button>
              <button class="calendar-menu-item" id="tableToggle" type="button">
                <span class="calendar-menu-icon" aria-hidden="true">☷</span>
                <span>列表</span>
              </button>
            </span>
          </span>
          <button class="icon-button" id="settingsButton" type="button" aria-label="分类与标签管理">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="10" cy="10" r="2.5"/>
              <path d="M10 3v1.5M10 15.5V17M3 10h1.5M15.5 10H17M4.9 4.9l1.1 1.1M14 14l1.1 1.1M4.9 15.1L6 14M14 6l1.1-1.1"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="week-nav" id="weekNav">
        <div class="week-header" aria-hidden="true">
          <span>一</span>
          <span>二</span>
          <span>三</span>
          <span>四</span>
          <span>五</span>
          <span>六</span>
          <span>日</span>
        </div>
        <div class="week-days" id="weekDays"></div>
      </div>
      <div class="top-meta-row">
        <div class="month-meta" id="monthMeta"></div>
        <span class="sync-indicator is-hidden" id="syncIndicator"></span>
      </div>
    </header>

    <div class="date-page-host" id="datePageHost">
      <section class="table-tools" id="tableTools">
        <span class="export-status" id="exportStatus" aria-live="polite"></span>
        <div id="tableArea"></div>
      </section>

      <section id="recordsArea" aria-live="polite"></section>
      <footer class="app-footer" id="appFooter">
        <button class="app-footer-brand" id="appVersionToggle" type="button" aria-expanded="false">Dotlog</button> · daily time log
        <div class="app-footer-version is-hidden" id="appVersion"></div>
      </footer>

      <div class="date-swipe-overlay is-hidden" id="dateSwipeOverlay" aria-hidden="true">
        <div class="date-swipe-track" id="dateSwipeTrack"></div>
      </div>
    </div>
    <section class="settings-view is-hidden" id="settingsView"></section>

    <div class="calendar-import-overlay is-hidden" id="calendarImportOverlay" role="dialog" aria-modal="true" aria-labelledby="calendarImportTitle">
      <section class="calendar-import-panel" id="calendarImportPanel"></section>
    </div>

    <div class="export-range-overlay is-hidden" id="exportRangeOverlay" role="dialog" aria-modal="true" aria-labelledby="exportRangeTitle">
      <section class="export-range-panel" id="exportRangePanel"></section>
    </div>

    <div class="ctx-overlay is-hidden" id="ctxOverlay"></div>

    <div class="ctx-menu is-hidden" id="ctxMenu" role="menu" aria-label="记录操作">
      <button class="ctx-item ctx-edit" id="ctxEdit" type="button" role="menuitem">
        <span class="ctx-icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
            <path d="M14.5 2.5l3 3L6 17H3v-3L14.5 2.5z"/>
          </svg>
        </span>
        <span class="ctx-label">编辑</span>
      </button>
      <div class="ctx-divider"></div>
      <button class="ctx-item ctx-delete" id="ctxDelete" type="button" role="menuitem">
        <span class="ctx-icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
            <polyline points="4,6 16,6"/>
            <path d="M7 6V4h6v2"/>
            <rect x="5" y="6" width="10" height="11" rx="1"/>
          </svg>
        </span>
        <span class="ctx-label">删除</span>
      </button>
    </div>

    <div class="time-picker-overlay is-hidden" id="timePickerOverlay"></div>
    <section class="time-picker is-hidden" id="timePicker" role="dialog" aria-modal="true" aria-labelledby="timePickerTitle">
      <div class="time-picker-title" id="timePickerTitle">选择时间</div>
      <div class="time-picker-columns">
        <div class="time-picker-column-wrap">
          <span class="time-picker-column-label">时</span>
          <div class="time-picker-column" id="timePickerHour" aria-label="小时"></div>
        </div>
        <div class="time-picker-column-wrap">
          <span class="time-picker-column-label">分</span>
          <div class="time-picker-column" id="timePickerMinute" aria-label="分钟"></div>
        </div>
      </div>
      <div class="time-picker-actions">
        <button class="time-picker-action" id="timePickerCancel" type="button">取消</button>
        <button class="time-picker-action is-primary" id="timePickerConfirm" type="button">确定</button>
      </div>
    </section>

    <div class="time-picker-overlay is-hidden" id="datePickerOverlay"></div>
    <section class="date-picker is-hidden" id="datePicker" role="dialog" aria-modal="true" aria-labelledby="datePickerTitle">
      <div class="sheet-handle"></div>
      <div class="date-picker-header">
        <button class="date-picker-nav" id="datePickerPrevious" type="button" aria-label="上个月">‹</button>
        <div class="date-picker-title" id="datePickerTitle"></div>
        <button class="date-picker-nav" id="datePickerNext" type="button" aria-label="下个月">›</button>
      </div>
      <div class="date-picker-weekdays" aria-hidden="true">
        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
      </div>
      <div class="date-picker-days" id="datePickerDays"></div>
    </section>
    <div class="app-toast is-hidden" id="appToast" role="status" aria-live="polite"></div>

    <button class="fab" id="fab" type="button" aria-label="新增记录">
      <svg viewBox="0 0 20 20" fill="none" stroke="#FFFFFF" stroke-width="2" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <line x1="10" y1="4" x2="10" y2="16"/>
        <line x1="4" y1="10" x2="16" y2="10"/>
      </svg>
    </button>

    <div class="sheet-overlay is-hidden" id="sheetOverlay"></div>

    <div class="bottom-sheet is-hidden" id="bottomSheet" role="dialog" aria-modal="true" aria-label="新增记录">
      <div class="sheet-handle"></div>

      <form class="sheet-form" id="entryForm">
        <input
          class="sheet-input"
          id="entryInput"
          type="text"
          placeholder="发生了什么？"
          autocomplete="off"
          enterkeyhint="done"
        >
        <div class="entry-suggestion is-hidden" id="entrySuggestion" aria-live="polite">
          <span class="entry-suggestion-copy">
            推荐：<span class="entry-suggestion-value" id="entrySuggestionValue"></span>
          </span>
          <span class="entry-suggestion-actions">
            <button class="entry-suggestion-action" id="acceptEntrySuggestion" type="button" aria-label="使用推荐" title="使用推荐">✓</button>
            <button class="entry-suggestion-action" id="dismissEntrySuggestion" type="button" aria-label="忽略推荐" title="忽略推荐">×</button>
          </span>
        </div>
        <div class="entry-time-row" id="entryTimeRow">
          <span class="entry-time-label">时间：</span>
          <div class="entry-date-range">
            <span class="entry-date-wrap"><button class="entry-date-button" id="entryStartDate" type="button" aria-label="事件开始日期"></button></span>
            <span class="time-range-arrow" aria-hidden="true">→</span>
            <span class="entry-date-wrap">
              <button class="entry-date-button" id="entryEndDate" type="button" aria-label="事件结束日期"></button>
              <span class="entry-date-badge is-hidden" id="entryEndDateBadge">次日</span>
            </span>
          </div>
          <div class="entry-clock-range">
            <input class="entry-time-input" id="entryStartTime" type="text" inputmode="none" readonly aria-label="事件开始时间">
            <span class="time-range-arrow" aria-hidden="true">→</span>
            <input class="entry-time-input" id="entryEndTime" type="text" inputmode="none" readonly aria-label="事件结束时间">
          </div>
          <button class="entry-time-auto" id="entryStartAuto" type="button" aria-label="自动设置开始时间" title="自动设置开始时间">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4.2 7.2A6.3 6.3 0 1 1 3.8 12"/>
              <path d="M4.2 3.8v3.4h3.4"/>
              <path d="M10 6.4v3.8l2.5 1.5"/>
            </svg>
          </button>
        </div>
        <div class="split-hint is-hidden" id="splitHint">检测到加号 · 拆分格式：主事件 + 次事件 时长（分钟）</div>
        <div class="entry-classification" id="entryClassification"></div>
