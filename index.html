<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dotlog</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dotlog">
  <meta name="theme-color" content="#FFFFFF">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #FFFFFF;
      --text: #1A1A1A;
      --muted: #8A8A8A;
      --accent: #606060;
      --border: #E0DDD8;
      --paper: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 0 20px 100px;
    }

    .top-region {
      position: sticky;
      top: 0;
      z-index: 500;
      padding: calc(10px + env(safe-area-inset-top)) 0 10px;
      border-bottom: 1px solid rgba(224, 221, 216, 0.72);
      background: var(--bg);
      box-shadow: 0 4px 10px rgba(26, 26, 26, 0.025);
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 32px;
      padding: 0;
      border-bottom: 0;
    }

    .page-header,
    .month-bar,
    .week-nav,
    .period-header {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .icon-button {
      border: 0;
      background: transparent;
      color: var(--muted);
      display: inline-grid;
      width: 28px;
      height: 28px;
      place-items: center;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      outline: none;
      box-shadow: none;
      -webkit-appearance: none;
      appearance: none;
      -webkit-tap-highlight-color: transparent;
    }

    .today-shortcut {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
    }

    .icon-button:hover {
      color: var(--text);
    }

    .icon-button:focus,
    .icon-button:focus-visible,
    .icon-button:active {
      outline: none;
      box-shadow: none;
      background: transparent;
    }

    .calendar-menu-wrap {
      position: relative;
      z-index: 9999;
      display: inline-grid;
    }

    .calendar-menu {
      position: absolute;
      top: 34px;
      right: 0;
      z-index: 9999;
      width: 168px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 10px 28px rgba(26, 26, 26, 0.12);
    }

    .calendar-menu-item {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      align-items: center;
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      touch-action: manipulation;
    }

    .calendar-menu-item + .calendar-menu-item {
      border-top: 1px solid var(--border);
    }

    .calendar-menu-item:hover {
      background: #F0EDEA;
    }

    .calendar-menu-icon {
      color: var(--muted);
      text-align: center;
    }

    .is-hidden {
      display: none !important;
    }

    .month-title {
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .top-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 21px;
      padding-inline: 7.142857%;
      padding-top: 2px;
    }

    .month-meta {
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .week-nav {
      overflow: hidden;
      margin: 0;
      padding: 12px 0 6px;
      touch-action: pan-y;
      user-select: none;
    }

    .week-header,
    .week-slide {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .week-header {
      margin-bottom: 3px;
    }

    .week-header span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }

    .week-days {
      position: relative;
      transition: none;
      will-change: transform, opacity;
    }

    .week-slide {
      width: 100%;
    }

    .week-slide.is-previous,
    .week-slide.is-next {
      position: absolute;
      top: 0;
      left: 0;
    }

    .week-slide.is-previous {
      transform: translateX(-100%);
    }

    .week-slide.is-next {
      transform: translateX(100%);
    }

    .week-days.is-dragging {
      transition: none;
    }

    .week-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      border: 0;
      background: transparent;
      padding: 2px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .week-day-num {
      display: flex;
      width: 32px;
      height: 32px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: var(--text);
      font-size: 16px;
      font-weight: 400;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .week-day.is-today .week-day-num {
      color: var(--accent);
      font-weight: 700;
    }

    .week-day.is-selected:not(.is-today) .week-day-num {
      background: #E0E0E0;
      color: var(--text);
      font-weight: 600;
    }

    .week-day.is-today.is-selected .week-day-num {
      background: var(--accent);
      color: #FFFFFF;
      font-weight: 700;
    }

    .app-footer {
      padding: 42px 72px calc(22px + env(safe-area-inset-bottom));
      color: #AAA7A2;
      font-size: 11px;
      text-align: center;
      white-space: nowrap;
    }

    .app-footer-brand {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 12px;
    }

    .sync-indicator {
      min-width: 18px;
      text-align: right;
      color: var(--muted);
    }

    .sync-indicator.is-syncing {
      animation: sync-spin 1s linear infinite;
    }

    .sync-indicator.is-error {
      color: #C8A06B;
    }

    @keyframes sync-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .compact-select {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 7px 8px;
      outline: none;
    }

    .compact-select:focus {
      border-color: var(--accent);
    }

    .backfill-panel,
    .edit-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(26, 26, 26, 0.05);
    }

    .fab {
      position: fixed;
      right: 24px;
      bottom: calc(32px + env(safe-area-inset-bottom));
      z-index: 200;
      display: grid;
      width: 56px;
      height: 56px;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 4px 16px rgba(26, 26, 26, 0.18);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .fab:active {
      transform: scale(0.93);
    }

    .fab svg {
      width: 20px;
      height: 20px;
    }

    .fab.is-hidden {
      display: none;
    }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(26, 26, 26, 0.32);
      transition: opacity 0.25s ease;
      touch-action: none;
    }

    .sheet-overlay.is-hidden {
      display: none;
    }

    .bottom-sheet {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 700;
      width: 100%;
      max-width: 680px;
      max-height: calc(100vh - 24px);
      max-height: calc(100dvh - 12px);
      margin: 0 auto;
      overflow-y: auto;
      overscroll-behavior: contain;
      border-radius: 16px 16px 0 0;
      background: var(--paper);
      padding: 12px 20px calc(40px + env(safe-area-inset-bottom));
      box-shadow: 0 -4px 24px rgba(26, 26, 26, 0.12);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .bottom-sheet.is-open {
      transform: translateY(0);
    }

    .bottom-sheet.is-hidden {
      display: none;
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      margin: 0 auto 16px;
      border-radius: 999px;
      background: var(--border);
    }

    .sheet-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }

    .sheet-input:focus {
      border-color: var(--accent);
    }

    .entry-suggestion {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 38px;
      margin-top: 8px;
      border: 1px solid rgba(224, 221, 216, 0.82);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      padding: 4px 5px 4px 11px;
      color: var(--muted);
      font-size: 13px;
    }

    .entry-suggestion.is-hidden {
      display: none;
    }

    .entry-suggestion-copy {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .entry-suggestion-value {
      color: var(--text);
      font-weight: 500;
    }

    .entry-suggestion-actions {
      display: flex;
      flex-shrink: 0;
      align-items: center;
      gap: 1px;
    }

    .entry-suggestion-action {
      display: grid;
      width: 34px;
      height: 30px;
      place-items: center;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
    }

    .entry-suggestion-action:hover {
      background: rgba(26, 26, 26, 0.045);
      color: var(--text);
    }

    .sheet-input::placeholder {
      color: var(--muted);
    }

    .sheet-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .sheet-left-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sheet-aux-btn {
      display: flex;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .sheet-aux-btn:active {
      background: var(--bg);
      color: var(--text);
    }

    .sheet-submit {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #FFFFFF;
      padding: 10px 24px;
      font-size: 15px;
      cursor: pointer;
    }

    .sheet-submit:active {
      filter: brightness(0.93);
    }

    .bottom-sheet .backfill-panel {
      margin-top: 12px;
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .bottom-sheet .split-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .entry-time-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
    }

    .entry-time-label {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 13px;
    }

    .time-range-arrow {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 14px;
    }

    .entry-time-input {
      width: 82px;
      min-width: 0;
      flex: 0 0 82px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      padding: 7px 10px;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
    }

    .entry-time-auto {
      display: inline-grid;
      width: 34px;
      align-self: stretch;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--muted);
      padding: 0;
      cursor: pointer;
    }

    .entry-time-auto:hover,
    .entry-time-auto:focus-visible,
    .entry-time-auto:active {
      border-color: var(--muted);
      color: var(--text);
    }

    .entry-time-auto svg {
      width: 16px;
      height: 16px;
    }

    .entry-classification {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .entry-classification-row {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }

    .entry-classification-label {
      color: var(--muted);
      padding-top: 4px;
      font-size: 13px;
      line-height: 1.4;
    }

    .entry-classification-options {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .date-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .form-line {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .form-line input {
      min-width: 0;
    }

    .edit-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 8px 10px;
      outline: none;
    }

    .edit-input:focus {
      border-color: var(--accent);
    }

    .edit-input.is-invalid {
      border-color: #C87B7B;
    }

    .field-error {
      color: #C87B7B;
      font-size: 13px;
      line-height: 1.4;
    }

    .panel-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .panel-save {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #FFFFFF;
      padding: 7px 14px;
      cursor: pointer;
    }

    .panel-save:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .panel-cancel {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 7px 4px;
      cursor: pointer;
    }

    .panel-cancel:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .table-tools {
      padding-top: 5px;
    }

    .table-tools.is-hidden {
      display: none;
    }

    .date-page-host {
      position: relative;
      min-height: 1px;
    }

    .date-page-host.is-swipe-previewing > .table-tools,
    .date-page-host.is-swipe-previewing > #recordsArea,
    .date-page-host.is-swipe-previewing > .app-footer {
      visibility: hidden;
    }

    .date-swipe-overlay {
      --date-swipe-gap: 14px;
      position: absolute;
      inset: 0;
      z-index: 20;
      overflow: hidden;
      background: var(--bg);
      pointer-events: none;
    }

    .date-swipe-overlay.is-hidden {
      display: none;
    }

    .date-swipe-track {
      display: flex;
      gap: var(--date-swipe-gap);
      height: 100%;
      will-change: transform;
    }

    .date-swipe-slide {
      flex: 0 0 100%;
      width: 100%;
      min-width: 0;
      background: var(--bg);
    }

    .date-swipe-slide .table-tools {
      padding-top: 5px;
    }

    .outline-button {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      padding: 9px 14px;
      cursor: pointer;
    }

    .outline-button:hover {
      background: rgba(74, 124, 111, 0.07);
    }

    .export-status {
      color: var(--accent);
      font-size: 14px;
    }

    #tableArea {
      flex-basis: 100%;
      width: 100%;
    }

    .summary-table {
      margin-top: 16px;
      padding: 18px;
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(26, 26, 26, 0.06);
    }

    .start-note,
    .table-total {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
      margin: 12px 0;
    }

    .time-table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .time-table th,
    .time-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .time-table th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .time-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .time-table .col-index {
      width: 42px;
    }

    .time-table .col-time {
      width: 74px;
      font-variant-numeric: tabular-nums;
    }

    .time-table .col-duration {
      width: 118px;
    }

    .time-table .col-category {
      width: 120px;
    }

    .time-table .col-tags {
      width: 170px;
    }

    .time-table .col-event {
      width: 150px;
    }

    .time-table .col-note {
      width: auto;
    }

    .time-table td {
      overflow-wrap: anywhere;
    }

    .list {
      margin: 9px 0 0;
      padding: 0;
      list-style: none;
    }

    .period-header {
      padding: 16px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .period-header:first-child {
      padding-top: 8px;
    }

    .record {
      position: relative;
      display: grid;
      grid-template-columns: 4px minmax(0, 1fr) auto;
      column-gap: 12px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 0;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: pan-y;
    }

    .record-bar {
      width: 4px;
      min-height: 36px;
      border-radius: 999px;
      align-self: stretch;
    }

    .record-gap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      min-height: 20px;
      padding: 1px 0;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      -webkit-user-select: none;
      user-select: none;
    }

    .record-gap-duration {
      white-space: nowrap;
    }

    .record-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .record-main {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0;
      line-height: 1.4;
    }

    .record-title {
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      word-break: break-all;
    }

    .record-tags {
      margin-left: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .record-sub {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      font-size: 13px;
      line-height: 1.4;
    }

    .record-category {
      border: 0;
      background: transparent;
      padding: 0;
      font-size: 13px;
      cursor: pointer;
    }

    .record-category:active {
      opacity: 0.7;
    }

    .record-duration {
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .record-time {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .record-time-start,
    .record-time-end {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .extend-to-now-button {
      display: flex;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
    }

    .extend-to-now-button:hover,
    .extend-to-now-button:focus-visible,
    .extend-to-now-button:active {
      border-color: var(--muted);
      color: var(--text);
    }

    .ctx-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.06);
      -webkit-backdrop-filter: blur(1px);

      background: var(--paper);
      color: var(--text);
      padding: 6px 8px;
      outline: none;
    }

    .inline-input:focus {
      border-color: var(--accent);
    }

    .config-tags {
      display: grid;
      gap: 2px;
      padding: 5px;
      border: 1px solid rgba(224, 221, 216, 0.52);
      border-radius: 12px;
      background: #FFFFFF;
    }

    #settingsView > .category-config-list + div {
      display: flex;
      margin-top: 24px;
    }

    #settingsView > .category-config-list + div > .outline-button {
      width: auto;
      border-color: rgba(96, 96, 96, 0.52);
      border-radius: 9px;
      padding: 8px 14px;
    }

    #settingsView > .category-config-list + div > .add-category-panel {
      width: min(100%, 360px);
      margin-top: 0;
    }

    .config-tag {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 45px;
      padding: 5px 3px 5px 9px;
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
    }

    .config-tag-name {
      min-width: 0;
      flex: 1;
      cursor: default;
      overflow-wrap: anywhere;
    }

    .config-tag-actions {
      position: relative;
      display: flex;
      flex-shrink: 0;
      align-items: center;
    }

    .config-tag-editor {
      display: flex;
      align-items: center;
      min-height: 45px;
      padding: 6px 8px;
    }

    .config-tag-editor .inline-input {
      width: 100%;
    }

    .config-tags-empty {
      color: var(--muted);
      padding: 10px 9px;
      font-size: 13px;
    }

    .tag-detail-overlay {
      position: fixed;
      inset: 0;
      z-index: 13000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(26, 26, 26, 0.32);
    }

    .tag-detail-panel {
      width: min(100%, 440px);
      max-height: calc(100dvh - 40px);
      overflow-y: auto;
      border-radius: 14px;
      background: var(--paper);
      padding: 20px;
      box-shadow: 0 14px 40px rgba(26, 26, 26, 0.18);
    }

    .tag-detail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .tag-detail-title {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .tag-detail-close {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 21px;
      line-height: 1;
    }

    .tag-detail-close:hover {
      background: rgba(26, 26, 26, 0.045);
      color: var(--text);
    }

    .tag-detail-fields {
      display: grid;
      gap: 18px;
    }

    .tag-detail-field {
      display: grid;
      gap: 7px;
    }

    .tag-detail-label {
      color: var(--muted);
      font-size: 13px;
    }

    .tag-detail-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      color: var(--text);
      padding: 9px 11px;
      outline: none;
    }

    .tag-detail-input:focus {
      border-color: var(--accent);
    }

    .tag-trigger-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-height: 28px;
    }

    .tag-trigger-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 28px;
      border: 1px solid rgba(224, 221, 216, 0.82);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      padding: 3px 5px 3px 10px;
      font-size: 13px;
    }

    .tag-trigger-remove {
      display: grid;
      width: 22px;
      height: 22px;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }

    .tag-trigger-remove:hover {
      background: rgba(26, 26, 26, 0.05);
      color: var(--text);
    }

    .tag-trigger-empty {
      color: var(--muted);
      font-size: 13px;
    }

    .tag-trigger-add-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .tag-trigger-add {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 8px 13px;
      cursor: pointer;
    }

    .tag-trigger-add:hover {
      border-color: var(--accent);
    }

    .tag-detail-error {
      min-height: 18px;
      color: #C87B7B;
      font-size: 13px;
    }

    .tag-detail-actions {
      margin-top: 2px;
    }

    .add-category-panel {
      display: grid;
      gap: 10px;
      margin-top: 16px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
    }

    .color-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border: 2px solid transparent;
      border-radius: 999px;
      cursor: pointer;
    }

    .color-swatch.is-selected {
      border-color: var(--text);
    }

    .add-category-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      color: var(--muted);
      text-align: center;
    }

    .empty-title {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 500;
    }

    .empty-subtitle {
      margin: 0;
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .page {
        width: 100%;
        padding-top: 0;
      }

      .outline-button {
        width: 100%;
      }

      .summary-table {
        padding: 14px;
      }

      .record {
        column-gap: 10px;
      }

      .form-line {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .sync-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .sync-actions,
      .sync-status-row {
        padding-left: 0;
      }

      .tag-detail-overlay {
        align-items: flex-end;
        padding: 0;
      }

      .tag-detail-panel {
        width: 100%;
        max-height: calc(100dvh - 16px);
        border-radius: 16px 16px 0 0;
        padding: 18px 20px calc(28px + env(safe-area-inset-bottom));
      }
    }

    @media (max-width: 480px) {
      .record {
        column-gap: 8px;
        padding: 12px 0;
      }
    }
  </style>
</head>

      <section id="recordsArea" aria-live="polite"></section>
      <footer class="app-footer" id="appFooter">

      <div class="date-swipe-overlay is-hidden" id="dateSwipeOverlay" aria-hidden="true">

      </div>

    <section class="settings-view is-hidden" id="settingsView"></section>

    <div class="calendar-import-overlay is-hidden" id="calendarImportOverlay" role="dialog" aria-modal="true" aria-labelledby="calendarImportTitle">

    <div class="export-range-overlay is-hidden" id="exportRangeOverlay" role="dialog" aria-modal="true" aria-labelledby="exportRangeTitle">

    <div class="ctx-overlay is-hidden" id="ctxOverlay"></div>

        <div class="sheet-actions">

          </div>
          <button class="sheet-submit" type="submit">记录</button>

          <button class="panel-cancel" id="cancelBackfill" type="button">取消</button>
        </div>
      </div>
    </div>
  </main>

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getWeekStart(date) {
      const start = startOfDay(date);
      const day = start.getDay();
      start.setDate(start.getDate() + (day === 0 ? -6 : 1 - day));
      return start;
    }

    function offsetDate(date, days) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate() + days);
    }

    function isSameDate(first, second) {
      return first.getFullYear() === second.getFullYear()
        && first.getMonth() === second.getMonth()
        && first.getDate() === second.getDate();
    }

    function formatDateLabel(date) {
      const weekdays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${weekdays[date.getDay()]}`;
    }

    function formatShortDateLabel(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function formatTime(date) {
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      return `${hours}:${minutes}`;
    }

    function timeToMinutes(time) {
      const [hours, minutes] = time.split(":").map(Number);
      return hours * 60 + minutes;
    }

    function minutesToTime(totalMinutes) {
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
    }

    function formatDuration(totalMinutes) {
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;

      if (hours === 0) return `${minutes} min`;
      if (minutes === 0) return `${hours} h`;
      return `${hours} h ${minutes} min`;
    }

    function durationBetween(startTime, endTime) {
      const start = timeToMinutes(startTime);
      let end = timeToMinutes(endTime);
      if (end < start) end += 24 * 60;
      return end - start;
    }

    function durationFromPreviousDay(startTime, endTime) {
      return (24 * 60 - timeToMinutes(startTime)) + timeToMinutes(endTime);
    }

    function summaryTextForRecords(records, date) {
      if (records.length === 0) return "";
      const totalMinutes = records.reduce((total, record, index) => {
        return total + (getRecordInterval(records, index, date)?.duration || 0);
      }, 0);
      return totalMinutes > 0
        ? `${records.length} 条 · ${formatDuration(totalMinutes)}`
        : `${records.length} 条 · —`;
    }

    function getTimePeriod(time) {
      const hour = Number(time.split(":")[0]);
      if (hour < 6) return "夜间";
      if (hour < 12) return "早上";
      if (hour < 18) return "下午";
      return "晚上";
    }

    const periodOrder = ["晚上", "下午", "早上", "夜间"];

    function groupRecordsByPeriod(records) {
      return records.reduce((groups, record, index) => {
        const period = getTimePeriod(record.time);
        if (!groups[period]) groups[period] = [];
        groups[period].push({ record, index });
        return groups;
      }, {});
    }

    function daysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function fillSelect(select, values, selectedValue) {
      select.replaceChildren();
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = String(value);
        option.textContent = String(value).padStart(2, "0");
        option.selected = Number(value) === Number(selectedValue);
        select.append(option);
      });
    }

    function setDateSelectors(yearSelect, monthSelect, daySelect, date) {
      const currentYear = today.getFullYear();
      fillSelect(yearSelect, [currentYear - 1, currentYear, currentYear + 1], date.getFullYear());
      fillSelect(monthSelect, Array.from({ length: 12 }, (_, index) => index + 1), date.getMonth() + 1);
      fillSelect(daySelect, Array.from({ length: daysInMonth(date.getFullYear(), date.getMonth() + 1) }, (_, index) => index + 1), date.getDate());
    }

    function refreshDaySelector(yearSelect, monthSelect, daySelect) {
      const year = Number(yearSelect.value);
      const month = Number(monthSelect.value);
      const currentDay = Math.min(Number(daySelect.value) || 1, daysInMonth(year, month));
      fillSelect(daySelect, Array.from({ length: daysInMonth(year, month) }, (_, index) => index + 1), currentDay);
    }

    function dateFromSelectors(yearSelect, monthSelect, daySelect) {
      return startOfDay(new Date(Number(yearSelect.value), Number(monthSelect.value) - 1, Number(daySelect.value)));
    }

    function isValidTimeInput(time) {
      if (!/^\d{2}:\d{2}$/.test(time)) return false;
      const [hours, minutes] = time.split(":").map(Number);
      return hours >= 0 && hours <= 23 && minutes >= 0 && minutes <= 59;
    }

    function createStableId(prefix) {
      const value = globalThis.crypto?.randomUUID
        ? globalThis.crypto.randomUUID()
        : `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 12)}`;
      return `${prefix}_${value}`;
    }

    function stableStringHash(value, seed = 2166136261) {
      let hash = seed >>> 0;
      for (let index = 0; index < value.length; index += 1) {
        hash ^= value.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return (hash >>> 0).toString(36);
    }

    function legacyRecordFingerprint(record) {
      return JSON.stringify({
        time: record.time || null,
        startTime: record.startTime || null,
        text: record.text || null,
        category: record.category || null,
        note: record.note || null,
        tags: Array.isArray(record.tags) ? record.tags : [],
        isBackfill: record.isBackfill || false,
        isSplit: record.isSplit || false
      });
    }

    function createLegacyRecordId(record, identityHint = "") {
      const fingerprint = `${identityHint}|${legacyRecordFingerprint(record)}`;
      return `rec_legacy_${stableStringHash(fingerprint)}_${stableStringHash(fingerprint, 3339675911)}`;
    }

    function normalizeStableId(value, prefix, usedIds = null) {
      let id = typeof value === "string" ? value.trim() : "";
      if (!id || usedIds?.has(id)) {
        do {
          id = createStableId(prefix);
        } while (usedIds?.has(id));
      }
      usedIds?.add(id);
      return id;
    }

    function normalizeTagConfig(tag, usedTagIds = null, fallbackId = null) {
      if (typeof tag === "string") {
        return {
          id: normalizeStableId(fallbackId, "tag", usedTagIds),
          name: tag,
          triggers: []
        };
      }

      if (!tag || typeof tag !== "object" || !tag.name) return null;

      const triggers = Array.isArray(tag.triggers)
        ? tag.triggers
        : (Array.isArray(tag.keywords) ? tag.keywords : []);

      return {
        ...tag,
        id: normalizeStableId(tag.id || fallbackId, "tag", usedTagIds),
        name: String(tag.name),
        triggers: [...new Set(triggers.map((trigger) => String(trigger).trim()).filter(Boolean))]
      };
    }

    function normalizeCategoryConfig(config) {
      const source = config && Array.isArray(config.categories)
        ? config
        : cloneDefaultCategoryConfig();
      const usedCategoryIds = new Set();
      const usedTagIds = new Set();

      return {
        ...source,
        schemaVersion: Number.isInteger(source.schemaVersion)
          ? Math.max(source.schemaVersion, dataSchemaVersion)
          : dataSchemaVersion,
        categories: source.categories
          .filter((category) => category && category.name && category.color)
          .map((category) => ({
            ...category,
            id: normalizeStableId(category.id || getDefaultCategoryId(category.name), "cat", usedCategoryIds),
            name: String(category.name),
            color: String(category.color),
            tags: Array.isArray(category.tags)
              ? category.tags.map((tag) => {
                const tagName = typeof tag === "string" ? tag : tag?.name;
                return normalizeTagConfig(tag, usedTagIds, getDefaultTagId(category.name, tagName));
              }).filter(Boolean)
              : []
          }))
      };
    }

    function loadCategoryConfig() {
      const storedConfig = localStorage.getItem("category_config");
      if (!storedConfig) {
        const defaultConfig = normalizeCategoryConfig(cloneDefaultCategoryConfig());
        saveCategoryConfig(defaultConfig);
        return defaultConfig;
      }

      try {
        return normalizeCategoryConfig(JSON.parse(storedConfig));
      } catch {
        const defaultConfig = cloneDefaultCategoryConfig();
        saveCategoryConfig(defaultConfig);
        return defaultConfig;
      }
    }

    function saveCategoryConfig(config) {
      localStorage.setItem("category_config", JSON.stringify(normalizeCategoryConfig(config)));
      markLocalDataChanged();

    function getCategories() {
      return loadCategoryConfig().categories;
