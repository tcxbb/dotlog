    function buildRenderedTable(records, date) {
      const tableData = buildTimeRows(records, date);
      if (tableData.rows.length === 0) {
        return null;
      }

      const table = document.createElement("div");
      table.className = "summary-table";

      const tableWrap = document.createElement("div");
      tableWrap.className = "table-wrap";

      const timeTable = document.createElement("table");
      timeTable.className = "time-table";
      timeTable.innerHTML = `
        <thead>
          <tr>
            <th class="col-index">#</th>
            <th class="col-time">开始</th>
            <th class="col-time">结束</th>
            <th class="col-duration">时长</th>
            <th class="col-category">分类</th>
            <th class="col-tags">标签</th>
            <th class="col-event">事件</th>
            <th class="col-note">备注</th>
          </tr>
        </thead>
      `;

      const tbody = document.createElement("tbody");
      tableData.rows.forEach((row) => {
        const tr = document.createElement("tr");
        const cells = [
          row.index,
          row.start,
          row.end,
          formatDuration(row.duration),
          row,
          row,
          row,
          row.note
        ];

        cells.forEach((value, cellIndex) => {
          const td = document.createElement("td");

          if (cellIndex === 4) {
            if (value.displayCategory) {
              td.append(createCategoryBadge(value.displayCategory));
            } else {
              const empty = document.createElement("span");
              empty.className = "empty-category";
              empty.textContent = "—";
              td.append(empty);
            }
          } else if (cellIndex === 5) {
            if (value.displayCategory && value.displayTags.length > 0) {
              const tableLabels = document.createElement("div");
              tableLabels.className = "label-stack";
              tableLabels.style.justifyContent = "flex-start";
              value.displayTags.forEach((tag) => {
                tableLabels.append(createTagBadge(tag, value.displayCategory, -1));
              });
              td.append(tableLabels);
            } else {
              const empty = document.createElement("span");
              empty.className = "empty-category";
              empty.textContent = "—";
              td.append(empty);
            }
          } else if (cellIndex === 6) {
            td.textContent = value.text;
          } else if (cellIndex === 7) {
            if (value) {
              td.className = "table-note";
              td.textContent = value;
            } else {
              const empty = document.createElement("span");
              empty.className = "empty-category";
              empty.textContent = "—";
              td.append(empty);
            }
          } else {
            td.textContent = value;
          }

          tr.append(td);
        });

        tbody.append(tr);
      });

      timeTable.append(tbody);
      tableWrap.append(timeTable);

      const total = document.createElement("p");
      total.className = "table-total";
      total.textContent = `合计：${formatDuration(tableData.totalMinutes)}（共 ${tableData.rows.length} 条）`;

      table.append(tableWrap, total);
      return table;
    }

    function buildDateRecordsContent(date, interactive = true) {
      const records = loadRecords(date);

      if (records.length === 0) {
        const emptyWrap = document.createElement("div");
        emptyWrap.className = "empty";
        emptyWrap.innerHTML = `
          <div>
            <p class="empty-title">还没有记录</p>
            <p class="empty-subtitle">发生了什么，就写下来</p>
          </div>
        `;
        return emptyWrap;
      }

      const list = document.createElement("ul");
      list.className = "list";
      const groups = groupRecordsByPeriod(records);

      periodOrder.forEach((period) => {
        if (!groups[period]?.length) return;

        const header = document.createElement("li");
        header.className = "period-header";
        header.textContent = period;
        list.append(header);

        groups[period].forEach(({ record, index }) => {
          const item = document.createElement("li");
          item.className = "record";
          item.dataset.index = String(index);

          const classificationDraft = interactive && (isCategoryOpen(index) || isTagOpen(index))
            ? getClassificationDraft(index, record)
            : interactive
              ? classificationDrafts[index]
              : null;
          const displayCategory = classificationDraft
            ? classificationDraft.category
            : resolveRecordCategoryName(record);
          const displayTags = classificationDraft
            ? classificationDraft.tags
            : resolveRecordTagNames(record);
          const displayColor = displayCategory ? categoryColor(displayCategory) : null;
          const interval = getRecordInterval(records, index, date);
          const durationText = interval ? formatDuration(interval.duration) : "—";

          const bar = document.createElement("div");
          bar.className = "record-bar";
          bar.style.background = displayColor || "var(--border)";

          const body = document.createElement("div");
          body.className = "record-body";

          const mainRow = document.createElement("div");
          mainRow.className = "record-main";

          const title = document.createElement("span");
          title.className = "record-title";
          title.textContent = record.text;
          mainRow.append(title);

          if (displayTags.length > 0) {
            const tags = document.createElement("span");
            tags.className = "record-tags";
            tags.textContent = displayTags.map((tag) => `#${tag}`).join(" ");
            mainRow.append(tags);
          }

          const subRow = document.createElement("div");
          subRow.className = "record-sub";

          if (displayCategory) {
            if (interactive) {
              const category = document.createElement("button");
              category.className = "record-category";
              category.type = "button";
              category.style.color = displayColor || "var(--muted)";
              category.textContent = displayCategory;
              category.addEventListener("click", () => {
                openCategorySelection(index, record);
              });
              subRow.append(category);
            } else {
              const category = document.createElement("span");
              category.className = "record-category";
              category.style.color = displayColor || "var(--muted)";
              category.textContent = displayCategory;
              subRow.append(category);
            }
          }

          const duration = document.createElement("span");
          duration.className = "record-duration";
          duration.textContent = displayCategory ? ` · ${durationText}` : durationText;
          subRow.append(duration);

          body.append(mainRow, subRow);

          if (record.note) {
            const note = document.createElement("div");
            note.className = "record-note";
            note.textContent = record.note;
            body.append(note);
          }

          const time = document.createElement("div");
          time.className = "record-time";

          const startTime = document.createElement("span");
          startTime.className = "record-time-start";
          startTime.textContent = interval?.startTime || record.time;
          if (interval?.isCrossDay) startTime.title = "前一天的开始时间";

          if (interval) {
            const endTime = document.createElement("span");
            endTime.className = "record-time-end";
            endTime.textContent = record.time;
            time.append(endTime);
          }

          time.append(startTime);

          if (interactive && editingRecordIndex !== index && canExtendRecordToNow(record, index, date)) {
            const extendButton = document.createElement("button");
            extendButton.className = "extend-to-now-button";
            extendButton.type = "button";
            extendButton.textContent = "⤴";
            extendButton.setAttribute("aria-label", "延长到现在");
            extendButton.title = "延长到现在";
            extendButton.addEventListener("click", (event) => {
              event.stopPropagation();
              extendRecordToNow(index);
            });
            time.append(extendButton);
          }

          if (interactive && isCategoryOpen(index)) {
            body.append(createCategoryPicker(record, index));
          }

          if (interactive && displayCategory && isTagOpen(index)) {
            body.append(createTagPicker(record, index));
          }

          if (interactive && editingRecordIndex === index && editDraft) {
            body.append(createEditPanel(index));
          }

          if (interactive) {
            let longPressTriggered = false;
            let longPressResetTimer = null;
            item.addEventListener("touchstart", (event) => {
              if (event.target.closest("button, input, select, textarea")) return;
              clearTimeout(longPressTimer);
              clearTimeout(longPressResetTimer);
              longPressTriggered = false;
              longPressTimer = setTimeout(() => {
                longPressTriggered = true;
                if (navigator.vibrate) navigator.vibrate(40);
                openCtxMenu(index, record, item);
              }, 500);
            }, { passive: true });
            item.addEventListener("touchend", () => {
              clearTimeout(longPressTimer);
              if (longPressTriggered) {
                longPressResetTimer = setTimeout(() => {
                  longPressTriggered = false;
                }, 700);
              }
            }, { passive: true });
            item.addEventListener("touchmove", () => {
              clearTimeout(longPressTimer);
            }, { passive: true });
            item.addEventListener("touchcancel", () => {
              clearTimeout(longPressTimer);
              longPressTriggered = false;
            }, { passive: true });
            item.addEventListener("click", (event) => {
              if (!longPressTriggered) return;
              event.preventDefault();
              event.stopPropagation();
              longPressTriggered = false;
            });
            item.addEventListener("contextmenu", (event) => {
              event.preventDefault();
              openCtxMenu(index, record, item);
            });
          }

          item.append(bar, body, time);
          list.append(item);

          if (interval?.gapMinutes > 0) {
            const gap = document.createElement("li");
            gap.className = "record-gap";
            gap.setAttribute("aria-label", `空白时间 ${formatDuration(interval.gapMinutes)}`);
            const spacer = document.createElement("span");
            const gapDuration = document.createElement("span");
            gapDuration.className = "record-gap-duration";
            gapDuration.textContent = `空白 ${formatDuration(interval.gapMinutes)}`;
            gap.append(spacer, gapDuration);
            list.append(gap);
          }
        });
      });

      return list;
    }

    function renderDatePageContent(date, interactive = true, includeTable = tableExpanded) {
      const records = loadRecords(date);
      const tableContent = includeTable ? buildRenderedTable(records, date) : null;
      const recordsContent = buildDateRecordsContent(date, interactive);
      const summaryText = summaryTextForRecords(records, date);
      return { records, tableContent, recordsContent, summaryText };
    }

    function createDateSwipeSlide(date, includeTable = false) {
      const slide = document.createElement("div");
      slide.className = "date-swipe-slide";
      const content = renderDatePageContent(date, false, includeTable);

      const tools = document.createElement("section");
      tools.className = "table-tools";
      const status = document.createElement("span");
      status.className = "export-status";
      status.setAttribute("aria-hidden", "true");
      const tableHolder = document.createElement("div");
      if (content.tableContent) tableHolder.append(content.tableContent);
      tools.append(status, tableHolder);

      const recordsSection = document.createElement("section");
      recordsSection.append(content.recordsContent);

      const footer = document.createElement("footer");
      footer.className = "app-footer";
      footer.innerHTML = `<span class="app-footer-brand">Dotlog</span> · daily time log`;

      slide.append(tools, recordsSection, footer);
      return slide;
    }

    function preparePageSwipeOverlay() {
      dateSwipeTrack.replaceChildren(
        createDateSwipeSlide(offsetDate(viewedDate, -1), false),
        createDateSwipeSlide(viewedDate, tableExpanded),
        createDateSwipeSlide(offsetDate(viewedDate, 1), false)
      );
      datePageHost.classList.add("is-swipe-previewing");
      dateSwipeOverlay.classList.remove("is-hidden");
      const { stride } = getPageSwipeMetrics();
      dateSwipeTrack.style.transition = "none";
      dateSwipeTrack.style.transform = `translate3d(${-stride}px, 0, 0)`;
      pageSwipeCurrentX = 0;
    }

    function resetPageSwipeOverlay() {
      dateSwipeTrack.style.transition = "none";
      dateSwipeTrack.style.transform = "";
      dateSwipeTrack.replaceChildren();
      dateSwipeOverlay.classList.add("is-hidden");
      datePageHost.classList.remove("is-swipe-previewing");
      pageSwipeCurrentX = 0;
    }

    function setPageSwipeTrack(offsetX, transition = "none") {
      const { stride } = getPageSwipeMetrics();
      dateSwipeTrack.style.transition = transition;
      dateSwipeTrack.style.transform = `translate3d(${offsetX - stride}px, 0, 0)`;
      pageSwipeCurrentX = offsetX;
    }

    function getPageSwipeMetrics() {
      const width = Math.max(datePageHost.clientWidth, 1);
      const gapValue = getComputedStyle(dateSwipeOverlay).getPropertyValue("--date-swipe-gap").trim();
      const gap = Number.parseFloat(gapValue) || 0;
      return {
        width,
        gap,
        stride: width + gap
      };
    }

    function resetPageSwipePosition(animate = true) {
      if (dateSwipeOverlay.classList.contains("is-hidden")) return;
      setPageSwipeTrack(
        0,
        animate ? "transform 0.34s cubic-bezier(0.2, 0.78, 0.2, 1)" : "none"
      );

      if (animate) {
        setTimeout(() => {
          if (pageSwipeAnimating || pageSwipeTracking) return;
          resetPageSwipeOverlay();
          unlockPageSwipeScroll();
        }, 360);
      } else {
        resetPageSwipeOverlay();
        unlockPageSwipeScroll();
      }
    }

    function finishPageSwipe(dayOffset, exitDirection) {
      if (pageSwipeAnimating) return;
      pageSwipeAnimating = true;
      const { stride } = getPageSwipeMetrics();
      const startX = Math.max(-stride, Math.min(stride, pageSwipeCurrentX));
      const targetX = exitDirection * stride;
      const remainingRatio = Math.min(1, Math.abs(targetX - startX) / stride);
      const duration = Math.max(180, Math.round(300 * remainingRatio));

      setPageSwipeTrack(startX, "none");

      requestAnimationFrame(() => {
        let completed = false;
        let completionTimer = null;
        const finishSwipe = (event) => {
          if (completed || (event && (event.target !== dateSwipeTrack || event.propertyName !== "transform"))) return;
          completed = true;
          dateSwipeTrack.removeEventListener("transitionend", finishSwipe);
          if (completionTimer !== null) clearTimeout(completionTimer);

          setViewedDate(offsetDate(viewedDate, dayOffset));
          requestAnimationFrame(() => {
            resetPageSwipeOverlay();
            unlockPageSwipeScroll();
            pageSwipeAnimating = false;
          });
        };

        dateSwipeTrack.addEventListener("transitionend", finishSwipe);
        setPageSwipeTrack(
          targetX,
          `transform ${duration}ms cubic-bezier(0.2, 0.78, 0.2, 1)`
        );
        completionTimer = setTimeout(() => finishSwipe(), duration + 120);
      });
    }

    function canStartPageSwipe(target) {
      if (settingsMode !== "main" || weekSwipeAnimating || pageSwipeAnimating) return false;
      if (!target || !(target instanceof Element)) return false;
      if (!bottomSheet.classList.contains("is-hidden")) return false;
      if (!sheetOverlay.classList.contains("is-hidden")) return false;
      if (!ctxOverlay.classList.contains("is-hidden")) return false;
      if (!timePickerOverlay.classList.contains("is-hidden")) return false;
      if (!calendarImportOverlay.classList.contains("is-hidden")) return false;
      if (!exportRangeOverlay.classList.contains("is-hidden")) return false;
      if (!calendarMenu.classList.contains("is-hidden")) return false;
      if (target.closest(".week-nav, .header-actions, .month-title, .settings-view")) return false;
      if (target.closest("button, input, select, textarea, label, a")) return false;
      if (target.closest(".table-wrap")) return false;
      if (target.closest(".ctx-menu, .bottom-sheet, .time-picker, .calendar-import-panel, .export-range-panel")) return false;
      return true;
    }

    function completeWeekSwipe(dayOffset, exitDirection) {
      if (weekSwipeAnimating) return;
      weekSwipeAnimating = true;
      const width = Math.max(weekNav.clientWidth, 1);
      const startX = Math.max(-width, Math.min(width, weekSwipeCurrentX));
      const targetX = exitDirection * width;
      const remainingRatio = Math.min(1, Math.abs(targetX - startX) / width);
      const duration = Math.max(90, Math.round(220 * remainingRatio));

      weekDays.classList.remove("is-dragging");
      weekDays.style.transition = "none";
      weekDays.style.transform = `translate3d(${startX}px, 0, 0)`;
      weekDays.style.opacity = "1";

      requestAnimationFrame(() => {
        let completionTimer = null;
        let completed = false;
        const finishWeekSwipe = (event) => {
          if (completed || (event && (event.target !== weekDays || event.propertyName !== "transform"))) return;
          completed = true;
          weekDays.removeEventListener("transitionend", finishWeekSwipe);
          if (completionTimer !== null) clearTimeout(completionTimer);

          viewedDate = offsetDate(viewedDate, dayOffset);
          currentWeekStart = getWeekStart(viewedDate);
          resetDateViewState();
          weekSwipeCurrentX = 0;

          // Keep transitions disabled while the three slides are rebuilt at the
          // centered position. Re-enabling them in this same frame can make
          // WebKit animate the reset from ±100% to 0 a second time.
          weekDays.style.transition = "none";
          weekDays.style.transform = "translate3d(0, 0, 0)";
          weekDays.style.opacity = "1";
          render();
          weekSwipeAnimating = false;

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              if (weekSwipeAnimating) return;
              weekDays.style.removeProperty("transition");
              weekDays.style.removeProperty("transform");
              weekDays.style.removeProperty("opacity");
            });
          });
        };

        weekDays.addEventListener("transitionend", finishWeekSwipe);
        weekDays.style.transition = `transform ${duration}ms cubic-bezier(0.22, 0.72, 0.2, 1)`;
        weekDays.style.transform = `translate3d(${targetX}px, 0, 0)`;
        weekSwipeCurrentX = targetX;
        completionTimer = setTimeout(() => finishWeekSwipe(), duration + 120);
      });
    }

    function goToPrevWeek() {
      completeWeekSwipe(-7, 1);
    }

    function goToNextWeek() {
      completeWeekSwipe(7, -1);
    }

    function getClassificationDraft(index, record) {
      if (!classificationDrafts[index]) {
        const resolvedCategory = resolveRecordCategory(record);
        const resolvedTags = resolveRecordTags(record);
        classificationDrafts[index] = {
          category: resolveRecordCategoryName(record) || null,
          tags: resolveRecordTagNames(record),
          categoryId: resolvedCategory?.id || normalizeReferenceId(record.categoryId),
          tagIds: resolvedTags.length > 0
            ? resolvedTags.map((tag) => tag.id)
            : (Array.isArray(record.tagIds) ? [...record.tagIds] : [])
        };
      }

      return classificationDrafts[index];
    }

    function discardClassificationDraft(index) {
      delete classificationDrafts[index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function commitClassificationDraft(index) {
      const draft = classificationDrafts[index];
      if (!draft) return;

      const records = loadRecords(viewedDate);
      if (!records[index]) return;

      Object.assign(
        records[index],
        resolveClassificationFields({
          category: draft.category,
          tags: draft.category ? [...draft.tags] : [],
          categoryId: draft.categoryId,
          tagIds: draft.tagIds
        }, records[index])
      );
      saveRecords(viewedDate, records);
      delete classificationDrafts[index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function openCategorySelection(index, record) {
      getClassificationDraft(index, record);
      openCategoryIndexes = [index];
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function openTagSelection(index, record) {
      getClassificationDraft(index, record);
      openTagIndexes = [index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function updateRecordCategory(date, index, category, keepPickerOpen = false) {
      const records = loadRecords(date);
      if (!records[index]) return;

      Object.assign(
        records[index],
        resolveClassificationFields({
          category,
          tags: [],
          categoryId: findCategoryByName(category)?.id || null,
          tagIds: []
        }, records[index])
      );
      saveRecords(date, records);
      delete classificationDrafts[index];
      openCategoryIndexes = [...new Set([...openCategoryIndexes, index])];
      openTagIndexes = category
        ? [...new Set([...openTagIndexes, index])]
        : openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function updateRecordTags(date, index, tags, keepPickerOpen = true) {
      const records = loadRecords(date);
      if (!records[index]) return;

      Object.assign(
        records[index],
        resolveClassificationFields({
          category: records[index].category,
          tags,
          categoryId: records[index].categoryId,
          tagIds: records[index].tagIds
        }, records[index])
      );
      saveRecords(date, records);
      delete classificationDrafts[index];
      openTagIndexes = keepPickerOpen
        ? [...new Set([...openTagIndexes, index])]
        : openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function isCategoryOpen(index) {
      return openCategoryIndexes.includes(index);
    }

    function isTagOpen(index) {
      return openTagIndexes.includes(index);
    }

    function openCtxMenu(index, record, recordEl) {
      window.getSelection()?.removeAllRanges();
      ctxTargetIndex = index;
      ctxTargetRecord = record;
      ctxOverlay.classList.remove("is-hidden");
      ctxMenu.classList.remove("is-hidden");

      const rect = recordEl.getBoundingClientRect();
      const preferredWidth = 156;
      const minWidth = 136;
      const maxLeft = Math.max(16, window.innerWidth - minWidth - 16);
      const menuLeft = Math.min(Math.max(16, Math.round(rect.left)), maxLeft);
      const menuWidth = Math.min(preferredWidth, window.innerWidth - menuLeft - 16);
      ctxMenu.style.left = `${menuLeft}px`;
      ctxMenu.style.width = `${menuWidth}px`;
      ctxMenu.style.right = "";
      ctxMenu.style.top = `${rect.bottom + 8}px`;

      requestAnimationFrame(() => {
        const menuHeight = ctxMenu.offsetHeight;
        if (rect.bottom + 8 + menuHeight > window.innerHeight - 16) {
          ctxMenu.style.top = `${rect.top - menuHeight - 8}px`;
        }
      });
    }

    function closeCtxMenu() {
      clearTimeout(longPressTimer);
      ctxOverlay.classList.add("is-hidden");
      ctxMenu.classList.add("is-hidden");
      ctxTargetIndex = null;
      ctxTargetRecord = null;
    }

    function createCategoryBadge(categoryName, options = {}) {
      const badge = document.createElement(options.button ? "button" : "span");
      badge.className = "category-pill";
      badge.style.backgroundColor = categoryColor(categoryName);
      badge.textContent = categoryName;

      if (options.button) {
        badge.classList.add("is-button");
        badge.type = "button";
        badge.setAttribute("aria-label", `重新选择分类 ${categoryName}`);
      }

      return badge;
    }

    function createTagBadge(tagName, categoryName, index, options = {}) {
      const badge = document.createElement(options.button ? "button" : "span");
      badge.className = "category-pill";
      badge.style.backgroundColor = categoryColor(categoryName);
      badge.textContent = tagName;

      if (options.button) {
        badge.classList.add("is-button");
        badge.type = "button";
        badge.setAttribute("aria-label", `重新选择标签 ${tagName}`);
      }

      return badge;
    }

    function createCategoryPicker(record, index) {
      const picker = document.createElement("div");
      picker.className = "category-picker";
      const draft = classificationDrafts[index] || null;

      getCategories().forEach((category) => {
        const button = document.createElement("button");
        button.className = "category-option";
        button.type = "button";
        button.textContent = category.name;
        if (draft && draft.category === category.name) {
          button.classList.add("is-selected");
          button.style.backgroundColor = category.color;
          button.style.borderColor = category.color;
        }
        button.addEventListener("click", () => {
          if (!draft) {
            updateRecordCategory(viewedDate, index, category.name);
            return;
          }

          Object.assign(draft, resolveClassificationFields({
            category: category.name,
            tags: [],
            categoryId: category.id,
            tagIds: []
          }, record));
          openTagIndexes = [...new Set([...openTagIndexes, index])];
          render();
        });
        picker.append(button);
      });

      if (draft && draft.category) {
        const clearButton = document.createElement("button");
        clearButton.className = "skip-category";
        clearButton.type = "button";
        clearButton.textContent = "清除";
        clearButton.addEventListener("click", () => {
          Object.assign(draft, resolveClassificationFields({
            category: null,
            tags: [],
            categoryId: null,
            tagIds: []
          }, record));
          commitClassificationDraft(index);
        });
        picker.append(clearButton);
      }

      const skipButton = document.createElement("button");
      skipButton.className = "skip-category";
      skipButton.type = "button";
      skipButton.textContent = "跳过";
      skipButton.addEventListener("click", () => {
        if (draft) {
          discardClassificationDraft(index);
        } else {
          openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
          render();
        }
      });

      picker.append(skipButton);
      return picker;
    }

    function createTagPicker(record, index) {
      const picker = document.createElement("div");
      picker.className = "tag-picker";
      const draft = getClassificationDraft(index, record);
      const activeCategory = draft.category || resolveRecordCategoryName(record);
      const activeTags = draft.tags;

      const prompt = document.createElement("div");
      prompt.className = "tag-prompt";
      prompt.textContent = "选择标签（可多选）：";
      picker.append(prompt);

      getCategoryTags(activeCategory).forEach((tag) => {
        const button = document.createElement("button");
        button.className = "tag-option";
        button.type = "button";
        button.textContent = tag;

        if (activeTags.includes(tag)) {
          button.classList.add("is-selected");
          button.style.backgroundColor = categoryColor(activeCategory);
          button.style.borderColor = categoryColor(activeCategory);
        }

        button.addEventListener("click", () => {
          const nextTags = draft.tags.includes(tag)
            ? draft.tags.filter((item) => item !== tag)
            : [...draft.tags, tag];
          Object.assign(draft, resolveClassificationFields({
            category: activeCategory,
            tags: nextTags,
            categoryId: draft.categoryId,
            tagIds: draft.tagIds
          }, record));
          render();
        });

        picker.append(button);
      });

      const finishButton = document.createElement("button");
      finishButton.className = "finish-tags";
      finishButton.type = "button";
      finishButton.textContent = "完成";
      finishButton.addEventListener("click", () => {
        commitClassificationDraft(index);
      });

      const skipButton = document.createElement("button");
      skipButton.className = "skip-category";
      skipButton.type = "button";
      skipButton.textContent = "跳过";
      skipButton.addEventListener("click", () => {
        discardClassificationDraft(index);
      });

      const actionsRow = document.createElement("div");
      actionsRow.className = "tag-picker-actions";
      actionsRow.append(finishButton, skipButton);
      picker.append(actionsRow);
      return picker;
    }

    function startEditingRecord(index, record) {
      const interval = getRecordInterval(loadRecords(viewedDate), index, viewedDate);
      const resolvedCategory = resolveRecordCategory(record);
      const resolvedTags = resolveRecordTags(record);
      editingRecordIndex = index;
      editDraft = {
        startTime: record.startTime || interval?.startTime || record.time || "",
        time: record.time || "",
        text: record.text || "",
        note: record.note || "",
        category: resolveRecordCategoryName(record) || null,
        tags: resolveRecordTagNames(record),
        categoryId: resolvedCategory?.id || normalizeReferenceId(record.categoryId),
        tagIds: resolvedTags.length > 0
          ? resolvedTags.map((tag) => tag.id)
          : (Array.isArray(record.tagIds) ? [...record.tagIds] : []),
        isBackfill: record.isBackfill || false,
        isSplit: record.isSplit || false
      };
      editCategoryExpanded = false;
      editTagsExpanded = false;
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function cancelEditingRecord() {
      closeTimePicker();
      editingRecordIndex = null;
      editDraft = null;
      editCategoryExpanded = false;
      editTagsExpanded = false;
      render();
    }

    function renderTimePickerColumn(column, count) {
      column.innerHTML = "";
      for (let value = 0; value < count; value += 1) {
        const option = document.createElement("button");
        option.className = "time-picker-option";
        option.type = "button";
        option.dataset.value = String(value);
        option.textContent = String(value).padStart(2, "0");
        option.addEventListener("click", () => selectTimePickerValue(column, value, true));
        column.append(option);
      }
    }

    function selectTimePickerValue(column, value, scroll = false) {
      const max = column === timePickerHour ? 23 : 59;
      const safeValue = Math.max(0, Math.min(max, value));
      column.querySelectorAll(".time-picker-option").forEach((option) => {
        option.classList.toggle("is-selected", Number(option.dataset.value) === safeValue);
      });
      const [hour, minute] = timePickerValue.split(":").map(Number);
      timePickerValue = column === timePickerHour
        ? `${String(safeValue).padStart(2, "0")}:${String(minute).padStart(2, "0")}`
        : `${String(hour).padStart(2, "0")}:${String(safeValue).padStart(2, "0")}`;
      if (scroll) column.scrollTo({ top: safeValue * 36, behavior: "smooth" });
    }

    function settleTimePickerColumn(column) {
      const pendingFrame = timePickerScrollFrames.get(column);
      if (pendingFrame) cancelAnimationFrame(pendingFrame);
      timePickerScrollFrames.set(column, requestAnimationFrame(() => {
        selectTimePickerValue(column, Math.round(column.scrollTop / 36));
        timePickerScrollFrames.delete(column);
      }));
    }

    function openTimePicker(target, title = "选择时间") {
      const fallback = formatTime(new Date());
      timePickerTarget = target;
      timePickerValue = isValidTimeInput(target.value) ? target.value : fallback;
      timePickerTitle.textContent = title;
      timePickerOverlay.classList.remove("is-hidden");
      timePicker.classList.remove("is-hidden");
      const [hour, minute] = timePickerValue.split(":").map(Number);
      selectTimePickerValue(timePickerHour, hour);
      selectTimePickerValue(timePickerMinute, minute);
      requestAnimationFrame(() => {
        timePickerHour.scrollTop = hour * 36;
        timePickerMinute.scrollTop = minute * 36;
      });
    }

    function closeTimePicker() {
      timePickerOverlay.classList.add("is-hidden");
      timePicker.classList.add("is-hidden");
      timePickerTarget = null;
    }

    function confirmTimePicker() {
      if (!timePickerTarget) return;
      selectTimePickerValue(timePickerHour, Math.round(timePickerHour.scrollTop / 36));
      selectTimePickerValue(timePickerMinute, Math.round(timePickerMinute.scrollTop / 36));
      const target = timePickerTarget;
      target.value = timePickerValue;
      closeTimePicker();
      target.dispatchEvent(new Event("input", { bubbles: true }));
    }

    function saveEditedRecord(index) {
      if (!editDraft || !isValidTimeInput(editDraft.startTime) || !isValidTimeInput(editDraft.time) || !editDraft.text.trim()) return;
      if (!validateEntryInterval(viewedDate, editDraft.startTime, editDraft.time)) return;

      const records = loadRecords(viewedDate);
      const original = records[index];
      if (!original) return;

      const timeChanged = editDraft.time !== original.time;
      const hasSameTime = records.some((record, recordIndex) => recordIndex !== index && record.time === editDraft.time);
      if (timeChanged && hasSameTime && !confirm("该时间已有另一条记录，是否继续保存？")) {
        return;
      }

      records[index] = {
        ...original,
        id: original.id,
        startTime: editDraft.startTime,
        time: editDraft.time,
        text: editDraft.text.trim(),
        note: editDraft.note.trim() || null,
        isBackfill: original.isBackfill || false,
        isSplit: original.isSplit || false,
        ...resolveClassificationFields({
          category: editDraft.category,
          tags: editDraft.category ? [...editDraft.tags] : [],
          categoryId: editDraft.categoryId,
          tagIds: editDraft.tagIds
        }, original)
      };

      saveRecords(viewedDate, sortRecords(records));
      editingRecordIndex = null;
      editDraft = null;
      editCategoryExpanded = false;
      editTagsExpanded = false;
      render();
    }

          getCategoryTags(editDraft.category).forEach((tag) => {
            const selected = editDraft.tags.includes(tag);
            tagOptions.append(createEditChoiceButton(tag, "tag", selected, categoryColor(editDraft.category), () => {
              const nextTags = selected
                ? editDraft.tags.filter((item) => item !== tag)
                : [...editDraft.tags, tag];
              Object.assign(editDraft, resolveClassificationFields({
                category: editDraft.category,
                tags: nextTags,
                categoryId: editDraft.categoryId,

              }));

        const validTime = isValidTimeInput(editDraft.time);

        error.classList.toggle("is-hidden", validStartTime && validTime);

      startTimeInput.addEventListener("input", () => {
        editDraft.startTime = startTimeInput.value;
        validateEditPanel();
      });
      startTimeInput.addEventListener("click", () => openTimePicker(startTimeInput, "选择开始时间"));
      timeInput.addEventListener("input", () => {
        editDraft.time = timeInput.value.trim();
        validateEditPanel();
      });
      timeInput.addEventListener("click", () => openTimePicker(timeInput, "选择结束时间"));
      textInput.addEventListener("input", () => {
        editDraft.text = textInput.value;
        validateEditPanel();
      });
      noteInput.addEventListener("input", () => {
        editDraft.note = noteInput.value;
      });

      cancelButton.addEventListener("click", cancelEditingRecord);

      timeFields.className = "edit-time-fields";
      const timeLabel = document.createElement("span");
      timeLabel.textContent = "时间：";

      timeRange.className = "edit-time-range";

      timeArrow.className = "time-range-arrow";
      timeArrow.setAttribute("aria-hidden", "true");
      timeArrow.textContent = "→";
      timeRange.append(startTimeInput, timeArrow, timeInput);
      timeFields.append(timeLabel, timeRange);
      actions.append(saveButton, cancelButton);
      panel.append(actions, timeFields, textLine, noteLine, error, categorySection, tagSection);
      validateEditPanel();

      setTimeout(() => textInput.focus(), 0);
      return panel;

    function categoryNameExists(name, excludeIndex = -1) {
      return getCategories().some((category, index) => index !== excludeIndex && category.name === name);
    }

    function showSettingsPage() {
      settingsMode = "settings";
      collapsedSettingsCategoryIndexes = new Set(getCategories().map((category, index) => index));
      openCategoryActionMenuIndex = null;
      openTagActionMenuKey = null;
      tagDetailDraft = null;
      tagDetailReturnScrollY = null;
      editingRecordIndex = null;
      editDraft = null;
      closeCalendarMenu();
      closeCalendarImportPanel();
      closeExportRangePanel();
      closeBottomSheet();
      pageHeader.classList.add("is-hidden");
      fab.classList.add("is-hidden");
      tableTools.classList.add("is-hidden");
      recordsArea.classList.add("is-hidden");
      appFooter.classList.add("is-hidden");
      settingsView.classList.remove("is-hidden");
      renderSettingsPage();

    function showMainPage() {
      settingsMode = "main";
      editingCategoryIndex = null;
      addingTagCategoryIndex = null;
      editingTag = null;
      addingCategory = false;
      openColorPickerIndex = null;
      collapsedSettingsCategoryIndexes = new Set();
      openCategoryActionMenuIndex = null;
      openTagActionMenuKey = null;

    function saveEditedCategoryName(index, input, originalName) {
      const nextName = input.value.trim();
      if (!nextName) {
        input.value = originalName;
        return;
      }

      if (categoryNameExists(nextName, index)) {
        alert("分类名称已存在");
        input.value = originalName;
        return;
      }

      const config = loadCategoryConfig();
      config.categories[index].name = nextName;
      saveCategoryConfig(config);
      editingCategoryIndex = null;
      renderSettingsPage();
    }

    function createInlineInput(value, onSave, onCancel) {
      const input = document.createElement("input");
      input.className = "inline-input";
      input.type = "text";
      input.value = value;

      let cancelled = false;
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          onSave(input);
        }

        if (event.key === "Escape") {
          cancelled = true;
          onCancel();
        }
      });

      input.addEventListener("blur", () => {
        if (!cancelled) onSave(input);
      });

      setTimeout(() => {
        input.focus();
        input.select();
      }, 0);

      return input;
    }

    function deleteCategory(index) {
      const config = loadCategoryConfig();
      const category = config.categories[index];
      if (!category) return;

      if (!confirm(`确认删除分类「${category.name}」？\n该分类下的所有标签也将一并删除。`)) {
        return;
      }

      config.categories.splice(index, 1);
      saveCategoryConfig(config);
      editingCategoryIndex = null;
      addingTagCategoryIndex = null;
      editingTag = null;
      openColorPickerIndex = null;
      renderSettingsPage();
    }

    function addTagToCategory(categoryIndex, input) {
      const tagName = input.value.trim();
      if (!tagName) return;

      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

      if (category.tags.some((tag) => tag.name === tagName)) {
        alert("标签已存在");
        return;
      }

      category.tags.push({ name: tagName, triggers: [] });
      saveCategoryConfig(config);
      addingTagCategoryIndex = null;
      renderSettingsPage();
    }

    function updateTagName(categoryIndex, tagIndex, input, originalName) {
      const tagName = input.value.trim();
      if (!tagName) {
        input.value = originalName;
        return;
      }

      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

      if (category.tags.some((tag, index) => index !== tagIndex && tag.name === tagName)) {
        alert("标签已存在");
        input.value = originalName;
        return;
      }

      category.tags[tagIndex].name = tagName;
      saveCategoryConfig(config);
      editingTag = null;
      renderSettingsPage();
    }

    function openTagDetailEditor(categoryIndex, tagIndex) {
      const category = loadCategoryConfig().categories[categoryIndex];
      const tag = category?.tags[tagIndex];
      if (!tag) return;

      tagDetailReturnScrollY = window.scrollY;
      tagDetailDraft = {
        categoryIndex,
        tagIndex,
        name: tag.name,
        triggers: Array.isArray(tag.triggers) ? [...tag.triggers] : [],
        error: ""
      };
      openCategoryActionMenuIndex = null;
      openTagActionMenuKey = null;
      renderSettingsPage();
    }

    function restoreTagDetailScrollPosition(scrollY) {
      if (scrollY === null) return;
      const restore = () => window.scrollTo({ top: scrollY, left: 0, behavior: "auto" });
      requestAnimationFrame(restore);
      setTimeout(restore, 320);
    }

    function closeTagDetailEditor() {
      const returnScrollY = tagDetailReturnScrollY;
      if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
      tagDetailDraft = null;
      tagDetailReturnScrollY = null;
      renderSettingsPage();
      restoreTagDetailScrollPosition(returnScrollY);
    }

    function saveTagDetailEditor() {
      if (!tagDetailDraft) return;
      const name = tagDetailDraft.name.trim();
      if (!name) {
        tagDetailDraft.error = "请输入标签名称";
        renderSettingsPage();
        return;
      }

      const config = loadCategoryConfig();
      const category = config.categories[tagDetailDraft.categoryIndex];
      const tag = category?.tags[tagDetailDraft.tagIndex];
      if (!category || !tag) {
        tagDetailDraft.error = "标签不存在，请关闭后重试";
        renderSettingsPage();
        return;
      }

      const duplicateName = category.tags.some((item, index) => (
        index !== tagDetailDraft.tagIndex && item.name === name
      ));
      if (duplicateName) {
        tagDetailDraft.error = "标签名称已存在";
        renderSettingsPage();
        return;
      }

      tag.name = name;
      tag.triggers = [...new Set(
        tagDetailDraft.triggers
          .map((trigger) => String(trigger).trim())
          .filter(Boolean)
      )];
      saveCategoryConfig(config);
      const returnScrollY = tagDetailReturnScrollY;
      if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
      tagDetailDraft = null;
      tagDetailReturnScrollY = null;
      renderSettingsPage();
      restoreTagDetailScrollPosition(returnScrollY);
    }

          });
          chip.append(text, remove);

        });
      }

      const addLabel = document.createElement("span");

      addLabel.textContent = "新增触发词";

      addRow.className = "tag-trigger-add-row";
      const triggerInput = document.createElement("input");
      triggerInput.className = "tag-detail-input";
      triggerInput.type = "text";
      triggerInput.placeholder = "输入触发词";
      triggerInput.autocomplete = "off";
      triggerInput.setAttribute("aria-label", "新增触发词");
      const addButton = document.createElement("button");
      addButton.className = "tag-trigger-add";
      addButton.type = "button";
      addButton.textContent = "添加";

      function addTrigger() {
        const trigger = triggerInput.value.trim();
        if (!trigger) {
          tagDetailDraft.error = "请输入触发词";
          renderSettingsPage();
          return;
        }
        if (tagDetailDraft.triggers.includes(trigger)) {
          tagDetailDraft.error = "触发词已存在";
          renderSettingsPage();
          return;
        }
        tagDetailDraft.triggers.push(trigger);
        tagDetailDraft.error = "";
        renderSettingsPage();

        if (event.key === "Enter") {
          event.preventDefault();

      });

    function deleteTag(categoryIndex, tagIndex) {
      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

      const tag = category.tags[tagIndex];
      if (tag === undefined || !confirm(`确认删除标签「${tag.name}」？`)) return;

      category.tags.splice(tagIndex, 1);
      saveCategoryConfig(config);
      renderSettingsPage();
    }

    function buildColorPicker(categoryIndex, currentColor) {
      const panel = document.createElement("div");
      panel.className = "color-picker-panel";
      panel.classList.toggle("is-hidden", openColorPickerIndex !== categoryIndex);
      panel.dataset.categoryIndex = String(categoryIndex);

      presetColors.forEach(({ value, label }) => {
        const option = document.createElement("button");
        option.className = "color-option";
        option.classList.toggle("is-selected", value === currentColor);
        option.type = "button";
        option.style.backgroundColor = value;
        option.setAttribute("aria-label", `${label} ${value}`);
        option.addEventListener("click", () => {
          const config = loadCategoryConfig();
          const targetCategory = config.categories[categoryIndex];
          if (!targetCategory) return;
          targetCategory.color = value;
          saveCategoryConfig(config);
          openColorPickerIndex = null;
          renderSettingsPage();
        });
        panel.append(option);
      });

      return panel;
    }

    function createSettingsCategory(category, categoryIndex) {
      const item = document.createElement("section");
      item.className = "config-category";
      const isCollapsed = collapsedSettingsCategoryIndexes.has(categoryIndex);

      const head = document.createElement("div");
      head.className = "config-category-head";

      function toggleCategory() {
        if (isCollapsed) {
          collapsedSettingsCategoryIndexes.delete(categoryIndex);
        } else {
          collapsedSettingsCategoryIndexes.add(categoryIndex);
          if (addingTagCategoryIndex === categoryIndex) addingTagCategoryIndex = null;
          if (editingTag?.categoryIndex === categoryIndex) editingTag = null;
          if (openColorPickerIndex === categoryIndex) openColorPickerIndex = null;
        }
        openCategoryActionMenuIndex = null;
        openTagActionMenuKey = null;
        renderSettingsPage();
      }

      head.addEventListener("click", (event) => {
        if (event.target.closest("button")) return;
        toggleCategory();
      });

      const nameWrap = document.createElement("div");
      nameWrap.className = "config-category-identity";

      const toggleButton = document.createElement("button");
      toggleButton.className = "config-category-toggle";
      toggleButton.type = "button";
      toggleButton.textContent = isCollapsed ? "›" : "⌄";
      toggleButton.setAttribute("aria-label", `${isCollapsed ? "展开" : "收起"}分类「${category.name}」`);
      toggleButton.setAttribute("aria-expanded", String(!isCollapsed));
      toggleButton.addEventListener("click", toggleCategory);

      const swatchButton = document.createElement("button");
      swatchButton.className = "color-swatch-btn";
      swatchButton.type = "button";
      swatchButton.dataset.categoryIndex = String(categoryIndex);
      swatchButton.style.backgroundColor = category.color;
      swatchButton.setAttribute("aria-label", `选择「${category.name}」的颜色`);
      swatchButton.setAttribute("aria-expanded", String(openColorPickerIndex === categoryIndex));
      swatchButton.addEventListener("click", () => {
        openColorPickerIndex = openColorPickerIndex === categoryIndex ? null : categoryIndex;
        renderSettingsPage();
      });
      nameWrap.append(toggleButton, swatchButton);

      if (editingCategoryIndex === categoryIndex) {
        nameWrap.append(createInlineInput(
          category.name,
          (input) => saveEditedCategoryName(categoryIndex, input, category.name),
          () => {
            editingCategoryIndex = null;
            renderSettingsPage();
          }
        ));
      } else {
        const name = document.createElement("span");
        name.className = "config-category-name";
        name.textContent = category.name;
        nameWrap.append(name);

      const actions = document.createElement("div");
      actions.className = "config-actions";

      const addTagButton = document.createElement("button");

      addTagButton.addEventListener("click", () => {

        openTagActionMenuKey = null;
        renderSettingsPage();

      const categoryMenuWrap = document.createElement("div");
      categoryMenuWrap.className = "config-action-menu-wrap";

      categoryMenuButton.className = "config-head-action";

      categoryMenuButton.textContent = "⋯";
      categoryMenuButton.setAttribute("aria-label", `分类「${category.name}」操作`);
      categoryMenuButton.setAttribute("aria-expanded", String(openCategoryActionMenuIndex === categoryIndex));
      categoryMenuButton.addEventListener("click", () => {
        openCategoryActionMenuIndex = openCategoryActionMenuIndex === categoryIndex ? null : categoryIndex;
        openTagActionMenuKey = null;
        renderSettingsPage();
      });
      categoryMenuWrap.append(categoryMenuButton);

      if (openCategoryActionMenuIndex === categoryIndex) {
        const menu = document.createElement("div");
        menu.className = "config-action-menu";
        const editButton = document.createElement("button");
        editButton.type = "button";
        editButton.textContent = "编辑名称";
        editButton.addEventListener("click", () => {
          editingCategoryIndex = categoryIndex;
          openCategoryActionMenuIndex = null;
          renderSettingsPage();
        });
        const deleteButton = document.createElement("button");
        deleteButton.className = "is-danger";
        deleteButton.type = "button";
        deleteButton.textContent = "删除分类";
        deleteButton.addEventListener("click", () => {
          openCategoryActionMenuIndex = null;
          deleteCategory(categoryIndex);

        tagMenuButton.type = "button";
        tagMenuButton.textContent = "⋯";
        tagMenuButton.setAttribute("aria-label", `标签「${tag.name}」操作`);
        tagMenuButton.setAttribute("aria-expanded", String(openTagActionMenuKey === tagMenuKey));
        tagMenuButton.addEventListener("click", () => {
          openTagActionMenuKey = openTagActionMenuKey === tagMenuKey ? null : tagMenuKey;
          openCategoryActionMenuIndex = null;
          renderSettingsPage();
        });
        tagMenuWrap.append(tagMenuButton);

        if (openTagActionMenuKey === tagMenuKey) {
          const menu = document.createElement("div");
          menu.className = "config-action-menu";

          removeButton.className = "is-danger";
          removeButton.type = "button";
          removeButton.textContent = "删除标签";
          removeButton.addEventListener("click", () => {
            openTagActionMenuKey = null;
            deleteTag(categoryIndex, tagIndex);
          });
          menu.append(editTagButton, removeButton);
          tagMenuWrap.append(menu);
        }

        tagActions.append(tagMenuWrap);
        tagRow.append(tagName, tagActions);
        tags.append(tagRow);
      });

    function buildTimeRows(records, date) {
      const chronologicalRecords = [...records].reverse();
      let totalMinutes = 0;

      const rows = chronologicalRecords.map((record, index) => {
        const descendingIndex = records.length - 1 - index;
        const interval = getRecordInterval(records, descendingIndex, date);
        if (!interval) return null;
        totalMinutes += interval.duration;

        return {
          index: index + 1,
          start: interval.startTime,
          end: record.time,
          duration: interval.duration,
          category: record.category,
          tags: record.tags,
          displayCategory: resolveRecordCategoryName(record),
          displayTags: resolveRecordTagNames(record),
          text: record.text,
          note: record.note,
          isBackfill: record.isBackfill,
          isSplit: record.isSplit
        };
      }).filter(Boolean);

      return {
        rows,
        totalMinutes
      };
    }

    function escapeCsvValue(value) {
      const text = String(value ?? "");
      if (/[",\r\n]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    function datesInRange(startDate, endDate) {
      const dates = [];
      for (let date = startOfDay(startDate); date <= endDate; date = offsetDate(date, 1)) {
        dates.push(date);
      }
      return dates;
    }

    function exportRangeLabel(startDate, endDate) {
      const startKey = formatDateKey(startDate);
      const endKey = formatDateKey(endDate);
      return startKey === endKey ? startKey : `${startKey}_${endKey}`;
    }

    function exportCsv(startDate, endDate) {
      const tableRows = datesInRange(startDate, endDate).flatMap((date) => (
        buildTimeRows(loadRecords(date), date).rows.map((row) => ({
          ...row,
          date: formatDateKey(date)
        }))
      ));

      if (tableRows.length === 0) {
        alert("所选日期区间没有可导出的完整时间记录");
        return false;
      }

      const headers = ["序号", "日期", "开始时间", "结束时间", "时长", "分类", "标签", "事件", "备注"];
      const rows = tableRows.map((row, index) => [
        index + 1,
        row.date,
        row.start,
        row.end,
        formatDuration(row.duration),
        row.category || "",
        row.tags.length ? row.tags.join("/") : "",
        row.text,
        row.note || ""
      ]);
      const csv = [headers, ...rows]
        .map((row) => row.map(escapeCsvValue).join(","))
        .join("\r\n");
      const blob = new Blob([`\uFEFF${csv}`], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `Dotlog_${exportRangeLabel(startDate, endDate)}.csv`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showExportStatus(`✓ 已导出 ${tableRows.length} 条记录`);
      return true;
    }

    function renderTimeTable(records) {

    function buildCalendarEvents(records, date) {
      const chronologicalRecords = [...records].reverse();
      const eventsByCategory = {};
      let eventCount = 0;

      chronologicalRecords.forEach((record, index) => {
        const descendingIndex = records.length - 1 - index;
        const interval = getRecordInterval(records, descendingIndex, date);
        if (!interval) return;
        if (!record.category) return;

        const event = [
          "BEGIN:VEVENT",
          `DTSTART;TZID=Asia/Shanghai:${formatIcsDate(interval.startDate, interval.startTime)}`,
          `DTEND;TZID=Asia/Shanghai:${formatIcsDate(date, record.time)}`,
          `SUMMARY:${escapeIcsText(summaryForRecord(record))}`,
          record.note ? `DESCRIPTION:${escapeIcsText(record.note)}` : null,
          `UID:${createEventUid()}@时间打点器`,
          "END:VEVENT"
        ].filter(Boolean).join("\r\n");

        if (!eventsByCategory[record.category]) {
          eventsByCategory[record.category] = [];
        }

        eventsByCategory[record.category].push(event);
        eventCount += 1;
      });

      return { eventsByCategory, eventCount };
    }

    function buildIcsContent(events) {
      return [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//时间打点器//CN",
        "CALSCALE:GREGORIAN",
        ...events,
        "END:VCALENDAR"
      ].join("\r\n");
    }

      return formatDateKey(date) === value ? date : null;

    async function exportIcsFiles(startDate, endDate) {
      if (typeof JSZip === "undefined") {
        alert("导出组件加载失败，请检查网络后重试");
        return false;
      }

      const eventsByCategory = {};
      let eventCount = 0;
      datesInRange(startDate, endDate).forEach((date) => {
        const dayEvents = buildCalendarEvents(loadRecords(date), date);
        eventCount += dayEvents.eventCount;
        Object.entries(dayEvents.eventsByCategory).forEach(([category, events]) => {
          if (!eventsByCategory[category]) eventsByCategory[category] = [];
          eventsByCategory[category].push(...events);
        });
      });

      if (eventCount === 0) {
        alert("所选日期区间没有已分类的完整时间记录");
        return false;
      }

      const rangeLabel = exportRangeLabel(startDate, endDate);
      const categoriesToExport = Object.keys(eventsByCategory);
      const zip = new JSZip();
      categoriesToExport.forEach((category) => {
        zip.file(`${rangeLabel}_${category}.ics`, buildIcsContent(eventsByCategory[category]));
      });

      const content = await zip.generateAsync({ type: "blob" });
      const url = URL.createObjectURL(content);
      const link = document.createElement("a");
      link.href = url;
      link.download = `时间记录_${rangeLabel}.zip`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showExportStatus(`✓ 已导出 ${categoriesToExport.length} 个分类，共 ${eventCount} 个事件`);
      return true;
    }
