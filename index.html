        const remoteOccurrence = remoteOccurrences[0] || null;
        if (localOccurrence && remoteOccurrence) {
          if (localOccurrence.dateKey !== remoteOccurrence.dateKey) {
            simulation.crossDateIdConflicts.push({
              recordId,
              local: recordLabel(localOccurrence.dateKey, localOccurrence.recordIndex, localOccurrence.record, "local"),
              remote: recordLabel(remoteOccurrence.dateKey, remoteOccurrence.recordIndex, remoteOccurrence.record, "remote"),
              conflictFields: ["dateKey"]
            });
            return;
          }
          const comparison = compareRecords(localOccurrence.record, remoteOccurrence.record);
          const item = {
            recordId,
            dateKey: localOccurrence.dateKey,
            localRecordIndex: localOccurrence.recordIndex,
            remoteRecordIndex: remoteOccurrence.recordIndex,
            conflictFields: comparison.conflictFields,
            nonBlockingDifferences: comparison.nonBlockingDifferences,
            classificationFallbacks: comparison.classificationFallbacks
          };
          if (comparison.nonBlockingDifferences.length > 0
            || comparison.classificationFallbacks.length > 0) {
            simulation.nonBlockingDifferences.push(item);
          }
          if (comparison.conflictFields.length === 0) {
            simulation.keep.push({ ...item, action: "keep" });
          } else {
            simulation.conflicts.push({
              ...item,
              action: "conflict",
              local: comparison.localComparable,
              remote: comparison.remoteComparable
            });
          }
        } else if (localOccurrence) {
          simulation.keepLocal.push({
            ...recordLabel(localOccurrence.dateKey, localOccurrence.recordIndex, localOccurrence.record, "local"),
            action: "keep local"
          });
        } else if (remoteOccurrence) {
          simulation.candidateImportRemote.push({
            ...recordLabel(remoteOccurrence.dateKey, remoteOccurrence.recordIndex, remoteOccurrence.record, "remote"),
            action: "candidate import remote"
          });
        }
      });

      const suspectedDuplicates = [];
      const duplicateCountsByDate = new Map();
      allDates.forEach((dateKey) => {
        const localRecords = localRecordsByDate[dateKey] || [];
        const localIds = new Set(localRecords.map((record) => cleanString(record?.id)).filter(Boolean));
        const candidates = [
          ...localRecords.map((record, recordIndex) => ({ source: "local", recordIndex, record })),
          ...(remoteRecordsByDate[dateKey] || [])
            .map((record, recordIndex) => ({ source: "remote", recordIndex, record }))
            .filter(({ record }) => !localIds.has(cleanString(record?.id)))
        ].filter(({ record }) => record && typeof record === "object" && !Array.isArray(record));

        for (let leftIndex = 0; leftIndex < candidates.length; leftIndex += 1) {
          for (let rightIndex = leftIndex + 1; rightIndex < candidates.length; rightIndex += 1) {
            const left = candidates[leftIndex];
            const right = candidates[rightIndex];
            const leftId = cleanString(left.record.id);
            const rightId = cleanString(right.record.id);
            if (leftId && rightId && leftId === rightId) continue;
            const leftTitle = normalizeTitle(left.record);
            const rightTitle = normalizeTitle(right.record);
            if (!leftTitle || leftTitle !== rightTitle) continue;

            const leftStart = firstString(left.record.start, left.record.startTime);
            const rightStart = firstString(right.record.start, right.record.startTime);
            const leftEnd = firstString(left.record.end, left.record.endTime, left.record.time);
            const rightEnd = firstString(right.record.end, right.record.endTime, right.record.time);
            const exactTime = leftStart === rightStart && leftEnd === rightEnd;
            const nearTime = circularMinuteDifference(
              timeToComparableMinutes(leftStart),
              timeToComparableMinutes(rightStart)
            ) <= 10 && circularMinuteDifference(
              timeToComparableMinutes(leftEnd),
              timeToComparableMinutes(rightEnd)
            ) <= 10;
            if (!exactTime && !nearTime) continue;

            suspectedDuplicates.push({
              dateKey,
              reason: exactTime ? "same time range and title with different ids" : "same title and time within 10 minutes",
              left: recordLabel(dateKey, left.recordIndex, left.record, left.source),
              right: recordLabel(dateKey, right.recordIndex, right.record, right.source)
            });
            duplicateCountsByDate.set(dateKey, (duplicateCountsByDate.get(dateKey) || 0) + 1);
          }
        }
      });

      const conflictsByDate = new Map();
      simulation.conflicts.forEach(({ dateKey }) => {
        conflictsByDate.set(dateKey, (conflictsByDate.get(dateKey) || 0) + 1);
      });
      simulation.crossDateIdConflicts.forEach(({ local, remote }) => {
        [local.dateKey, remote.dateKey].forEach((dateKey) => {
          conflictsByDate.set(dateKey, (conflictsByDate.get(dateKey) || 0) + 1);
        });
      });

      const sparseRisks = [];
      const dailyComparisons = allDates.map((dateKey) => {
        const localRecords = localRecordsByDate[dateKey] || [];
        const remoteRecords = remoteRecordsByDate[dateKey] || [];
        const localCount = localRecords.length;
        const remoteCount = remoteRecords.length;
        const sharedDate = localDateSet.has(dateKey) && remoteDateSet.has(dateKey);
        const smallerCount = Math.min(localCount, remoteCount);
        const largerCount = Math.max(localCount, remoteCount);
        const countDifference = largerCount - smallerCount;
        const substantiallySparse = sharedDate && largerCount > 0 && (
          (smallerCount <= 3 && countDifference >= 3)
          || (largerCount >= 5 && smallerCount / largerCount <= 0.5)
        );
        const sparseSide = substantiallySparse
          ? localCount < remoteCount ? "local" : "remote"
          : null;
        if (substantiallySparse) {
          sparseRisks.push({
            dateKey,
            localCount,
            remoteCount,
            sparseSide,
            remoteToLocalWouldRegress: remoteCount < localCount,
            localToRemoteWouldRegress: localCount < remoteCount,
            reason: `${sparseSide} side is substantially sparser`
          });
        }

        const localValidIds = new Set(localRecords
          .map((record) => cleanString(record?.id))
          .filter((recordId) => recordId && (localIdIndex.get(recordId) || []).length === 1));
        const remoteValidIds = new Set(remoteRecords
          .map((record) => cleanString(record?.id))
          .filter((recordId) => recordId && (remoteIdIndex.get(recordId) || []).length === 1));
        const sameIds = [...localValidIds].filter((recordId) => remoteValidIds.has(recordId));
        const crossDateIds = simulation.crossDateIdConflicts.filter(({ local, remote }) => (
          local.dateKey === dateKey || remote.dateKey === dateKey
        ));
        const onlyLocalIds = [...localValidIds].filter((recordId) => (
          !remoteIdIndex.has(recordId)
        ));
        const onlyRemoteIds = [...remoteValidIds].filter((recordId) => (
          !localIdIndex.has(recordId)
        ));
        const missingIdCount = missingIdRecords.filter((record) => record.dateKey === dateKey).length;
        const duplicateIdCount = duplicateIdRecords.reduce((count, duplicate) => (
          count + duplicate.occurrences.filter((record) => record.dateKey === dateKey).length
        ), 0);
        const conflictByIdCount = conflictsByDate.get(dateKey) || 0;
        const suspectedDuplicateByTimeTextCount = duplicateCountsByDate.get(dateKey) || 0;

        let recommendedAction = "safe-no-change";
        if (!remoteReadSucceeded || errors.local.some((error) => error.dateKey === dateKey)
          || errors.remote.some((error) => error.dateKey === dateKey)) {
          recommendedAction = "unknown-risk";
        } else if (missingIdCount > 0) {
          recommendedAction = "missing-id-unsafe";
        } else if (duplicateIdCount > 0) {
          recommendedAction = "duplicate-risk-needs-review";
        } else if (substantiallySparse) {
          recommendedAction = "sparse-risk-do-not-sync";
        } else if (conflictByIdCount > 0 || crossDateIds.length > 0) {
          recommendedAction = "conflict-needs-review";
        } else if (suspectedDuplicateByTimeTextCount > 0) {
          recommendedAction = "duplicate-risk-needs-review";
        } else if (onlyRemoteIds.length > 0 && onlyLocalIds.length === 0) {
          recommendedAction = "safe-import-remote-only";
        } else if (onlyLocalIds.length > 0 && onlyRemoteIds.length === 0) {
          recommendedAction = "safe-keep-local-only";
        } else if (onlyLocalIds.length > 0 && onlyRemoteIds.length > 0) {
          recommendedAction = "unknown-risk";
        }

        return {
          dateKey,
          localCount,
          remoteCount,
          sameIdCount: sameIds.length,
          onlyLocalByIdCount: onlyLocalIds.length,
          onlyRemoteByIdCount: onlyRemoteIds.length,
          conflictByIdCount,
          suspectedDuplicateByTimeTextCount,
          missingIdCount,
          duplicateIdCount,
          sparseRisk: substantiallySparse,
          sparseSide,
          recordCountRegressionRisk: {
            remoteToLocal: remoteCount < localCount,
            localToRemote: localCount < remoteCount
          },
          recommendedAction
        };
      });

      const blockingReasons = [];
      if (!remoteReadSucceeded) blockingReasons.push("远程 Gist 未成功读取");
      if (errors.local.length > 0 || localAbnormalDateKeys.length > 0) blockingReasons.push("本地日期数据存在解析异常");
      if (errors.remote.length > 0) blockingReasons.push("远程日期数据存在解析异常");
      if (malformedRecords.length > 0) blockingReasons.push("存在格式异常记录");
      if (missingIdRecords.length > 0) blockingReasons.push("存在缺少 record.id 的记录");
      if (duplicateIdRecords.length > 0) blockingReasons.push("本地或远程存在重复 record.id");
      if (simulation.crossDateIdConflicts.length > 0) blockingReasons.push("相同 record.id 位于不同日期");
      if (simulation.conflicts.length > 0) blockingReasons.push("相同 record.id 存在内容冲突");
      if (sparseRisks.length > 0) blockingReasons.push("存在明显稀疏日期");
      if (suspectedDuplicates.length > 0) blockingReasons.push("存在疑似重复记录");

      const report = {
        generatedAt: new Date().toISOString(),
        readOnly: true,
        remoteRequestMethod: remoteRequestAttempted ? "GET" : null,
        overview: {
          localDateCount: localDates.length,
          remoteDateCount: remoteDates.length,
          localRecordCount: Object.values(localRecordsByDate)
            .reduce((sum, records) => sum + records.length, 0),
          remoteRecordCount: Object.values(remoteRecordsByDate)
            .reduce((sum, records) => sum + records.length, 0),
          sharedDates: allDates.filter((dateKey) => localDateSet.has(dateKey) && remoteDateSet.has(dateKey)),
          localOnlyDates: localDates.filter((dateKey) => !remoteDateSet.has(dateKey)),
          remoteOnlyDates: remoteDates.filter((dateKey) => !localDateSet.has(dateKey)),
          localAbnormalDateKeys
        },
        dailyComparisons,
        mergeSimulation: simulation,
        sparseRisks,
        suspectedDuplicates,
        risks: {
          remoteReadSucceeded,
          hasMissingIds: missingIdRecords.length > 0,
          hasDuplicateIds: duplicateIdRecords.length > 0,
          hasCrossDateIdConflicts: simulation.crossDateIdConflicts.length > 0,
          hasContentConflicts: simulation.conflicts.length > 0,
          hasSparseRisk: sparseRisks.length > 0,
          hasSuspectedDuplicates: suspectedDuplicates.length > 0,
          blockingReasons,
          suitableForRound7B: blockingReasons.length === 0,
          recommendation: blockingReasons.length === 0
            ? "未发现阻断项，可以设计第 7B 受控 record.id 合并。"
            : "先处理或人工确认阻断项，不要进入真实同步合并改造。"
        },
        errors: {
          ...errors,
          malformedRecords
        }
      };

      window.__dotlogGistMergePreview = report;
      console.group("[Dotlog] Gist record.id 合并 dry-run（只读）");
      console.log("完整报告：window.__dotlogGistMergePreview", report);
      console.table([{
        本地日期: report.overview.localDateCount,
        远程日期: report.overview.remoteDateCount,
        本地记录: report.overview.localRecordCount,
        远程记录: report.overview.remoteRecordCount,
        内容冲突: simulation.conflicts.length,
        稀疏风险日期: sparseRisks.length,
        疑似重复: suspectedDuplicates.length
      }]);
      console.groupCollapsed("每日对比与建议");
      console.table(dailyComparisons);
      console.groupEnd();
      console.groupCollapsed("record.id 合并模拟");
      console.log(simulation);
      console.groupEnd();
      console.groupCollapsed("稀疏数据风险");
      console.table(sparseRisks);
      console.groupEnd();
      console.groupCollapsed("疑似重复记录");
      console.table(suspectedDuplicates);
      console.groupEnd();
      console.groupCollapsed("风险与第 7B 建议");
      console.log(report.risks);
      console.groupEnd();
      if (errors.remoteRequest) console.warn("远程只读请求未完成", errors.remoteRequest);
      if (blockingReasons.length > 0) console.warn(report.risks.recommendation, blockingReasons);
      else console.info(report.risks.recommendation);
      console.info("dry-run 仅执行远程 GET：未写 localStorage、未调用 saveRecords、未推送 Gist、未执行真实合并。");
      console.groupEnd();
      return report;
    }

    function mapTagIdsByName(tags, tagIds) {
      const tagIdMap = new Map();
      if (!Array.isArray(tags)) return tagIdMap;

      tags.forEach((tagName, index) => {
        const safeTagName = typeof tagName === "string" ? tagName.trim() : "";
        const tagId = normalizeReferenceId(Array.isArray(tagIds) ? tagIds[index] : null);
        if (safeTagName && tagId && !tagIdMap.has(safeTagName)) {
          tagIdMap.set(safeTagName, tagId);
        }
      });

      return tagIdMap;
    }

    function resolveClassificationFields(classification, fallbackRecord = null) {
      const category = typeof classification?.category === "string"
        ? classification.category.trim()
        : "";
      const safeCategory = category || null;
      const tags = safeCategory
        ? [...new Set((Array.isArray(classification?.tags) ? classification.tags : [])
          .map((tag) => String(tag).trim())
          .filter(Boolean))]
        : [];

      if (!safeCategory) {
        return {
          category: null,
          tags: [],
          categoryId: null,
          tagIds: []
        };
      }

      const matchedCategory = findCategoryByName(safeCategory);
      const fallbackCategoryId = fallbackRecord?.category === safeCategory
        ? normalizeReferenceId(fallbackRecord.categoryId)
        : null;
      const categoryId = matchedCategory?.id
        || normalizeReferenceId(classification?.categoryId)
        || fallbackCategoryId
        || null;

      const classificationTagIdMap = mapTagIdsByName(tags, classification?.tagIds);
      const fallbackTagIdMap = fallbackRecord?.category === safeCategory
        ? mapTagIdsByName(fallbackRecord.tags, fallbackRecord.tagIds)
        : new Map();
      const tagIds = tags.map((tagName, index) => {
        const matchedTag = findTagByName(safeCategory, tagName);
        if (matchedTag?.tag?.id) return matchedTag.tag.id;
        return normalizeReferenceId(Array.isArray(classification?.tagIds) ? classification.tagIds[index] : null)
          || classificationTagIdMap.get(tagName)
          || fallbackTagIdMap.get(tagName)
          || null;
      }).filter(Boolean);

      return {
        category: safeCategory,
        tags,
        categoryId,
        tagIds
      };
    }

    function getCategoryTags(categoryName) {
      const category = findCategory(categoryName);
      return category ? category.tags.map((tag) => tag.name) : [];
    }

    function categoryColor(categoryName) {
      const category = findCategory(categoryName);
      return category ? category.color : "#B0B0B0";
    }

    function parseEntryText(rawText) {
      const notes = [];
      const textWithoutNotes = rawText.replace(/（([^（）]*)）|\(([^()]*)\)/g, (match, chineseNote, englishNote) => {
        const note = (chineseNote || englishNote || "").trim();
        if (note) notes.push(note);
        return "";
      });

      const text = textWithoutNotes.replace(/\s+/g, " ").trim() || rawText.trim();

      return {
        text,
        note: notes.length ? notes.join("；") : null
      };
    }

    function parseBackfill(rawText) {
      if (!rawText.startsWith("补录")) {
        return {
          isBackfill: false,
          time: formatTime(new Date()),
          text: rawText
        };
      }

      const match = rawText.match(/^补录\s+(\S+)\s+(.+)$/);
      if (!match) {
        alert("补录格式：补录 HH:MM 事件描述");
        return null;
      }

      const time = match[1];
      const text = match[2].trim();
      if (!/^\d{2}:\d{2}$/.test(time)) {
        alert("补录格式：补录 HH:MM 事件描述");
        return null;
      }

      const [hours, minutes] = time.split(":").map(Number);
      if (hours > 23 || minutes > 59) {
        alert("时间格式不正确，请使用 00:00–23:59");
        return null;
      }

      return {
        isBackfill: true,
        time,
        text
      };
    }

    function parseSplit(rawText, endTime) {
      if (!rawText.includes("+")) {
        return { isSplit: false };
      }

      const match = rawText.match(/^(.+?)\s*\+\s*(.+?)\s+(\d+)$/);
      if (!match) {
        alert("加号拆分格式：主事件 + 次事件 时长（分钟）");
        return null;
      }

      const duration = Number(match[3]);
      if (duration < 1 || duration > 600) {
        alert("时长超出范围，请输入 1–600 分钟");
        return null;
      }

      const endMinutes = timeToMinutes(endTime);
      const secondaryEndMinutes = endMinutes - duration;
      if (secondaryEndMinutes < 0) {
        alert("拆分后时间超出当天范围，请检查时长");
        return null;
      }

      return {
        isSplit: true,
        mainText: match[1].trim(),
        secondaryText: match[2].trim(),
        duration,
        secondaryEndTime: minutesToTime(secondaryEndMinutes)
      };
    }

    function storageKey(date) {
      return `time_tracker_${formatDateKey(date)}`;
    }

    function formatIcsDate(date, time) {
      const [hours, minutes] = time.split(":").map(Number);
      const eventDate = new Date(date.getFullYear(), date.getMonth(), date.getDate(), hours, minutes, 0);
      const year = eventDate.getFullYear();
      const month = String(eventDate.getMonth() + 1).padStart(2, "0");
      const day = String(eventDate.getDate()).padStart(2, "0");
      return `${year}${month}${day}T${time.replace(":", "")}00`;
    }

    function addDays(date, days) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate() + days);
    }

    function escapeIcsText(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/;/g, "\\;")
        .replace(/,/g, "\\,")
        .replace(/\r?\n/g, "\\n");
    }

    function summaryForRecord(record) {
      const tagNames = resolveRecordTagNames(record);
      if (!tagNames.length) return record.text;
      return `${record.text} ${tagNames.map((tag) => `#${tag}`).join(" ")}`;
    }

    function createEventUid() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function showExportStatus(message) {
      exportStatus.textContent = message;
      clearTimeout(exportStatusTimer);
      exportStatusTimer = setTimeout(() => {
        exportStatus.textContent = "";
      }, 2000);
    }

    function getGistSettings() {
      return {
        token: localStorage.getItem("gist_token") || "",
        gistId: localStorage.getItem("gist_id") || ""
      };
    }

    function hasGistSettings() {
      const settings = getGistSettings();
      return Boolean(settings.token && settings.gistId);
    }

    function formatSyncTime(date = new Date()) {
      return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function setSyncStatus(state, message, options = {}) {
      syncStatus = {
        state,
        message,
        lastSyncedAt: options.lastSyncedAt || syncStatus.lastSyncedAt
      };

      if (state === "connected" && options.lastSyncedAt) {
        localStorage.setItem("dotlog_last_synced", options.lastSyncedAt);
      }

      updateSyncIndicators();
    }

    function updateSyncIndicators() {
      if (!hasGistSettings()) {
        syncIndicator.className = "sync-indicator is-hidden";
        syncIndicator.textContent = "";
      } else if (syncStatus.state === "syncing") {
        syncIndicator.className = "sync-indicator is-syncing";
        syncIndicator.textContent = "↑↓";
        syncIndicator.title = "同步中";
      } else if (syncStatus.state === "error") {
        syncIndicator.className = "sync-indicator is-error";
        syncIndicator.textContent = "!";
        syncIndicator.title = syncStatus.message;
      } else {
        syncIndicator.className = "sync-indicator";
        syncIndicator.textContent = "✓";
        syncIndicator.title = syncStatus.message || "已同步";
      }

      const statusNode = document.querySelector("#syncStatusText");
      if (!statusNode) return;

      statusNode.className = "sync-status";
      if (!hasGistSettings()) {
        statusNode.textContent = "● 未配置";
      } else if (syncStatus.state === "connected") {
        statusNode.classList.add("is-connected");
        statusNode.textContent = syncStatus.message;
      } else if (syncStatus.state === "syncing") {
        statusNode.textContent = "● 同步中";
      } else if (syncStatus.state === "error") {
        statusNode.classList.add("is-error");
        statusNode.textContent = syncStatus.message;
      } else {
        statusNode.textContent = "● 未配置";
      }
    }

    function isToday(date) {
      return isSameDate(date, new Date());
    }

    function normalizeRecord(record, recordDate = "") {
      const fallbackDate = isValidDateKey(record?.date)
        ? record.date
        : (String(recordDate).match(/\d{4}-\d{2}-\d{2}/)?.[0] || "");
      const startTime = normalizeTime(record.startTime || "", fallbackDate);
      const endTime = normalizeTime(record.endTime || record.time || "", fallbackDate);
      const { time: legacyTime, ...recordWithoutLegacyTime } = record;
      return {
        ...recordWithoutLegacyTime,
        id: typeof record.id === "string" && record.id.trim()
          ? record.id.trim()
          : createLegacyRecordId(record),
        startTime,
        endTime,
        text: record.text,
        category: record.category || null,
        categoryId: normalizeReferenceId(record.categoryId),
        note: record.note || null,
        tags: Array.isArray(record.tags) ? record.tags : [],
        tagIds: Array.isArray(record.tagIds)
          ? record.tagIds.map((tagId) => normalizeReferenceId(tagId)).filter(Boolean)
          : [],
        isBackfill: record.isBackfill || false,
        isSplit: record.isSplit || false
      };
    }

    function normalizeRecordList(records, identityScope = "") {
      if (!Array.isArray(records)) {
        throw new Error(`记录数据不是数组，已阻止 normalize：${identityScope || "unknown"}`);
      }

      const occurrenceByFingerprint = new Map();
      const normalizedRecords = records.map((record) => {
        if (typeof record.id === "string" && record.id.trim()) return normalizeRecord(record, identityScope);

        const fingerprint = legacyRecordFingerprint(record);
        const occurrence = occurrenceByFingerprint.get(fingerprint) || 0;
        occurrenceByFingerprint.set(fingerprint, occurrence + 1);
        return normalizeRecord({
          ...record,
          id: createLegacyRecordId(record, `${identityScope}:${occurrence}`)
        }, identityScope);
      });

      if (normalizedRecords.length < records.length) {
        console.warn("[Dotlog] normalize 后记录数量减少，已阻止写回", {
          identityScope,
          before: records.length,
          after: normalizedRecords.length
        });
        throw new Error("NORMALIZE_RECORD_COUNT_REGRESSION");
      }

      return normalizedRecords;
    }

    function normalizeGistDataForSync(data) {
      if (!data) return { data: null, changed: false };
      if (!data.records || typeof data.records !== "object" || Array.isArray(data.records)) {
        throw new Error("远程 records 结构异常");
      }

      const normalizedRecords = {};
      Object.entries(data.records).forEach(([dateKey, records]) => {
        if (!Array.isArray(records)) {
          throw new Error(`远程记录不是数组：${dateKey}`);
        }
        const normalized = sortRecords(normalizeRecordList(records, dateKey));
        if (normalized.length !== records.length) {
          throw new Error("NORMALIZE_RECORD_COUNT_REGRESSION");
        }
        normalizedRecords[dateKey] = normalized;
      });

      return {
        data: { ...data, records: normalizedRecords },
        changed: stableSerializeForGistMerge(normalizedRecords)
          !== stableSerializeForGistMerge(data.records)
      };
    }

    function getRecordStorageKeys() {
      const keys = [];
      for (let index = 0; index < localStorage.length; index += 1) {
        const key = localStorage.key(index);
        if (key && /^time_tracker_\d{4}-\d{2}-\d{2}$/.test(key)) keys.push(key);
      }
      return keys.sort();
    }

    function ensureSchemaV1Backup() {
      const existingBackupKey = localStorage.getItem(schemaV1BackupMarkerKey);
      if (existingBackupKey && localStorage.getItem(existingBackupKey)) return true;

      const createdAt = new Date().toISOString();
      const backupKey = `backup_before_schema_v1_${createdAt.replace(/[:.]/g, "-")}`;
      const recordValues = {};
      getRecordStorageKeys().forEach((key) => {
        recordValues[key] = localStorage.getItem(key);
      });

      try {
        localStorage.setItem(backupKey, JSON.stringify({
          createdAt,
          schemaVersion: dataSchemaVersion,
          records: recordValues,
          categoryConfig: localStorage.getItem("category_config"),
          lastUpdated: localStorage.getItem("dotlog_last_updated")
        }));
        localStorage.setItem(schemaV1BackupMarkerKey, backupKey);
        console.info("[Dotlog] schema v1 原始数据备份已创建", backupKey);
        return true;
      } catch (error) {
        console.error("[Dotlog] schema v1 备份失败，已阻止记录写回和自动同步", error);
        return false;
      }
    }

    function parseStoredRecordArray(rawValue, key) {
      if (rawValue === null) return [];
      const records = JSON.parse(rawValue);
      if (!Array.isArray(records)) {
        throw new Error(`记录 key 不是数组：${key}`);
      }
      return records;
    }

    function getRecordIdOccurrencesByDate(recordsByDate = {}) {
      const index = new Map();
      Object.entries(recordsByDate || {}).forEach(([dateKey, records]) => {
        if (!Array.isArray(records)) return;
        records.forEach((record, recordIndex) => {
          const recordId = normalizeReferenceId(record?.id);
          if (!recordId) return;
          if (!index.has(recordId)) index.set(recordId, []);
          index.get(recordId).push({ dateKey, recordIndex, record });
        });
      });
      return index;
    }

    function findCrossDateMovedRecordIds(localRecords = {}, remoteRecords = {}) {
      const localById = getRecordIdOccurrencesByDate(localRecords);
      const remoteById = getRecordIdOccurrencesByDate(remoteRecords);
      const movedIds = [];

      remoteById.forEach((remoteOccurrences, recordId) => {
        const localOccurrences = localById.get(recordId) || [];
        if (remoteOccurrences.length !== 1 || localOccurrences.length !== 1) return;

        const remoteOccurrence = remoteOccurrences[0];
        const localOccurrence = localOccurrences[0];
        if (remoteOccurrence.dateKey === localOccurrence.dateKey) return;
        if (datePart(localOccurrence.record?.startTime || "") !== localOccurrence.dateKey) return;

        const localSameDateRecords = Array.isArray(localRecords?.[remoteOccurrence.dateKey])
          ? localRecords[remoteOccurrence.dateKey]
          : [];
        const stillExistsOnRemoteDate = localSameDateRecords.some((record) => (
          normalizeReferenceId(record?.id) === recordId
        ));
        if (!stillExistsOnRemoteDate) movedIds.push(recordId);
      });

      return movedIds;
    }

    function getRecordCountRegressions(candidateRecords = {}, baselineRecords = {}, options = {}) {
      const ignoredMovedIds = new Set(options.ignoreMovedRecordIds || []);
      return Object.keys(baselineRecords).flatMap((dateKey) => {
        const baselineList = Array.isArray(baselineRecords[dateKey]) ? baselineRecords[dateKey] : [];
        const before = baselineList.filter((record) => {
          const recordId = normalizeReferenceId(record?.id);
          return !(recordId && ignoredMovedIds.has(recordId));
        }).length;
        const after = Array.isArray(candidateRecords[dateKey]) ? candidateRecords[dateKey].length : 0;
        return after < before ? [{ dateKey, before, after }] : [];
      });
    }

    function assertNoRecordCountRegression(candidateData, baselineData, context) {
      const regressions = getRecordCountRegressions(candidateData?.records, baselineData?.records);
      if (regressions.length === 0) return;
      console.warn(`[Dotlog] ${context} 检测到记录数量减少，已阻止覆盖`, regressions);
      const error = new Error("RECORD_COUNT_REGRESSION");
      error.regressions = regressions;
      throw error;
    }

    function getLocalUpdatedAt() {
      return localStorage.getItem("dotlog_last_updated") || "1970-01-01T00:00:00.000Z";
    }

    function collectLocalData() {
      const records = {};

      getRecordStorageKeys().forEach((key) => {
        const dateKey = key.replace("time_tracker_", "");
        try {
          const value = parseStoredRecordArray(localStorage.getItem(key), key);
          records[dateKey] = sortRecords(normalizeRecordList(value, dateKey));
        } catch (error) {
          console.error("[Dotlog] 本地记录读取失败，已阻止同步", { key, error });
          throw error;
        }
      });

      const settings = loadCategoryConfig();
      return {
        records,
        __settings__: settings,
        category_config: settings,
        last_updated: getLocalUpdatedAt()
      };
    }

    function getSettingsFromGistData(data) {
      return data?.__settings__ || data?.category_config || null;
    }

    function countDataRecords(data) {
      return Object.values(data?.records || {}).reduce((total, records) => {
        return total + (Array.isArray(records) ? records.length : 0);
      }, 0);
    }

    function getPendingDeletedRecordIds() {
      try {
        const value = JSON.parse(localStorage.getItem(pendingDeletedRecordIdsKey) || "[]");
        return Array.isArray(value)
          ? [...new Set(value.map((recordId) => normalizeReferenceId(recordId)).filter(Boolean))]
          : [];
      } catch {
        return [];
      }
    }

    function rememberDeletedRecordIds(recordIds) {
      const nextIds = [...new Set([
        ...getPendingDeletedRecordIds(),
        ...recordIds.map((recordId) => normalizeReferenceId(recordId)).filter(Boolean)
      ])];
      if (nextIds.length > 0) {
        localStorage.setItem(pendingDeletedRecordIdsKey, JSON.stringify(nextIds));
      }
    }

    function clearDeletedRecordIds(recordIds) {
      const clearedIds = new Set(recordIds);
      const remainingIds = getPendingDeletedRecordIds().filter((recordId) => !clearedIds.has(recordId));
      if (remainingIds.length > 0) {
        localStorage.setItem(pendingDeletedRecordIdsKey, JSON.stringify(remainingIds));
      } else {
        localStorage.removeItem(pendingDeletedRecordIdsKey);
      }
    }

    function applyRecordDeletionIds(data, recordIds) {
      const deletedIds = new Set(recordIds);
      const removedIds = new Set();
      const records = {};

      Object.entries(data?.records || {}).forEach(([dateKey, dayRecords]) => {
        if (!Array.isArray(dayRecords)) {
          throw new Error(`远程记录不是数组：${dateKey}`);
        }
        records[dateKey] = dayRecords.filter((record) => {
          const recordId = normalizeReferenceId(record?.id);
          if (!recordId || !deletedIds.has(recordId)) return true;
          removedIds.add(recordId);
          return false;
        });
      });

      return {
        data: { ...data, records },
        removedIds: [...removedIds]
      };
    }

    function findConfirmableRemoteOnlyRecordIds(localData, remoteData) {
      const regressions = getRecordCountRegressions(localData?.records, remoteData?.records);
      if (regressions.length === 0) return [];

      const localIds = new Set(Object.values(localData?.records || {}).flatMap((records) => (
        (Array.isArray(records) ? records : [])
          .map((record) => normalizeReferenceId(record?.id))
          .filter(Boolean)
      )));
      const remoteOnlyIds = [];
      let expectedDifference = 0;

      for (const regression of regressions) {
        expectedDifference += regression.before - regression.after;
        const remoteRecords = Array.isArray(remoteData?.records?.[regression.dateKey])
          ? remoteData.records[regression.dateKey]
          : [];
        remoteRecords.forEach((record) => {
          const recordId = normalizeReferenceId(record?.id);
          if (recordId && !localIds.has(recordId)) remoteOnlyIds.push(recordId);
        });
      }

      const uniqueIds = [...new Set(remoteOnlyIds)];
      return uniqueIds.length === expectedDifference ? uniqueIds : [];
    }

    function createManualSyncBackup(localData, remoteData, reason = "confirmed-local-snapshot-override") {
      const createdAt = new Date().toISOString();
      const backupKey = `backup_before_manual_sync_${createdAt.replace(/[:.]/g, "-")}`;
      try {
        localStorage.setItem(backupKey, JSON.stringify({
          createdAt,
          reason,
          localData,
          remoteData
        }));
        console.info("[Dotlog] 手动同步前完整备份已创建", backupKey);
        return backupKey;
      } catch (error) {
        console.error("[Dotlog] 手动同步前备份失败，已阻止覆盖", error);
        return null;
      }
    }

    function isCurrentGistInitialized() {
      const { gistId } = getGistSettings();
      return Boolean(gistId && localStorage.getItem("dotlog_sync_initialized_gist") === gistId);
    }

    function markCurrentGistInitialized() {
      const { gistId } = getGistSettings();
      if (gistId) localStorage.setItem("dotlog_sync_initialized_gist", gistId);
    }

    function applyRemoteData(data) {
      if (!schemaV1BackupReady) {
        throw new Error("SCHEMA_BACKUP_NOT_READY");
      }

      const localData = collectLocalData();
      assertNoRecordCountRegression(data, localData, "远程覆盖本地");
      const normalizedRemoteRecords = {};
      Object.entries(data.records || {}).forEach(([dateKey, records]) => {
        if (!Array.isArray(records)) {
          throw new Error(`远程记录不是数组：${dateKey}`);
        }
        const normalizedRecords = sortRecords(normalizeRecordList(records, dateKey));
        if (normalizedRecords.length < records.length) {
          console.warn("[Dotlog] 远程记录 normalize 后数量减少，已阻止覆盖", {
            dateKey,
            before: records.length,
            after: normalizedRecords.length
          });
          throw new Error("NORMALIZE_RECORD_COUNT_REGRESSION");
        }
        normalizedRemoteRecords[dateKey] = normalizedRecords;
      });

      applyingRemoteData = true;

      try {
        const keysToRemove = getRecordStorageKeys().filter((key) => (
          !Object.prototype.hasOwnProperty.call(normalizedRemoteRecords, key.replace("time_tracker_", ""))
        ));
        keysToRemove.forEach((key) => localStorage.removeItem(key));

        Object.entries(normalizedRemoteRecords).forEach(([dateKey, records]) => {
          localStorage.setItem(`time_tracker_${dateKey}`, JSON.stringify(records));
        });

        const remoteSettings = getSettingsFromGistData(data);
        if (remoteSettings) {
          localStorage.setItem("category_config", JSON.stringify(normalizeCategoryConfig(remoteSettings)));
        }

        localStorage.setItem("dotlog_last_updated", data.last_updated || new Date().toISOString());
      } finally {
        applyingRemoteData = false;
      }
    }

    function stableSerializeForGistMerge(value) {
      const normalizeValue = (item) => {
        if (Array.isArray(item)) return item.map(normalizeValue);
        if (!item || typeof item !== "object") return item;
        return Object.keys(item).sort().reduce((result, key) => {
          if (item[key] !== undefined) result[key] = normalizeValue(item[key]);
          return result;
        }, {});
      };
      return JSON.stringify(normalizeValue(value));
    }

    function getNormalizedRecordClassificationForMerge(record) {
      const cleanString = (value) => typeof value === "string" ? value.trim() : "";
      const uniqueSorted = (value) => [...new Set(Array.isArray(value)
        ? value.map(cleanString).filter(Boolean)
        : [])].sort();
      const rawCategoryId = cleanString(record?.categoryId);
      const rawTagIds = uniqueSorted(record?.tagIds);
      const hasTagIdsField = Array.isArray(record?.tagIds);
      return {
        categoryId: rawCategoryId.startsWith("cat_") ? rawCategoryId : null,
        rawCategoryId: rawCategoryId || null,
        categoryName: cleanString(record?.category) || null,
        tagIds: hasTagIdsField && rawTagIds.every((tagId) => tagId.startsWith("tag_"))
          ? rawTagIds
          : null,
        rawTagIds,
        hasTagIdsField,
        tagNames: uniqueSorted(record?.tags)
      };
    }

    function compareRecordClassificationForMerge(localRecord, remoteRecord) {
      const local = getNormalizedRecordClassificationForMerge(localRecord);
      const remote = getNormalizedRecordClassificationForMerge(remoteRecord);
      const blockingDifferences = [];
      const nonBlockingDifferences = [];
      const classificationFallbacks = [];
      const sameSet = (left, right) => stableSerializeForGistMerge(left)
        === stableSerializeForGistMerge(right);

      if (local.categoryId && remote.categoryId) {
        if (local.categoryId !== remote.categoryId) {
          blockingDifferences.push("categoryId");
        } else if (local.categoryName !== remote.categoryName) {
          nonBlockingDifferences.push("legacyCategoryName");
        }
      } else {
        classificationFallbacks.push("categoryName");
        if (local.rawCategoryId && !local.categoryId) blockingDifferences.push("localCategoryIdUnusable");
        if (remote.rawCategoryId && !remote.categoryId) blockingDifferences.push("remoteCategoryIdUnusable");
        if (local.categoryName !== remote.categoryName) blockingDifferences.push("category");
        if (local.categoryId !== remote.categoryId) {
          nonBlockingDifferences.push("categoryIdPresenceFallback");
        }
      }

      if (local.tagIds && remote.tagIds) {
        if (!sameSet(local.tagIds, remote.tagIds)) {
          blockingDifferences.push("tagIds");
        } else if (!sameSet(local.tagNames, remote.tagNames)) {
          nonBlockingDifferences.push("legacyTagNames");
        }
      } else {
        classificationFallbacks.push("tagNames");
        if (local.hasTagIdsField && !local.tagIds) blockingDifferences.push("localTagIdsUnusable");
        if (remote.hasTagIdsField && !remote.tagIds) blockingDifferences.push("remoteTagIdsUnusable");
        if (!sameSet(local.tagNames, remote.tagNames)) blockingDifferences.push("tags");
        if (!sameSet(local.tagIds || [], remote.tagIds || [])) {
          nonBlockingDifferences.push("tagIdsPresenceFallback");
        }
      }

      return {
        local,
        remote,
        blockingDifferences: [...new Set(blockingDifferences)],
        nonBlockingDifferences: [...new Set(nonBlockingDifferences)],
        classificationFallbacks: [...new Set(classificationFallbacks)]
      };
    }

    function compareRecordsForGistMerge(localRecord, remoteRecord) {
      const cleanString = (value) => typeof value === "string" ? value.trim() : "";
      const firstString = (...values) => {
        for (const value of values) {
          const cleaned = cleanString(value);
          if (cleaned) return cleaned;
        }
        return null;
      };
      const comparable = (record) => {
        const knownFields = new Set([
          "id", "start", "startTime", "end", "endTime", "time",
          "title", "text", "summary", "categoryId", "tagIds", "category", "tags",
          "updatedAt", "note", "description", "createdAt", "isBackfill", "isSplit",
          "writerVersion", "updatedByVersion"
        ]);
        const additionalFields = Object.keys(record || {}).reduce((result, key) => {
          if (!knownFields.has(key) && record[key] !== undefined) result[key] = record[key];
          return result;
        }, {});
        return {
          start: firstString(record?.start, record?.startTime),
          end: firstString(record?.end, record?.endTime, record?.time),
          titleTextSummary: firstString(record?.title, record?.text, record?.summary),
          updatedAt: cleanString(record?.updatedAt) || null,
          note: cleanString(record?.note) || null,
          description: cleanString(record?.description) || null,
          createdAt: cleanString(record?.createdAt) || null,
          isBackfill: Boolean(record?.isBackfill),
          isSplit: Boolean(record?.isSplit),
          additionalFields
        };
      };
      const localComparable = comparable(localRecord);
      const remoteComparable = comparable(remoteRecord);
      const contentDifferences = Object.keys(localComparable).filter((field) => (
        stableSerializeForGistMerge(localComparable[field])
          !== stableSerializeForGistMerge(remoteComparable[field])
      ));
      const classification = compareRecordClassificationForMerge(localRecord, remoteRecord);
      const versionMetadataDifferences = [];
      if (cleanString(localRecord?.writerVersion) !== cleanString(remoteRecord?.writerVersion)) {
        versionMetadataDifferences.push("writerVersionMetadata");
      }
      if (cleanString(localRecord?.updatedByVersion) !== cleanString(remoteRecord?.updatedByVersion)) {
        versionMetadataDifferences.push("updatedByVersionMetadata");
      }
      const conflictFields = [...new Set([
        ...contentDifferences,
        ...classification.blockingDifferences
      ])];

      return {
        localComparable: { ...localComparable, classification: classification.local },
        remoteComparable: { ...remoteComparable, classification: classification.remote },
        conflictFields,
        blockingDifferences: conflictFields,
        nonBlockingDifferences: [...new Set([
          ...classification.nonBlockingDifferences,
          ...versionMetadataDifferences
        ])],
        classificationFallbacks: classification.classificationFallbacks
      };
    }

    function getRecordMergeConflictFields(localRecord, remoteRecord) {
      return compareRecordsForGistMerge(localRecord, remoteRecord).conflictFields;
    }

    function getReliableRecordUpdatedAt(record) {
      const value = typeof record?.updatedAt === "string" ? record.updatedAt.trim() : "";
      if (!value) return null;
      const timestamp = Date.parse(value);
      return Number.isFinite(timestamp) ? timestamp : null;
    }

    function getRecordMergeSimilarity(record) {
      const cleanString = (value) => typeof value === "string" ? value.trim() : "";
      const title = cleanString(
        record?.title || record?.text || record?.summary || record?.description
      ).replace(/\s+/g, " ").toLowerCase();
      const start = cleanString(record?.start || record?.startTime);
      const end = cleanString(record?.end || record?.endTime || record?.time);
      const toMinutes = (value) => {
        const match = value.match(/^(\d{1,2}):(\d{2})$/);
        if (!match) return null;
        const hours = Number(match[1]);
        const minutes = Number(match[2]);
        if (hours > 23 || minutes > 59) return null;
        return hours * 60 + minutes;
      };
      return { title, start, end, startMinutes: toMinutes(start), endMinutes: toMinutes(end) };
    }

    function areRecordsSuspiciouslySimilar(localRecord, remoteRecord) {
      const local = getRecordMergeSimilarity(localRecord);
      const remote = getRecordMergeSimilarity(remoteRecord);
      if (!local.title || local.title !== remote.title) return false;
      if (local.start === remote.start && local.end === remote.end) return true;
      if (local.startMinutes === null || remote.startMinutes === null
        || local.endMinutes === null || remote.endMinutes === null) return false;
      const minuteDifference = (left, right) => {
        const difference = Math.abs(left - right);
        return Math.min(difference, 1440 - difference);
      };
      return minuteDifference(local.startMinutes, remote.startMinutes) <= 10
        && minuteDifference(local.endMinutes, remote.endMinutes) <= 10;
    }

    function mergeDateRecordsByRecordId(localRecords, remoteRecords, dateKey, options = {}) {
      const localList = Array.isArray(localRecords) ? localRecords : [];
      const remoteList = Array.isArray(remoteRecords) ? remoteRecords : [];
      const localById = new Map();
      const remoteById = new Map();
      const missingIds = [];
      const malformedRecords = [];
      const indexRecords = (records, side, index) => {
        records.forEach((record, recordIndex) => {
          if (!record || typeof record !== "object" || Array.isArray(record)) {
            malformedRecords.push({ side, dateKey, recordIndex, reason: "record is not an object" });
            return;
          }
          const recordId = normalizeReferenceId(record.id);
          if (!recordId) {
            missingIds.push({ side, dateKey, recordIndex, record });
            return;
          }
          if (!index.has(recordId)) index.set(recordId, []);
          index.get(recordId).push({ side, dateKey, recordIndex, record });
        });
      };
      indexRecords(localList, "local", localById);
      indexRecords(remoteList, "remote", remoteById);

      const duplicateIds = [];
      const duplicateIdSet = new Set();
      [["local", localById], ["remote", remoteById]].forEach(([side, index]) => {
        index.forEach((occurrences, recordId) => {
          if (occurrences.length <= 1) return;
          duplicateIdSet.add(recordId);
          duplicateIds.push({ side, dateKey, recordId, occurrences });
        });
      });

      const mergedRecords = [];
      const sameIds = [];
      const conflicts = [];
      const resolvedConflicts = [];
      const manuallyResolvedConflicts = [];
      const nonBlockingDifferences = [];
      const onlyLocal = [];
      const onlyRemote = [];
      const allIds = new Set([...localById.keys(), ...remoteById.keys()]);
      allIds.forEach((recordId) => {
        if (duplicateIdSet.has(recordId)) return;
        const localOccurrence = (localById.get(recordId) || [])[0] || null;
        const remoteOccurrence = (remoteById.get(recordId) || [])[0] || null;
        if (localOccurrence && remoteOccurrence) {
          const comparison = compareRecordsForGistMerge(
            localOccurrence.record,
            remoteOccurrence.record
          );
          const conflictFields = comparison.conflictFields;
          if (comparison.nonBlockingDifferences.length > 0
            || comparison.classificationFallbacks.length > 0) {
            nonBlockingDifferences.push({
              dateKey,
              recordId,
              differences: comparison.nonBlockingDifferences,
              classificationFallbacks: comparison.classificationFallbacks
            });
          }
          if (conflictFields.length === 0) {
            sameIds.push(recordId);
            mergedRecords.push(localOccurrence.record);
            return;
          }

          const localUpdatedAt = getReliableRecordUpdatedAt(localOccurrence.record);
          const remoteUpdatedAt = getReliableRecordUpdatedAt(remoteOccurrence.record);
          if (localUpdatedAt !== null && remoteUpdatedAt !== null && localUpdatedAt !== remoteUpdatedAt) {
            const winner = remoteUpdatedAt > localUpdatedAt ? "remote" : "local";
            resolvedConflicts.push({
              dateKey,
              recordId,
              conflictFields,
              nonBlockingDifferences: comparison.nonBlockingDifferences,
              winner,
              localUpdatedAt: localOccurrence.record.updatedAt,
              remoteUpdatedAt: remoteOccurrence.record.updatedAt
            });
            mergedRecords.push(winner === "remote" ? remoteOccurrence.record : localOccurrence.record);
          } else {
            const resolutionTimestamp = getReliableIsoTimestamp(options.resolutionTimestamp);
            if (options.conflictResolution === "prefer-local" && resolutionTimestamp) {
              const resolvedRecord = stampNewRecord(localOccurrence.record, resolutionTimestamp);
              manuallyResolvedConflicts.push({
                dateKey,
                recordId,
                conflictFields,
                nonBlockingDifferences: comparison.nonBlockingDifferences,
                winner: "local",
                resolutionTimestamp,
                reason: "explicit manual local conflict resolution"
              });
              mergedRecords.push(resolvedRecord);
            } else {
              conflicts.push({
                dateKey,
                recordId,
                conflictFields,
                nonBlockingDifferences: comparison.nonBlockingDifferences,
                localRecord: localOccurrence.record,
                remoteRecord: remoteOccurrence.record,
                reason: "content differs without reliable distinct updatedAt"
              });
              mergedRecords.push(localOccurrence.record);
            }
          }
        } else if (localOccurrence) {
          onlyLocal.push({ dateKey, recordId, record: localOccurrence.record });
          mergedRecords.push(localOccurrence.record);
        } else if (remoteOccurrence) {
          onlyRemote.push({ dateKey, recordId, record: remoteOccurrence.record });
          mergedRecords.push(remoteOccurrence.record);
        }
      });

      const suspectedDuplicates = [];
      onlyLocal.forEach((localItem) => {
        onlyRemote.forEach((remoteItem) => {
          if (!areRecordsSuspiciouslySimilar(localItem.record, remoteItem.record)) return;
          suspectedDuplicates.push({
            dateKey,
            localRecordId: localItem.recordId,
            remoteRecordId: remoteItem.recordId,
            reason: "different ids with same title and same or nearby time range"
          });
        });
      });

      const localDateExists = options.localDateExists !== false;
      const remoteDateExists = options.remoteDateExists !== false;
      const smallerCount = Math.min(localList.length, remoteList.length);
      const largerCount = Math.max(localList.length, remoteList.length);
      const countDifference = largerCount - smallerCount;
      const hasSparseRisk = localDateExists && remoteDateExists && largerCount > 0 && (
        (smallerCount <= 3 && countDifference >= 3)
        || (largerCount >= 5 && smallerCount / largerCount <= 0.5)
      );
      const sparseRisk = {
        hasRisk: hasSparseRisk,
        dateKey,
        localCount: localList.length,
        remoteCount: remoteList.length,
        sparseSide: hasSparseRisk
          ? localList.length < remoteList.length ? "local" : "remote"
          : null,
        remoteToLocalWouldRegress: remoteList.length < localList.length,
        localToRemoteWouldRegress: localList.length < remoteList.length
      };
      const remoteSparseExplainedByLocalOnly = hasSparseRisk
        && sparseRisk.sparseSide === "remote"
        && onlyLocal.length > 0
        && localList.length - remoteList.length <= onlyLocal.length;
      const manuallyAllowedSparseRisk = options.allowRemoteSparseWithLocalOnly === true
        && remoteSparseExplainedByLocalOnly;
      sparseRisk.manualUnionEligible = remoteSparseExplainedByLocalOnly;
      sparseRisk.manuallyAllowed = manuallyAllowedSparseRisk;

      const unsafeOriginalRecords = [
        ...missingIds.map((item) => item.record).filter(Boolean),
        ...duplicateIds.flatMap((item) => item.occurrences.map((occurrence) => occurrence.record)),
        ...malformedRecords.map(({ side, recordIndex }) => (
          side === "local" ? localList[recordIndex] : remoteList[recordIndex]
        ))
      ];
      unsafeOriginalRecords.forEach((record) => {
        if (!mergedRecords.includes(record)) mergedRecords.push(record);
      });

      const allTimesValid = mergedRecords.every((record) => {
        if (!record || typeof record !== "object") return false;
        return isValidLocalDateTime(record.endTime || "") || isValidTimeInput(record.time || "");
      });
      const stableMergedRecords = allTimesValid ? sortRecords(mergedRecords) : [...mergedRecords];
      const countSafety = {
        mergedCount: stableMergedRecords.length,
        preservesLocalCount: stableMergedRecords.length >= localList.length,
        preservesRemoteCount: stableMergedRecords.length >= remoteList.length
      };
      const skippedUnsafe = [
        ...missingIds.map((item) => ({ type: "missing-id", ...item })),
        ...duplicateIds.map((item) => ({ type: "duplicate-id", ...item })),
        ...malformedRecords.map((item) => ({ type: "malformed-record", ...item })),
        ...conflicts.map((item) => ({ type: "unresolved-conflict", ...item })),
        ...suspectedDuplicates.map((item) => ({ type: "suspected-duplicate", ...item })),
        ...(hasSparseRisk && !manuallyAllowedSparseRisk
          ? [{ type: "sparse-risk", ...sparseRisk }]
          : [])
      ];
      const shouldApply = skippedUnsafe.length === 0
        && countSafety.preservesLocalCount
        && countSafety.preservesRemoteCount;

      return {
        dateKey,
        mergedRecords: stableMergedRecords,
        conflicts,
        resolvedConflicts,
        manuallyResolvedConflicts,
        nonBlockingDifferences,
        skippedUnsafe,
        onlyLocal,
        onlyRemote,
        sameIds,
        duplicateIds,
        missingIds,
        malformedRecords,
        suspectedDuplicates,
        sparseRisk,
        countSafety,
        shouldApply
      };
    }

    function getDatasetRecordIdIndex(data, source) {
      const index = new Map();
      Object.entries(data?.records || {}).forEach(([dateKey, records]) => {
        if (!Array.isArray(records)) return;
        records.forEach((record, recordIndex) => {
          const recordId = normalizeReferenceId(record?.id);
          if (!recordId) return;
          if (!index.has(recordId)) index.set(recordId, []);
          index.get(recordId).push({ source, dateKey, recordIndex, record });
        });
      });
      return index;
    }

    function areGistRecordSetsEquivalent(leftRecords = {}, rightRecords = {}) {
      const allDates = new Set([...Object.keys(leftRecords), ...Object.keys(rightRecords)]);
      for (const dateKey of allDates) {
        const leftList = Array.isArray(leftRecords[dateKey]) ? leftRecords[dateKey] : [];
        const rightList = Array.isArray(rightRecords[dateKey]) ? rightRecords[dateKey] : [];
        if (leftList.length !== rightList.length) return false;
        const rightById = new Map();
        rightList.forEach((record) => {
          const recordId = normalizeReferenceId(record?.id);
          if (recordId && !rightById.has(recordId)) rightById.set(recordId, record);
        });
        if (rightById.size !== rightList.length) return false;
        for (const leftRecord of leftList) {
          const recordId = normalizeReferenceId(leftRecord?.id);
          const rightRecord = recordId ? rightById.get(recordId) : null;
          if (!rightRecord || getRecordMergeConflictFields(leftRecord, rightRecord).length > 0) {
            return false;
          }
        }
      }
      return true;
    }

    function isGistDataEquivalentForMerge(leftData, rightData) {
      if (!areGistRecordSetsEquivalent(leftData?.records || {}, rightData?.records || {})) return false;
      return stableSerializeForGistMerge(getSettingsFromGistData(leftData))
        === stableSerializeForGistMerge(getSettingsFromGistData(rightData));
    }

    function mergeGistData(localData, remoteData, options = {}) {
      const localRecords = localData?.records || {};
      const remoteRecords = remoteData?.records || {};
      const allDates = [...new Set([
        ...Object.keys(remoteRecords),
        ...Object.keys(localRecords)
      ])].sort();
      const invalidDateRecords = [
        ...Object.entries(localRecords)
          .filter(([, records]) => !Array.isArray(records))
          .map(([dateKey]) => ({ source: "local", dateKey, reason: "date records are not an array" })),
        ...Object.entries(remoteRecords)
          .filter(([, records]) => !Array.isArray(records))
          .map(([dateKey]) => ({ source: "remote", dateKey, reason: "date records are not an array" }))
      ];
      const dateResults = allDates.map((dateKey) => mergeDateRecordsByRecordId(
        localRecords[dateKey] || [],
        remoteRecords[dateKey] || [],
        dateKey,
        {
          localDateExists: Object.prototype.hasOwnProperty.call(localRecords, dateKey),
          remoteDateExists: Object.prototype.hasOwnProperty.call(remoteRecords, dateKey),
          conflictResolution: options.conflictResolution || null,
          resolutionTimestamp: options.resolutionTimestamp || null,
          allowRemoteSparseWithLocalOnly: options.allowRemoteSparseWithLocalOnly === true
        }
      ));

      const localIdIndex = getDatasetRecordIdIndex(localData, "local");
      const remoteIdIndex = getDatasetRecordIdIndex(remoteData, "remote");
      const datasetDuplicateIds = [];
      [["local", localIdIndex], ["remote", remoteIdIndex]].forEach(([source, index]) => {
        index.forEach((occurrences, recordId) => {
          if (occurrences.length > 1) datasetDuplicateIds.push({ source, recordId, occurrences });
        });
      });
      const crossDateIdConflicts = [];
      localIdIndex.forEach((localOccurrences, recordId) => {
        const remoteOccurrences = remoteIdIndex.get(recordId) || [];
        if (localOccurrences.length !== 1 || remoteOccurrences.length !== 1) return;
        if (localOccurrences[0].dateKey === remoteOccurrences[0].dateKey) return;
        crossDateIdConflicts.push({
          recordId,
          local: localOccurrences[0],
          remote: remoteOccurrences[0]
        });
      });

      const mergedRecords = Object.fromEntries(dateResults.map((result) => (
        [result.dateKey, result.mergedRecords]
      )));
      const preferredSettingsData = options.settingsPreference === "local" ? localData : remoteData;
      const fallbackSettingsData = options.settingsPreference === "local" ? remoteData : localData;
      const mergedSettings = normalizeCategoryConfig(
        getSettingsFromGistData(preferredSettingsData)
          || getSettingsFromGistData(fallbackSettingsData)
          || cloneDefaultCategoryConfig()
      );
      const data = {
        records: mergedRecords,
        __settings__: mergedSettings,
        category_config: mergedSettings,
        last_updated: new Date().toISOString()
      };
      const plan = {
        generatedAt: new Date().toISOString(),
        shouldApply: dateResults.every((result) => result.shouldApply)
          && invalidDateRecords.length === 0
          && datasetDuplicateIds.length === 0
          && crossDateIdConflicts.length === 0,
        dateResults,
        invalidDateRecords,
        datasetDuplicateIds,
        crossDateIdConflicts,
        conflicts: dateResults.flatMap((result) => result.conflicts),
        resolvedConflicts: dateResults.flatMap((result) => result.resolvedConflicts),
        manuallyResolvedConflicts: dateResults.flatMap((result) => result.manuallyResolvedConflicts),
        nonBlockingDifferences: dateResults.flatMap((result) => result.nonBlockingDifferences),
        sparseRisks: dateResults.filter((result) => result.sparseRisk.hasRisk)
          .map((result) => result.sparseRisk),
        skippedUnsafe: dateResults.flatMap((result) => result.skippedUnsafe),
        data
      };
      window.__dotlogLastGistMergePlan = plan;

      if (!plan.shouldApply) {
        console.warn("[Dotlog] record.id 合并发现风险，已阻止本地应用和远程推送", plan);
        const error = new Error("GIST_MERGE_UNSAFE");
        error.mergePlan = plan;
        throw error;
      }
      return data;
    }

    function canManuallyResolveGistMergeRisks(plan) {
      if (!plan) return false;
      const hasEligibleSparseRisk = plan.sparseRisks.some((risk) => risk.manualUnionEligible);
      if (plan.conflicts.length === 0 && !hasEligibleSparseRisk) return false;
      if (plan.invalidDateRecords.length > 0
        || plan.datasetDuplicateIds.length > 0
        || plan.crossDateIdConflicts.length > 0
        || plan.sparseRisks.some((risk) => !risk.manualUnionEligible)) return false;
      return plan.dateResults.every((result) => (
        result.countSafety.preservesLocalCount
        && result.countSafety.preservesRemoteCount
        && result.skippedUnsafe.every((item) => (
          item.type === "unresolved-conflict" || item.type === "sparse-risk"
        ))
      ));
    }

    function describeGistMergeBlockers(plan) {
      if (!plan) return "无法读取合并风险详情";
      const blockers = [];
      const skippedTypes = new Set(plan.skippedUnsafe.map((item) => item.type));
      if (skippedTypes.has("missing-id")) blockers.push("存在缺少 ID 的记录");
      if (skippedTypes.has("duplicate-id") || plan.datasetDuplicateIds.length > 0) {
        blockers.push("存在重复 record.id");
      }
      if (skippedTypes.has("malformed-record") || plan.invalidDateRecords.length > 0) {
        blockers.push("存在格式异常的记录或日期数据");
      }
      if (skippedTypes.has("suspected-duplicate")) blockers.push("存在疑似重复记录");
      if (plan.crossDateIdConflicts.length > 0) blockers.push("相同 record.id 出现在不同日期");
      if (plan.sparseRisks.some((risk) => risk.sparseSide === "local")) {
        blockers.push("当前设备记录明显少于远程");
      }
      if (plan.sparseRisks.some((risk) => (
        risk.sparseSide === "remote" && !risk.manualUnionEligible
      ))) {
        blockers.push("远程记录较少，但无法由本地独有记录安全解释");
      }
      return blockers.length > 0 ? blockers.join("；") : "存在尚不能安全自动处理的合并风险";
    }

    async function auditDotlogSyncState() {
      const dateKeyPattern = /^\d{4}-\d{2}-\d{2}$/;
      const recordUuidPattern = /^rec_[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
      const cleanString = (value) => typeof value === "string" ? value.trim() : "";
      const isRealDate = (dateKey) => {
        if (!dateKeyPattern.test(dateKey)) return false;
        const [year, month, day] = dateKey.split("-").map(Number);
        const parsed = new Date(Date.UTC(year, month - 1, day));
        return parsed.getUTCFullYear() === year
          && parsed.getUTCMonth() === month - 1
          && parsed.getUTCDate() === day;
      };
      const recordSummary = (source, dateKey, recordIndex, record) => ({
        source,
        dateKey,
        recordIndex,
        recordId: cleanString(record?.id) || null,
        start: cleanString(record?.start || record?.startTime) || null,
        end: cleanString(record?.end || record?.endTime || record?.time) || null,
        title: cleanString(record?.title || record?.text || record?.summary || record?.description) || null
      });

      const errors = {
        local: [],
        remote: [],
        remoteRequest: null,
        malformedRecords: []
      };
      const localAbnormalDateKeys = [];
      const remoteAbnormalDateKeys = [];
      const localRecordsByDate = {};
      const localErrorDateKeys = new Set();
      for (let index = 0; index < localStorage.length; index += 1) {
        const storageKey = localStorage.key(index);
        if (!storageKey?.startsWith("time_tracker_")) continue;
        const dateKey = storageKey.replace(/^time_tracker_/, "");
        if (!isRealDate(dateKey)) {
          localAbnormalDateKeys.push(storageKey);
          continue;
        }
        try {
          const records = JSON.parse(localStorage.getItem(storageKey));
          if (!Array.isArray(records)) throw new Error("记录数据不是数组");
          localRecordsByDate[dateKey] = records;
        } catch (error) {
          localErrorDateKeys.add(dateKey);
          errors.local.push({
            dateKey,
            storageKey,
            error: error instanceof Error ? error.message : String(error)
          });
        }
      }

      let remoteReadSucceeded = false;
      let remoteRequestAttempted = false;
      const remoteRecordsByDate = {};
      const remoteErrorDateKeys = new Set();
      if (syncInProgress) {
        errors.remoteRequest = "真实同步正在进行，请等待完成后重新审计";
      } else {
        const { token, gistId } = getGistSettings();
        if (!token || !gistId) {
          errors.remoteRequest = "Gist Token 或 Gist ID 未配置";
        } else {
          try {
            remoteRequestAttempted = true;
            const gist = await requestGist("GET");
            const content = gist.files?.[gistDataFile]?.content;
            if (!content) throw new Error(`${gistDataFile} 不存在或内容为空`);
            const remoteData = JSON.parse(content);
            if (!remoteData || typeof remoteData !== "object" || Array.isArray(remoteData)) {
              throw new Error("远程 Gist 数据不是对象");
            }
            if (!remoteData.records || typeof remoteData.records !== "object"
              || Array.isArray(remoteData.records)) {
              throw new Error("远程 records 不是对象");
            }
            Object.entries(remoteData.records).forEach(([dateKey, records]) => {
              if (!isRealDate(dateKey)) {
                remoteAbnormalDateKeys.push(dateKey);
                errors.remote.push({ dateKey, error: "远程日期 key 异常" });
                return;
              }
              if (!Array.isArray(records)) {
                remoteErrorDateKeys.add(dateKey);
                errors.remote.push({ dateKey, error: "远程日期记录不是数组" });
                return;
              }
              remoteRecordsByDate[dateKey] = records;
            });
            remoteReadSucceeded = true;
          } catch (error) {
            errors.remoteRequest = error instanceof Error ? error.message : String(error);
          }
        }
      }

      const scanRecordIds = (recordsByDate, source) => {
        const idIndex = new Map();
        const missing = [];
        const abnormal = [];
        Object.entries(recordsByDate).forEach(([dateKey, records]) => {
          records.forEach((record, recordIndex) => {
            const summary = recordSummary(source, dateKey, recordIndex, record);
            if (!record || typeof record !== "object" || Array.isArray(record)) {
              errors.malformedRecords.push({ ...summary, reason: "记录不是对象" });
              return;
            }
            const recordId = cleanString(record.id);
            if (!recordId) {
              missing.push(summary);
              return;
            }
            if (!idIndex.has(recordId)) idIndex.set(recordId, []);
            idIndex.get(recordId).push({ source, dateKey, recordIndex, record });
            if (!recordId.startsWith("rec_legacy_") && !recordUuidPattern.test(recordId)) {
              abnormal.push(summary);
            }
          });
        });
        const duplicates = [...idIndex.entries()]
          .filter(([, occurrences]) => occurrences.length > 1)
          .map(([recordId, occurrences]) => ({
            source,
            recordId,
            occurrences: occurrences.map(({ dateKey, recordIndex, record }) => (
              recordSummary(source, dateKey, recordIndex, record)
            ))
          }));
        const sameDateDuplicates = duplicates.filter(({ occurrences }) => (
          new Set(occurrences.map(({ dateKey }) => dateKey)).size < occurrences.length
        ));
        return { idIndex, missing, abnormal, duplicates, sameDateDuplicates };
      };

      const localIdHealth = scanRecordIds(localRecordsByDate, "local");
      const remoteIdHealth = scanRecordIds(remoteRecordsByDate, "remote");
      const localDates = Object.keys(localRecordsByDate).sort();
      const remoteDates = Object.keys(remoteRecordsByDate).sort();
      const localDateSet = new Set(localDates);
      const remoteDateSet = new Set(remoteDates);
      const allDates = [...new Set([
        ...localDates,
        ...remoteDates,
        ...localErrorDateKeys,
        ...remoteErrorDateKeys
      ])].sort();

      const crossDateIdConflicts = [];
      localIdHealth.idIndex.forEach((localOccurrences, recordId) => {
        const remoteOccurrences = remoteIdHealth.idIndex.get(recordId) || [];
        if (localOccurrences.length !== 1 || remoteOccurrences.length !== 1) return;
        if (localOccurrences[0].dateKey === remoteOccurrences[0].dateKey) return;
        crossDateIdConflicts.push({
          recordId,
          local: recordSummary(
            "local",
            localOccurrences[0].dateKey,
            localOccurrences[0].recordIndex,
            localOccurrences[0].record
          ),
          remote: recordSummary(
            "remote",
            remoteOccurrences[0].dateKey,
            remoteOccurrences[0].recordIndex,
            remoteOccurrences[0].record
          )
        });
      });

      const duplicateRiskDates = new Set([
        ...localIdHealth.duplicates.flatMap(({ occurrences }) => occurrences.map(({ dateKey }) => dateKey)),
        ...remoteIdHealth.duplicates.flatMap(({ occurrences }) => occurrences.map(({ dateKey }) => dateKey)),
        ...crossDateIdConflicts.flatMap(({ local, remote }) => [local.dateKey, remote.dateKey])
      ]);
      const missingRiskDates = new Set([
        ...localIdHealth.missing.map(({ dateKey }) => dateKey),
        ...remoteIdHealth.missing.map(({ dateKey }) => dateKey)
      ]);
      const abnormalIdDates = new Set([
        ...localIdHealth.abnormal.map(({ dateKey }) => dateKey),
        ...remoteIdHealth.abnormal.map(({ dateKey }) => dateKey)
      ]);
      const malformedDates = new Set(errors.malformedRecords.map(({ dateKey }) => dateKey));

      const dateResults = allDates.map((dateKey) => mergeDateRecordsByRecordId(
        localRecordsByDate[dateKey] || [],
        remoteRecordsByDate[dateKey] || [],
        dateKey,
        {
          localDateExists: localDateSet.has(dateKey),
          remoteDateExists: remoteDateSet.has(dateKey)
        }
      ));
      const dateResultByKey = new Map(dateResults.map((result) => [result.dateKey, result]));

      const localOnlyRecords = dateResults.flatMap((result) => result.onlyLocal.map((item) => ({
        ...recordSummary("local", result.dateKey, null, item.record),
        recordId: item.recordId
      })));
      const remoteOnlyRecords = dateResults.flatMap((result) => result.onlyRemote.map((item) => ({
        ...recordSummary("remote", result.dateKey, null, item.record),
        recordId: item.recordId
      })));
      const localOnlyMissingFromCandidate = [];
      const remoteOnlyMissingFromCandidate = [];
      dateResults.forEach((result) => {
        const mergedIds = new Set(result.mergedRecords
          .map((record) => normalizeReferenceId(record?.id))
          .filter(Boolean));
        result.onlyLocal.forEach((item) => {
          if (!mergedIds.has(item.recordId)) localOnlyMissingFromCandidate.push(item);
        });
        result.onlyRemote.forEach((item) => {
          if (!mergedIds.has(item.recordId)) remoteOnlyMissingFromCandidate.push(item);
        });
      });

      const dailyStatus = allDates.map((dateKey) => {
        const result = dateResultByKey.get(dateKey);
        const hasParseError = localErrorDateKeys.has(dateKey) || remoteErrorDateKeys.has(dateKey);
        let status = "healthy";
        if (!remoteReadSucceeded || hasParseError || malformedDates.has(dateKey)) {
          status = "needs-manual-review";
        } else if (missingRiskDates.has(dateKey)) {
          status = "missing-id-risk";
        } else if (duplicateRiskDates.has(dateKey)) {
          status = "duplicate-id-risk";
        } else if (result.conflicts.length > 0) {
          status = "content-conflict-risk";
        } else if (result.sparseRisk.hasRisk) {
          status = result.sparseRisk.sparseSide === "local"
            ? "local-sparse-risk"
            : "remote-sparse-risk";
        } else if (result.suspectedDuplicates.length > 0 || abnormalIdDates.has(dateKey)) {
          status = "needs-manual-review";
        } else if (result.onlyLocal.length > 0 || result.onlyRemote.length > 0
          || result.resolvedConflicts.length > 0) {
          status = "safe-to-sync";
        }

        const mergedCount = result.countSafety.mergedCount;
        const localCount = (localRecordsByDate[dateKey] || []).length;
        const remoteCount = (remoteRecordsByDate[dateKey] || []).length;
        return {
          dateKey,
          status,
          localCount,
          remoteCount,
          theoreticalMergedCount: mergedCount,
          sameIdCount: result.sameIds.length,
          onlyLocalCount: result.onlyLocal.length,
          onlyRemoteCount: result.onlyRemote.length,
          contentConflictCount: result.conflicts.length,
          resolvedConflictCount: result.resolvedConflicts.length,
          nonBlockingDifferenceCount: result.nonBlockingDifferences.length,
          suspectedDuplicateCount: result.suspectedDuplicates.length,
          sparseRisk: result.sparseRisk.hasRisk,
          shouldApplyBy7B: result.shouldApply
            && !duplicateRiskDates.has(dateKey)
            && !hasParseError,
          recommendedAutoSync: status === "healthy" || status === "safe-to-sync",
          theoreticalCountDecrease: mergedCount < localCount || mergedCount < remoteCount
        };
      });

      const localSparseDates = dateResults
        .filter((result) => result.sparseRisk.hasRisk && result.sparseRisk.sparseSide === "local")
        .map((result) => result.sparseRisk);
      const remoteSparseDates = dateResults
        .filter((result) => result.sparseRisk.hasRisk && result.sparseRisk.sparseSide === "remote")
        .map((result) => result.sparseRisk);
      const theoreticalCountDecreaseDates = dailyStatus
        .filter(({ theoreticalCountDecrease }) => theoreticalCountDecrease);
      const datesNotAutoSync = dailyStatus.filter(({ status }) => (
        status !== "healthy" && status !== "safe-to-sync"
      ));
      const contentConflicts = dateResults.flatMap((result) => result.conflicts);
      const resolvedConflicts = dateResults.flatMap((result) => result.resolvedConflicts);
      const nonBlockingDifferences = dateResults.flatMap((result) => result.nonBlockingDifferences);
      const suspectedDuplicates = dateResults.flatMap((result) => result.suspectedDuplicates);

      const globalErrors = Boolean(
        errors.local.length
        || errors.remote.length
        || errors.malformedRecords.length
        || localAbnormalDateKeys.length
        || remoteAbnormalDateKeys.length
      );
      const safeForAutomaticSync = remoteReadSucceeded
        && !globalErrors
        && datesNotAutoSync.length === 0
        && localOnlyMissingFromCandidate.length === 0
        && remoteOnlyMissingFromCandidate.length === 0
        && theoreticalCountDecreaseDates.length === 0;
      const fullyConverged = safeForAutomaticSync
        && dailyStatus.every(({ status }) => status === "healthy");

      const report = {
        generatedAt: new Date().toISOString(),
        readOnly: true,
        remoteRequestMethod: remoteRequestAttempted ? "GET" : null,
        overview: {
          localDateCount: localDates.length,
          remoteDateCount: remoteDates.length,
          localRecordCount: Object.values(localRecordsByDate)
            .reduce((sum, records) => sum + records.length, 0),
          remoteRecordCount: Object.values(remoteRecordsByDate)
            .reduce((sum, records) => sum + records.length, 0),
          sharedDateKeys: allDates.filter((dateKey) => localDateSet.has(dateKey) && remoteDateSet.has(dateKey)),
          onlyLocalDateKeys: localDates.filter((dateKey) => !remoteDateSet.has(dateKey)),
          onlyRemoteDateKeys: remoteDates.filter((dateKey) => !localDateSet.has(dateKey))
        },
        recordIds: {
          localDuplicateIds: localIdHealth.duplicates,
          remoteDuplicateIds: remoteIdHealth.duplicates,
          sameDateDuplicateIds: [
            ...localIdHealth.sameDateDuplicates,
            ...remoteIdHealth.sameDateDuplicates
          ],
          crossDateIdConflicts,
          localMissingIds: localIdHealth.missing,
          remoteMissingIds: remoteIdHealth.missing,
          localAbnormalIds: localIdHealth.abnormal,
          remoteAbnormalIds: remoteIdHealth.abnormal
        },
        mergeRisks: {
          localOnlyRecords,
          remoteOnlyRecords,
          localOnlyMissingFromCandidate,
          remoteOnlyMissingFromCandidate,
          contentConflicts,
          resolvedConflicts,
          nonBlockingDifferences,
          suspectedDuplicates,
          sparseDates: [...localSparseDates, ...remoteSparseDates]
        },
        quantityRisks: {
          localSignificantlyLessThanRemote: localSparseDates,
          remoteSignificantlyLessThanLocal: remoteSparseDates,
          theoreticalCountDecreaseDates,
          datesNotAutoSync
        },
        dailyStatus,
        health: {
          remoteReadSucceeded,
          safeForAutomaticSync,
          fullyConverged,
          status: !safeForAutomaticSync
            ? "needs-manual-review"
            : fullyConverged ? "healthy" : "safe-to-sync",
          recommendation: !safeForAutomaticSync
            ? "存在阻断项，不应自动同步；先检查 quantityRisks、recordIds 和 mergeRisks。"
            : fullyConverged
              ? "本地与远程已按 record.id 收敛，未发现同步风险。"
              : "未发现阻断项，存在可安全同步的单侧新增记录。"
        },
        errors: {
          ...errors,
          localAbnormalDateKeys,
          remoteAbnormalDateKeys
        }
      };

      window.__dotlogSyncHealthAudit = report;
      console.group("[Dotlog] 第 7B 同步改造后健康审计（只读）");
      console.log("完整报告：window.__dotlogSyncHealthAudit", report);
      console.table([{
        本地日期: report.overview.localDateCount,
        远程日期: report.overview.remoteDateCount,
        本地记录: report.overview.localRecordCount,
        远程记录: report.overview.remoteRecordCount,
        本地重复ID: report.recordIds.localDuplicateIds.length,
        远程重复ID: report.recordIds.remoteDuplicateIds.length,
        内容冲突: report.mergeRisks.contentConflicts.length,
        稀疏日期: report.mergeRisks.sparseDates.length,
        总体状态: report.health.status
      }]);
      console.groupCollapsed("每日同步健康状态");
      console.table(report.dailyStatus);
      console.groupEnd();
