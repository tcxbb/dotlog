    function findEntrySuggestion(inputText) {
      const text = inputText.trim();
      if (!text) return null;

      let bestMatch = null;
      getCategories().forEach((category) => {
        category.tags.forEach((tag) => {
          const triggers = Array.isArray(tag.triggers) ? tag.triggers : [];
          triggers.forEach((rawTrigger) => {
            const trigger = String(rawTrigger).trim();
            if (!trigger || !text.includes(trigger)) return;
            if (bestMatch && trigger.length <= bestMatch.trigger.length) return;
            bestMatch = {
              categoryName: category.name,
              categoryId: category.id,
              tagName: tag.name,
              tagId: tag.id,
              trigger,
              key: JSON.stringify([category.name, tag.name, trigger])
            };
          });
        });
      });
      return bestMatch;
    }

    function renderEntrySuggestion() {
      const suggestion = findEntrySuggestion(entryInput.value);
      const hidden = !suggestion || suggestion.key === dismissedEntrySuggestionKey;
      entrySuggestion.classList.toggle("is-hidden", hidden);
      entrySuggestionValue.textContent = hidden
        ? ""
        : `${suggestion.categoryName} + #${suggestion.tagName}`;
    }

    function resetEntrySuggestion() {
      dismissedEntrySuggestionKey = null;
      renderEntrySuggestion();
    }

    function acceptCurrentEntrySuggestion() {
      const suggestion = findEntrySuggestion(entryInput.value);
      if (!suggestion || suggestion.key === dismissedEntrySuggestionKey) return;

      if (entryClassificationDraft.category === suggestion.categoryName) {
        const tags = entryClassificationDraft.tags.includes(suggestion.tagName)
          ? [...entryClassificationDraft.tags]
          : [...entryClassificationDraft.tags, suggestion.tagName];
        entryClassificationDraft = resolveClassificationFields({
          category: suggestion.categoryName,
          tags,
          categoryId: suggestion.categoryId,
          tagIds: tags.map((tagName, index) => (
            tagName === suggestion.tagName
              ? suggestion.tagId
              : Array.isArray(entryClassificationDraft.tagIds) ? entryClassificationDraft.tagIds[index] : null
          ))
        });
      } else {
        entryClassificationDraft = resolveClassificationFields({
          category: suggestion.categoryName,
          tags: [suggestion.tagName],
          categoryId: suggestion.categoryId,
          tagIds: [suggestion.tagId]
        });
      }

      dismissedEntrySuggestionKey = suggestion.key;
      renderEntryClassification();
      renderEntrySuggestion();
    }

    function dismissCurrentEntrySuggestion() {
      const suggestion = findEntrySuggestion(entryInput.value);
      if (!suggestion) return;
      dismissedEntrySuggestionKey = suggestion.key;
      renderEntrySuggestion();
    }

    function renderEntryClassification() {
      const categoryRow = document.createElement("div");
      categoryRow.className = "entry-classification-row";

      const categoryLabel = document.createElement("span");
      categoryLabel.className = "entry-classification-label";
      categoryLabel.textContent = "分类";

      const categoryOptions = document.createElement("div");
      categoryOptions.className = "entry-classification-options";

      getCategories().forEach((category) => {
        const button = document.createElement("button");
        button.className = "category-option";
        button.type = "button";
        button.textContent = category.name;
        button.setAttribute("aria-pressed", String(entryClassificationDraft.category === category.name));

        if (entryClassificationDraft.category === category.name) {
          button.classList.add("is-selected");
          button.style.backgroundColor = category.color;
          button.style.borderColor = category.color;
        }

        button.addEventListener("click", () => {
          const selectingCurrent = entryClassificationDraft.category === category.name;
          entryClassificationDraft = resolveClassificationFields({
            category: selectingCurrent ? null : category.name,
            tags: [],
            categoryId: selectingCurrent ? null : category.id,
            tagIds: []
          });
          renderEntryClassification();
        });
        categoryOptions.append(button);
      });

      categoryRow.append(categoryLabel, categoryOptions);
      const rows = [categoryRow];
      const availableTags = entryClassificationDraft.category
        ? getCategoryTags(entryClassificationDraft.category)
        : [];

      if (availableTags.length > 0) {
        const tagRow = document.createElement("div");
        tagRow.className = "entry-classification-row";

        const tagLabel = document.createElement("span");
        tagLabel.className = "entry-classification-label";
        tagLabel.textContent = "标签";

        const tagOptions = document.createElement("div");
        tagOptions.className = "entry-classification-options";

        availableTags.forEach((tag) => {
          const button = document.createElement("button");
          button.className = "tag-option";
          button.type = "button";
          button.textContent = `#${tag}`;
          button.setAttribute("aria-pressed", String(entryClassificationDraft.tags.includes(tag)));

          if (entryClassificationDraft.tags.includes(tag)) {
            const color = categoryColor(entryClassificationDraft.category);
            button.classList.add("is-selected");
            button.style.backgroundColor = color;
            button.style.borderColor = color;
          }

          button.addEventListener("click", () => {
            const nextTags = entryClassificationDraft.tags.includes(tag)
              ? entryClassificationDraft.tags.filter((item) => item !== tag)
              : [...entryClassificationDraft.tags, tag];
            entryClassificationDraft = resolveClassificationFields({
              category: entryClassificationDraft.category,
              tags: nextTags,
              categoryId: entryClassificationDraft.categoryId,
              tagIds: entryClassificationDraft.tagIds
            });
            renderEntryClassification();
          });
          tagOptions.append(button);
        });

        tagRow.append(tagLabel, tagOptions);
        rows.push(tagRow);
      }

      entryClassification.replaceChildren(...rows);
    }

    function resetEntryClassification() {
      entryClassificationDraft = { category: null, tags: [], categoryId: null, tagIds: [] };
      renderEntryClassification();
    }

    function entryClassificationFields() {
      return resolveClassificationFields({
        category: entryClassificationDraft.category,
        tags: entryClassificationDraft.category ? [...entryClassificationDraft.tags] : [],
        categoryId: entryClassificationDraft.categoryId,
        tagIds: entryClassificationDraft.tagIds
      });
    }

    function activeEntryTiming() {
      if (!backfillPanel.classList.contains("is-hidden")) {
        return {
          date: dateFromSelectors(backfillYear, backfillMonth, backfillDay),
          endTime: isValidTimeInput(entryEndTime.value) ? entryEndTime.value : formatTime(new Date())
        };
      }

      return {
        date: today,
        endTime: isValidTimeInput(entryEndTime.value) ? entryEndTime.value : formatTime(new Date())
      };
    }

    function resetEntryEndTime() {
      entryEndTime.value = formatTime(new Date());
    }

    function refreshEntryStartTime(force = false) {
      if (entryStartTimeTouched && !force) return;
      const timing = activeEntryTiming();
      entryStartTime.value = getDefaultStartTime(timing.date, timing.endTime);
    }

    function resolveEntryStartTime(date, endTime) {
      if (entryStartTimeTouched && isValidTimeInput(entryStartTime.value)) {
        return entryStartTime.value;
      }
      return getDefaultStartTime(date, endTime);
    }

    function validateEntryInterval(date, startTime, endTime) {
      if (!isValidTimeInput(startTime) || !isValidTimeInput(endTime)) {
        alert("请选择正确的开始时间");
        return false;
      }

      const startMinutes = timeToMinutes(startTime);
      const endMinutes = timeToMinutes(endTime);
      const previousRecord = loadRecords(date)
        .filter((record) => timeToMinutes(record.time) < endMinutes)
        .sort((first, second) => timeToMinutes(second.time) - timeToMinutes(first.time))[0];

      if (previousRecord) {
        const previousEndMinutes = timeToMinutes(previousRecord.time);
        if (startMinutes < previousEndMinutes || startMinutes > endMinutes) {
          alert(`开始时间应在 ${previousRecord.time}–${endTime} 之间`);
          return false;
        }
      } else if (startMinutes > endMinutes) {
        const previousDayBoundary = getPreviousDayBoundary(date);
        if (previousDayBoundary && startMinutes < timeToMinutes(previousDayBoundary.record.time)) {
          alert(`开始时间不能早于前一天最后记录 ${previousDayBoundary.record.time}`);
          return false;
        }
      }

      return true;
    }

    function resetEntryStartTime() {
      entryStartTimeTouched = false;
      refreshEntryStartTime(true);
    }

    function updateBottomSheetViewport() {
      if (!window.visualViewport || bottomSheet.classList.contains("is-hidden")) return;
      const viewport = window.visualViewport;
      const layoutHeight = Math.max(window.innerHeight, document.documentElement.clientHeight);
      const keyboardOffset = Math.max(0, layoutHeight - viewport.height - viewport.offsetTop);
      bottomSheet.style.bottom = `${keyboardOffset}px`;
      bottomSheet.style.maxHeight = `${Math.max(260, viewport.height - 12)}px`;
    }

    function resetBottomSheetViewport() {
      bottomSheet.style.bottom = "";
      bottomSheet.style.maxHeight = "";
    }

    function openBottomSheet() {
      clearTimeout(bottomSheetCloseTimer);
      lockBottomSheetBackgroundScroll();
      bottomSheet.classList.remove("is-hidden");
      sheetOverlay.classList.remove("is-hidden");
      fab.classList.add("is-hidden");
      renderEntryClassification();
      renderEntrySuggestion();
      resetEntryEndTime();
      refreshEntryStartTime(true);
      requestAnimationFrame(() => {
        bottomSheet.classList.add("is-open");
        updateBottomSheetViewport();
      });
      setTimeout(() => {
        if (bottomSheet.classList.contains("is-open")) entryInput.focus();
      }, 300);
    }

    function closeBottomSheet() {
      clearTimeout(bottomSheetCloseTimer);
      bottomSheet.classList.remove("is-open");
      if (bottomSheet.classList.contains("is-hidden")) {
        toggleBackfillPanel(false);
        unlockBottomSheetBackgroundScroll();
        return;
      }
      bottomSheetCloseTimer = setTimeout(() => {
        bottomSheet.classList.add("is-hidden");
        sheetOverlay.classList.add("is-hidden");
        toggleBackfillPanel(false);
        resetBottomSheetViewport();
        unlockBottomSheetBackgroundScroll();
        fab.classList.toggle("is-hidden", settingsMode !== "main");
      }, 300);
    }

    function toggleBackfillPanel(open) {
      backfillPanel.classList.toggle("is-hidden", !open);
      if (open) {
        setDateSelectors(backfillYear, backfillMonth, backfillDay, today);
        resetEntryEndTime();
        entryStartTimeTouched = false;
        refreshEntryStartTime(true);
        backfillError.classList.add("is-hidden");
      } else if (!bottomSheet.classList.contains("is-hidden")) {
        entryStartTimeTouched = false;
        refreshEntryStartTime(true);
      }
    }

    function setBackfillError(message) {
      backfillError.textContent = message;
      backfillError.classList.remove("is-hidden");
    }

    function validateBackfillPanel() {
      const valid = isValidTimeInput(entryEndTime.value);
      entryEndTime.classList.toggle("is-invalid", !valid);
      if (!valid) {
        setBackfillError("请选择正确的结束时间");
      } else {
        backfillError.classList.add("is-hidden");
      }
      return valid;
    }

    function submitBackfillPanel() {
      const time = entryEndTime.value;
      const rawText = entryInput.value.trim();
      const targetDate = dateFromSelectors(backfillYear, backfillMonth, backfillDay);

      if (!validateBackfillPanel()) {
        entryEndTime.focus();
        return;
      }

      if (!rawText) {
        setBackfillError("请填写事件描述");
        entryInput.focus();
        return;
      }

      const parsedEntry = parseEntryText(rawText);
      const classification = entryClassificationFields();
      const startTime = resolveEntryStartTime(targetDate, time);
      if (!validateEntryInterval(targetDate, startTime, time)) return;
      const newRecord = {
        startTime,
        time,
        text: parsedEntry.text,
        category: classification.category,
        note: parsedEntry.note,
        tags: classification.tags,
        isBackfill: true,
        isSplit: false
      };

      insertNewRecords(targetDate, [newRecord]);
      entryInput.value = "";
      updateSplitHint();
      resetEntrySuggestion();
      resetEntryClassification();
      resetEntryStartTime();
      toggleBackfillPanel(false);
      if (formatDateKey(targetDate) === formatDateKey(viewedDate)) {
        render();
      } else {
        openCategoryIndexes = [];
        openTagIndexes = [];
        render();
        showExportStatus(`已补录至 ${formatShortDateLabel(targetDate)}`);
      }
      closeBottomSheet();
    }

    entryForm.addEventListener("submit", (event) => {
      event.preventDefault();

      if (!backfillPanel.classList.contains("is-hidden")) {
        submitBackfillPanel();
        return;
      }

      const rawText = entryInput.value.trim();
      if (!rawText) {
        return;
      }

      const backfill = parseBackfill(rawText);
      if (!backfill) {
        return;
      }

      if (!backfill.isBackfill) backfill.time = activeEntryTiming().endTime;
      const split = parseSplit(backfill.text, backfill.time);
      if (!split) {
        return;
      }

      const newRecords = [];
      const classification = entryClassificationFields();
      const firstEndTime = split.isSplit ? split.secondaryEndTime : backfill.time;
      const startTime = resolveEntryStartTime(today, firstEndTime);
      if (!validateEntryInterval(today, startTime, firstEndTime)) return;

      if (split.isSplit) {
        const mainEntry = parseEntryText(split.mainText);
        const secondaryEntry = parseEntryText(split.secondaryText);
        newRecords.push(
          {
            startTime,
            time: split.secondaryEndTime,
            text: mainEntry.text,
            category: classification.category,
            note: mainEntry.note,
            tags: [...classification.tags],
            isBackfill: backfill.isBackfill,
            isSplit: true
          },
          {
            startTime: split.secondaryEndTime,
            time: backfill.time,
            text: secondaryEntry.text,
            category: classification.category,
            note: secondaryEntry.note,
            tags: [...classification.tags],
            isBackfill: backfill.isBackfill,
            isSplit: true
          }
        );
      } else {
        const parsedEntry = parseEntryText(backfill.text);
        newRecords.push({
          startTime,
          time: backfill.time,
          text: parsedEntry.text,
          category: classification.category,
          note: parsedEntry.note,
          tags: classification.tags,
          isBackfill: backfill.isBackfill,
          isSplit: false
        });
      }

      insertNewRecords(today, newRecords);
      viewedDate = startOfDay(new Date());
      currentWeekStart = getWeekStart(viewedDate);
      entryInput.value = "";
      updateSplitHint();
      resetEntrySuggestion();
      resetEntryClassification();
      resetEntryStartTime();
      resetEntryEndTime();
      render();
      closeBottomSheet();
    });

    tableToggle.addEventListener("click", () => {
      closeCalendarMenu();
      const records = loadRecords(viewedDate);

      if (!tableExpanded && buildTimeRows(records, viewedDate).rows.length === 0) {
        alert("至少需要一个完整时间区间才能生成表格");
        return;
      }

      tableExpanded = !tableExpanded;
      render();
    });

    calendarMenuWrap.addEventListener("click", (event) => {
      event.stopPropagation();
    });

    exportIcs.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopImmediatePropagation();
      toggleCalendarMenu();
    }, true);

    importCalendarOption.addEventListener("click", () => {
      closeCalendarMenu();
      openCalendarImportPanel();
    });

    exportIcsOption.addEventListener("click", () => {
      openExportRangePanel("ics");
    });

    exportCsvOption.addEventListener("click", () => {
      openExportRangePanel("csv");
    });

    calendarImportOverlay.addEventListener("click", (event) => {
      if (event.target === calendarImportOverlay) {
        closeCalendarImportPanel();
      }
    });

    exportRangeOverlay.addEventListener("click", (event) => {
      if (event.target === exportRangeOverlay) {
        closeExportRangePanel();
      }
    });

    ctxEdit.addEventListener("click", () => {
      if (ctxTargetIndex === null || !ctxTargetRecord) return;
      const targetIndex = ctxTargetIndex;
      const targetRecord = ctxTargetRecord;
      closeCtxMenu();
      startEditingRecord(targetIndex, targetRecord);
    });

    ctxDelete.addEventListener("click", () => {
      if (ctxTargetIndex === null) return;
      const targetIndex = ctxTargetIndex;
      closeCtxMenu();
      if (!confirm("确认删除这条记录？")) return;
      const latestRecords = loadRecords(viewedDate);
      latestRecords.splice(targetIndex, 1);
      saveRecords(viewedDate, latestRecords, {
        allowRecordCountDecrease: true,
        expectedDecrease: 1,
        reason: "delete-record"
      });
      openCategoryIndexes = [];
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
      render();
    });

    ctxOverlay.addEventListener("click", closeCtxMenu);

    entryInput.addEventListener("input", () => {
      dismissedEntrySuggestionKey = null;
      updateSplitHint();
      renderEntrySuggestion();
      if (entryInput.value.trim() && backfillError.textContent === "请填写事件描述") {
        backfillError.classList.add("is-hidden");
      }
    });

    acceptEntrySuggestion.addEventListener("click", acceptCurrentEntrySuggestion);
    dismissEntrySuggestion.addEventListener("click", dismissCurrentEntrySuggestion);

    entryStartTime.addEventListener("input", () => {
      entryStartTimeTouched = true;
    });

    entryStartTime.addEventListener("click", () => openTimePicker(entryStartTime, "选择开始时间"));

    entryEndTime.addEventListener("input", () => refreshEntryStartTime());
    entryEndTime.addEventListener("click", () => openTimePicker(entryEndTime, "选择结束时间"));

    timePickerHour.addEventListener("scroll", () => settleTimePickerColumn(timePickerHour), { passive: true });
    timePickerMinute.addEventListener("scroll", () => settleTimePickerColumn(timePickerMinute), { passive: true });
    timePickerOverlay.addEventListener("click", closeTimePicker);
    timePickerCancel.addEventListener("click", closeTimePicker);
    timePickerConfirm.addEventListener("click", confirmTimePicker);

    entryStartAuto.addEventListener("click", () => {
      entryStartTimeTouched = false;
      refreshEntryStartTime(true);
    });

    insertPlusBtn.addEventListener("click", () => {
      const start = entryInput.selectionStart ?? entryInput.value.length;
      const end = entryInput.selectionEnd ?? start;
      const insertion = " + ";
      entryInput.value = entryInput.value.slice(0, start) + insertion + entryInput.value.slice(end);
      const newPosition = start + insertion.length;
      entryInput.setSelectionRange(newPosition, newPosition);
      dismissedEntrySuggestionKey = null;
      updateSplitHint();
      renderEntrySuggestion();
      entryInput.focus();
    });

    fab.addEventListener("click", () => {
      if (bottomSheet.classList.contains("is-open")) {
        closeBottomSheet();
      } else {
        openBottomSheet();
      }
    });

    sheetOverlay.addEventListener("click", closeBottomSheet);
    sheetOverlay.addEventListener("touchmove", (event) => {
      event.preventDefault();
    }, { passive: false });

    backfillToggle.addEventListener("click", () => {
      toggleBackfillPanel(backfillPanel.classList.contains("is-hidden"));
    });

    backfillYear.addEventListener("change", () => {
      refreshDaySelector(backfillYear, backfillMonth, backfillDay);
      refreshEntryStartTime();
    });
    backfillMonth.addEventListener("change", () => {
      refreshDaySelector(backfillYear, backfillMonth, backfillDay);
      refreshEntryStartTime();
    });
    backfillDay.addEventListener("change", () => refreshEntryStartTime());

    confirmBackfill.addEventListener("click", submitBackfillPanel);

    cancelBackfill.addEventListener("click", () => {
      toggleBackfillPanel(false);
    });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", updateBottomSheetViewport);
      window.visualViewport.addEventListener("scroll", updateBottomSheetViewport);
    }

    bottomSheet.addEventListener("focusin", (event) => {
      setTimeout(() => {
        updateBottomSheetViewport();
        if (event.target instanceof HTMLElement) {
          event.target.scrollIntoView({ block: "nearest" });
        }
      }, 250);
    });

    todayShortcut.addEventListener("click", () => {
      if (isToday(viewedDate)) return;
      setViewedDate(new Date());
    });

    settingsButton.addEventListener("click", showSettingsPage);
    settingsView.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });

    page.addEventListener("touchstart", (event) => {
      if (event.touches.length === 0 || !canStartPageSwipe(event.target)) return;
      pageSwipeTracking = true;
      pageSwipeStartX = event.touches[0].clientX;
      pageSwipeStartY = event.touches[0].clientY;
      pageSwipeCurrentX = 0;
      pageSwipeAxis = null;
    }, { passive: true });

    page.addEventListener("touchmove", (event) => {
      if (!pageSwipeTracking || pageSwipeAnimating || event.touches.length === 0) return;
      const deltaX = event.touches[0].clientX - pageSwipeStartX;
      const deltaY = event.touches[0].clientY - pageSwipeStartY;

      if (pageSwipeAxis === null) {
        if (Math.max(Math.abs(deltaX), Math.abs(deltaY)) < 6) return;
        pageSwipeAxis = Math.abs(deltaX) > Math.abs(deltaY) ? "horizontal" : "vertical";
      }
      if (pageSwipeAxis !== "horizontal") return;

      if (dateSwipeOverlay.classList.contains("is-hidden")) {
        lockPageSwipeScroll();
        preparePageSwipeOverlay();
      }

      const width = Math.max(datePageHost.clientWidth, 1);
      const maxDrag = width * 0.92;
      const displayX = Math.sign(deltaX) * Math.min(Math.abs(deltaX), maxDrag);
      setPageSwipeTrack(displayX, "none");
    }, { passive: true });

    page.addEventListener("touchend", (event) => {
      if (!pageSwipeTracking || pageSwipeAnimating) return;
      const deltaX = event.changedTouches[0].clientX - pageSwipeStartX;
      const deltaY = event.changedTouches[0].clientY - pageSwipeStartY;
      if (pageSwipeAxis === null) {
        pageSwipeAxis = Math.abs(deltaX) > Math.abs(deltaY) ? "horizontal" : "vertical";
      }

      if (pageSwipeAxis === "horizontal") {
        const threshold = Math.max(54, datePageHost.clientWidth * 0.16);
        if (deltaX <= -threshold) {
          finishPageSwipe(1, -1);
        } else if (deltaX >= threshold) {
          finishPageSwipe(-1, 1);
        } else {
          resetPageSwipePosition(true);
        }
      }

      pageSwipeTracking = false;
      pageSwipeAxis = null;
    }, { passive: true });

    page.addEventListener("touchcancel", () => {
      if (!pageSwipeTracking) return;
      if (!pageSwipeAnimating) resetPageSwipePosition(true);
      pageSwipeTracking = false;
      pageSwipeAxis = null;
    }, { passive: true });

    weekNav.addEventListener("touchstart", (event) => {
      if (weekSwipeAnimating) return;
      weekSwipeStartX = event.touches[0].clientX;
      weekSwipeStartY = event.touches[0].clientY;
      weekSwipeCurrentX = 0;
      weekSwipeAxis = null;
      weekSwipeSuppressClick = false;
    }, { passive: true });

    weekNav.addEventListener("touchmove", (event) => {
      if (weekSwipeAnimating || event.touches.length === 0) return;
      const deltaX = event.touches[0].clientX - weekSwipeStartX;
      const deltaY = event.touches[0].clientY - weekSwipeStartY;

      if (weekSwipeAxis === null) {
        if (Math.max(Math.abs(deltaX), Math.abs(deltaY)) < 6) return;
        weekSwipeAxis = Math.abs(deltaX) > Math.abs(deltaY) ? "horizontal" : "vertical";
      }
      if (weekSwipeAxis !== "horizontal") return;

      weekSwipeSuppressClick = Math.abs(deltaX) > 8;
      const width = Math.max(weekNav.clientWidth, 1);
      const maxDrag = width * 0.92;
      const displayX = Math.sign(deltaX) * Math.min(Math.abs(deltaX), maxDrag);
      weekDays.classList.add("is-dragging");
      weekDays.style.transform = `translate3d(${displayX}px, 0, 0)`;
      weekDays.style.opacity = "1";
      weekSwipeCurrentX = displayX;
    }, { passive: true });

    weekNav.addEventListener("touchend", (event) => {
      if (weekSwipeAnimating) return;
      const deltaX = event.changedTouches[0].clientX - weekSwipeStartX;
      const deltaY = event.changedTouches[0].clientY - weekSwipeStartY;
      if (weekSwipeAxis === null) {
        weekSwipeAxis = Math.abs(deltaX) > Math.abs(deltaY) ? "horizontal" : "vertical";
      }

      if (weekSwipeAxis !== "horizontal") {
        weekSwipeAxis = null;
        return;
      }

      weekSwipeSuppressClick = Math.abs(deltaX) > 8;
      const threshold = Math.max(48, weekNav.clientWidth * 0.18);
      if (deltaX <= -threshold) {
        goToNextWeek();
      } else if (deltaX >= threshold) {
        goToPrevWeek();
      } else {
        resetWeekSwipePosition(true);
        setTimeout(() => {
          if (weekSwipeAnimating) return;
          weekDays.style.removeProperty("transition");
          weekDays.style.removeProperty("transform");
          weekDays.style.removeProperty("opacity");
        }, 340);
      }

      weekSwipeAxis = null;
      setTimeout(() => {
        weekSwipeSuppressClick = false;
      }, 450);
    }, { passive: true });

    weekNav.addEventListener("touchcancel", () => {
      if (!weekSwipeAnimating) resetWeekSwipePosition(true);
      weekSwipeAxis = null;
      weekSwipeSuppressClick = false;
    }, { passive: true });

    weekNav.addEventListener("click", (event) => {
      if (!weekSwipeSuppressClick) return;
      event.preventDefault();
      event.stopImmediatePropagation();
    }, true);

    document.addEventListener("pointerdown", (event) => {
      if (editingRecordIndex === null) return;
      if (event.target.closest(".edit-panel, .time-picker, .time-picker-overlay")) return;
      cancelEditingRecord();
    });

    document.addEventListener("click", (event) => {
      closeCalendarMenu();
      if (settingsMode !== "settings") return;
      if (event.target.closest(".config-action-menu-wrap")) return;
      if (openCategoryActionMenuIndex === null && openTagActionMenuKey === null) return;
      openCategoryActionMenuIndex = null;
      openTagActionMenuKey = null;
      renderSettingsPage();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (tagDetailDraft) {
          closeTagDetailEditor();
        }
        closeCtxMenu();
        closeBottomSheet();
        closeCalendarMenu();
        closeCalendarImportPanel();
        closeExportRangePanel();
        closeTimePicker();
      }
    });

    renderTimePickerColumn(timePickerHour, 24);
    renderTimePickerColumn(timePickerMinute, 60);

    schemaV1BackupReady = ensureSchemaV1Backup();
    render();
    if (hasGistSettings() && schemaV1BackupReady) {
      syncWithGist();
    } else {
      updateSyncIndicators();
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  </script>
</body>
</html>
