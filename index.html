<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dotlog</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dotlog">
  <meta name="theme-color" content="#FFFFFF">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #FFFFFF;
      --text: #1A1A1A;
      --muted: #8A8A8A;
      --accent: #606060;
      --border: #E0DDD8;
      --paper: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 0 20px 100px;
    }

    .top-region {
      position: sticky;
      top: 0;
      z-index: 500;
      padding: calc(10px + env(safe-area-inset-top)) 0 10px;
      border-bottom: 1px solid rgba(224, 221, 216, 0.72);
      background: var(--bg);
      box-shadow: 0 4px 10px rgba(26, 26, 26, 0.025);
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 32px;
      padding: 0;
      border-bottom: 0;
    }

    .page-header,
    .month-bar,
    .week-nav,
    .period-header {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .icon-button {
      border: 0;
      background: transparent;
      color: var(--muted);
      display: inline-grid;
      width: 28px;
      height: 28px;
      place-items: center;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
    }

    .icon-button:hover {
      color: var(--text);
    }

    .calendar-menu-wrap {
      position: relative;
      z-index: 9999;
      display: inline-grid;
    }

    .calendar-menu {
      position: absolute;
      top: 34px;
      right: 0;
      z-index: 9999;
      width: 168px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 10px 28px rgba(26, 26, 26, 0.12);
    }

    .calendar-menu-item {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      align-items: center;
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      touch-action: manipulation;
    }

    .calendar-menu-item + .calendar-menu-item {
      border-top: 1px solid var(--border);
    }

    .calendar-menu-item:hover {
      background: #F0EDEA;
    }

    .calendar-menu-icon {
      color: var(--muted);
      text-align: center;
    }

    .is-hidden {
      display: none !important;
    }

    .month-title {
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 0;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .top-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 21px;
      padding-top: 2px;
    }

    .month-meta {
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .week-nav {
      overflow: hidden;
      margin: 0;
      padding: 8px 0 6px;
      user-select: none;
    }

    .week-header,
    .week-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .week-header {
      margin-bottom: 3px;
    }

    .week-header span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }

    .week-days {
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .week-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      border: 0;
      background: transparent;
      padding: 2px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .week-day-num {
      display: flex;
      width: 32px;
      height: 32px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: var(--text);
      font-size: 16px;
      font-weight: 400;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .week-day.is-today .week-day-num {
      color: var(--accent);
      font-weight: 700;
    }

    .week-day.is-selected:not(.is-today) .week-day-num {
      background: #E0E0E0;
      color: var(--text);
      font-weight: 600;
    }

    .week-day.is-today.is-selected .week-day-num {
      background: var(--accent);
      color: #FFFFFF;
      font-weight: 700;
    }

    .app-footer {
      padding: 42px 72px calc(22px + env(safe-area-inset-bottom));
      color: #AAA7A2;
      font-size: 11px;
      text-align: center;
      white-space: nowrap;
    }

    .app-footer-brand {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 12px;
    }

    .sync-indicator {
      min-width: 18px;
      text-align: right;
      color: var(--muted);
    }

    .sync-indicator.is-syncing {
      animation: sync-spin 1s linear infinite;
    }

    .sync-indicator.is-error {
      color: #C8A06B;
    }

    @keyframes sync-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .compact-select {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 7px 8px;
      outline: none;
    }

    .compact-select:focus {
      border-color: var(--accent);
    }

    .backfill-panel,
    .edit-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(26, 26, 26, 0.05);
    }

    .fab {
      position: fixed;
      right: 24px;
      bottom: calc(32px + env(safe-area-inset-bottom));
      z-index: 200;
      display: grid;
      width: 56px;
      height: 56px;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 4px 16px rgba(26, 26, 26, 0.18);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .fab:active {
      transform: scale(0.93);
    }

    .fab svg {
      width: 20px;
      height: 20px;
    }

    .fab.is-hidden {
      display: none;
    }

    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(26, 26, 26, 0.32);
      transition: opacity 0.25s ease;
    }

    .sheet-overlay.is-hidden {
      display: none;
    }

    .bottom-sheet {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 700;
      width: 100%;
      max-width: 680px;
      max-height: calc(100vh - 24px);
      max-height: calc(100dvh - 12px);
      margin: 0 auto;
      overflow-y: auto;
      overscroll-behavior: contain;
      border-radius: 16px 16px 0 0;
      background: var(--paper);
      padding: 12px 20px calc(40px + env(safe-area-inset-bottom));
      box-shadow: 0 -4px 24px rgba(26, 26, 26, 0.12);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .bottom-sheet.is-open {
      transform: translateY(0);
    }

    .bottom-sheet.is-hidden {
      display: none;
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      margin: 0 auto 16px;
      border-radius: 999px;
      background: var(--border);
    }

    .sheet-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }

    .sheet-input:focus {
      border-color: var(--accent);
    }

    .entry-suggestion {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 38px;
      margin-top: 8px;
      border: 1px solid rgba(224, 221, 216, 0.82);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      padding: 4px 5px 4px 11px;
      color: var(--muted);
      font-size: 13px;
    }

    .entry-suggestion.is-hidden {
      display: none;
    }

    .entry-suggestion-copy {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .entry-suggestion-value {
      color: var(--text);
      font-weight: 500;
    }

    .entry-suggestion-actions {
      display: flex;
      flex-shrink: 0;
      align-items: center;
      gap: 1px;
    }

    .entry-suggestion-action {
      display: grid;
      width: 34px;
      height: 30px;
      place-items: center;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
    }

    .entry-suggestion-action:hover {
      background: rgba(26, 26, 26, 0.045);
      color: var(--text);
    }

    .sheet-input::placeholder {
      color: var(--muted);
    }

    .sheet-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .sheet-left-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sheet-aux-btn {
      display: flex;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .sheet-aux-btn:active {
      background: var(--bg);
      color: var(--text);
    }

    .sheet-submit {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #FFFFFF;
      padding: 10px 24px;
      font-size: 15px;
      cursor: pointer;
    }

    .sheet-submit:active {
      filter: brightness(0.93);
    }

    .bottom-sheet .backfill-panel {
      margin-top: 12px;
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .bottom-sheet .split-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .entry-time-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
    }

    .entry-time-label {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 13px;
    }

    .time-range-arrow {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 14px;
    }

    .entry-time-input {
      width: 82px;
      min-width: 0;
      flex: 0 0 82px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      padding: 7px 10px;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
    }

    .entry-time-auto {
      display: inline-grid;
      width: 34px;
      align-self: stretch;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--muted);
      padding: 0;
      cursor: pointer;
    }

    .entry-time-auto:hover,
    .entry-time-auto:focus-visible,
    .entry-time-auto:active {
      border-color: var(--muted);
      color: var(--text);
    }

    .entry-time-auto svg {
      width: 16px;
      height: 16px;
    }

    .entry-classification {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .entry-classification-row {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }

    .entry-classification-label {
      color: var(--muted);
      padding-top: 4px;
      font-size: 13px;
      line-height: 1.4;
    }

    .entry-classification-options {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .date-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .form-line {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .form-line input {
      min-width: 0;
    }

    .edit-input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--paper);
      color: var(--text);
      padding: 8px 10px;
      outline: none;
    }

    .edit-input:focus {
      border-color: var(--accent);
    }

    .edit-input.is-invalid {
      border-color: #C87B7B;
    }

    .field-error {
      color: #C87B7B;
      font-size: 13px;
      line-height: 1.4;
    }

    .panel-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .panel-save {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #FFFFFF;
      padding: 7px 14px;
      cursor: pointer;
    }

    .panel-save:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .panel-cancel {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 7px 4px;
      cursor: pointer;
    }

    .panel-cancel:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .table-tools {
      padding-top: 16px;
    }

    .table-tools.is-hidden {
      display: none;
    }

    .outline-button {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      padding: 9px 14px;
      cursor: pointer;
    }

    .outline-button:hover {
      background: rgba(74, 124, 111, 0.07);
    }

    .export-status {
      color: var(--accent);
      font-size: 14px;
    }

    #tableArea {
      flex-basis: 100%;
      width: 100%;
    }

    .summary-table {
      margin-top: 16px;
      padding: 18px;
      border-radius: 8px;
      background: #FFFFFF;
      box-shadow: 0 8px 22px rgba(26, 26, 26, 0.06);
    }

    .start-note,
    .table-total {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
      margin: 12px 0;
    }

    .time-table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .time-table th,
    .time-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .time-table th {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .time-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .time-table .col-index {
      width: 42px;
    }

    .time-table .col-time {
      width: 74px;
      font-variant-numeric: tabular-nums;
    }

    .time-table .col-duration {
      width: 118px;
    }

    .time-table .col-category {
      width: 120px;
    }

    .time-table .col-tags {
      width: 170px;
    }

    .time-table .col-event {
      width: 150px;
    }

    .time-table .col-note {
      width: auto;
    }

    .time-table td {
      overflow-wrap: anywhere;
    }

    .list {
      margin: 26px 0 0;
      padding: 0;
      list-style: none;
    }

    .period-header {
      padding: 16px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .period-header:first-child {
      padding-top: 8px;
    }

    .record {
      position: relative;
      display: grid;
      grid-template-columns: 4px minmax(0, 1fr) auto;
      column-gap: 12px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 0;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: pan-y;
    }

    .record-bar {
      width: 4px;
      min-height: 36px;
      border-radius: 999px;
      align-self: stretch;
    }

    .record-gap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      min-height: 20px;
      padding: 1px 0;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      -webkit-user-select: none;
      user-select: none;
    }

    .record-gap-duration {
      white-space: nowrap;
    }

    .record-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .record-main {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0;
      line-height: 1.4;
    }

    .record-title {
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      word-break: break-all;
    }

    .record-tags {
      margin-left: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .record-sub {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      font-size: 13px;
      line-height: 1.4;
    }

    .record-category {
      border: 0;
      background: transparent;
      padding: 0;
      font-size: 13px;
      cursor: pointer;
    }

    .record-category:active {
      opacity: 0.7;
    }

    .record-duration {
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .record-time {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .record-time-start,
    .record-time-end {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .extend-to-now-button {
      display: flex;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
    }

    .extend-to-now-button:hover,
    .extend-to-now-button:focus-visible,
    .extend-to-now-button:active {
      border-color: var(--muted);
      color: var(--text);
    }

    .ctx-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.06);
      -webkit-backdrop-filter: blur(1px);
      backdrop-filter: blur(1px);
      transition: opacity 0.2s ease;
    }

    .ctx-overlay.is-hidden {
      display: none;
    }

    .ctx-overlay,
    .ctx-menu {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .ctx-menu {
      position: fixed;
      z-index: 10001;
      left: 50%;
      width: 65%;
      max-width: 320px;
      overflow: hidden;
      transform: translateX(-50%);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.12),
        0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .ctx-menu.is-hidden {
      display: none;
    }

    .ctx-menu:not(.is-hidden) {
      animation: ctxMenuIn 0.18s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .time-picker-overlay {
      position: fixed;
      inset: 0;
      z-index: 12000;
      background: rgba(26, 26, 26, 0.12);
      -webkit-backdrop-filter: blur(1px);
      backdrop-filter: blur(1px);
    }

    .time-picker {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 12001;
      width: min(280px, calc(100vw - 48px));
      transform: translate(-50%, -50%);
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 254, 251, 0.98);
      box-shadow: 0 18px 48px rgba(26, 26, 26, 0.18);
    }

    .time-picker-title {
      padding: 14px 16px 10px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
    }

    .time-picker-columns {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 28px;
    }

    .time-picker-columns::after {
      content: ":";

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getWeekStart(date) {
      const start = startOfDay(date);
      const day = start.getDay();
      start.setDate(start.getDate() + (day === 0 ? -6 : 1 - day));
      return start;
    }

    function offsetDate(date, days) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate() + days);
    }

    function isSameDate(first, second) {
      return first.getFullYear() === second.getFullYear()
        && first.getMonth() === second.getMonth()
        && first.getDate() === second.getDate();
    }

    function formatDateLabel(date) {
      const weekdays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${weekdays[date.getDay()]}`;
    }

    function formatShortDateLabel(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function formatTime(date) {
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      return `${hours}:${minutes}`;
    }

    function timeToMinutes(time) {
      const [hours, minutes] = time.split(":").map(Number);
      return hours * 60 + minutes;
    }

    function minutesToTime(totalMinutes) {
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
    }

    function formatDuration(totalMinutes) {
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;

      if (hours === 0) return `${minutes} min`;
      if (minutes === 0) return `${hours} h`;
      return `${hours} h ${minutes} min`;
    }

    function durationBetween(startTime, endTime) {
      const start = timeToMinutes(startTime);
      let end = timeToMinutes(endTime);
      if (end < start) end += 24 * 60;
      return end - start;
    }

    function durationFromPreviousDay(startTime, endTime) {
      return (24 * 60 - timeToMinutes(startTime)) + timeToMinutes(endTime);
    }

    function summaryTextForRecords(records, date) {
      if (records.length === 0) return "";
      const totalMinutes = records.reduce((total, record, index) => {
        return total + (getRecordInterval(records, index, date)?.duration || 0);
      }, 0);
      return totalMinutes > 0
        ? `${records.length} 条 · ${formatDuration(totalMinutes)}`
        : `${records.length} 条 · —`;
    }

    function getTimePeriod(time) {
      const hour = Number(time.split(":")[0]);
      if (hour < 6) return "夜间";
      if (hour < 12) return "早上";
      if (hour < 18) return "下午";
      return "晚上";
    }

    const periodOrder = ["晚上", "下午", "早上", "夜间"];

    function groupRecordsByPeriod(records) {
      return records.reduce((groups, record, index) => {
        const period = getTimePeriod(record.time);
        if (!groups[period]) groups[period] = [];
        groups[period].push({ record, index });
        return groups;
      }, {});
    }

    function daysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function fillSelect(select, values, selectedValue) {
      select.replaceChildren();
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = String(value);
        option.textContent = String(value).padStart(2, "0");
        option.selected = Number(value) === Number(selectedValue);
        select.append(option);
      });
    }

    function setDateSelectors(yearSelect, monthSelect, daySelect, date) {
      const currentYear = today.getFullYear();
      fillSelect(yearSelect, [currentYear - 1, currentYear, currentYear + 1], date.getFullYear());
      fillSelect(monthSelect, Array.from({ length: 12 }, (_, index) => index + 1), date.getMonth() + 1);
      fillSelect(daySelect, Array.from({ length: daysInMonth(date.getFullYear(), date.getMonth() + 1) }, (_, index) => index + 1), date.getDate());
    }

    function refreshDaySelector(yearSelect, monthSelect, daySelect) {
      const year = Number(yearSelect.value);
      const month = Number(monthSelect.value);
      const currentDay = Math.min(Number(daySelect.value) || 1, daysInMonth(year, month));
      fillSelect(daySelect, Array.from({ length: daysInMonth(year, month) }, (_, index) => index + 1), currentDay);
    }

    function dateFromSelectors(yearSelect, monthSelect, daySelect) {
      return startOfDay(new Date(Number(yearSelect.value), Number(monthSelect.value) - 1, Number(daySelect.value)));
    }

    function isValidTimeInput(time) {
      if (!/^\d{2}:\d{2}$/.test(time)) return false;
      const [hours, minutes] = time.split(":").map(Number);
      return hours >= 0 && hours <= 23 && minutes >= 0 && minutes <= 59;
    }

    function cloneDefaultCategoryConfig() {
      return JSON.parse(JSON.stringify(defaultCategoryConfig));
    }

    function normalizeTagConfig(tag) {
      if (typeof tag === "string") {
        return { name: tag, triggers: [] };
      }

      if (!tag || typeof tag !== "object" || !tag.name) return null;

      const triggers = Array.isArray(tag.triggers)
        ? tag.triggers
        : (Array.isArray(tag.keywords) ? tag.keywords : []);

      return {
        name: String(tag.name),
        triggers: [...new Set(triggers.map((trigger) => String(trigger).trim()).filter(Boolean))]
      };
    }

    function normalizeCategoryConfig(config) {
      const source = config && Array.isArray(config.categories)
        ? config
        : cloneDefaultCategoryConfig();

      return {
        categories: source.categories
          .filter((category) => category && category.name && category.color)
          .map((category) => ({
            name: String(category.name),
            color: String(category.color),
            tags: Array.isArray(category.tags)
              ? category.tags.map(normalizeTagConfig).filter(Boolean)
              : []
          }))
      };
    }

    function loadCategoryConfig() {
      const storedConfig = localStorage.getItem("category_config");
      if (!storedConfig) {
        const defaultConfig = normalizeCategoryConfig(cloneDefaultCategoryConfig());
        saveCategoryConfig(defaultConfig);
        return defaultConfig;
      }

      try {
        return normalizeCategoryConfig(JSON.parse(storedConfig));
      } catch {
        const defaultConfig = cloneDefaultCategoryConfig();
        saveCategoryConfig(defaultConfig);
        return defaultConfig;
      }
    }

    function saveCategoryConfig(config) {
      localStorage.setItem("category_config", JSON.stringify(normalizeCategoryConfig(config)));
      markLocalDataChanged();
    }

    function getCategories() {
      return loadCategoryConfig().categories;
    }

    function findCategory(categoryName) {
      return getCategories().find((category) => category.name === categoryName);
    }

    function getCategoryTags(categoryName) {
      const category = findCategory(categoryName);
      return category ? category.tags.map((tag) => tag.name) : [];
    }

    function categoryColor(categoryName) {
      const category = findCategory(categoryName);
      return category ? category.color : "#B0B0B0";
    }

    function parseEntryText(rawText) {
      const notes = [];
      const textWithoutNotes = rawText.replace(/（([^（）]*)）|\(([^()]*)\)/g, (match, chineseNote, englishNote) => {
        const note = (chineseNote || englishNote || "").trim();
        if (note) notes.push(note);
        return "";
      });

      const text = textWithoutNotes.replace(/\s+/g, " ").trim() || rawText.trim();

      return {
        text,
        note: notes.length ? notes.join("；") : null
      };
    }

    function parseBackfill(rawText) {
      if (!rawText.startsWith("补录")) {
        return {
          isBackfill: false,
          time: formatTime(new Date()),
          text: rawText
        };
      }

      const match = rawText.match(/^补录\s+(\S+)\s+(.+)$/);
      if (!match) {
        alert("补录格式：补录 HH:MM 事件描述");
        return null;
      }

      const time = match[1];
      const text = match[2].trim();
      if (!/^\d{2}:\d{2}$/.test(time)) {
        alert("补录格式：补录 HH:MM 事件描述");
        return null;
      }

      const [hours, minutes] = time.split(":").map(Number);
      if (hours > 23 || minutes > 59) {
        alert("时间格式不正确，请使用 00:00–23:59");
        return null;
      }

      return {
        isBackfill: true,
        time,
        text
      };
    }

    function parseSplit(rawText, endTime) {
      if (!rawText.includes("+")) {
        return { isSplit: false };
      }

      const match = rawText.match(/^(.+?)\s*\+\s*(.+?)\s+(\d+)$/);
      if (!match) {
        alert("加号拆分格式：主事件 + 次事件 时长（分钟）");
        return null;
      }

      const duration = Number(match[3]);
      if (duration < 1 || duration > 600) {
        alert("时长超出范围，请输入 1–600 分钟");
        return null;
      }

      const endMinutes = timeToMinutes(endTime);
      const secondaryEndMinutes = endMinutes - duration;
      if (secondaryEndMinutes < 0) {
        alert("拆分后时间超出当天范围，请检查时长");
        return null;
      }

      return {
        isSplit: true,
        mainText: match[1].trim(),
        secondaryText: match[2].trim(),
        secondaryEndTime: minutesToTime(secondaryEndMinutes)
      };
    }

    function storageKey(date) {
      return `time_tracker_${formatDateKey(date)}`;
    }

    function formatIcsDate(date, time) {
      const [hours, minutes] = time.split(":").map(Number);
      const eventDate = new Date(date.getFullYear(), date.getMonth(), date.getDate(), hours, minutes, 0);
      const year = eventDate.getFullYear();
      const month = String(eventDate.getMonth() + 1).padStart(2, "0");
      const day = String(eventDate.getDate()).padStart(2, "0");
      return `${year}${month}${day}T${time.replace(":", "")}00`;
    }

    function addDays(date, days) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate() + days);
    }

    function escapeIcsText(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/;/g, "\\;")
        .replace(/,/g, "\\,")
        .replace(/\r?\n/g, "\\n");
    }

    function summaryForRecord(record) {
      if (!record.tags.length) return record.text;
      return `${record.text} ${record.tags.map((tag) => `#${tag}`).join(" ")}`;
    }

    function createEventUid() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function showExportStatus(message) {
      exportStatus.textContent = message;
      clearTimeout(exportStatusTimer);
      exportStatusTimer = setTimeout(() => {
        exportStatus.textContent = "";
      }, 2000);
    }

    function getGistSettings() {
      return {
        token: localStorage.getItem("gist_token") || "",
        gistId: localStorage.getItem("gist_id") || ""
      };
    }

    function hasGistSettings() {
      const settings = getGistSettings();
      return Boolean(settings.token && settings.gistId);
    }

    function formatSyncTime(date = new Date()) {
      return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function setSyncStatus(state, message, options = {}) {
      syncStatus = {
        state,
        message,
        lastSyncedAt: options.lastSyncedAt || syncStatus.lastSyncedAt
      };

      if (state === "connected" && options.lastSyncedAt) {
        localStorage.setItem("dotlog_last_synced", options.lastSyncedAt);
      }

      updateSyncIndicators();
    }

    function updateSyncIndicators() {
      if (!hasGistSettings()) {
        syncIndicator.className = "sync-indicator is-hidden";
        syncIndicator.textContent = "";
      } else if (syncStatus.state === "syncing") {
        syncIndicator.className = "sync-indicator is-syncing";
        syncIndicator.textContent = "↑↓";
        syncIndicator.title = "同步中";
      } else if (syncStatus.state === "error") {
        syncIndicator.className = "sync-indicator is-error";
        syncIndicator.textContent = "!";
        syncIndicator.title = syncStatus.message;
      } else {
        syncIndicator.className = "sync-indicator";
        syncIndicator.textContent = "✓";
        syncIndicator.title = syncStatus.message || "已同步";
      }

      const statusNode = document.querySelector("#syncStatusText");
      if (!statusNode) return;

      statusNode.className = "sync-status";
      if (!hasGistSettings()) {
        statusNode.textContent = "● 未配置";
      } else if (syncStatus.state === "connected") {
        statusNode.classList.add("is-connected");
        statusNode.textContent = syncStatus.message;
      } else if (syncStatus.state === "syncing") {
        statusNode.textContent = "● 同步中";
      } else if (syncStatus.state === "error") {
        statusNode.classList.add("is-error");
        statusNode.textContent = syncStatus.message;
      } else {
        statusNode.textContent = "● 未配置";
      }
    }

    function isToday(date) {
      return isSameDate(date, new Date());
    }

    function normalizeRecord(record) {
      return {
        time: record.time,
        startTime: isValidTimeInput(record.startTime || "") ? record.startTime : null,
        text: record.text,
        category: record.category || null,
        note: record.note || null,
        tags: Array.isArray(record.tags) ? record.tags : [],
        isBackfill: record.isBackfill || false,
        isSplit: record.isSplit || false
      };
    }

    function getLocalUpdatedAt() {
      return localStorage.getItem("dotlog_last_updated") || "1970-01-01T00:00:00.000Z";
    }

    function collectLocalData() {
      const records = {};

      for (let index = 0; index < localStorage.length; index += 1) {
        const key = localStorage.key(index);
        if (!key || !key.startsWith("time_tracker_")) continue;

        const dateKey = key.replace("time_tracker_", "");
        try {
          const value = JSON.parse(localStorage.getItem(key)) || [];
          records[dateKey] = sortRecords(value.map(normalizeRecord));
        } catch {
          records[dateKey] = [];
        }
      }

      const settings = loadCategoryConfig();
      return {
        records,
        __settings__: settings,
        category_config: settings,
        last_updated: getLocalUpdatedAt()
      };
    }

    function getSettingsFromGistData(data) {
      return data?.__settings__ || data?.category_config || null;
    }

    function countDataRecords(data) {
      return Object.values(data?.records || {}).reduce((total, records) => {
        return total + (Array.isArray(records) ? records.length : 0);
      }, 0);
    }

    function isCurrentGistInitialized() {
      const { gistId } = getGistSettings();
      return Boolean(gistId && localStorage.getItem("dotlog_sync_initialized_gist") === gistId);
    }

    function markCurrentGistInitialized() {
      const { gistId } = getGistSettings();
      if (gistId) localStorage.setItem("dotlog_sync_initialized_gist", gistId);
    }

    function applyRemoteData(data) {
      applyingRemoteData = true;

      try {
        const keysToRemove = [];
        for (let index = 0; index < localStorage.length; index += 1) {
          const key = localStorage.key(index);
          if (key && key.startsWith("time_tracker_")) keysToRemove.push(key);
        }
        keysToRemove.forEach((key) => localStorage.removeItem(key));

        Object.entries(data.records || {}).forEach(([dateKey, records]) => {
          localStorage.setItem(`time_tracker_${dateKey}`, JSON.stringify(sortRecords((records || []).map(normalizeRecord))));
        });

        const remoteSettings = getSettingsFromGistData(data);
        if (remoteSettings) {
          localStorage.setItem("category_config", JSON.stringify(normalizeCategoryConfig(remoteSettings)));
        }

        localStorage.setItem("dotlog_last_updated", data.last_updated || new Date().toISOString());
      } finally {
        applyingRemoteData = false;
      }
    }

    function mergeGistData(localData, remoteData) {
      const mergedRecords = {};
      const allDates = new Set([
        ...Object.keys(remoteData.records || {}),
        ...Object.keys(localData.records || {})
      ]);

      allDates.forEach((dateKey) => {
        const seen = new Set();
        const merged = [];
        [...(remoteData.records?.[dateKey] || []), ...(localData.records?.[dateKey] || [])]
          .map(normalizeRecord)
          .forEach((record) => {
            const signature = JSON.stringify(record);
            if (seen.has(signature)) return;
            seen.add(signature);
            merged.push(record);
          });
        mergedRecords[dateKey] = sortRecords(merged);
      });

      const mergedSettings = normalizeCategoryConfig(
        getSettingsFromGistData(remoteData)
          || getSettingsFromGistData(localData)
          || cloneDefaultCategoryConfig()
      );

      return {
        records: mergedRecords,
        __settings__: mergedSettings,
        category_config: mergedSettings,
        last_updated: new Date().toISOString()
      };
    }

    function markLocalDataChanged() {
      if (applyingRemoteData) return;
      localStorage.setItem("dotlog_last_updated", new Date().toISOString());
      queueGistSync();
    }

    async function requestGist(method, body = null, settingsOverride = null) {
      const { token, gistId } = settingsOverride || getGistSettings();
      const response = await fetch(`https://api.github.com/gists/${encodeURIComponent(gistId)}`, {
        method,
        headers: {
          Authorization: `token ${token}`,
          Accept: "application/vnd.github+json",
          ...(body ? { "Content-Type": "application/json" } : {})
        },
        ...(body ? { body: JSON.stringify(body) } : {})
      });

      if (response.status === 401 || response.status === 403) {
        throw new Error("TOKEN_INVALID");
      }

      if (response.status === 404) {
        throw new Error("GIST_NOT_FOUND");
      }

      if (!response.ok) {
        throw new Error("NETWORK_ERROR");
      }

      return response.json();
    }

    async function fetchGistData() {
      const gist = await requestGist("GET");
      const content = gist.files?.[gistDataFile]?.content;
      if (!content) return null;
      return JSON.parse(content);
    }

    async function pushGistData(data) {
      await requestGist("PATCH", {
        files: {
          [gistDataFile]: {
            content: JSON.stringify(data, null, 2)
          }
        }
      });
    }

    function syncErrorMessage(error) {
      if (error.message === "TOKEN_INVALID") return "● Token 无效，请检查";
      if (error.message === "GIST_NOT_FOUND") return "● Gist 不存在，请检查 ID";
      return "● 无法连接，请检查网络";
    }

    async function testGistConnection() {
      if (!hasGistSettings()) return false;

      setSyncStatus("syncing", "● 同步中");
      try {
        await requestGist("GET");
        const checkedAt = new Date().toISOString();
        setSyncStatus("connected", `● 已连接，上次同步 ${formatSyncTime(new Date(checkedAt))}`, { lastSyncedAt: checkedAt });
        return true;
      } catch (error) {
        setSyncStatus("error", syncErrorMessage(error));
        return false;
      }
    }

    function queueGistSync() {
      if (!hasGistSettings() || applyingRemoteData) return;
      clearTimeout(syncTimer);
      setSyncStatus("syncing", "● 同步中");
      syncTimer = setTimeout(() => {
        syncWithGist().catch(() => {});
      }, 700);
    }

    async function syncWithGist(options = {}) {
      if (!hasGistSettings() || syncInProgress) return false;

      syncInProgress = true;
      setSyncStatus("syncing", "● 同步中");

      try {
        const localData = collectLocalData();
        const remoteData = await fetchGistData();
        let nextData = null;
        const requiresInitialMerge = options.mergeLocal || !isCurrentGistInitialized();

        if (requiresInitialMerge) {
          nextData = mergeGistData(localData, remoteData || { records: {}, category_config: null, last_updated: "1970-01-01T00:00:00.000Z" });
          applyRemoteData(nextData);
          await pushGistData(nextData);
        } else if (!remoteData) {
          nextData = { ...localData, last_updated: new Date().toISOString() };
          applyRemoteData(nextData);
          await pushGistData(nextData);
        } else {
          const localTime = Date.parse(localData.last_updated || "1970-01-01T00:00:00.000Z");
          const remoteTime = Date.parse(remoteData.last_updated || "1970-01-01T00:00:00.000Z");
          const localRecordCount = countDataRecords(localData);
          const remoteRecordCount = countDataRecords(remoteData);

          if (localRecordCount === 0 && remoteRecordCount > 0) {
            applyRemoteData(remoteData);
            nextData = remoteData;
          } else if (remoteTime > localTime) {
            applyRemoteData(remoteData);
            nextData = remoteData;
          } else if (localTime > remoteTime) {
            nextData = localData;
            await pushGistData(nextData);
          } else {
            nextData = localData;
          }
        }

        markCurrentGistInitialized();
        const syncedAt = new Date().toISOString();
        setSyncStatus("connected", `● 已连接，上次同步 ${formatSyncTime(new Date(syncedAt))}`, { lastSyncedAt: syncedAt });
        if (settingsMode === "settings") {
          renderSettingsPage();
        } else {
          render();
        }
        return true;
      } catch (error) {
        setSyncStatus("error", syncErrorMessage(error));
        return false;
      } finally {
        syncInProgress = false;
      }
    }

    function loadRecords(date) {
      try {
        const records = JSON.parse(localStorage.getItem(storageKey(date))) || [];
        return records.map(normalizeRecord);
      } catch {
        return [];
      }
    }

    function getPreviousDayBoundary(date) {
      const previousDate = addDays(date, -1);
      const previousRecords = loadRecords(previousDate);
      if (previousRecords.length === 0) return null;

      const record = previousRecords.reduce((latest, current) => {
        return timeToMinutes(current.time) > timeToMinutes(latest.time) ? current : latest;
      });

      return { date: previousDate, record };
    }

    function getDefaultStartTime(date, endTime) {
      if (!isValidTimeInput(endTime)) return "";
      const endMinutes = timeToMinutes(endTime);
      const previousRecord = loadRecords(date)
        .filter((record) => timeToMinutes(record.time) < endMinutes)
        .sort((first, second) => timeToMinutes(second.time) - timeToMinutes(first.time))[0];

      if (previousRecord) return previousRecord.time;
      return getPreviousDayBoundary(date)?.record.time || endTime;
    }

    function getRecordInterval(records, index, date) {
      const record = records[index];
      if (!record) return null;

      const previousDayBoundary = index === records.length - 1 ? getPreviousDayBoundary(date) : null;
      const previousRecord = index < records.length - 1
        ? records[index + 1]
        : previousDayBoundary?.record || null;
      const startTime = record.startTime || previousRecord?.time || null;
      if (!startTime) return null;

      const isCrossDay = index === records.length - 1
        && (record.startTime
          ? timeToMinutes(startTime) > timeToMinutes(record.time)
          : Boolean(previousDayBoundary));
      const duration = isCrossDay
        ? durationFromPreviousDay(startTime, record.time)
        : durationBetween(startTime, record.time);

      let gapMinutes = 0;
      if (record.startTime && previousRecord) {
        if (index < records.length - 1) {
          gapMinutes = Math.max(0, timeToMinutes(startTime) - timeToMinutes(previousRecord.time));
        } else if (isCrossDay) {
          gapMinutes = Math.max(0, timeToMinutes(startTime) - timeToMinutes(previousRecord.time));
        } else {
          gapMinutes = durationFromPreviousDay(previousRecord.time, startTime);
        }
      }

      return {
        startTime,
        endTime: record.time,
        duration,
        gapMinutes,
        isCrossDay,
        startDate: isCrossDay ? addDays(date, -1) : date
      };
    }

    function saveRecords(date, records) {
      localStorage.setItem(storageKey(date), JSON.stringify(records));
      markLocalDataChanged();
    }

    function canExtendRecordToNow(record, index, date, now = new Date()) {
      if (!record || index !== 0 || !isToday(date)) return false;
      const difference = now.getHours() * 60 + now.getMinutes() - timeToMinutes(record.time);
      return difference >= 3;
    }

    function extendRecordToNow(index) {
      const records = loadRecords(viewedDate);
      const record = records[index];
      const now = new Date();
      if (!canExtendRecordToNow(record, index, viewedDate, now)) return;

      record.time = formatTime(now);
      saveRecords(viewedDate, sortRecords(records));
      render();
    }

    function sortRecords(records) {
      return records
        .map((record, order) => ({ record, order }))
        .sort((a, b) => {
          const timeDiff = timeToMinutes(b.record.time) - timeToMinutes(a.record.time);
          return timeDiff || a.order - b.order;
        })
        .map((item) => item.record);
    }

    function resetDateViewState() {
      tableExpanded = false;
      openCategoryIndexes = [];
      openTagIndexes = [];
      classificationDrafts = {};
      editingRecordIndex = null;
      editDraft = null;
    }

    function setViewedDate(date) {
      viewedDate = startOfDay(date);
      currentWeekStart = getWeekStart(viewedDate);
      resetDateViewState();
      render();
    }

    function renderWeekNav() {
      weekDays.replaceChildren();
      const todayDate = startOfDay(new Date());

      monthTitle.textContent = isSameDate(viewedDate, todayDate)
        ? "今天"
        : formatShortDateLabel(viewedDate);

      for (let index = 0; index < 7; index += 1) {
        const date = offsetDate(currentWeekStart, index);
        const day = document.createElement("button");
        day.className = "week-day";
        day.type = "button";
        day.setAttribute("aria-label", formatDateLabel(date));
        if (isSameDate(date, todayDate)) day.classList.add("is-today");
        if (isSameDate(date, viewedDate)) day.classList.add("is-selected");

        const number = document.createElement("span");
        number.className = "week-day-num";
        number.textContent = String(date.getDate());
        day.append(number);

        day.addEventListener("click", () => setViewedDate(date));
        weekDays.append(day);
      }
    }

    function animateWeekTransition(direction) {
      const outX = direction === "left" ? "-100%" : "100%";
      const inX = direction === "left" ? "100%" : "-100%";
      weekDays.style.transition = "none";
      weekDays.style.opacity = "0";
      weekDays.style.transform = `translateX(${outX})`;

      requestAnimationFrame(() => {
        weekDays.style.transition = "transform 0.22s ease, opacity 0.22s ease";
        weekDays.style.transform = `translateX(${inX})`;
        requestAnimationFrame(() => {
          weekDays.style.transform = "translateX(0)";
          weekDays.style.opacity = "1";
        });
      });
    }

    function changeWeek(dayOffset, direction) {
      viewedDate = offsetDate(viewedDate, dayOffset);
      currentWeekStart = getWeekStart(viewedDate);
      resetDateViewState();
      animateWeekTransition(direction);
      render();
    }

    function goToPrevWeek() {
      changeWeek(-7, "right");
    }

    function goToNextWeek() {
      changeWeek(7, "left");
    }

    function getClassificationDraft(index, record) {
      if (!classificationDrafts[index]) {
        classificationDrafts[index] = {
          category: record.category || null,
          tags: Array.isArray(record.tags) ? [...record.tags] : []
        };
      }

      return classificationDrafts[index];
    }

    function discardClassificationDraft(index) {
      delete classificationDrafts[index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function commitClassificationDraft(index) {
      const draft = classificationDrafts[index];
      if (!draft) return;

      const records = loadRecords(viewedDate);
      if (!records[index]) return;

      records[index].category = draft.category || null;
      records[index].tags = draft.category ? [...draft.tags] : [];
      saveRecords(viewedDate, records);
      delete classificationDrafts[index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function openCategorySelection(index, record) {
      getClassificationDraft(index, record);
      openCategoryIndexes = [index];
      openTagIndexes = openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function openTagSelection(index, record) {
      getClassificationDraft(index, record);
      openTagIndexes = [index];
      openCategoryIndexes = openCategoryIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function updateRecordCategory(date, index, category, keepPickerOpen = false) {
      const records = loadRecords(date);
      if (!records[index]) return;

      records[index].category = category;
      records[index].tags = [];
      saveRecords(date, records);
      delete classificationDrafts[index];
      openCategoryIndexes = [...new Set([...openCategoryIndexes, index])];
      openTagIndexes = category
        ? [...new Set([...openTagIndexes, index])]
        : openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function updateRecordTags(date, index, tags, keepPickerOpen = true) {
      const records = loadRecords(date);
      if (!records[index]) return;

      records[index].tags = tags;
      saveRecords(date, records);
      delete classificationDrafts[index];
      openTagIndexes = keepPickerOpen
        ? [...new Set([...openTagIndexes, index])]
        : openTagIndexes.filter((itemIndex) => itemIndex !== index);
      render();
    }

    function isCategoryOpen(index) {
      return openCategoryIndexes.includes(index);
    }

    function isTagOpen(index) {
      return openTagIndexes.includes(index);
    }

    function openCtxMenu(index, record, recordEl) {

    function renderTimePickerColumn(column, count) {
      column.innerHTML = "";
      for (let value = 0; value < count; value += 1) {
        const option = document.createElement("button");
        option.className = "time-picker-option";
        option.type = "button";
        option.dataset.value = String(value);
        option.textContent = String(value).padStart(2, "0");
        option.addEventListener("click", () => selectTimePickerValue(column, value, true));
        column.append(option);
      }
    }

    function selectTimePickerValue(column, value, scroll = false) {
      const max = column === timePickerHour ? 23 : 59;
      const safeValue = Math.max(0, Math.min(max, value));
      column.querySelectorAll(".time-picker-option").forEach((option) => {
        option.classList.toggle("is-selected", Number(option.dataset.value) === safeValue);
      });
      const [hour, minute] = timePickerValue.split(":").map(Number);
      timePickerValue = column === timePickerHour
        ? `${String(safeValue).padStart(2, "0")}:${String(minute).padStart(2, "0")}`
        : `${String(hour).padStart(2, "0")}:${String(safeValue).padStart(2, "0")}`;
      if (scroll) column.scrollTo({ top: safeValue * 36, behavior: "smooth" });
    }

    function settleTimePickerColumn(column) {
      const pendingFrame = timePickerScrollFrames.get(column);
      if (pendingFrame) cancelAnimationFrame(pendingFrame);
      timePickerScrollFrames.set(column, requestAnimationFrame(() => {
        selectTimePickerValue(column, Math.round(column.scrollTop / 36));
        timePickerScrollFrames.delete(column);
      }));
    }

    function openTimePicker(target, title = "选择时间") {
      const fallback = formatTime(new Date());
      timePickerTarget = target;
      timePickerValue = isValidTimeInput(target.value) ? target.value : fallback;
      timePickerTitle.textContent = title;
      timePickerOverlay.classList.remove("is-hidden");
      timePicker.classList.remove("is-hidden");
      const [hour, minute] = timePickerValue.split(":").map(Number);
      selectTimePickerValue(timePickerHour, hour);
      selectTimePickerValue(timePickerMinute, minute);
      requestAnimationFrame(() => {
        timePickerHour.scrollTop = hour * 36;
        timePickerMinute.scrollTop = minute * 36;
      });
    }

    function closeTimePicker() {
      timePickerOverlay.classList.add("is-hidden");
      timePicker.classList.add("is-hidden");
      timePickerTarget = null;
    }

    function confirmTimePicker() {
      if (!timePickerTarget) return;
      selectTimePickerValue(timePickerHour, Math.round(timePickerHour.scrollTop / 36));
      selectTimePickerValue(timePickerMinute, Math.round(timePickerMinute.scrollTop / 36));
      const target = timePickerTarget;
      target.value = timePickerValue;
      closeTimePicker();
      target.dispatchEvent(new Event("input", { bubbles: true }));
    }

    function saveEditedRecord(index) {
      if (!editDraft || !isValidTimeInput(editDraft.startTime) || !isValidTimeInput(editDraft.time) || !editDraft.text.trim()) return;
      if (!validateEntryInterval(viewedDate, editDraft.startTime, editDraft.time)) return;

      const records = loadRecords(viewedDate);
      const original = records[index];
      if (!original) return;

      const timeChanged = editDraft.time !== original.time;
      const hasSameTime = records.some((record, recordIndex) => recordIndex !== index && record.time === editDraft.time);
      if (timeChanged && hasSameTime && !confirm("该时间已有另一条记录，是否继续保存？")) {
        return;
      }

      records[index] = {
        startTime: editDraft.startTime,
        time: editDraft.time,
        text: editDraft.text.trim(),
        category: editDraft.category || null,
        note: editDraft.note.trim() || null,
        tags: editDraft.category ? [...editDraft.tags] : [],
        isBackfill: original.isBackfill || false,
        isSplit: original.isSplit || false
      };

      saveRecords(viewedDate, sortRecords(records));
      editingRecordIndex = null;
      editDraft = null;
      editCategoryExpanded = false;
      editTagsExpanded = false;
      render();
    }

    function saveEditedCategoryName(index, input, originalName) {
      const nextName = input.value.trim();
      if (!nextName) {
        input.value = originalName;
        return;
      }

      if (categoryNameExists(nextName, index)) {
        alert("分类名称已存在");
        input.value = originalName;
        return;
      }

      const config = loadCategoryConfig();
      config.categories[index].name = nextName;
      saveCategoryConfig(config);
      editingCategoryIndex = null;
      renderSettingsPage();
    }

    function createInlineInput(value, onSave, onCancel) {
      const input = document.createElement("input");
      input.className = "inline-input";
      input.type = "text";
      input.value = value;

      let cancelled = false;
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          onSave(input);
        }

        if (event.key === "Escape") {
          cancelled = true;
          onCancel();
        }
      });

      input.addEventListener("blur", () => {
        if (!cancelled) onSave(input);
      });

      setTimeout(() => {
        input.focus();
        input.select();
      }, 0);

      return input;
    }

    function deleteCategory(index) {
      const config = loadCategoryConfig();
      const category = config.categories[index];
      if (!category) return;

      if (!confirm(`确认删除分类「${category.name}」？\n该分类下的所有标签也将一并删除。`)) {
        return;
      }

      config.categories.splice(index, 1);
      saveCategoryConfig(config);
      editingCategoryIndex = null;
      addingTagCategoryIndex = null;
      editingTag = null;
      openColorPickerIndex = null;
      renderSettingsPage();
    }

    function addTagToCategory(categoryIndex, input) {
      const tagName = input.value.trim();
      if (!tagName) return;

      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

      if (category.tags.some((tag) => tag.name === tagName)) {
        alert("标签已存在");
        return;
      }

      category.tags.push({ name: tagName, triggers: [] });
      saveCategoryConfig(config);
      addingTagCategoryIndex = null;
      renderSettingsPage();
    }

    function updateTagName(categoryIndex, tagIndex, input, originalName) {
      const tagName = input.value.trim();
      if (!tagName) {
        input.value = originalName;
        return;
      }

      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

      if (category.tags.some((tag, index) => index !== tagIndex && tag.name === tagName)) {
        alert("标签已存在");
        input.value = originalName;
        return;
      }

      category.tags[tagIndex].name = tagName;
      saveCategoryConfig(config);
      editingTag = null;
      renderSettingsPage();
    }

    function openTagDetailEditor(categoryIndex, tagIndex) {
      const category = loadCategoryConfig().categories[categoryIndex];
      const tag = category?.tags[tagIndex];
      if (!tag) return;

      tagDetailDraft = {
        categoryIndex,
        tagIndex,
        name: tag.name,
        triggers: Array.isArray(tag.triggers) ? [...tag.triggers] : [],
        error: ""
      };
      openCategoryActionMenuIndex = null;
      openTagActionMenuKey = null;
      renderSettingsPage();
    }

    function closeTagDetailEditor() {
      tagDetailDraft = null;
      renderSettingsPage();
    }

    function saveTagDetailEditor() {
      if (!tagDetailDraft) return;
      const name = tagDetailDraft.name.trim();
      if (!name) {
        tagDetailDraft.error = "请输入标签名称";
        renderSettingsPage();
        return;
      }

      const config = loadCategoryConfig();
      const category = config.categories[tagDetailDraft.categoryIndex];
      const tag = category?.tags[tagDetailDraft.tagIndex];
      if (!category || !tag) {
        tagDetailDraft.error = "标签不存在，请关闭后重试";
        renderSettingsPage();
        return;
      }

      const duplicateName = category.tags.some((item, index) => (
        index !== tagDetailDraft.tagIndex && item.name === name
      ));
      if (duplicateName) {
        tagDetailDraft.error = "标签名称已存在";
        renderSettingsPage();
        return;
      }

      tag.name = name;
      tag.triggers = [...new Set(
        tagDetailDraft.triggers
          .map((trigger) => String(trigger).trim())
          .filter(Boolean)
      )];
      saveCategoryConfig(config);
      tagDetailDraft = null;
      renderSettingsPage();
    }

      const nameLabel = document.createElement("span");
      nameLabel.className = "tag-detail-label";
      nameLabel.textContent = "标签名称";
      const nameInput = document.createElement("input");
      nameInput.className = "tag-detail-input";
      nameInput.type = "text";
      nameInput.value = tagDetailDraft.name;
      nameInput.autocomplete = "off";
      nameInput.setAttribute("aria-label", "标签名称");
      nameInput.addEventListener("input", () => {
        tagDetailDraft.name = nameInput.value;
        tagDetailDraft.error = "";
      });
      nameField.append(nameLabel, nameInput);

      const triggerField = document.createElement("div");
      triggerField.className = "tag-detail-field";
      const triggerLabel = document.createElement("span");
      triggerLabel.className = "tag-detail-label";
      triggerLabel.textContent = "触发词";
      const triggerList = document.createElement("div");
      triggerList.className = "tag-trigger-list";

      if (tagDetailDraft.triggers.length === 0) {
        const empty = document.createElement("span");
        empty.className = "tag-trigger-empty";
        empty.textContent = "暂无触发词";
        triggerList.append(empty);
      } else {
        tagDetailDraft.triggers.forEach((trigger, triggerIndex) => {
          const chip = document.createElement("span");
          chip.className = "tag-trigger-chip";
          const text = document.createElement("span");
          text.textContent = trigger;
          const remove = document.createElement("button");
          remove.className = "tag-trigger-remove";
          remove.type = "button";
          remove.textContent = "×";
          remove.setAttribute("aria-label", `删除触发词「${trigger}」`);
          remove.addEventListener("click", () => {
            tagDetailDraft.triggers.splice(triggerIndex, 1);
            tagDetailDraft.error = "";
            renderSettingsPage();
          });
          chip.append(text, remove);
          triggerList.append(chip);
        });
      }

      const addLabel = document.createElement("span");
      addLabel.className = "tag-detail-label";
      addLabel.textContent = "新增触发词";
      const addRow = document.createElement("div");
      addRow.className = "tag-trigger-add-row";
      const triggerInput = document.createElement("input");
      triggerInput.className = "tag-detail-input";
      triggerInput.type = "text";
      triggerInput.placeholder = "输入触发词";
      triggerInput.autocomplete = "off";
      triggerInput.setAttribute("aria-label", "新增触发词");
      const addButton = document.createElement("button");
      addButton.className = "tag-trigger-add";
      addButton.type = "button";
      addButton.textContent = "添加";

      function addTrigger() {
        const trigger = triggerInput.value.trim();
        if (!trigger) {
          tagDetailDraft.error = "请输入触发词";
          renderSettingsPage();
          return;
        }
        if (tagDetailDraft.triggers.includes(trigger)) {
          tagDetailDraft.error = "触发词已存在";
          renderSettingsPage();
          return;
        }
        tagDetailDraft.triggers.push(trigger);
        tagDetailDraft.error = "";
        renderSettingsPage();
      }

      triggerInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          addTrigger();
        }
      });
      addButton.addEventListener("click", addTrigger);
      addRow.append(triggerInput, addButton);
      triggerField.append(triggerLabel, triggerList, addLabel, addRow);

      const error = document.createElement("div");
      error.className = "tag-detail-error";
      error.setAttribute("role", "alert");
      error.textContent = tagDetailDraft.error;

      const actions = document.createElement("div");
      actions.className = "panel-actions tag-detail-actions";
      const saveButton = document.createElement("button");
      saveButton.className = "panel-save";
      saveButton.type = "button";
      saveButton.textContent = "保存";
      saveButton.addEventListener("click", saveTagDetailEditor);
      const cancelButton = document.createElement("button");
      cancelButton.className = "panel-cancel";
      cancelButton.type = "button";
      cancelButton.textContent = "取消";
      cancelButton.addEventListener("click", closeTagDetailEditor);
      actions.append(saveButton, cancelButton);

      fields.append(nameField, triggerField, error, actions);
      panel.append(head, fields);
      overlay.append(panel);
      return overlay;
    }

    function deleteTag(categoryIndex, tagIndex) {
      const config = loadCategoryConfig();
      const category = config.categories[categoryIndex];
      if (!category) return;

      const tag = category.tags[tagIndex];
      if (tag === undefined || !confirm(`确认删除标签「${tag.name}」？`)) return;

      category.tags.splice(tagIndex, 1);
      saveCategoryConfig(config);
      renderSettingsPage();
    }

    function buildColorPicker(categoryIndex, currentColor) {
      const panel = document.createElement("div");
      panel.className = "color-picker-panel";
      panel.classList.toggle("is-hidden", openColorPickerIndex !== categoryIndex);
      panel.dataset.categoryIndex = String(categoryIndex);

      presetColors.forEach(({ value, label }) => {
        const option = document.createElement("button");
        option.className = "color-option";
        option.classList.toggle("is-selected", value === currentColor);
        option.type = "button";
        option.style.backgroundColor = value;
        option.setAttribute("aria-label", `${label} ${value}`);
        option.addEventListener("click", () => {
          const config = loadCategoryConfig();
          const targetCategory = config.categories[categoryIndex];
          if (!targetCategory) return;
          targetCategory.color = value;
          saveCategoryConfig(config);
          openColorPickerIndex = null;
          renderSettingsPage();
        });
        panel.append(option);
      });

      return panel;
    }

    function createSettingsCategory(category, categoryIndex) {
      const item = document.createElement("section");
      item.className = "config-category";
      const isCollapsed = collapsedSettingsCategoryIndexes.has(categoryIndex);

      const head = document.createElement("div");
      head.className = "config-category-head";

      function toggleCategory() {
        if (isCollapsed) {
          collapsedSettingsCategoryIndexes.delete(categoryIndex);
        } else {
          collapsedSettingsCategoryIndexes.add(categoryIndex);
          if (addingTagCategoryIndex === categoryIndex) addingTagCategoryIndex = null;
          if (editingTag?.categoryIndex === categoryIndex) editingTag = null;
          if (openColorPickerIndex === categoryIndex) openColorPickerIndex = null;
        }
        openCategoryActionMenuIndex = null;
        openTagActionMenuKey = null;
        renderSettingsPage();
      }

      head.addEventListener("click", (event) => {
        if (event.target.closest("button")) return;
        toggleCategory();
      });

      const nameWrap = document.createElement("div");
      nameWrap.className = "config-category-identity";

      const toggleButton = document.createElement("button");
      toggleButton.className = "config-category-toggle";
      toggleButton.type = "button";
      toggleButton.textContent = isCollapsed ? "›" : "⌄";
      toggleButton.setAttribute("aria-label", `${isCollapsed ? "展开" : "收起"}分类「${category.name}」`);
      toggleButton.setAttribute("aria-expanded", String(!isCollapsed));
      toggleButton.addEventListener("click", toggleCategory);

      const swatchButton = document.createElement("button");
      swatchButton.className = "color-swatch-btn";
      swatchButton.type = "button";
      swatchButton.dataset.categoryIndex = String(categoryIndex);
      swatchButton.style.backgroundColor = category.color;
      swatchButton.setAttribute("aria-label", `选择「${category.name}」的颜色`);
      swatchButton.setAttribute("aria-expanded", String(openColorPickerIndex === categoryIndex));
      swatchButton.addEventListener("click", () => {
        openColorPickerIndex = openColorPickerIndex === categoryIndex ? null : categoryIndex;
        renderSettingsPage();
      });
      nameWrap.append(toggleButton, swatchButton);

      if (editingCategoryIndex === categoryIndex) {
        nameWrap.append(createInlineInput(
          category.name,
          (input) => saveEditedCategoryName(categoryIndex, input, category.name),
          () => {
            editingCategoryIndex = null;
            renderSettingsPage();
          }
        ));

        const name = document.createElement("span");
        name.className = "config-category-name";

        nameWrap.append(name);

      const actions = document.createElement("div");

      const addTagButton = document.createElement("button");

      addTagButton.addEventListener("click", () => {

        addingTagCategoryIndex = categoryIndex;
        openCategoryActionMenuIndex = null;
        openTagActionMenuKey = null;
        renderSettingsPage();

      const categoryMenuWrap = document.createElement("div");
      categoryMenuWrap.className = "config-action-menu-wrap";
      const categoryMenuButton = document.createElement("button");
      categoryMenuButton.className = "config-head-action";
      categoryMenuButton.type = "button";
      categoryMenuButton.textContent = "⋯";
      categoryMenuButton.setAttribute("aria-label", `分类「${category.name}」操作`);
      categoryMenuButton.setAttribute("aria-expanded", String(openCategoryActionMenuIndex === categoryIndex));
      categoryMenuButton.addEventListener("click", () => {
        openCategoryActionMenuIndex = openCategoryActionMenuIndex === categoryIndex ? null : categoryIndex;
        openTagActionMenuKey = null;
        renderSettingsPage();
      });
      categoryMenuWrap.append(categoryMenuButton);

      if (openCategoryActionMenuIndex === categoryIndex) {
        const menu = document.createElement("div");
        menu.className = "config-action-menu";
        const editButton = document.createElement("button");
        editButton.type = "button";
        editButton.textContent = "编辑名称";
        editButton.addEventListener("click", () => {
          editingCategoryIndex = categoryIndex;
          openCategoryActionMenuIndex = null;
          renderSettingsPage();
        });
        const deleteButton = document.createElement("button");
        deleteButton.className = "is-danger";
        deleteButton.type = "button";
        deleteButton.textContent = "删除分类";
        deleteButton.addEventListener("click", () => {
          openCategoryActionMenuIndex = null;
          deleteCategory(categoryIndex);
        });

      category.tags.forEach((tag, tagIndex) => {
        if (editingTag && editingTag.categoryIndex === categoryIndex && editingTag.tagIndex === tagIndex) {
          const editor = document.createElement("div");
          editor.className = "config-tag-editor";
          editor.append(createInlineInput(
            tag.name,
            (input) => updateTagName(categoryIndex, tagIndex, input, tag.name),
            () => {
              editingTag = null;
              renderSettingsPage();
            }
          ));

          openTagDetailEditor(categoryIndex, tagIndex);
        });

        const tagActions = document.createElement("div");

        const tagMenuWrap = document.createElement("div");
        tagMenuWrap.className = "config-action-menu-wrap";
        const tagMenuButton = document.createElement("button");
        tagMenuButton.className = "config-tag-action";
        tagMenuButton.type = "button";
        tagMenuButton.textContent = "⋯";
        tagMenuButton.setAttribute("aria-label", `标签「${tag.name}」操作`);
        tagMenuButton.setAttribute("aria-expanded", String(openTagActionMenuKey === tagMenuKey));
        tagMenuButton.addEventListener("click", () => {
          openTagActionMenuKey = openTagActionMenuKey === tagMenuKey ? null : tagMenuKey;
          openCategoryActionMenuIndex = null;
          renderSettingsPage();
        });
        tagMenuWrap.append(tagMenuButton);

        if (openTagActionMenuKey === tagMenuKey) {
          const menu = document.createElement("div");
          menu.className = "config-action-menu";
          const editTagButton = document.createElement("button");
          editTagButton.type = "button";
          editTagButton.textContent = "编辑标签";
          editTagButton.addEventListener("click", () => {
            openTagDetailEditor(categoryIndex, tagIndex);
          });
          const removeButton = document.createElement("button");
          removeButton.className = "is-danger";
          removeButton.type = "button";
          removeButton.textContent = "删除标签";
          removeButton.addEventListener("click", () => {
            openTagActionMenuKey = null;
            deleteTag(categoryIndex, tagIndex);
          });
          menu.append(editTagButton, removeButton);
          tagMenuWrap.append(menu);
        }

        tagActions.append(tagMenuWrap);
        tagRow.append(tagName, tagActions);
        tags.append(tagRow);
      });

      if (addingTagCategoryIndex === categoryIndex) {
        const editor = document.createElement("div");
        editor.className = "config-tag-editor";
        editor.append(createInlineInput(
          "",
          (input) => addTagToCategory(categoryIndex, input),
          () => {
            addingTagCategoryIndex = null;
            renderSettingsPage();
          }
        ));
        tags.append(editor);
      } else if (category.tags.length === 0) {
        const empty = document.createElement("div");
        empty.className = "config-tags-empty";
        empty.textContent = "暂无标签";
        tags.append(empty);
      }

      item.append(head, colorPicker);
      if (!isCollapsed) item.append(tags);
      return item;
    }

    function renderAddCategoryPanel(container) {
      if (!addingCategory) {
        const addButton = document.createElement("button");
        addButton.className = "outline-button";
        addButton.type = "button";
        addButton.textContent = "+ 添加新分类";
        addButton.addEventListener("click", () => {
          addingCategory = true;
          selectedNewCategoryColor = presetColors[0].value;
          renderSettingsPage();
        });
        container.append(addButton);
        return;
      }

      const panel = document.createElement("div");
      panel.className = "add-category-panel";

      const input = document.createElement("input");
      input.className = "inline-input";
      input.type = "text";
      input.placeholder = "分类名称";

      const swatches = document.createElement("div");
      swatches.className = "color-swatches";
      presetColors.forEach(({ value, label }) => {
        const swatch = document.createElement("button");
        swatch.className = "color-swatch";
        swatch.type = "button";
        swatch.style.backgroundColor = value;
        swatch.setAttribute("aria-label", `${label} ${value}`);
        swatch.classList.toggle("is-selected", value === selectedNewCategoryColor);
        swatch.addEventListener("click", () => {
          selectedNewCategoryColor = value;
          renderSettingsPage();
        });
        swatches.append(swatch);
      });

      const actions = document.createElement("div");
      actions.className = "add-category-actions";

      const confirmButton = document.createElement("button");
      confirmButton.className = "outline-button";
      confirmButton.type = "button";
      confirmButton.textContent = "确认";

      const cancelButton = document.createElement("button");
      cancelButton.className = "text-button";
      cancelButton.type = "button";
      cancelButton.textContent = "取消";

      function confirmAddCategory() {
        const name = input.value.trim();
        if (!name) return;
        if (categoryNameExists(name)) {
          alert("分类名称已存在");
          return;
        }

        const config = loadCategoryConfig();
        config.categories.push({
          name,
          color: selectedNewCategoryColor,
          tags: []
        });
        saveCategoryConfig(config);
        addingCategory = false;
        renderSettingsPage();
      }

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") confirmAddCategory();
        if (event.key === "Escape") {
          addingCategory = false;
          renderSettingsPage();
        }
      });
      confirmButton.addEventListener("click", confirmAddCategory);
      cancelButton.addEventListener("click", () => {
        addingCategory = false;
        renderSettingsPage();
      });

      actions.append(confirmButton, cancelButton);
      panel.append(input, swatches, actions);
      container.append(panel);

      setTimeout(() => input.focus(), 0);
    }
